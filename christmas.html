tmas-decorated-web-landscape","details":{"size":2367416,"image":{"width":2000,"height":1299}},"fileName":"HP-F1-philosophers-stone-ron-harry-hermione-great-hall-chess-christmas-decorated-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"17tbLef7PppiWU0cVDrWBV","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T15:14:31.179Z","updatedAt":"2019-10-28T16:37:58.697Z","_updatedAt":"2019-10-28T16:37:58.697Z","entryTitle":"HP-F1","displayTitle":"Harry Potter and the Philosopher's Stone ","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Philosopher's Stone ","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-philosophers-stone"}]},"intro":"There’s something about Harry Potter and the Philosopher’s Stone that feels Christmassy. While the plot might not be centred around the holiday, we think there are plenty of reasons why it could be considered a festive film…","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"PQ20oWdZgXsXqSUdYEGnu","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-12-08T11:02:15.557Z","updatedAt":"2021-12-08T11:02:15.557Z","_updatedAt":"2021-12-08T11:02:15.557Z","entryTitle":"five-reasons-why-philosophers-stone-could-be-considered-a-christmas-film-text-section-1","text":"## The gorgeous snowy scenes and decorations\nWhen you think of Christmas, one of the first things that springs to mind has to be snow – and the first film has it in spades. Who couldn’t look at it blanketing the Hogwarts grounds and not be reminded of the festive season? This was especially the case when we saw Hagrid dragging the huge Christmas trees across our screens and into the castle. The inside of Hogwarts was just as joyful – they always went all out when it came to decorations. Imagine how amazing it would feel to walk into the Great Hall and be surrounded by huge Christmas trees, festooned in baubles and ornaments. That’s how Christmas should be done."},{"contentfulId":"2HhKtxD7FOpEqeprG7L40w","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-08T10:02:34.398Z","updatedAt":"2021-12-08T10:02:34.398Z","_updatedAt":"2021-12-08T10:02:34.398Z","entryTitle":"HP-F1-philosophers-stone-harry-ron-great-hall-christmas-weasley-jumpers-decorations-web-landscape","image":{"contentfulId":"57v17EyqVzwS7FhM7Pr0TZ","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-08T10:02:26.324Z","updatedAt":"2021-12-08T10:02:26.324Z","_updatedAt":"2021-12-08T10:02:26.324Z","revision":1,"locale":"en-GB","title":"HP-F1-philosophers-stone-harry-ron-great-hall-christmas-weasley-jumpers-decorations-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/57v17EyqVzwS7FhM7Pr0TZ/4d97482b99b4ed33970b196697562413/HP-F1-philosophers-stone-harry-ron-great-hall-christmas-weasley-jumpers-decorations-web-landscape","details":{"size":2560405,"image":{"width":2000,"height":1299}},"fileName":"HP-F1-philosophers-stone-harry-ron-great-hall-christmas-weasley-jumpers-decorations-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"17tbLef7PppiWU0cVDrWBV","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T15:14:31.179Z","updatedAt":"2019-10-28T16:37:58.697Z","_updatedAt":"2019-10-28T16:37:58.697Z","entryTitle":"HP-F1","displayTitle":"Harry Potter and the Philosopher's Stone ","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Philosopher's Stone ","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-philosophers-stone"}]},{"contentfulId":"6re7i5TcD6c5xkosjn8buc","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-12-08T11:03:28.884Z","updatedAt":"2021-12-08T11:03:28.884Z","_updatedAt":"2021-12-08T11:03:28.884Z","entryTitle":"five-reasons-why-philosophers-stone-could-be-considered-a-christmas-film-text-section-2","text":"## The atmospheric music\nFrom Hedwig’s Theme to Harry’s Wonderous World, the music from the first film feels like another argument why *Philosopher’s Stone* should be considered a Christmas film. Whether it is the tinkly bell sounds or the swelling crescendos, there’s something that reminds us of the music you listen to at Christmas – which has a habit of stirring up your emotions. We know we can’t help but feel rather sentimental when we hear the soundtrack. It also feels like music that suits the winter season, rather than a summer bop, and that sets the tone for the entire film."},{"contentfulId":"9thxYHf5ceoh7GJ6pdrFh","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-12-08T11:07:19.922Z","updatedAt":"2021-12-08T11:07:19.922Z","_updatedAt":"2021-12-08T11:07:19.922Z","entryTitle":"five-reasons-why-philosophers-stone-could-be-considered-a-christmas-film-text-section-3","text":"## Harry’s first proper Christmas\nOne of the most happy and poignant scenes of the entire movie must be when Harry wakes up on Christmas Day at Hogwarts. Before this, he had suffered through years of thoroughly miserable yuletides with the Dursleys. We highly doubt he received many (if any) presents. He certainly was incredibly surprised to wake up and find that there were some gifts waiting for him at the end of his four-poster bed. It warmed our hearts to witness Harry enjoying this holiday for the first time. We were right there with him as he unwrapped everything from his iconic Weasley jumper to his father’s Invisibility Cloak and marvelled at it all. This important scene thoroughly cements the idea that *Philosopher’s Stone* is a Christmas movie."},{"contentfulId":"7I1Ctb2bJZt9OyFCNVlRQt","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-06T13:43:29.283Z","updatedAt":"2021-12-06T13:47:07.604Z","_updatedAt":"2021-12-06T13:47:07.604Z","entryTitle":"HP-F1-philosophers-stone-flitwick-decorating-christmas-tree-great-hall-web-landscape","image":{"contentfulId":"2SnLEqBsmsGnWxuo3Rh2Cn","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-06T13:43:23.288Z","updatedAt":"2021-12-06T13:43:23.288Z","_updatedAt":"2021-12-06T13:43:23.288Z","revision":1,"locale":"en-GB","title":"HP-F1-philosophers-stone-flitwick-decorating-christmas-tree-great-hall-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2SnLEqBsmsGnWxuo3Rh2Cn/c785e7a129f03be45bf086001d3607af/HP-F1-philosophers-stone-flitwick-decorating-christmas-tree-great-hall-web-landscape","details":{"size":1809469,"image":{"width":2000,"height":828}},"fileName":"HP-F1-philosophers-stone-flitwick-decorating-christmas-tree-great-hall-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"17tbLef7PppiWU0cVDrWBV","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T15:14:31.179Z","updatedAt":"2019-10-28T16:37:58.697Z","_updatedAt":"2019-10-28T16:37:58.697Z","entryTitle":"HP-F1","displayTitle":"Harry Potter and the Philosopher's Stone ","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Philosopher's Stone ","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-philosophers-stone"}]},{"contentfulId":"3dzKWNXXitGLssmfHhIjwB","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-12-08T11:16:32.801Z","updatedAt":"2021-12-08T11:16:32.801Z","_updatedAt":"2021-12-08T11:16:32.801Z","entryTitle":"five-reasons-why-philosophers-stone-could-be-considered-a-christmas-film-text-section-4","text":"## It has that Christmassy feeling\nThis one is a little harder to define as it isn’t a physical thing from the film. However, there is no doubt that the *Philosopher’s Stone* leaves you with a warm and fuzzy feeling – which is rather Christmassy. It’s like the feeling you get when you’re a kid and you’re waiting for Father Christmas to bring you presents, or when you’re sat on the sofa with your family watching Christmas television, or when you’re tucking into a fantastic Christmas feast – it makes you feel cosy and content. "},{"contentfulId":"4baGfCwtQYbP4OmfiYfMU3","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-12-08T11:17:29.917Z","updatedAt":"2021-12-08T11:17:29.917Z","_updatedAt":"2021-12-08T11:17:29.917Z","entryTitle":"five-reasons-why-philosophers-stone-could-be-considered-a-christmas-film-text-section-5","text":"## Chris Columbus’s direction \nFinally, we couldn’t finish this list without mentioning the director, Chris Columbus. Not only can you not spell Christmas without Chris, but his direction of the first film makes us think of the festive period. If we were to pinpoint why, it would probably be because of how much of a family film it turned out to be. It’s definitely one that you could all gather round to watch on Christmas Day, and everyone would find a thing they enjoyed about it. Also, he has previous experience when it comes to making festive films and has directed some other Christmas movies… there was one about a boy that was left on his own all alone at home…"},{"contentfulId":"yOqevFUFH1wvn2VKH9BSx","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-08T10:04:30.515Z","updatedAt":"2021-12-08T10:04:30.515Z","_updatedAt":"2021-12-08T10:04:30.515Z","entryTitle":"HP-F1-philosophers-stone-ron-weasley-jumper-christmas-common-room-eating-bertie-botts","image":{"contentfulId":"5sZSJ7X2Irh2gGZYUMlMrB","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-08T10:04:25.018Z","updatedAt":"2021-12-08T10:04:25.018Z","_updatedAt":"2021-12-08T10:04:25.018Z","revision":1,"locale":"en-GB","title":"HP-F1-philosophers-stone-ron-weasley-jumper-christmas-common-room-eating-bertie-botts","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5sZSJ7X2Irh2gGZYUMlMrB/1208b5f58e051fbe4bc51b32f3a33f93/HP-F1-philosophers-stone-ron-weasley-jumper-christmas-common-room-eating-bertie-botts","details":{"size":2551142,"image":{"width":2000,"height":1306}},"fileName":"HP-F1-philosophers-stone-ron-weasley-jumper-christmas-common-room-eating-bertie-botts","contentType":"image/jpeg"}},"source":[{"contentfulId":"17tbLef7PppiWU0cVDrWBV","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T15:14:31.179Z","updatedAt":"2019-10-28T16:37:58.697Z","_updatedAt":"2019-10-28T16:37:58.697Z","entryTitle":"HP-F1","displayTitle":"Harry Potter and the Philosopher's Stone ","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Philosopher's Stone ","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-philosophers-stone"}]}],"publishDate":"2021-12-24T00:00+00:00"},{"contentfulId":"2fqQz6mUdxTDqTrsDUIGKb","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2021-12-17T09:01:31.136Z","updatedAt":"2021-12-17T09:01:31.136Z","_updatedAt" ypotter.com/usf1vwtuqyxm/X3siVF6az4UBJv0osOlV7/5e42178d51f2516d8c99d2496fbe2399/HP-F6-half-blood-prince-harry-hermione-ron-walking-hogsmeade-web-landscape","details":{"size":1431293,"image":{"width":2000,"height":1333}},"fileName":"HP-F6-half-blood-prince-harry-hermione-ron-walking-hogsmeade-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"5c2mZe756Zsr2MY2EJjWmt","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-28T12:35:05.995Z","updatedAt":"2019-10-28T16:40:18.076Z","_updatedAt":"2019-10-28T16:40:18.076Z","entryTitle":"HP-F6","displayTitle":"Harry Potter and the Half-Blood Prince","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Half-Blood Prince","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-half-blood-prince"}]},"intro":"With Christmas fast approaching that can only mean one thing, presents! But is your gift giving style most like Harry, Ron or Hermione? We’ve had a think and made some decisions based on your personality.","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"29GSGYB0HlcklCsKN5qIie","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-12-13T17:53:43.145Z","updatedAt":"2021-12-13T17:56:09.243Z","_updatedAt":"2021-12-13T17:56:09.243Z","entryTitle":"is-your-gift-giving-style-most-like-harry-ron-or-hermione-text-section-1","text":"## Are you an overgenerous gift giver like Harry? \nGrowing up, Harry didn’t have much. Even though the Dursleys were hardly short of money (the mountain of birthday presents Dudley would get shows that), they spent as little as they possibly could on him. So, when he discovered the fortune left to him by his parents, he went the opposite way and wanted to share what he had with others. At the Quidditch World Cup, he bought Hermione and Ron a pair of Omnioculars without caring about the cost – he just wanted to make sure they had the best experience watching the match. He also handed Fred and George his Triwizard Tournament winnings without a second glance, and that was one thousand Galleons! If you’re someone who is known for going all out at Christmas, will happily spend more than you should if you find the perfect present and doesn’t mind being a bit short of cash in January as a result, then you’re most like Harry. Some people might assume you’re showing off but really you just want to make those you love happy."},{"contentfulId":"2Uro1B6ZcvZiWGF42ufjTL","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-07-30T14:36:25.475Z","updatedAt":"2022-01-25T16:04:01.264Z","_updatedAt":"2022-01-25T16:04:01.264Z","entryTitle":"HP-F3-prisoner-of-azkaban-harry-smiling-hogwarts-express-web-landscape","image":{"contentfulId":"18QRhwlpgMjPQ5HBea7JJl","type":"Asset","contentTypeId":"asset","createdAt":"2021-07-30T14:36:09.590Z","updatedAt":"2021-07-30T14:36:09.590Z","_updatedAt":"2021-07-30T14:36:09.590Z","revision":1,"locale":"en-GB","title":"HP-F3-prisoner-of-azkaban-harry-smiling-hogwarts-express-web-landscape","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/18QRhwlpgMjPQ5HBea7JJl/ebcfa569029e4e398408767ce2085a5c/HP-F3-prisoner-of-azkaban-harry-smiling-hogwarts-express-web-landscape","details":{"size":3342209,"image":{"width":2000,"height":1293}},"fileName":"HP-F3-prisoner-of-azkaban-harry-smiling-hogwarts-express-web-landscape","contentType":"image/jpeg"}},"imageAltText":"Harry smiling while sat in a compartment on the Hogwarts Express","source":[{"contentfulId":"20Vvqh8Xa6ssh3Ulkm4zeF","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T14:39:50.322Z","updatedAt":"2019-10-28T16:38:53.178Z","_updatedAt":"2019-10-28T16:38:53.178Z","entryTitle":"HP-F3","displayTitle":"Harry Potter and the Prisoner of Azkaban","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Prisoner of Azkaban","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-prisoner-of-azkaban"}]},{"contentfulId":"2Lr62NfH1blzyFl4I9QRiI","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-12-13T17:54:36.105Z","updatedAt":"2021-12-13T17:57:26.992Z","_updatedAt":"2021-12-13T17:57:26.992Z","entryTitle":"is-your-gift-giving-style-most-like-harry-ron-or-hermione-text-section-2","text":"## Are you a practical gift giver like Hermione? \nHermione was a rather logical and practical person, which was often reflected in the presents she gave. She always thought carefully about what someone would need as opposed to what they would want. Sometimes that really paid off – like with Harry’s Broomstick Servicing Kit. Other times its wasn’t so well received – like the talking homework planners she gave Harry and Ron as fifth-years. If you’re someone who is a fan of useful rather than decorative presents, you’re most like Hermione. Though that doesn’t mean the gifts you give are boring or impersonal. In fact, knowing exactly what would make someone’s life easier shows you have put a lot of thought into who that person is. So, whether you gave your parents that kitchen gadget they desperately needed or your friend some funky new stationary for a job they were about to begin, there’s no doubt they appreciated it."},{"contentfulId":"3UiOyaUIKBpQegBaLU8w6L","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-05-11T11:44:43.795Z","updatedAt":"2021-05-11T11:44:43.795Z","_updatedAt":"2021-05-11T11:44:43.795Z","entryTitle":"HP-F4-goblet-of-fire-hermione-smirking-great-hall-web-landscape","image":{"contentfulId":"Iia7k6aU0w01okQGfN8wd","type":"Asset","contentTypeId":"asset","createdAt":"2021-05-11T11:44:19.940Z","updatedAt":"2021-05-11T11:44:19.940Z","_updatedAt":"2021-05-11T11:44:19.940Z","revision":1,"locale":"en-GB","title":"HP-F4-goblet-of-fire-hermione-smirking-great-hall-web-landscape","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/Iia7k6aU0w01okQGfN8wd/0a822d9b4e0a6b41bec6f7dcfedffb84/HP-F4-goblet-of-fire-hermione-smirking-great-hall-web-landscape","details":{"size":2551682,"image":{"width":2000,"height":1331}},"fileName":"HP-F4-goblet-of-fire-hermione-smirking-great-hall-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"15fY8suSs8UHkOzysj3ldD","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-28T11:43:57.874Z","updatedAt":"2019-10-28T16:39:29.286Z","_updatedAt":"2019-10-28T16:39:29.286Z","entryTitle":"HP-F4","displayTitle":"Harry Potter and the Goblet of Fire","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Goblet of Fire","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-goblet-of-fire"}]},{"contentfulId":"3PgcffvlzkmdUQwUvzDc7e","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-12-13T17:54:55.410Z","updatedAt":"2021-12-13T18:01:24.874Z","_updatedAt":"2021-12-13T18:01:24.874Z","entryTitle":"is-your-gift-giving-style-most-like-harry-ron-or-hermione-text-section-3","text":"## Are you all about giving fun presents like Ron?\nChristmas presents should be all about joy! They should be things that bring a smile to your face – and they definitely shouldn’t be serious. If this is your philosophy, and you’ve been known to give anything from practical jokes to a huge box of a person’s favourite sweets, then your style is most like Ron. He was one for fun presents – especially when he helped run Weasleys’ Wizard Wheezes in *Cursed Child*. Who can forget the comb he gave to young James Potter which turned his hair pink? Or the farting gnomes that he presented to Lily? Even in his schooldays he didn’t go in for practicality. After all, he once gave Harry a bulging bag of Dungbombs for Christmas. As somebody who is similar, we reckon you enjoy embracing your childish side too – and you would be a lot of fun at Christmas."},{"contentfulId":"8AfPUp1YPw43rSQpJNB3B","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-13T17:47:15.037Z","updatedAt":"2022-02-28T17:39:45.843Z","_updatedAt":"2022-02-28T17:39:45.843Z","entryTitle":"HP-F6-half-blood-prince-ron-pyjamas-smirking-love-potion-web-landscape","image":{"contentfulId":"5Xpzr1HK3TCNJOTBvD2okc","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-13T17:47:10.698Z","updatedAt":"2021-12-13T17:47:10.698Z","_updatedAt":"2021-12-13T17:47:10.698Z","revision":1,"locale":"en-GB","title":"HP-F6-half-blood-prince-ron-pyjamas-smirking-love-potion-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5Xpzr1HK3TCNJOTBvD2okc/a16952f5548e490a91e9f78e1be97caa/HP-F6-half-blood-prince-ron-pyjamas-smirking-love-potion-web-landscape","details":{"size":2120851,"image":{"width":2000,"height":1333}},"fileName":"HP-F6-half-blood-prince-ron-pyjamas-smirking-love-potion-web-landscape","contentType":"image/jpeg"}},"imageAltText":"A close-up of Ron standing in his pyjamas and smiling","source":[{"contentfulId":"5c2mZe756Zsr2MY2EJjWmt","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-28T12:35:05.995Z","updatedAt":"2019-10-28T16:40:18.076Z","_updatedAt":"2019-10-28T16:40:18.076Z","entryTitle":"HP-F6","displayTitle":"Harry Potter and the Half-Blood Prince","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Half-Blood Prince","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-half-blood-prince"}]}],"publishDate":"2021-12-17T00:00+00:00"},{"contentfulId":"5Aqe3BZLIMhpTKcnYe7B5S","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"article","createdAt":"2020-12-15T17:42:06.222Z","updatedAt":"2020-12-21T23:05:38.456Z","_updatedAt":"2020-12-21T23:05:38.456Z","entryTitle":"2020-WEB-harry-christmases-ranked","displayTitle":"Ranked: Harry’s Christmases from the Harry Potter books","activationDate":"2020-12-15T00:00+00:00","tags":[{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"},{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"harry-christmases-ranked","mainImage":{"contentfulId":"2PqxPMpnpKqoMYkcgAsEKC-img","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-10-01T18:33:03.052Z","updatedAt":"2019-10-01T18:33:03.052Z","_updatedAt":"2019-10-01T18:33:03.052Z","entryTitle":"PMARCHIVE-WB F4 Yule Ball Professor Flitwick Christmas HP4D-14922 Cg2NJTxeWOQ2GSQy6wUoY-b7","image":{"contentfulId":"2PqxPMpnpKqoMYkcgAsEKC","type":"Asset","contentTypeId":"asset","createdAt":"2019-09-20T18:20:16.774Z","updatedAt":"2019-09-24T05:33:11.387Z","_updatedAt":"2019-09-24T05:33:11.387Z","revision":10,"locale":"en-GB","title":"WB F4 Yule Ball Professor Flitwick Christmas HP4D-14922","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2PqxPMpnpKqoMYkcgAsEKC/6f562eed0e669f7f59f4dd6f3f2c1ce5/WB_F4_Yule_Ball_Professor_Flitwick_Christmas_HP4D-14922.jpg","details":{"size":1526402,"image":{"width":4064,"height":2704}},"fileName":"WB F4 Yule Ball Professor Flitwick Christmas HP4D-14922.jpg","contentType":"image/jpeg"}},"imageCaption":"Harry Potter and the Goblet of Fire"},"intro":"How did we rank all seven of Harry’s Christmases from the Harry Potter books?","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"nqzZvkGxlqtl0jRHQrBxc","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2020-12-15T17:32:02.769Z","updatedAt":"2020-12-15T17:43:41.988Z","_updatedAt":"2020-12-15T17:43:41.988Z","entryTitle":"2020-WEB-TEXTSECTION-harry-christmases-ranked","text":"## Last place: Harry Potter and the Deathly Hallows\n\nIf camping out in the freezing cold is not your idea of a relaxing Christmas break, you’ll probably understand Harry’s final Christmas in the series being bottom of our ranking. Alone with Hermione after Ron had left the trio after a huge row, the pair ended up spending Christmas Eve being attacked by Nagini disguised as Bathilda Bagshot at Godric’s Hollow. Seeing the graves of his parents for the first time earlier in the evening was literally cold comfort. In fact, they didn’t even notice it was Christmas time until Hermione noticed the lights of the neighbouring village. Things improved a bit when Ron returned and saved Harry’s life by destroying the locket Horcrux after Harry ventured into a freezing pool to attempt to retrieve the sword of Gryffindor.\n\n![GodricsHollow WB F7 GodricsHollowReferencePhoto Still 080615 Land](//contentful.harrypotter.com/usf1vwtuqyxm/4CPPszLrFuuG0cSMm6WUcU/a738f6ae98e2719d4c2c6e04453ae0fc/GodricsHollow_WB_F7_GodricsHollowReferencePhoto_Still_080615_Land.jpg)\n\n## Sixth place: Harry Potter and the Order of the Phoenix\n\nIn Order of the Phoenix, Harry finds himself in the strange situation of visiting Arthur Weasley at St Mungo’s Hospital for Magical Maladies during the Christmas period. After seeing Arthur attacked by Nagini at the Department of Mysteries in a ‘dream’, it is Harry that sounds the alarm to Dumbledore, leading to Arthur’s rescue before it is too late. While Arthur recovered, Harry spent a lot of time back at Grimmauld Place hiding away because he was worried he was possessed by Voldemort. Hermione eventually coaxed him out and Ginny was able to convince him he wasn’t, despite his vision of Nagini coming to him from the snake’s point of view. Worries about possession don’t make for a happy Christmas.\n\u003cbr\u003e\n## Fifth place: Harry Potter and the Chamber of Secrets\n\nOn the plus side, Harry’s second year saw him spend Christmas at Hogwarts with Ron and Hermione. But it was a little fraught. Hermione finished brewing up some Polyjuice Potion on Christmas Day itself. She might have preferred another tipple, because she accidentally added a cat hair to the mix, transforming herself partially into a cat rather than Millicent Bulstrode. Harry and Ron did better, disguising themselves as Goyle and Crabbe in order to gain access to the Slytherin common room and quiz Malfoy about whether he was the Heir of Slytherin opening the Chamber of Secrets. It turned out he wasn’t. It was probably worth it – but Hermione had to spend the rest of the holidays in the hospital wing.\n\n![WB F2 PolyjuicePotion HarryAndRonDrinkPolyjuice 3533](//contentful.harrypotter.com/usf1vwtuqyxm/1I6nL8oXM0qEEGQie4Y6ia/d39c418de43e014d91ea339ae4cce141/WB_F2_PolyjuicePotion_HarryAndRonDrinkPolyjuice_3533.jpg)\n\n## Fourth place: Harry Potter and the Half-Blood Prince\n\nYou’d think Christmas at the Burrow with Lupin and the Weasleys would be great. Well, it was, until Percy turned up with Minister of Magic, Rufus Scrimgour, on Christmas Day itself. Giving them short shrift, Harry was then able to focus on his present from Kreacher: a parcel full of maggots! Still, it wasn’t as bad as the ‘My Sweetheart’ necklace that Ron received from Lavender Brown.\n\u003cbr\u003e\n## Third place: Harry Potter and the Goblet of Fire\n\nThe most extraordinary Christmas at Hogwarts saw the holding of the Yule Ball during the Triwizard Tournament. A lavish and loved-up affair where the students could bring dates to the dance, there was a lot of tension simmering under the surface. Harry attended with Parvati Patil, but would have preferred to go with Cho Chang, who instead went with Hufflepuff champion Cedric Diggory. Hermione linked arms with Durmstrung Champion and Quidditch superstar Victor Krum, filling Ron with jealousy (there with Padma Patil – the ball was hard on the Patils) which culminated in a row between the friends. Worst of all, Harry overheard a conversation between Snape and headmaster of Durmstrang Igor Karkaroff, where the latter said that his Dark Mark was burning – a sign of Voldemort’s growing power. This Christmas event presaged the tragedy to come at the Tournament’s conclusion…\n\n![WB F4 Yule Ball Professors Christmas HP4D-15050](//contentful.harrypotter.com/usf1vwtuqyxm/2v39qjuVg8oyiCg4YIyiUy/73c1409331ea9f1517941736caa1774e/WB_F4_Yule_Ball_Professors_Christmas_HP4D-15050.jpg)\n## Second place: Harry Potter and the Prisoner of Azkaban\n\nOnce again joined by Ron and Hermione, on Harry’s third Christmas at Hogwarts he received an excellent gift: the Firebolt. Hermione suspected it was from Sirius Black, at that point the notorious escapee of Azkaban, and she notified Professor McGonagall. Nothing like receiving a pressie and not being able to play with it!\n\u003cbr\u003e\n## First place: Harry Potter and the Philosopher’s Stone\n\nAfter a lifetime of Christmases at the Dursleys, it’s not surprising that Harry chose to spend Christmas at Hogwarts during his first year. It was a lot of fun, mainly because all the Weasley boys also stayed. The snowbound japes included Fred and George pelting Professor Quirrell with snow balls. But this Christmas was also tainted with personal pain. After he received the Cloak of Invisibility from Dumbledore, Harry whiled away this sleepiest part of the year exploring the nooks and crannies of Hogwarts. It was then he came upon the Mirror of Erised and a glimpse of his deceased parents: a bittersweet tang of long-lost affection in an otherwise cosy festive sea\n\n![HP-F1-harry-ron-hermione-christmas-chess](//contentful.harrypotter.com/usf1vwtuqyxm/4Lw5wUzD4UKYtxZ8CEwISM/475fae4c1508a6e533b09191419a331b/christmas-portrait-harry-ron.jpg)"}],"relatedArticleReference":[{"contentfulId":"2Ie7jIboVPbnlhKn3jM9Tq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2019-12-25T10:00:11.866Z","updatedAt":"2019-12-25T10:00:11.866Z","_updatedAt":"2019-12-25T10:00:11.866Z","entryTitle":"WEB-FEATURE-wizarding-world-christmas-cracker-jokes","displayTitle":"Some Wizarding World Christmas cracker jokes","activationDate":"2019-12-16T00:00+00:00","tags":[{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"},{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"}],"displayTag":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"web-wizarding-world-christmas-cracker-jokes","mainImage":{"contentfulId":"4BFMNY2EKPBqIqf9aKTKQl","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-12-16T16:05:44.367Z","updatedAt":"2019-12-16T16:13:39.506Z","_updatedAt":"2019-12-16T16:13:39.506Z","entryTitle":"image-web-HP3-hermione-ron-laughing-snow-winter","image":{"contentfulId":"19iG6biAW0bngUKedlnmK7","type":"Asset","contentTypeId":"asset","createdAt":"2019-12-16T16:05:40.950Z","updatedAt":"2019-12-16T16:13:32.398Z","_updatedAt":"2019-12-16T16:13:32.398Z","revision":2,"locale":"en-GB","title":"image-web-HP3-hermione-ron-laughing-snow-winter","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/19iG6biAW0bngUKedlnmK7/50773b4eb22613466e73fe53d3085540/C194-3_UP_HPE3.jpg","details":{"size":3625899,"image":{"width":4600,"height":3063}},"fileName":"C194-3_UP_HPE3.jpg","contentType":"image/jpeg"}}},"intro":"Just because wizarding Christmas crackers have more impressive prizes than Muggle ones, it doesn’t mean the jokes are any better. ","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"68oYGNfWCHeb4sZCD4GNKK","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2019-12-11T16:43:09.098Z","updatedAt":"2019-12-17T10:26:44.006Z","_updatedAt":"2019-12-17T10:26:44.006Z","entryTitle":"2019-12-25-ISSUE21-ARTICLE-TEXTSECTION-wizarding-world-christmas-cracker-jokes","text":"That said, in case you want to give your Christmas dinner a Wizarding World touch this year, feel free to try out these.  \n \n1. What do you do with a Remembrall at Christmas time?  \n \n*Let it glow!*  \n \n2. Which Weasley is it best to channel around the festive season? \n \n*Tis the season to be Molly!* \n \n3. What does Snape use to make disappointing mince pies? \n\n *The Half-Good Mince*  \n \n4. What's Dobby's favourite Christmas song? \n\n*Jingle Bell Sock*  \n\n5. What would happen if you cast Muffliato on someone around Christmas time? \n \n*They’d have a Silent Night!* \n \n6. Why should you never give a toddler gravy at Christmas? \n\n*Because of the Reasonable Restriction of Underage Sauce-ry*  \n\n7. Why was the wizard sneezing all through Christmas Day? \n \n*He took too much Flu Powder!*  \n \n8. What happens when you accidentally swallow the silver coin in a Christmas pudding? \n \n*You feel a bit Sickle*  \n\n9. What do you call someone who puts too many herbs in the stuffing? \n \n*A Parsley-Mouth!*  \n\n10. Did you hear about what happened to the Boggart in the Christmas tree?\n\n*We’d tell you, but it’s too Riddikulus*\n \nThank you, thank you. We’re here all week.  \n \n"}],"publishDate":"2019-12-16T00:00+00:00","yoursMagically":false},{"contentfulId":"6ECJLHoO7YEkI7ACPBU7hT","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"article","createdAt":"2019-12-19T14:19:42.848Z","updatedAt":"2019-12-19T16:47:03.517Z","_updatedAt":"2019-12-19T16:47:03.517Z","entryTitle":"WEB-FEATURE-ten-wizarding-treats-we'd-love-to-find-in-our-stocking","displayTitle":"Ten wizarding treats we'd love to find in our stocking","activationDate":"2019-12-16T00:00+00:00","tags":[{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"displayTag":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"web-ten-wizarding-treats-love-find-stocking","mainImage":{"contentfulId":"7eaOSB5l3Y5mzVdgqEAPQa","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-12-19T16:46:59.780Z","updatedAt":"2019-12-19T16:46:59.780Z","_updatedAt":"2019-12-19T16:46:59.780Z","entryTitle":"WB HP F3 Wizarding World sweets ","image":{"contentfulId":"4Gz39ddPErvuLyg1FHC5Ob","type":"Asset","contentTypeId":"asset","createdAt":"2019-12-19T16:46:57.096Z","updatedAt":"2019-12-19T16:48:12.568Z","_updatedAt":"2019-12-19T16:48:12.568Z","revision":2,"locale":"en-GB","title":"WB HP F3 Wizarding World sweets ","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4Gz39ddPErvuLyg1FHC5Ob/87a7b9a1dd8efaaa0c4ec8fa14d94459/F3_Prisoner_of_Azkaban_sweets.jpg","details":{"size":674666,"image":{"width":2000,"height":1247}},"fileName":"F3 Prisoner of Azkaban sweets.jpg","contentType":"image/jpeg"}}},"intro":"Imagine it’s Christmas Day at Hogwarts and you wake up in your house common room. What delicious treats would you want to unwrap on Christmas morning?","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"5UJglMh99hQJidUUX33CHs","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2019-12-05T14:44:52.701Z","updatedAt":"2019-12-16T15:24:18.243Z","_updatedAt":"2019-12-16T15:24:18.243Z","entryTitle":"2019-12-18-ISSUE20-ARTICLE-wizarding-treats-love-find-stocking","text":"### Honeydukes’ best chocolate \n\nChocolate is a remedy in the wizarding world. Madam Pomfrey was delighted to hear that Professor Lupin – the new Defence Against the Dark Arts teacher – had given chocolate to students after the Dementors boarded the Hogwarts Express in Harry ‘s third year. \n\nLupin also gifted a large bar of Honeydukes’ best chocolate to Harry after their first private anti-Dementor lesson together. Everything about Honeydukes sounds delicious, but their best chocolate. Yes please! \n\u003cbr\u003e\n### Canary Creams\n\u003cbr\u003e\n\n\u003e‘Just then, Neville caused a slight diversion by turning into a large canary.’  \n\u003e\u003cbr\u003e *Harry Potter and the Order of the Phoenix*\n\nA bargain at seven Sickles each, eating these hilarious treats – invented by Fred and George Weasley – turned witches and wizards into canaries for a minute or so, before their feathers moulted. What better way to diffuse a family argument at Christmas dinner than turning the troublemaker into a bird?\n\u003cbr\u003e\n### Sugar Quills  \n\nThese were in stock at Honeydukes and according to Ron you can suck them in class ‘and just look like you’re thinking what to write next’. When they headed to Hogsmeade in *Harry Potter and the Half-Blood Prince*, Hermione even spotted ‘Deluxe Sugar Quills’ which she reckoned would last hours. If you want to eat sweets whilst pretending to work, this would be the perfect stocking filler for you.\n\u003cbr\u003e\n### Mrs Weasley’s Homemade Fudge \n\nThis fudge may not turn you into a canary or help you recover from a Dementor attack, but it would definitely warm your heart. Mrs Weasley sent Harry ‘a large box of home-made’ fudge (as well as a Weasley jumper) his first Christmas at Hogwarts. We assume this was because Ron mentioned that Harry ‘didn’t expect any presents’.\n\nMolly Weasley really is the best – and we’re sure that fudge was pretty tasty too! \n\u003cbr\u003e\n### Skiving Snackbox  \n\nIf you haven’t heard of Skiving Snackboxes then we’ll hand over to the Weasley twins to explain: \n\n\u003e‘‘They’re double-ended, colour-coded chews. If you eat the orange half of the Puking Pastilles, you throw up. Moment you’ve been rushed out of the lesson for the hospital wing, you swallow the purple half –’  \n\u003e\n\u003e‘– which restores you to full fitness, enabling you to pursue the leisure activity of your own choice during an hour that would otherwise have been devoted to unprofitable boredom.’’  \n\u003e\u003cbr\u003e *Harry Potter and the Order of the Phoenix*  \n\nAside from Puking Pastilles, the twins also developed Fainting Fancies, Fever Fudge and Noseblood Nougat, so customers could choose their favourite fake sickness.  \n\nWe don’t think the Snackboxes would be as tasty as many of the treats on this list, but you can’t deny that they’d come in useful for those Christmas activities you might want to escape from…   \n\u003cbr\u003e\n### Chocolate Frogs \n\nHermione bought a box of Chocolate Frogs for Harry in his first year at Hogwarts and we’d be pretty excited to find even one in our stocking. Not only are they made of chocolate – which is both delicious and useful in the wizarding world – but they also have Famous Witches and Wizards cards inside them. Two presents for the price of one if you ask us. \n\u003cbr\u003e\n### Bertie Bott’s Every-Flavour Beans  \n\nWe know Albus Dumbledore avoided them, but he once set ‘Cockroach Cluster’ as his office password, so we’re not sure whether to trust his treat choices. What we do know from Ron is that ‘when they say every flavour, they mean every flavour’. Christmas fun for days! We’d just try to avoid the bogey and earwax flavours… Easy, right? \n\u003cbr\u003e\n### Pumpkin Pasties  \n\nOpening presents is hungry work so we think it’d be great to find a few Pumpkin Pasties in your stocking. In *Harry Potter and the Philosopher’s Stone*, a Pumpkin Pasty was the first treat from the trolley that Harry chomped on. Alongside all the sweet things we’d love to eat on Christmas Day, it might be a good idea to munch on something savoury too.\n\u003cbr\u003e\n### Chocolate Cauldrons \n\nRomilda Vane gave Harry some Chocolate Cauldrons for Christmas in *Harry Potter and the Half-Blood Prince* that were spiked with love potion. The whole episode was disastrous, culminating in Ron being poisoned in Slughorn’s office. But despite this, we’re still intrigued by the treats themselves. When Romilda thrust the box into Harry’s hands, she mentioned they had Firewhisky in them. And Ron ate half the box in no time which suggested they were pretty tasty. Worth a try? We think so – minus the love potion, of course.  \n\u003cbr\u003e\n### Bottle of Butterbeer \n\nA warm, foaming Butterbeer would surely be enough to keep anyone warm on a frosty Christmas morning. And after all those sugary treats, it’d be ideal to find something as tasty as a Butterbeer in your stocking to wash it all down with. Plus, Luna Lovegood let us into a little secret: Butterbeer corks can make a rather fetching necklace. A present for a friend next Christmas, perhaps?"}],"publishDate":"2019-12-16T00:00+00:00"},{"contentfulId":"1QRPNsb865OoP5MimBXp8C","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2019-12-16T12:10:32.609Z","updatedAt":"2019-12-16T12:10:32.609Z","_updatedAt":"2019-12-16T12:10:32.609Z","entryTitle":"WEB-FEATURE-seven-spells-to-survive-a-family-christmas","displayTitle":"Seven spells to survive a family Christmas ","activationDate":"2019-12-16T00:00+00:00","tags":[{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"},{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"displayTag":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"web-seven-spells-survive-family-christmas","mainImage":{"contentfulId":"7pnZAa3T8F1yfocYf1fbza","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-12-16T11:37:07.668Z","updatedAt":"2019-12-16T11:37:07.668Z","_updatedAt":"2019-12-16T11:37:07.668Z","entryTitle":"image-HP-F5-room-of-requirement-ron-hermione-twins","image":{"contentfulId":"34KllPvjqeL2jlalaHAl6b","type":"Asset","contentTypeId":"asset","createdAt":"2019-12-16T11:37:03.980Z","updatedAt":"2019-12-16T11:37:03.980Z","_updatedAt":"2019-12-16T11:37:03.980Z","revision":1,"locale":"en-GB","title":"image-HP-F5-room-of-requirement-ron-hermione-twins","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/34KllPvjqeL2jlalaHAl6b/db34de616085901b014a5cf147bd01fd/Ron__Hermione__Weasley_twins_Room_of_Req.jpg","details":{"size":1602581,"image":{"width":3600,"height":2401}},"fileName":"Ron, Hermione, Weasley twins Room of Req.jpg","contentType":"image/jpeg"}}},"intro":"Being a witch or wizard really would make life easier, just think about Apparition, Time-Turners and Muffliato. So, with Christmas around the corner, here are seven spells we wish we had up our sleeves…  ","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"cXn4s7hdBR6THLMRrX3UJ","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2019-12-16T10:08:06.645Z","updatedAt":"2019-12-16T10:58:44.806Z","_updatedAt":"2019-12-16T10:58:44.806Z","entryTitle":"web-seven-spells-to-survive-a-family-christmas-text-section-1","text":"## Undetectable Extension Charm\n\nIf you’re travelling to see family or friends at Christmas, it’s tricky to find enough room for presents, woolly hats, coats and a few festive snacks. We think the Undetectable Extension Charm Hermione placed on her small beaded bag would be the perfect solution to Christmas packing struggles."},{"contentfulId":"1nW3deuiXWQEWAYGQKQoCm-img","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-10-01T18:19:35.109Z","updatedAt":"2019-10-01T18:54:00.320Z","_updatedAt":"2019-10-01T18:54:00.320Z","entryTitle":"PMARCHIVE-HermioneGranger WB F7 HermioneInHerBedroom Still 080615 Land 5CsktElzIAE6SQMMOycuQ-b1","image":{"contentfulId":"1nW3deuiXWQEWAYGQKQoCm","type":"Asset","contentTypeId":"asset","createdAt":"2019-09-20T18:00:31.063Z","updatedAt":"2019-09-24T05:19:00.736Z","_updatedAt":"2019-09-24T05:19:00.736Z","revision":11,"locale":"en-GB","title":"HermioneGranger WB F7 HermioneInHerBedroom Still 080615 Land","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1nW3deuiXWQEWAYGQKQoCm/f217cbdfe7f7b0213f8a8b87d63d8f35/HermioneGranger_WB_F7_HermioneInHerBedroom_Still_080615_Land.jpg","details":{"size":1184874,"image":{"width":3743,"height":2496}},"fileName":"HermioneGranger_WB_F7_HermioneInHerBedroom_Still_080615_Land.jpg","contentType":"image/jpeg"}},"imageCaption":"Harry Potter and the Deathly Hallows – Part 1","imageAltText":"Hermione in her bedroom"},{"contentfulId":"QlGShqeGUBxElmFG5BnrC","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2019-12-16T10:12:16.299Z","updatedAt":"2019-12-16T10:58:55.549Z","_updatedAt":"2019-12-16T10:58:55.549Z","entryTitle":"web-seven-spells-to-survive-a-family-christmas-text-section-2","text":"## Homenum revelio\n\nThis spell reveals human presence, so we think it would come in really handy for sneaking gifts into hiding places, away from prying eyes. You can never tell who might be spying from a cupboard or under a bed in a bid to getting a peek at their Christmas gifts. This spell would definitely help keep the surprises secret.\n"},{"contentfulId":"6sK7h6DpvwxRogNFxV5tCD","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2019-12-16T10:26:10.812Z","updatedAt":"2019-12-16T10:58:26.870Z","_updatedAt":"2019-12-16T10:58:26.870Z","entryTitle":"web-seven-spells-to-survive-a-family-christmas-text-section-4","text":"## Langlock \n\nWhen Harry cast this spell on Peeves, the poltergeist was silenced because his tongue ‘had glued itself to the roof of his mouth’. Many of us have an Aunt Marge type relative attending Christmas lunch. You know who I mean. That person who always says the one thing guaranteed to start a family argument (or cause a young wizard to lose control of his magic). With Langlock you could stop the unfortunate comment before it’s even left their mouth.\n\n"},{"contentfulId":"76BU9IyyxYNXeZOVwVfrFx","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-12-16T11:21:40.206Z","updatedAt":"2019-12-16T11:21:40.206Z","_updatedAt":"2019-12-16T11:21:40.206Z","entryTitle":"image-web-HP-F3-aunt-marge-blowing-up-at-table","image":{"contentfulId":"1pAcgJnk3JSqGOTIIjENaE","type":"Asset","contentTypeId":"asset","createdAt":"2019-12-16T11:21:36.379Z","updatedAt":"2019-12-16T11:21:36.379Z","_updatedAt":"2019-12-16T11:21:36.379Z","revision":1,"locale":"en-GB","title":"image-web-HP-F3-aunt-marge-blowing-up-at-table","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1pAcgJnk3JSqGOTIIjENaE/422a5796fba8ade45d49cb33048a1706/Aunt_marge_blowing_up.jpg","details":{"size":722191,"image":{"width":2048,"height":871}},"fileName":"Aunt marge blowing up.jpg","contentType":"image/jpeg"}}},{"contentfulId":"3fGzrl66VaVaE81ik5QKNX","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2019-12-16T10:15:08.799Z","updatedAt":"2019-12-16T10:58:35.438Z","_updatedAt":"2019-12-16T10:58:35.438Z","entryTitle":"web-seven-spells-to-survive-a-family-christmas-text-section-3","text":"## Atmospheric Charm\n\nRemember that time Ron – impersonating Ministry worker Reg Cattermole – was sent to stop it raining in someone’s office? It sounded like it was something to do with an Atmospheric Charm. So, we were wondering, if the charm made it rain perhaps it might work for snow too. Worth a go, isn’t it?\n"},{"contentfulId":"4NXL551jciHqZt8jlGa2x3","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2019-12-16T10:27:33.198Z","updatedAt":"2019-12-16T10:27:43.170Z","_updatedAt":"2019-12-16T10:27:43.170Z","entryTitle":"web-seven-spells-to-survive-a-family-christmas-text-section-5","text":"## Accio\n\nWe think the Summoning Charm would definitely come in useful at Christmas. Can’t reach the last present right under the tree? Lost your glasses amongst piles of discarded wrapping paper? Want to beat everyone else to that last roast potato? Can’t reach your new Harry Potter book but too full of Christmas pudding to move? Accio! Accio! Acci–all the way.\n"},{"contentfulId":"6CH7fJiH6gsMmI6A4e0yQ8-img","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-10-01T18:18:43.599Z","updatedAt":"2019-10-01T18:59:50.878Z","_updatedAt":"2019-10-01T18:59:50.878Z","entryTitle":"PMARCHIVE-Wands WB F4 HarryPotterWandForQuidditch Still 100615 Land 1NXPGxRVz6kgmw6OMIce8y-b2","image":{"contentfulId":"6CH7fJiH6gsMmI6A4e0yQ8","type":"Asset","contentTypeId":"asset","createdAt":"2019-09-20T17:58:58.153Z","updatedAt":"2019-09-24T05:02:43.300Z","_updatedAt":"2019-09-24T05:02:43.300Z","revision":3,"locale":"en-GB","title":"Wands WB F4 HarryPotterWandForQuidditch Still 100615 Land","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6CH7fJiH6gsMmI6A4e0yQ8/65ad64e9c7bacd2fdbc368bd4a6edde9/Wands_WB_F4_HarryPotterWandForQuidditch_Still_100615_Land.jpg","details":{"size":1450769,"image":{"width":4000,"height":2661}},"fileName":"Wands_WB_F4_HarryPotterWandForQuidditch_Still_100615_Land.jpg","contentType":"image/jpeg"}},"imageCaption":"Harry Potter and the Goblet of Fire","imageAltText":"Harry holding his wand in the first task of the Triwizard Tournament "},{"contentfulId":"4LKJibd0YsufwLiZ0leB64","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2019-12-16T10:55:51.108Z","updatedAt":"2019-12-16T10:55:51.108Z","_updatedAt":"2019-12-16T10:55:51.108Z","entryTitle":"web-seven-spells-to-survive-a-family-christmas-text-section-6","text":"## Levicorpus \n \nWe reckon Levicorpus – the hooked by the ankle jinx – would have two main uses on Christmas Day, the first as a distraction from disasters. Imagine you accidentally spill some gravy? Levicorpus! Struggling to feign excitement about receiving a book you’ve already read? Levicorpus the attention away. Then there’s the Weasley twins’ entertainment factor. Levicorpus would definitely give everyone a good laugh if the cracker jokes fall flat. A family member dangling upside down in the air by their ankle would surely guarantee giggles from the whole room. Best let your target’s turkey go down first though, eh?\n"},{"contentfulId":"6og9GNH6bdOzXVL5vcVLU4","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2019-12-16T10:56:33.126Z","updatedAt":"2019-12-16T10:56:33.126Z","_updatedAt":"2019-12-16T10:56:33.126Z","entryTitle":"web-seven-spells-to-survive-a-family-christmas-text-section-7","text":"## Scourgify \n\nWhen everyone has collapsed after a hearty Christmas dinner, there’s nothing less appealing than having to drag yourself up off your chair and clean a mountain of dirty dishes. Scourgify is the answer to all your post-prandial problems. Imagine being able to get all those plates, pots and pans sparkling again, with just a swish of your wand. \n"},{"contentfulId":"2TH4NLfAOtTD19eUjA8cp9","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-12-05T17:44:27.234Z","updatedAt":"2019-12-09T13:48:36.776Z","_updatedAt":"2019-12-09T13:48:36.776Z","entryTitle":"HP-F6-wizarding-food-slughorn-party-05624","image":{"contentfulId":"7y7XO9om2rAGMnBgyElzfl","type":"Asset","contentTypeId":"asset","createdAt":"2019-12-05T17:44:13.527Z","updatedAt":"2019-12-09T13:54:15.471Z","_updatedAt":"2019-12-09T13:54:15.471Z","revision":2,"locale":"en-GB","title":"HP-F6-wizarding-food-slughorn-party-05624","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7y7XO9om2rAGMnBgyElzfl/23882bc055b1654144d638d047aa2633/quiz-pic-food.jpg","details":{"size":590558,"image":{"width":900,"height":1121}},"fileName":"quiz-pic-food.jpg","contentType":"image/gif"}},"source":[{"contentfulId":"5c2mZe756Zsr2MY2EJjWmt","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-28T12:35:05.995Z","updatedAt":"2019-10-28T16:40:18.076Z","_updatedAt":"2019-10-28T16:40:18.076Z","entryTitle":"HP-F6","displayTitle":"Harry Potter and the Half-Blood Prince","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubti
