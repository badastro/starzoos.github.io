4VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"}],"externalId":"the-importance-of-the-weasley-jumper","mainImage":{"contentfulId":"2USnYCyDPEOaFRRgQY4wcO","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-21T17:26:51.961Z","updatedAt":"2021-12-21T17:26:51.961Z","_updatedAt":"2021-12-21T17:26:51.961Z","entryTitle":"hp-f1-ron-weasley-jumper-christmas-common-room-eating-bertie-botts-app-landscape","image":{"contentfulId":"5mNxcrPooS6QSwEnuvP2sv","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-21T17:26:48.764Z","updatedAt":"2021-12-21T17:26:48.764Z","_updatedAt":"2021-12-21T17:26:48.764Z","revision":1,"locale":"en-GB","title":"hp-f1-ron-weasley-jumper-christmas-common-room-eating-bertie-botts-app-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5mNxcrPooS6QSwEnuvP2sv/4e204a1c2f41b30827894aabb57dba2f/hp-f1-ron-weasley-jumper-christmas-common-room-eating-bertie-botts-app-landscape.jpg","details":{"size":83022,"image":{"width":2000,"height":1306}},"fileName":"hp-f1-ron-weasley-jumper-christmas-common-room-eating-bertie-botts-app-landscape.jpg","contentType":"image/jpeg"}}},"intro":"Many families have their own holiday traditions, and the Weasleys were no exception – Christmas just wouldn’t be complete without every Weasley (and honorary Weasley) donning a hand-knitted, one-of-a-kind, Molly Weasley-designed creation. But the Weasley jumper was never just about cosy loungewear. It represented much more.","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"2vkpmeTJllS0GJjj3LaJRB","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-12-13T11:18:21.379Z","updatedAt":"2022-12-13T11:18:21.379Z","_updatedAt":"2022-12-13T11:18:21.379Z","entryTitle":"web-feature-the-importance-of-the-Weasley-jumper-text-section-1","text":"For Harry, receiving his first Weasley jumper was a surprise, not least because at that point he had only met Ron’s mum very briefly. But from the outset Molly Weasley seemed to sense instinctively what Harry needed: a family who would actually care for him.\n\nSo Harry’s first Weasley jumper – an emerald-green creation that came with a large box of home-made fudge – was Molly’s way of welcoming him to the fold. She was moved to add a jumper for Harry to her knitting pile after Ron said Harry wasn’t expecting any presents. Sure enough, within a year or two, he was basically part of the family. It’s almost as if the jumper itself bestowed upon Harry some honorary Weasley status. Fred and George helped Ron rescue him from the Dursley’s; Arthur secured an extra Quidditch World Cup ticket for him; Molly comforted him after Cedric’s death. (Of course, much later, Ginny actually married him, but let’s not get ahead of ourselves.)\n\nIn the meantime, every year, there was a new Weasley jumper for Harry. Which must have taken some doing, if you think about it. Even if Molly used magic to help with her festive [knitwear](https://www.wizardingworld.com/features/an-appreciation-of-harry-potter-knitwear-web) production line, she had at least 8 to produce every year: one for each of her own 7 children, plus Harry, and that’s assuming there were no other jumper recipients on her list.\n\nBut the effort was what it was all about – even though, let’s face it, not everybody appreciated a Weasley jumper. Ron complained his were always maroon, Malfoy once mocked Harry’s, and when Percy was estranged from his family, he sent it back unopened. \n\nStill, Molly kept making them. For her, it was about more than the item itself. The real magic was in its creation, and we don’t just mean the wand-work. Whatever the finished item looked like, receiving a Weasley jumper on Christmas morning was a clear demonstration of Molly’s affection for the recipient. It said: ‘you’re part of this family.’ No wonder Dobby was so pleased when Ron bestowed one on him one Christmas. Dobby definitely didn’t mind maroon."},{"contentfulId":"494m9a6urrnmYzg1q9TuND","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"quote","createdAt":"2022-12-13T11:23:36.822Z","updatedAt":"2022-12-13T11:23:36.822Z","_updatedAt":"2022-12-13T11:23:36.822Z","entryTitle":"HP4-dobby-thank-ron-for-weasley-jumper","activationDate":"2022-12-13T00:00+00:00","quoteText":"Dobby looked quite overwhelmed. ‘Sir is very kind!’ he squeaked, his eyes brimming with tears again, bowing deeply to Ron. ‘Dobby knew sir must be a great wizard, for he is Harry Potter’s greatest friend, but Dobby did not know that he was also as generous of spirit, as noble, as selfless –’","quoteAttributionTitle":"Harry Potter and the Goblet of Fire"},{"contentfulId":"3pLWTGflqdALb0RXTfmalO","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-12-13T11:26:17.565Z","updatedAt":"2022-12-13T11:26:17.565Z","_updatedAt":"2022-12-13T11:26:17.565Z","entryTitle":"web-feature-the-importance-of-the-Weasley-jumper-text-section-2","text":"And so the Weasley Christmas jumper became a regular festive tradition. We can just picture Harry and the Weasleys lounging around after Christmas dinner at [The Burrow](https://www.wizardingworld.com/features/4-reasons-we-always-wanted-to-run-away-to-the-burrow), woolly jumpers on for a snooze on the sofa. Or Ron and Harry wearing one under a Hogwarts cloak, keeping warm as they threw snowballs at Fred and George. And no doubt they were perfect for keeping off the chill of those draughty Hogwarts corridors.\n\nThe Weasley jumper was also a masterclass in gift-giving, if you ask us. A hand-made gift, unique to the wearer, lovingly created with a specific individual in mind? It ticks a lot of boxes (even if Mrs Weasley did repeatedly forget that Ron didn’t like maroon…)\n\nOverall, though, the Weasley jumper was important because of what it represented – particularly to Harry, who had never before experienced what it was like to be part of a warm, loving, slightly chaotic family. Cosy, comforting, and with ample space to snuggle in, it was basically an extension of the Weasley family home. Those jumpers did a lot more than keep out the chill for Harry. Right from the very beginning, they were symbolic of the very thing he needed: a family who actually cared for him.\n\nBring on Weasley jumper season, we say."}],"relatedArticleHeader":"Dig out your Weasley jumper and dig into these Weasley favourites","relatedArticleReference":[{"contentfulId":"cYZR86HoSetvImyc5hF4n","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2022-03-01T09:00:52.104Z","updatedAt":"2022-03-01T09:00:52.104Z","_updatedAt":"2022-03-01T09:00:52.104Z","entryTitle":"WEB-FEATURE-seven-times-ron-weasley-was-a-brilliant-friend","displayTitle":"Seven times Ron Weasley was a brilliant friend","activationDate":"2022-03-01T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"}],"externalId":"seven-times-ron-weasley-was-a-brilliant-friend","mainImage":{"contentfulId":"8AfPUp1YPw43rSQpJNB3B","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-13T17:47:15.037Z","updatedAt":"2022-02-28T17:39:45.843Z","_updatedAt":"2022-02-28T17:39:45.843Z","entryTitle":"HP-F6-half-blood-prince-ron-pyjamas-smirking-love-potion-web-landscape","image":{"contentfulId":"5Xpzr1HK3TCNJOTBvD2okc","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-13T17:47:10.698Z","updatedAt":"2021-12-13T17:47:10.698Z","_updatedAt":"2021-12-13T17:47:10.698Z","revision":1,"locale":"en-GB","title":"HP-F6-half-blood-prince-ron-pyjamas-smirking-love-potion-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5Xpzr1HK3TCNJOTBvD2okc/a16952f5548e490a91e9f78e1be97caa/HP-F6-half-blood-prince-ron-pyjamas-smirking-love-potion-web-landscape","details":{"size":2120851,"image":{"width":2000,"height":1333}},"fileName":"HP-F6-half-blood-prince-ron-pyjamas-smirking-love-potion-web-landscape","contentType":"image/jpeg"}},"imageAltText":"A close-up of Ron standing in his pyjamas and smiling","source":[{"contentfulId":"5c2mZe756Zsr2MY2EJjWmt","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-28T12:35:05.995Z","updatedAt":"2019-10-28T16:40:18.076Z","_updatedAt":"2019-10-28T16:40:18.076Z","entryTitle":"HP-F6","displayTitle":"Harry Potter and the Half-Blood Prince","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Half-Blood Prince","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-half-blood-prince"}]},"intro":"From the infamous slug incident to rescuing Harry from Privet Drive, there were plenty of times Ron Weasley proved to be an excellent friend. We look at some of his best moments.","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"4n87j5z7sfM7DvjZuHWH4r","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-02-28T17:49:42.136Z","updatedAt":"2022-02-28T17:49:42.136Z","_updatedAt":"2022-02-28T17:49:42.136Z","entryTitle":"seven-times-ron-weasley-was-a-brilliant-friend-text-section-1","text":"## The time he sacrificed himself on the chessboard\nRon was always willing to join Harry on his many adventures (despite the risks they posed) and their journey through the trapdoor was no exception. When they reached the giant chessboard, Ron proved himself to be an excellent friend. Not only did he make sure that Harry and Hermione were kept out of harm’s way, but he also sacrificed himself so that the other two could get to the Philosopher’s Stone before it was too late. \n\n\u003e‘We’re nearly there,’ he muttered suddenly. ‘Let me think – let me think...’\n\u003e\n\u003eThe white queen turned her blank face towards him.\n\u003e\n\u003e‘Yes...’ said Ron softly, ‘it’s the only way... I’ve got to be taken.’ \n\u003e\n\u003e‘NO!’ Harry and Hermione shouted.\n\u003e\n\u003e‘That’s chess!’ snapped Ron. ‘You’ve got to make some sacrifices!\n\u003e\n\u003eI take one step forward and she’ll take me – that leaves you free to checkmate the king, Harry!’\n\u003e\n\u003e‘But –’\n\u003e\n\u003e‘Do you want to stop Snape or not?’\n\u003e\n\u003e‘Ron –’\n\u003e\n\u003e‘Look, if you don’t hurry up, he’ll already have the Stone!’\n\u003e\n\u003eThere was nothing else for it.\n\u003e\n\u003e‘Ready?’ Ron called, his face pale but determined. ‘Here I go – now, don’t hang around once you’ve won.’\n\u003e\u003cbr\u003e*Harry Potter and the Philosopher’s Stone*\n"},{"contentfulId":"3qXk2Ftui4B0HVUYauvGii","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2022-02-28T17:18:32.086Z","updatedAt":"2022-02-28T17:18:32.086Z","_updatedAt":"2022-02-28T17:18:32.086Z","entryTitle":"HP-F1-philosophers-stone-harry-ron-hermione-giant-chess-board-walking-web-landscape","image":{"contentfulId":"7sos8h5NJAxHm0RB7E9hvY","type":"Asset","contentTypeId":"asset","createdAt":"2022-02-28T17:17:54.864Z","updatedAt":"2022-02-28T17:17:54.864Z","_updatedAt":"2022-02-28T17:17:54.864Z","revision":1,"locale":"en-GB","title":"HP-F1-philosophers-stone-harry-ron-hermione-giant-chess-board-walking-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7sos8h5NJAxHm0RB7E9hvY/f5b9042626ab557eae74312015c2e39c/HP-F1-philosophers-stone-harry-ron-hermione-giant-chess-board-walking-web-landscape","details":{"size":2677143,"image":{"width":2000,"height":1316}},"fileName":"HP-F1-philosophers-stone-harry-ron-hermione-giant-chess-board-walking-web-landscape","contentType":"image/jpeg"}},"imageAltText":"Harry, Ron and Hermione walking across the giant chess board","source":[{"contentfulId":"17tbLef7PppiWU0cVDrWBV","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T15:14:31.179Z","updatedAt":"2019-10-28T16:37:58.697Z","_updatedAt":"2019-10-28T16:37:58.697Z","entryTitle":"HP-F1","displayTitle":"Harry Potter and the Philosopher's Stone ","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Philosopher's Stone ","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-philosophers-stone"}]},{"contentfulId":"4YlLhZxVgNxKMue6I05ZXy","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-02-28T17:51:09.985Z","updatedAt":"2022-02-28T17:51:09.985Z","_updatedAt":"2022-02-28T17:51:09.985Z","entryTitle":"seven-times-ron-weasley-was-a-brilliant-friend-text-section-2","text":"## When he rescued Harry from the Dursleys\nWhen Harry was locked in his bedroom after the incident with the Hover Charm, Aunt Petunia’s pudding and a rogue house-elf, he had no way of getting in touch with his friends. However, Ron was not going to stand for that. After not hearing from his best friend, he took matters into his own hands and decided to rescue him. He most certainly broke the rules (and risked the wrath of his mother) but proved himself to be a true friend to Harry. \n\n\u003e‘What’s been going on?’ said Ron. ‘Why haven’t you been answering my letters? I’ve asked you to stay about twelve times, and then Dad came home and said you’d got an official warning for using magic in front of Muggles...’\n\u003e\n\u003e‘It wasn’t me – and how did he know?’\n\u003e\n\u003e‘He works for the Ministry,’ said Ron. ‘You know we’re not supposed to do spells outside school –’\n\u003e\n\u003e‘Bit rich coming from you,’ said Harry, staring at the floating car.\n\u003e\n\u003e‘Oh, this doesn’t count,’ said Ron. ‘We’re only borrowing this, it’s Dad’s, we didn’t enchant it. But doing magic in front of those Muggles you live with...’\n\u003e\n\u003e‘I told you, I didn’t – but it’ll take too long to explain now. Look, can you explain to them at Hogwarts that the Dursleys have locked me up and won’t let me come back, and obviously I can’t magic myself out, because the Ministry’ll think that’s the second spell I’ve done in three days, so –’\n\u003e\n\u003e‘Stop gibbering,’ said Ron, ‘we’ve come to take you home with us.’\n\u003e\u003cbr\u003e*Harry Potter and the Chamber of Secrets*"},{"contentfulId":"5GLqOJXEoIcgm26F0yCGiy","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-11-09T13:22:24.613Z","updatedAt":"2022-02-28T17:44:00.325Z","_updatedAt":"2022-02-28T17:44:00.325Z","entryTitle":"HP-F2-chamber-of-secrets-privet-drive-ford-anglia-harry-escape-web-landscape","image":{"contentfulId":"7cThjSQpRXsSTZDebFQpcb","type":"Asset","contentTypeId":"asset","createdAt":"2021-11-09T13:22:17.017Z","updatedAt":"2021-11-09T13:22:17.017Z","_updatedAt":"2021-11-09T13:22:17.017Z","revision":1,"locale":"en-GB","title":"HP-F2-chamber-of-secrets-privet-drive-ford-anglia-harry-escape-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7cThjSQpRXsSTZDebFQpcb/113322b8e3e6fc3569ec83d8a7760d05/HP-F2-chamber-of-secrets-privet-drive-ford-anglia-harry-escape-web-landscape","details":{"size":1249153,"image":{"width":2000,"height":829}},"fileName":"HP-F2-chamber-of-secrets-privet-drive-ford-anglia-harry-escape-web-landscape","contentType":"image/jpeg"}},"imageAltText":"The Weasley's blue flying car in the air, with a rope tied to the bars on Harry's window at Privet Drive.","source":[{"contentfulId":"Akw1bA63mc49Emh8ppfFj","type":"Link"}]},{"contentfulId":"7JsF3pCQt14DDQmNazD5wQ","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-02-28T17:52:58.859Z","updatedAt":"2022-02-28T17:52:58.859Z","_updatedAt":"2022-02-28T17:52:58.859Z","entryTitle":"seven-times-ron-weasley-was-a-brilliant-friend-text-section-3","text":"## When he stood up for Hermione against Malfoy \nDraco Malfoy was often incredibly foul, and this incident was no exception. Calling Hermione a ‘Mudblood’ was an awful thing to do. Ron clearly felt the same way and stood up for her… despite his broken wand and the slug-filled consequences. \n\n\u003e‘At least no one on the Gryffindor team had to *buy* their way in,’ said Hermione sharply. ‘*They* got in on pure talent.’\n\u003e\n\u003eThe smug look on Malfoy’s face flickered.\n\u003e\n\u003e‘No one asked your opinion, you filthy little Mudblood,’ he spat.\n\u003e\n\u003eHarry knew at once that Malfoy had said something really bad because there was an instant uproar at his words. Flint had to dive in front of Malfoy to stop Fred and George jumping on him, Alicia shrieked, *‘How dare you!’* and Ron plunged his hand into his robes, pulled out his wand, yelling, ‘You’ll pay for that one, Malfoy!’ and pointed it furiously under Flint’s arm at Malfoy’s face.\n\u003e\n\u003eA loud bang echoed around the stadium and a jet of green light shot out of the wrong end of Ron’s wand, hitting him in the stomach and sending him reeling backwards onto the grass.\n\u003e\n\u003e‘Ron! Ron! Are you all right?’ squealed Hermione.\n\u003e\n\u003eRon opened his mouth to speak, but no words came out. Instead he gave an almighty belch and several slugs dribbled out of his mouth onto his lap.\n\u003e\u003cbr\u003e*Harry Potter and the Chamber of Secrets*"},{"contentfulId":"2wpcpRq5lb2gaKMPDflbo","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2022-02-28T17:25:52.604Z","updatedAt":"2022-02-28T17:25:52.604Z","_updatedAt":"2022-02-28T17:25:52.604Z","entryTitle":"HP-F2-chamber-of-secrets-harry-ron-wands-aloft-serious-web-landscape","image":{"contentfulId":"3I5NARapGI2EIg2dYWG5aT","type":"Asset","contentTypeId":"asset","createdAt":"2022-02-28T17:25:48.861Z","updatedAt":"2022-02-28T17:25:48.861Z","_updatedAt":"2022-02-28T17:25:48.861Z","revision":1,"locale":"en-GB","title":"HP-F2-chamber-of-secrets-harry-ron-wands-aloft-serious-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3I5NARapGI2EIg2dYWG5aT/f663b53c0e7f1f767ca5c6f69b9da5ce/HP-F2-chamber-of-secrets-harry-ron-wands-aloft-serious-web-landscape","details":{"size":3073366,"image":{"width":2000,"height":1315}},"fileName":"HP-F2-chamber-of-secrets-harry-ron-wands-aloft-serious-web-landscape","contentType":"image/jpeg"}},"imageAltText":"Harry and Ron standing side-by-side with their wands raised. Both look determined.","source":[{"contentfulId":"Akw1bA63mc49Emh8ppfFj","type":"Link"}]},{"contentfulId":"4bDVT5BiwSbUHb9cdHwEc3","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-02-28T17:54:47.486Z","updatedAt":"2022-02-28T17:54:47.486Z","_updatedAt":"2022-02-28T17:54:47.486Z","entryTitle":"seven-times-ron-weasley-was-a-brilliant-friend-text-section-4","text":"## His willingness to follow the spiders into the Forbidden Forest despite his fear\nRon was terrified of spiders. So much so, his Boggart even took the shape of a giant one. Yet, he forced himself to get over his fear after Hermione was Petrified in *Chamber of Secrets*. He and Harry were determined to find out what had hurt their friend and the other students, so they went to Hagrid for some help. Unfortunately, they witnessed Hagrid being wrongly arrested, but not before he managed to leave them the cryptic clue to ‘follow the spiders’. Though we have no doubt that Ron was terrified, he still did it – because that’s what makes a good friend.\n\n\u003eInstead he contented himself with scrawling a note to Ron: *‘Let’s do it tonight.’*\n\u003e\n\u003eRon read the message, swallowed hard and looked sideways at the empty seat usually filled by Hermione. The sight seemed to stiffen his resolve, and he nodded.\n\u003e\u003cbr\u003e*Harry Potter and the Chamber of Secrets*"},{"contentfulId":"4awEz2DK3GEyeldlNsRonA","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2022-02-28T17:23:27.697Z","updatedAt":"2022-02-28T17:23:27.697Z","_updatedAt":"2022-02-28T17:23:27.697Z","entryTitle":"HP-F2-chamber-of-secrets-harry-ron-forbidden-forest-night-time-web-landscape","image":{"contentfulId":"4JtYabhUFeGwLYd93M9zWY","type":"Asset","contentTypeId":"asset","createdAt":"2022-02-28T17:23:20.255Z","updatedAt":"2022-02-28T17:23:20.255Z","_updatedAt":"2022-02-28T17:23:20.255Z","revision":1,"locale":"en-GB","title":"HP-F2-chamber-of-secrets-harry-ron-forbidden-forest-night-time-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4JtYabhUFeGwLYd93M9zWY/d4c76cb14dab8f17ceb3c97d183a6325/HP-F2-chamber-of-secrets-harry-ron-forbidden-forest-night-time-web-landscape","details":{"size":2933758,"image":{"width":2000,"height":1314}},"fileName":"HP-F2-chamber-of-secrets-harry-ron-forbidden-forest-night-time-web-landscape","contentType":"image/jpeg"}},"imageAltText":"Harry and Ron walking together in the Forbidden Forest at night. Harry holds a lantern and both look nervous..","source":[{"contentfulId":"Akw1bA63mc49Emh8ppfFj","type":"Link"}]},{"contentfulId":"2L6zPrHBP2tRj7Gzx8WqSb","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-02-28T17:58:05.161Z","updatedAt":"2022-02-28T17:58:05.161Z","_updatedAt":"2022-02-28T17:58:05.161Z","entryTitle":"seven-times-ron-weasley-was-a-brilliant-friend-text-section-5","text":"## When he stood up to Snape\nOk, Ron and Hermione might not have always seen eye-to-eye, but that didn’t mean Ron was going to let anyone else say anything about her. Despite the fact that he would happily call her a know-it-all, he still instantly stood up to her against Snape – and landed himself in a lot of trouble for his efforts. \n\n\u003e‘That is the second time you have spoken out of turn, Miss Granger,’ said Snape coolly. ‘Five more points from Gryffindor for being an insufferable know-it-all.’\n\u003e\n\u003eHermione went very red, put down her hand and stared at the floor with her eyes full of tears. It was a mark of how much the class loathed Snape that they were all glaring at him, because every one of them had called Hermione a know-it-all at least once, and Ron, who told Hermione she was a know-it-all at least twice a week, said loudly, ‘You asked us a question and she knows the answer! Why ask if you don’t want to be told?’\n\u003e\n\u003eThe class knew instantly he’d gone too far. Snape advanced on Ron slowly, and the room held its breath.\n\u003e\n\u003e‘Detention, Weasley,’ Snape said silkily, his face very close to Ron’s. ‘And if I ever hear you criticise the way I teach a class again, you will be very sorry indeed.’\n\u003e\u003cbr\u003e*Harry Potter and the Prisoner of Azkaban*"},{"contentfulId":"BRHDhvclEV419TfScY1gX","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2022-02-28T17:28:20.134Z","updatedAt":"2022-02-28T17:28:20.134Z","_updatedAt":"2022-02-28T17:28:20.134Z","entryTitle":"HP-F3-prisoner-of-azkaban-ron-classroom-smiling-web-landscape","image":{"contentfulId":"4RGgQFp9LQhjjo8E0VllW0","type":"Asset","contentTypeId":"asset","createdAt":"2022-02-28T17:27:09.316Z","updatedAt":"2022-02-28T17:27:09.316Z","_updatedAt":"2022-02-28T17:27:09.316Z","revision":1,"locale":"en-GB","title":"HP-F3-prisoner-of-azkaban-ron-classroom-smiling-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4RGgQFp9LQhjjo8E0VllW0/fc13e3c81c43fdb9146d684175d6261e/HP-F3-prisoner-of-azkaban-ron-classroom-smiling-web-landscape","details":{"size":3092007,"image":{"width":2000,"height":1315}},"fileName":"HP-F3-prisoner-of-azkaban-ron-classroom-smiling-web-landscape","contentType":"image/jpeg"}},"imageAltText":"A close-up of Ron who is smiling","source":[{"contentfulId":"20Vvqh8Xa6ssh3Ulkm4zeF","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T14:39:50.322Z","updatedAt":"2019-10-28T16:38:53.178Z","_updatedAt":"2019-10-28T16:38:53.178Z","entryTitle":"HP-F3","displayTitle":"Harry Potter and the Prisoner of Azkaban","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Prisoner of Azkaban","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-prisoner-of-azkaban"}]},{"contentfulId":"2BW4x21FEZxmmGXKnLGWGb","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-02-28T17:59:24.481Z","updatedAt":"2022-02-28T17:59:24.481Z","_updatedAt":"2022-02-28T17:59:24.481Z","entryTitle":"seven-times-ron-weasley-was-a-brilliant-friend-text-section-6","text":"## How he refused to sever ties with Harry\nWhen Voldemort returned not everybody was willing to believe it. In fact, many decided that Harry was lying. Not Ron though. He stood by Harry the entire time and never questioned his story. When his brother Percy suggested that Ron should stop hanging out with him, Ron wasn’t having any of it. He was furious. Yet again, this proved that he could be a wonderful friend. \n\n\u003eHarry looked up at Ron.\n\u003e\n\u003e‘Well,’ he said, trying to sound as though he found the whole thing a joke, ‘if you want to – er – what is it?’ – he checked Percy’s letter – ‘Oh yeah – “sever ties” with me, I swear I won’t get violent.’ \n\u003e\n\u003e‘Give it back,’ said Ron, holding out his hand. ‘He is –’ Ron said jerkily, tearing Percy’s letter in half ‘the world’s –’ he tore it into quarters ‘biggest –’ he tore it into eighths ‘git.’ He threw the pieces\ninto the fire.\n\u003e\u003cbr\u003e*Harry Potter and the Order of the Phoenix*"},{"contentfulId":"1x7gSg5UZFNEZwnuTBYsEl","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2022-02-28T17:30:31.105Z","updatedAt":"2022-02-28T17:30:31.105Z","_updatedAt":"2022-02-28T17:30:31.105Z","entryTitle":"HP-F5-order-of-the-phoenix-harry-ron-sitting-in-classroom-listening-web-landscape","image":{"contentfulId":"77agWF2NFIPVnNQICgIEW9","type":"Asset","contentTypeId":"asset","createdAt":"2022-02-28T17:30:14.468Z","updatedAt":"2022-02-28T17:30:14.468Z","_updatedAt":"2022-02-28T17:30:14.468Z","revision":1,"locale":"en-GB","title":"HP-F5-order-of-the-phoenix-harry-ron-sitting-in-classroom-listening-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/77agWF2NFIPVnNQICgIEW9/829ad1e79ebd272f3495818bb6e0b43e/HP-F5-order-of-the-phoenix-harry-ron-sitting-in-classroom-listening-web-landscape","details":{"size":1732165,"image":{"width":2000,"height":1331}},"fileName":"HP-F5-order-of-the-phoenix-harry-ron-sitting-in-classroom-listening-web-landscape","contentType":"image/jpeg"}},"imageAltText":"Harry and Ron next to each other at their desk in a lesson. Both are facing forward and listening.","source":[{"contentfulId":"6vSblg4bo8ERfWv6wulvcW","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T14:17:38.549Z","updatedAt":"2019-10-28T16:39:54.558Z","_updatedAt":"2019-10-28T16:39:54.558Z","entryTitle":"HP-F5","displayTitle":"Harry Potter and the Order of the Phoenix","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Order of the Phoenix","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-order-of-the-phoenix"}]},{"contentfulId":"1jozlyzJ8IVcpdHohiPZjo","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-02-28T18:00:20.412Z","updatedAt":"2022-02-28T18:00:20.412Z","_updatedAt":"2022-02-28T18:00:20.412Z","entryTitle":"seven-times-ron-weasley-was-a-brilliant-friend-text-section-7","text":"## When he came back after leaving Harry and Hermione\nYes, Ron was completely in the wrong for leaving Harry and Hermione behind. And yes, that is an example of him being a terrible friend. But he immediately realised that, swallowed his pride and tried his hardest to return to them. He was eventually successful – and saved Harry’s life in the process. Owning up to your mistake is something that takes a lot of courage. Ron being willing to fight for two of his most important relationships demonstrated that, at his core, he was truly loyal.  \n\n\u003e‘I’m sorry,’ he said in a thick voice. ‘I’m sorry I left. I know I was a – a –’\n\u003e\n\u003eHe looked around at the darkness, as if hoping a bad enough word would swoop down upon him and claim him.\n\u003e\n\u003e‘You’ve sort of made up for it tonight,’ said Harry. ‘Getting the sword. Finishing off the Horcrux. Saving my life.’\n\u003e\n\u003e‘That makes me sound a lot cooler than I was,’ Ron mumbled.\n\u003e\u003cbr\u003e*Harry Potter and the Deathly Hallows*"},{"contentfulId":"1HKoMuCyTX8mki8g4zOzXC","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-07-05T13:04:40.877Z","updatedAt":"2022-02-28T17:42:44.922Z","_updatedAt":"2022-02-28T17:42:44.922Z","entryTitle":"HP-F7-deathly-hallows-part-1-hermione-ron-return-camp-angry-web-landscape","image":{"contentfulId":"1kigbkEhWNNqspQ4xRe1LK","type":"Asset","contentTypeId":"asset","createdAt":"2021-07-05T13:04:17.107Z","updatedAt":"2021-07-05T13:04:17.107Z","_updatedAt":"2021-07-05T13:04:17.107Z","revision":1,"locale":"en-GB","title":"HP-F7-deathly-hallows-part-1-hermione-ron-return-camp-angry-web-landscape","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1kigbkEhWNNqspQ4xRe1LK/454cca36978802856a94a71aa1d68ef3/HP-F7-deathly-hallows-part-1-hermione-ron-return-camp-angry-web-landscape","details":{"size":1865746,"image":{"width":2000,"height":1333}},"fileName":"HP-F7-deathly-hallows-part-1-hermione-ron-return-camp-angry-web-landscape","contentType":"image/jpeg"}},"imageAltText":"Hermione and Ron outside in a snowy wood. She is angrily hitting him with a bag and Harry is stood in the background.","source":[{"contentfulId":"5ldWCMR6l74JrDEciUBXgp","type":"Link"}]}],"publishDate":"2022-03-01T00:00+00:00"},{"contentfulId":"1cUa7DPxcaqcJWDCrltjXn","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"article","createdAt":"2021-10-29T12:31:57.128Z","updatedAt":"2021-10-30T08:00:55.476Z","_updatedAt":"2021-10-30T08:00:55.476Z","entryTitle":"WEB-FEATURE-five-reasons-why-you-should-never-overlook-molly-weasley","displayTitle":"Five reasons why you should never overlook Molly Weasley ","activationDate":"2021-10-25T00:00+01:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"}],"externalId":"five-reasons-why-you-should-never-overlook-molly-weasley","mainImage":{"contentfulId":"outoeSEZ6f0rQQYn3twfp","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-07-01T10:18:13.985Z","updatedAt":"2021-07-01T10:18:13.985Z","_updatedAt":"2021-07-01T10:18:13.985Z","entryTitle":"HP-F5-order-of-the-phoenix-molly-harry-grimmauld-place-happy-web-landscape","image":{"contentfulId":"7jmUrZM3qC1BRYtPzkQlXY","type":"Asset","contentTypeId":"asset","createdAt":"2021-07-01T10:17:58.776Z","updatedAt":"2021-07-01T10:17:58.776Z","_updatedAt":"2021-07-01T10:17:58.776Z","revision":1,"locale":"en-GB","title":"HP-F5-order-of-the-phoenix-molly-harry-grimmauld-place-happy-web-landscape","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7jmUrZM3qC1BRYtPzkQlXY/79cca0ab513ef7c1f433beef8563463d/HP-F5-order-of-the-phoenix-molly-harry-grimmauld-place-happy-web-landscape","details":{"size":2362928,"image":{"width":2000,"height":1333}},"fileName":"HP-F5-order-of-the-phoenix-molly-harry-grimmauld-place-happy-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"6vSblg4bo8ERfWv6wulvcW","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T14:17:38.549Z","updatedAt":"2019-10-28T16:39:54.558Z","_updatedAt":"2019-10-28T16:39:54.558Z","entryTitle":"HP-F5","displayTitle":"Harry Potter and the Order of the Phoenix","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Order of the Phoenix","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-order-of-the-phoenix"}]},"intro":"As the matriarch of one of the most popular and rambunctious wizarding families in Britain, Molly Weasley is well-loved. However, there was so much more to her than her role as a loving (if exasperated!) mum. This is why you shouldn’t overlook her.","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"1JVfrCP5MmAt9BsZ7Lib1U","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-10-25T14:46:45.234Z","updatedAt":"2021-10-25T14:46:45.234Z","_updatedAt":"2021-10-25T14:46:45.234Z","entryTitle":"five-reasons-why-you-should-never-overlook-molly-weasley-text-section-1","text":"## Molly’s magical ability\nSo, we all know that Mrs Weasley was a total legend – her takedown of Bellatrix in the Battle of Hogwarts was superb. However, outside of that moment, a lot of her other magical abilities were overlooked. Molly was a whizz when it came to household and healing spells, but they weren’t often acknowledged because of their domestic nature. Her most used spells may not have been as flashy as the ones used by other prominent characters, but they were still complex and skilful. Nobody was able to pull off a mouth-watering meal quite like Mrs Weasley and Harry certainly appreciated her efforts. \n\n\u003eBy seven o’clock, the two tables were groaning under dishes and dishes of Mrs Weasley’s excellent cooking, and the nine Weasleys, Harry and Hermione were settling themselves down to eat beneath a clear, deep-blue sky. To somebody who had been living on meals of increasingly stale cake all summer, this was paradise, and at first, Harry listened rather than talked, as he helped himself to chicken-and-ham pie, boiled potatoes and salad. \n\u003e\u003cbr\u003e*Harry Potter and the Goblet of Fire*"},{"contentfulId":"4CN1yHW0h1qkm5z94s9jOg","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-10-25T13:29:37.867Z","updatedAt":"2021-10-25T13:29:37.867Z","_updatedAt":"2021-10-25T13:29:37.867Z","entryTitle":"HP-F6-half-blood-prince-molly-weasley-the-burrown-stairs-web-landscape","image":{"contentfulId":"YZRCyUOXawQCVy9XJGpHB","type":"Asset","contentTypeId":"asset","createdAt":"2021-10-25T13:29:23.695Z","updatedAt":"2021-10-25T13:29:23.695Z","_updatedAt":"2021-10-25T13:29:23.695Z","revision":1,"locale":"en-GB","title":"HP-F6-half-blood-prince-molly-weasley-the-burrown-stairs-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/YZRCyUOXawQCVy9XJGpHB/64f64320553d8de0ae8ccc7552319c50/HP-F6-half-blood-prince-molly-weasley-the-burrown-stairs-web-landscape","details":{"size":2529661,"image":{"width":2000,"height":1334}},"fileName":"HP-F6-half-blood-prince-molly-weasley-the-burrown-stairs-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"5c2mZe756Zsr2MY2EJjWmt","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-28T12:35:05.995Z","updatedAt":"2019-10-28T16:40:18.076Z","_updatedAt":"2019-10-28T16:40:18.076Z","entryTitle":"HP-F6","displayTitle":"Harry Potter and the Half-Blood Prince","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Half-Blood Prince","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-half-blood-prince"}]},{"contentfulId":"6rB3N2lfWD1uvANCvitIhU","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-10-25T14:47:48.298Z","updatedAt":"2021-10-25T15:13:11.474Z","_updatedAt":"2021-10-25T15:13:11.474Z","entryTitle":"five-reasons-why-you-should-never-overlook-molly-weasley-text-section-2","text":"## She stood up for what was right\nMolly wasn’t in the first iteration of the Order of the Phoenix but that doesn’t mean she hadn’t consistently opposed Voldemort. Her resolve never wavered, despite losing her brothers Fabian and Gideon when Voldemort was first in power. She instilled that resolve in her family (though Percy took longer to come around). When Voldemort returned, she joined the Order and stayed at the headquarters in Grimmauld Place – despite knowing the possible risks. Even the death of her son Fred, during the Battle of Hogwarts, was not enough to stop her from fighting to help bring an end to Voldemort’s reign of terror."},{"contentfulId":"2fHjT9VFXNQiD5o9JB1Hjc","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-07-01T10:21:09.566Z","updatedAt":"2022-03-07T17:33:37.435Z","_updatedAt":"2022-03-07T17:33:37.435Z","entryTitle":"HP-F8-deathly-hallows-part-2-molly-duel-wand-fierce-web-landscape","image":{"contentfulId":"4rzKMGapRrgEQtNnkQ7XCR","type":"Asset","contentTypeId":"asset","createdAt":"2021-07-01T10:20:55.711Z","updatedAt":"2021-07-01T10:20:55.711Z","_updatedAt":"2021-07-01T10:20:55.711Z","revision":1,"locale":"en-GB","title":"HP-F8-deathly-hallows-part-2-molly-duel-wand-fierce-web-landscape","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4rzKMGapRrgEQtNnkQ7XCR/9f09217b654cd8d2a70ebbad846027bd/HP-F8-deathly-hallows-part-2-molly-duel-wand-fierce-web-landscape","details":{"size":1890500,"image":{"width":2000,"height":1333}},"fileName":"HP-F8-deathly-hallows-part-2-molly-duel-wand-fierce-web-landscape","contentType":"image/jpeg"}},"imageAltText":"A close-up of Molly Weasley looking determined and holding her wand up while duelling in the Great Hall at the Battle of Hogwarts","source":[{"contentfulId":"5VGVe8xvZVmCS6kECzBSpb","type":"Link"}]},{"contentfulId":"4TBd6IhdQL9A0LeTEmMHa4","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-10-25T14:48:22.950Z","updatedAt":"2021-10-25T14:48:22.950Z","_updatedAt":"2021-10-25T14:48:22.950Z","entryTitle":"five-reasons-why-you-should-never-overlook-molly-weasley-text-section-3","text":"## Mrs Weasley loved fiercely\nMrs Weasley had a lot of love to give. Though sometimes she may have seemed to be as ferocious as a Hungarian Horntail, there was no doubt that she was dedicated to her family and loved them with that same ferocity. She was also willing to extend that love to others. After all, she was the consistent mother figure in Harry’s life. From his first year at Hogwarts, she made him feel wanted. She knitted him sweaters, invited him to stay, supported him and loved him like her own. There was one moment in particular that stood out to us. When Cedric was killed in front of Harry, she was the one to bring him the most comfort. Knowing he would have been traumatised, she hugged him like a mother would, which reminded him that he was loved. "},{"contentfulId":"3K8IwGjitge9ZQG1KrI3yE","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-10-25T13:27:04.311Z","updatedAt":"2021-10-25T13:27:04.311Z","_updatedAt":"2021-10-25T13:27:04.311Z","entryTitle":"HP-F1-philosophers-stone-molly-weasley-ginny-harry-platform-nine-and-three-quarters-web-landscape","image":{"contentfulId":"5ZYgxen0IIUt1dYM1s0nsd","type":"Asset","contentTypeId":"asset","createdAt":"2021-10-25T13:26:57.597Z","updatedAt":"2021-10-25T13:26:57.597Z","_updatedAt":"2021-10-25T13:26:57.597Z","revision":1,"locale":"en-GB","title":"HP-F1-philosophers-stone-molly-weasley-ginny-harry-platform-nine-and-three-quarters-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5ZYgxen0IIUt1dYM1s0nsd/43ec67ff4e1e0aad35fdeca0f06d91f9/HP-F1-philosophers-stone-molly-weasley-ginny-harry-platform-nine-and-three-quarters-web-landscape","details":{"size":2678022,"image":{"width":2000,"height":1309}},"fileName":"HP-F1-philosophers-stone-molly-weasley-ginny-harry-platform-nine-and-three-quarters-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"17tbLef7PppiWU0cVDrWBV","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T15:14:31.179Z","updatedAt":"2019-10-28T16:37:58.697Z","_updatedAt":"2019-10-28T16:37:58.697Z","entryTitle":"HP-F1","displayTitle":"Harry Potter and the Philosopher's Stone ","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Philosopher's Stone ","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-philosophers-stone"}]},{"contentfulId":"UeqWKuAHRdiaXacZ0kG0B","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-10-25T14:49:38.098Z","updatedAt":"2021-10-25T14:49:38.098Z","_updatedAt":"2021-10-25T14:49:38.098Z","entryTitle":"five-reasons-why-you-should-never-overlook-molly-weasley-text-section-4","text":"## Molly was often (unintentionally) hilarious\nWhen you think of the funniest characters in the Harry Potter books, Mrs Weasley probably doesn’t spring to mind. However, Molly could be funny. It wasn’t always intentional, but the relationship she had with her family (especially Fred and George) often provided relief when the story became intense. For instance, when Ron was very unhappy about the… interesting dress robes she had given him, her response was a classic Molly comeback…\n\n\u003e‘I’m never wearing them,’ Ron was saying stubbornly. ‘Never.’ \n\u003e\n\u003e‘Fine,’ snapped Mrs Weasley. ‘Go naked. And Harry, make sure you get a picture of him. Goodness knows I could do with a laugh.’ \n\u003e\u003cbr\u003e*Harry Potter and the Goblet of Fire*"},{"contentfulId":"6OlWUQeqnAd5o9APPlX4Aq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-10-25T13:28:19.132Z","updatedAt":"2021-10-25T13:28:19.132Z","_updatedAt":"2021-10-25T13:28:19.132Z","entryTitle":"HP-F5-order-of-the-phoenix-weasleys-christmas-grimmauld-place-web-landscape","image":{"contentfulId":"yzOg13hw0sgBTcoyqVEcy","type":"Asset","contentTypeId":"asset","createdAt":"2021-10-25T13:28:13.500Z","updatedAt":"2021-10-25T13:28:13.500Z","_updatedAt":"2021-10-25T13:28:13.500Z","revision":1,"locale":"en-GB","title":"HP-F5-order-of-the-phoenix-weasleys-christmas-grimmauld-place-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/yzOg13hw0sgBTcoyqVEcy/e7060d6cca54531097bc2ff35653c5ea/HP-F5-order-of-the-phoenix-weasleys-christmas-grimmauld-place-web-landscape","details":{"size":2177108,"image":{"width":2000,"height":1333}},"fileName":"HP-F5-order-of-the-phoenix-weasleys-christmas-grimmauld-place-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"6vSblg4bo8ERfWv6wulvcW","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T14:17:38.549Z","updatedAt":"2019-10-28T16:39:54.558Z","_updatedAt":"2019-10-28T16:39:54.558Z","entryTitle":"HP-F5","displayTitle":"Harry Potter and the Order of the Phoenix","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Order of the Phoenix","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-order-of-the-phoenix"}]},{"contentfulId":"6a4z0A95JmANIqMuyKrdA0","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-10-25T14:50:49.831Z","updatedAt":"2021-10-25T14:50:49.831Z","_updatedAt":"2021-10-25T14:50:49.831Z","entryTitle":"five-reasons-why-you-should-never-overlook-molly-weasley-text-section-5","text":"## She learnt from her mistakes\nNobody is perfect and neither was Mrs Weasley. She could sometimes be judgemental and got situations wrong, but she was also willing to being corrected and showed that it’s ok to change your mind. In *Goblet of Fire*, she believed the rubbish that Rita Skeeter was writing about Harry’s love life and turned against Hermione. Yet, as soon as Harry told her the rumours weren’t true, she believed him and changed her opinion.\n\nShe also jumped to conclusions about her daughter-in-law Fleur and her relationship with Bill. In *Half-Blood Prince*, when he was attacked by Fenrir Greyback and left scarred, she seemed to assume that Fleur wouldn’t want to be with him anymore. Fleur quickly put a stop to that nonsense and stood up for their relationship. Yet again, Molly was corrected and even offered her the use of Great Auntie Muriel’s tiara for their wedding as an olive branch. Yes, Mrs Weasley was wrong in both scenarios, but ultimately she didn’t allow her stubbornness to get the better of her."},{"contentfulId":"D47jgJoUsi0DlPCnX2HbQ","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-10-25T13:30:51.878Z","updatedAt":"2021-10-25T13:30:51.878Z","_updatedAt":"2021-10-25T13:30:51.878Z","entryTitle":"HP-F7-deathly-hallows-part-one-molly-weasley-hermione-bill-fleur-wedding-web-landscape","image":{"contentfulId":"6eWZ2LU5GmUiJotaITr1Qr","type":"Asset","contentTypeId":"asset","createdAt":"2021-10-25T13:30:45.034Z","updatedAt":"2021-10-25T13:30:45.034Z","_updatedAt":"2021-10-25T13:30:45.034Z","revision":1,"locale":"en-GB","title":"HP-F7-deathly-hallows-part-one-molly-weasley-hermione-bill-fleur-wedding-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6eWZ2LU5GmUiJotaITr1Qr/e12982498e3c06735f86c17c1a39bf5f/HP-F7-deathly-hallows-part-one-molly-weasley-hermione-bill-fleur-wedding-web-landscape","details":{"size":1242568,"image":{"width":2000,"height":1191}},"fileName":"HP-F7-deathly-hallows-part-one-molly-weasley-hermione-bill-fleur-wedding-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"5ldWCMR6l74JrDEciUBXgp","type":"Link"}]},{"contentfulId":"5qJRc0AU6vnIbYMpdYTkN6","typ tfulId":"2oJSUf8asdeECsNVB2HHXq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2020-11-23T12:09:21.699Z","updatedAt":"2020-11-23T12:09:21.699Z","_updatedAt":"2020-11-23T12:09:21.699Z","entryTitle":"WB-HP-F4-goblet-of-fire-harry-ron-happy-gryffindor-scarves","image":{"contentfulId":"3V5C9cUKrH6rwXxLO1yBkQ","type":"Asset","contentTypeId":"asset","createdAt":"2020-11-23T12:09:11.655Z","updatedAt":"2020-11-23T12:09:11.656Z","_updatedAt":"2020-11-23T12:09:11.656Z","revision":1,"locale":"en-GB","title":"WB-HP-F4-goblet-of-fire-harry-ron-happy-gryffindor-scarves","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3V5C9cUKrH6rwXxLO1yBkQ/228de99769d4963cc41519765c96d22c/WB-HP-F4-goblet-of-fire-harry-ron-happy-gryffindor-scarves.jpg","details":{"size":2041690,"image":{"width":2000,"height":1331}},"fileName":"WB-HP-F4-goblet-of-fire-harry-ron-happy-gryffindor-scarves.jpg","contentType":"image/jpeg"}}},"intro":"It’s getting cold outside – and nobody knows how to rock something knitted and fuzzy like the wizarding community. Please join us in paying homage to these extremely cosy witches and wizards! ","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"2XG72PYU5TseHFukR8ZJ3T","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2020-11-23T12:42:11.159Z","updatedAt":"2021-01-05T15:21:54.296Z","_updatedAt":"2021-01-05T15:21:54.296Z","entryTitle":"another-appreciation-of-hogwarts-winterwear-text-section-0","text":"To see our first appreciation post of jumpers, sweater vests and beyond, [join us in paying tribute to the Hogwarts students’ favourite winter woollies here](https://www.wizardingworld.com/features/an-appreciation-of-harry-potter-knitwear-web). And now, here’s some more! \n\n## Hogwarts house scarves  \n"},{"contentfulId":"6FnresKMIR8aSVdTejA0Tz","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2020-11-23T12:17:56.922Z","updatedAt":"2020-11-23T12:17:56.922Z","_updatedAt":"2020-11-23T12:17:56.922Z","entryTitle":"WB-HP-F4-goblet-of-fire-harry-ron-hermione-gryffindor-scarves","image":{"contentfulId":"7Kcf8zSlucwc4cewOtq2R5","type":"Asset","contentTypeId":"asset","createdAt":"2020-11-23T12:17:54.762Z","updatedAt":"2020-11-23T12:17:54.762Z","_updatedAt":"2020-11-23T12:17:54.762Z","revision":1,"locale":"en-GB","title":"WB-HP-F4-goblet-of-fire-harry-ron-hermione-gryffindor-scarves","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7Kcf8zSlucwc4cewOtq2R5/33283ac7e12a8ed43ac4807af75cd0c5/WB-HP-F4-goblet-of-fire-harry-ron-hermione-gryffindor-scarves.jpg","details":{"size":4644649,"image":{"width":2000,"height":3006}},"fileName":"WB-HP-F4-goblet-of-fire-harry-ron-hermione-gryffindor-scarves.jpg","contentType":"image/jpeg"}}},{"contentfulId":"2l1mW1gscdCaFzPi87982r","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2020-11-23T12:42:07.669Z","updatedAt":"2020-11-23T12:42:07.669Z","_updatedAt":"2020-11-23T12:42:07.669Z","entryTitle":"another-appreciation-of-hogwarts-winterwear-text-section-1","text":"One of the snuggest ways of showcasing your house pride has surely got to be with a big woolly Hogwarts scarf. For this moment, we’re modelling the Gryffindor ones with Harry, Ron and Hermione, simply because they look quite cool and moody here, like they’re posing for a band album cover.\n\n## Xenophilius Lovegood’s... actually, we don’t know what this is "},{"contentfulId":"6qoloqJk2JNzG7c0Fy7KD1","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2020-11-23T12:19:26.442Z","updatedAt":"2020-11-23T12:19:26.442Z","_updatedAt":"2020-11-23T12:19:26.442Z","entryTitle":"WB-HP-F7-deathly-hallows-xenophilius-lovegood-outside-lovegood-house","image":{"contentfulId":"1bDqsHnKPi32tps3nkMZaD","type":"Asset","contentTypeId":"asset","createdAt":"2020-11-23T12:19:24.290Z","updatedAt":"2020-11-23T12:19:24.290Z","_updatedAt":"2020-11-23T12:19:24.290Z","revision":1,"locale":"en-GB","title":"WB-HP-F7-deathly-hallows-xenophilius-lovegood-outside-lovegood-house","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1bDqsHnKPi32tps3nkMZaD/380cf040cd79f148f62ee51c33b11bf1/WB-HP-F7-deathly-hallows-xenophilius-lovegood-outside-lovegood-house.jpg","details":{"size":2695309,"image":{"width":2000,"height":1333}},"fileName":"WB-HP-F7-deathly-hallows-xenophilius-lovegood-outside-lovegood-house.jpg","contentType":"image/jpeg"}}},{"contentfulId":"7pP9MNWrObBN9ghSpQrU7y","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2020-11-23T12:42:04.044Z","updatedAt":"2020-11-23T12:42:04.044Z","_updatedAt":"2020-11-23T12:42:04.044Z","entryTitle":"another-appreciation-of-hogwarts-winterwear-text-section-2","text":"We love Luna for her quirky fashion choices, and when we met Xenophilius, her dad, we discovered that the apple did not fall far from the tree in that department. Look at this strange thatched number we see him wearing here. What is it?! Another of the wizarding world’s greatest mysteries.  \n\n## Hermione’s turtleneck of anxiety "},{"contentfulId":"2dfAJs5tuV0jdjeuaDgOTD","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2020-11-23T12:22:36.637Z","updatedAt":"2020-11-23T12:22:36.637Z","_updatedAt":"2020-11-23T12:22:36.637Z","entryTitle":"WB-HP-F4-goblet-of-fire-Hermione-and-Harry-Triwizard-Tournament-tent","image":{"contentfulId":"3ysYlmYwuSbdy0XtxY6KXH","type":"Asset","contentTypeId":"asset","createdAt":"2020-11-23T12:22:34.099Z","updatedAt":"2020-11-23T12:22:34.099Z","_updatedAt":"2020-11-23T12:22:34.099Z","revision":1,"locale":"en-GB","title":"WB-HP-F4-goblet-of-fire-Hermione-and-Harry-Triwizard-Tournament-tent","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3ysYlmYwuSbdy0XtxY6KXH/2e34591d59609eb0bb240f3b7f15676f/WB-HP-F4-goblet-of-fire-Hermione-and-Harry-Triwizard-Tournament-tent.jpg","details":{"size":2838555,"image":{"width":2000,"height":1331}},"fileName":"WB-HP-F4-goblet-of-fire-Hermione-and-Harry-Triwizard-Tournament-tent.jpg","contentType":"image/jpeg"}}},{"contentfulId":"2ojEy298Io9oXntJUZEMhi","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2020-11-23T12:42:00.127Z","updatedAt":"2020-11-23T12:42:00.127Z","_updatedAt":"2020-11-23T12:42:00.127Z","entryTitle":"another-appreciation-of-hogwarts-winterwear-text-section-3","text":"During Harry’s first task at the Triwizard Tournament, a worried Hermione sneaks into his tent to wish him good luck wearing a very cosy turtleneck. Because when you’re fretting if your best friend is about to be eaten by a dragon, it’s always important to be comfortable. \n\n## Just anything that anybody from Durmstrang wears\n"},{"contentfulId":"6o4UUBS8f9oRcTKYhBNpYD","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2020-11-23T12:28:40.551Z","updatedAt":"2020-11-23T12:28:40.551Z","_updatedAt":"2020-11-23T12:28:40.551Z","entryTitle":"WB-HP-F4-goblet-of-fire-viktor-krum-and-igor-karkaroff-at-durmstrang-hogwarts-entrance","image":{"contentfulId":"4zSe7Ui2OpZ1lZQt4HHkOW","type":"Asset","contentTypeId":"asset","createdAt":"2020-11-23T12:28:37.178Z","updatedAt":"2020-11-23T12:28:37.178Z","_updatedAt":"2020-11-23T12:28:37.178Z","revision":1,"locale":"en-GB","title":"WB-HP-F4-goblet-of-fire-viktor-krum-and-igor-karkaroff-at-durmstrang-hogwarts-entrance","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4zSe7Ui2OpZ1lZQt4HHkOW/c8f58453bc1e90e276d9dadf2e2ea6d5/WB-HP-F4-goblet-of-fire-viktor-krum-and-igor-karkaroff-at-durmstrang-hogwarts-entrance.jpg","details":{"size":3238959,"image":{"width":2000,"height":1331}},"fileName":"WB-HP-F4-goblet-of-fire-viktor-krum-and-igor-karkaroff-at-durmstrang-hogwarts-entrance.jpg","contentType":"image/jpeg"}}},{"contentfulId":"38LFHWFUJjvacRT1PAAUYd","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2020-11-23T12:41:55.611Z","updatedAt":"2020-11-23T12:51:30.870Z","_updatedAt":"2020-11-23T12:51:30.870Z","entryTitle":"another-appreciation-of-hogwarts-winterwear-text-section-4","text":"You thought it was a bit chilly at Hogwarts? Step forward, the class of Durmstrang, who turned up for the Triwizard Tournament looking like immaculate models ready for a long walk in Antarctica. The coats! The hats! The boots! The browns and greys and creams! Now, this is how you keep toasty and still catwalk-ready. Super-serious, yet super-snuggly.\n\n## Madame Maxime’s statement coat  "},{"contentfulId":"3P6OTb92rXIaqzC8cbaA11","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2020-11-23T12:33:19.646Z","updatedAt":"2020-11-23T12:33:19.646Z","_updatedAt":"2020-11-23T12:33:19.646Z","entryTitle":"WB-HP-F4-goblet-of-fire-madame-olympe-maxime","image":{"contentfulId":"oeGwbLIJvuIUCHkwgNZIb","type":"Asset","contentTypeId":"asset","createdAt":"2020-11-23T12:33:17.322Z","updatedAt":"2020-11-23T12:33:17.322Z","_updatedAt":"2020-11-23T12:33:17.322Z","revision":1,"locale":"en-GB","title":"WB-HP-F4-goblet-of-fire-madame-olympe-maxime","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/oeGwbLIJvuIUCHkwgNZIb/9f39f63692f6cceac960c5bb5085a01f/WB-HP-F4-goblet-of-fire-madame-maxime.jpg","details":{"size":6636875,"image":{"width":2000,"height":3006}},"fileName":"WB-HP-F4-goblet-of-fire-madame-maxime.jpg","contentType":"image/jpeg"}}},{"contentfulId":"4wI8GFyCRPix2sVaQ4aLOH","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2020-11-23T12:41:46.089Z","updatedAt":"2020-11-23T12:44:54.898Z","_updatedAt":"2020-11-23T12:44:54.898Z","entryTitle":"another-appreciation-of-hogwarts-winterwear-text-section-5","text":"From Durmstrang to Beauxbatons – and here is Madame Maxime in the most striking coat the world has ever seen. It’s always fun to get yourself a dressy coat for the winter months to feel both fluffy and fabulous - and especially fun if that coat could also double-up as a magic eye optical illusion. \n\n## Dual purpose earmuffs  \n"},{"contentfulId":"6VhVVzf60pJWxDkHS5tUNI","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2020-11-23T12:36:57.368Z","updatedAt":"2020-11-23T12:36:57.368Z","_updatedAt":"2020-11-23T12:36:57.368Z","entryTitle":"WB-HP-F2-Chamber-of-Secrets-hermione-and-students-wear-earmuffs-in-greenhouse-herbology","image":{"contentfulId":"1ehIX4oxbnJONrDcQ3Hnar","type":"Asset","contentTypeId":"asset","createdAt":"2020-11-23T12:36:54.956Z","updatedAt":"2020-11-23T12:36:54.956Z","_updatedAt":"2020-11-23T12:36:54.956Z","revision":1,"locale":"en-GB","title":"WB-HP-F2-Chamber-of-Secrets-hermione-and-students-wear-earmuffs-in-greenhouse-herbology","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1ehIX4oxbnJONrDcQ3Hnar/505f959f1f84f5e79e2bc86b8b4c123f/WB-HP-F2-Chamber-of-Secrets-hermione-and-students-wear-earmuffs-in-greenhouse-herbology.jpg","details":{"size":2969731,"image":{"width":2000,"height":1306}},"fileName":"WB-HP-F2-Chamber-of-Secrets-hermione-and-students-wear-earmuffs-in-greenhouse-herbology.jpg","contentType":"image/jpeg"}}},{"contentfulId":"6imqpJbuVx6AAcUr465v54","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2020-11-23T12:41:42.541Z","updatedAt":"2020-11-23T12:52:49.712Z","_updatedAt":"2020-11-23T12:52:49.712Z","entryTitle":"another-appreciation-of-hogwarts-winterwear-text-section-6","text":"There’s nothing we hate more than red raw ears on a frosty day, so be sure to invest in a pair of earmuffs. In the wizarding world, fluffy earmuffs also double-up as a life-saving accessory that quietens the sound of screaming Mandrakes, who are known for their fatal cries. We love a piece of headwear with dual purpose! \n\n## Pink poncho of horrors "},{"contentfulId":"1onK4SJlwzjx6EZt94jP0s","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2020-11-23T12:39:04.386Z","updatedAt":"2020-11-23T12:39:04.386Z","_updatedAt":"2020-11-23T12:39:04.386Z","entryTitle":"WB-HP-F5-professor-umbridge-and-mcgonagall","image":{"contentfulId":"40OQtLH30DhO4a1LpZpUXW","type":"Asset","contentTypeId":"asset","createdAt":"2020-11-23T12:39:02.147Z","updatedAt":"2020-11-23T12:39:02.147Z","_updatedAt":"2020-11-23T12:39:02.147Z","revision":1,"locale":"en-GB","title":"WB-HP-F5-professor-umbridge-and-mcgonagall","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/40OQtLH30DhO4a1LpZpUXW/1e325951d0e7b3f83385a8f343bd9bc6/WB-HP-F5-professor-umbridge-and-mcgonagall.jpg","details":{"size":1994553,"image":{"width":2000,"height":1334}},"fileName":"WB-HP-F5-professor-umbridge-and-mcgonagall.jpg","contentType":"image/jpeg"}}},{"contentfulId":"47ekNLB2x5iNJFPzukdkAa","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2020-11-23T12:41:39.040Z","updatedAt":"2020-11-23T12:53:26.611Z","_updatedAt":"2020-11-23T12:53:26.611Z","entryTitle":"another-appreciation-of-hogwarts-winterwear-text-section-7","text":"Dolores Umbridge strikes again. If it wasn’t enough that the short-lived Defence Against the Dark Arts teacher caused general despair among the students of Hogwarts during her tenure, she also delighted in wearing an array of pastel pink atrocities to further upset us. We include this choice not to appreciate it, but just to simply observe that it somehow exists. \n\nProfessor McGonagall's facial expression perfectly represents how we feel too.\n\n## Neville: a wizard of many layers \n"},{"contentfulId":"2zQ8S94Wsr4sEBPN5KaRW9","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2020-11-23T12:35:05.491Z","updatedAt":"2020-11-23T12:35:05.491Z","_updatedAt":"2020-11-23T12:35:05.491Z","entryTitle":"WB-HP-F4-goblet-of-fire-harry-and-neville-forest","image":{"contentfulId":"3hdLn6R6Rnr8uQTJ8fgGjW","type":"Asset","contentTypeId":"asset","createdAt":"2020-11-23T12:35:02.908Z","updatedAt":"2020-11-23T12:35:02.908Z","_updatedAt":"2020-11-23T12:35:02.908Z","revision":1,"locale":"en-GB","title":"WB-HP-F4-goblet-of-fire-harry-and-neville-forest","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3hdLn6R6Rnr8uQTJ8fgGjW/efb691e8c2bf2dd6018ffb827c305cbe/WB-HP-F4-goblet-of-fire-harry-and-neville-forest.jpg","details":{"size":2034583,"image":{"width":2000,"height":1331}},"fileName":"WB-HP-F4-goblet-of-fire-harry-and-neville-forest.jpg","contentType":"image/jpeg"}}},{"contentfulId":"0CTc6Pram54G8edbKVURr","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2020-11-23T12:41:34.980Z","updatedAt":"2020-11-23T12:46:53.116Z","_updatedAt":"2020-11-23T12:46:53.116Z","entryTitle":"another-appreciation-of-hogwarts-winterwear-text-section-8","text":"We all know Neville loves to layer up in the colder months ([we have commented passionately on his choice of sweater vests before](https://www.wizardingworld.com/features/an-appreciation-of-harry-potter-knitwear-web)) and here he is employing his Gryffindor-esque bravery by wearing *three* different patterns at once.\n\nThe checkered inlay of the coat, the lovely stripey Hogwarts scarf, and a fleece with *different stripes* on underneath! A bold choice for a character that would one day take on Lord Voldemort in a lovely knitted cardie. \n\nAnd, finally, a special shoutout to....\n\n## Professor Slughorn’s dressing gown-turned-couch"},{"contentfulId":"3sodMZ3nzcKIdT2Zp5PxlZ","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2020-11-23T12:41:27.411Z","updatedAt":"2020-11-23T12:41:27.411Z","_updatedAt":"2020-11-23T12:41:27.411Z","entryTitle":"WB-HP-F6-slughorn-dressing-gown","image":{"contentfulId":"CLfyOZjkw48St7aFNfZsM","type":"Asset","contentTypeId":"asset","createdAt":"2020-11-23T12:41:24.765Z","updatedAt":"2020-11-23T12:41:24.765Z","_updatedAt":"2020-11-23T12:41:24.765Z","revision":1,"locale":"en-GB","title":"WB-HP-F6-slughorn-dressing-gown","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/CLfyOZjkw48St7aFNfZsM/ecb60154e6c9883cf1f77d073cf4e46a/WB-HP-F6-slughorn-dressing-gown.jpg","details":{"size":5854279,"image":{"width":2000,"height":2999}},"fileName":"WB-HP-F6-slughorn-dressing-gown.jpg","contentType":"image/jpeg"}}},{"contentfulId":"5DqatWQ3Rjvx2RP2LryZ7G","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2020-11-23T12:41:31.908Z","updatedAt":"2020-11-23T12:48:18.225Z","_updatedAt":"2020-11-23T12:48:18.225Z","entryTitle":"another-appreciation-of-hogwarts-winterwear-text-section-9","text":"You know on those lazy Sunday afternoons where you spend so long sitting on the armchair, you feel like you have become the armchair? Try telling that to Professor Slughorn, who quite literally turned into the piece of furniture to avoid talking to Albus Dumbledore one time. His pink, striped dressing gown even matched the armchair’s look.\n\nSurely, when it comes to winter-time cosiness, nobody can defeat this incredibly dedicated attempt to achieve pure comfy zen."}],"relatedArticleReference":[{"contentfulId":"4Zhwn8AAXNxfsJyI98VI2H","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2019-11-18T15:45:14.342Z","updatedAt":"2019-11-18T15:45:14.342Z","_updatedAt":"2019-11-18T15:45:14.342Z","entryTitle":"FEATURE-WEB-an-appreciation-of-knitwear-in-the-harry-potter-films","displayTitle":"An appreciation of knitwear in the Harry Potter films ","activationDate":"2019-11-18T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"}],"externalId":"an-appreciation-of-harry-potter-knitwear-web","mainImage":{"contentfulId":"426mdHCIw9SXZyJG3kpzzD","type":"Link"},"intro":"Weasley jumpers! Sweater vests! Cardigans over jumpers! Yes, it’s very cold up at Hogwarts, as the students make clear with their constant wearing of knitwear.","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTy
