other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"}],"externalId":"where-would-you-spend-a-wizarding-christmas","mainImage":{"contentfulId":"6h6Q8uYYDxajOg0lEJmFIg","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-20T17:18:41.645Z","updatedAt":"2021-12-20T17:18:41.645Z","_updatedAt":"2021-12-20T17:18:41.645Z","entryTitle":"hp-f6-harry-ginny-talking-the-burrow-christmas-christmas-tree-app-landscape","image":{"contentfulId":"5C4iOZlq141KIdgVGqKOk4","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-20T17:18:34.830Z","updatedAt":"2021-12-20T17:18:34.830Z","_updatedAt":"2021-12-20T17:18:34.830Z","revision":1,"locale":"en-GB","title":"hp-f6-harry-ginny-talking-the-burrow-christmas-christmas-tree-app-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5C4iOZlq141KIdgVGqKOk4/c853318de4da8498e6af993e5d8bf537/hp-f6-harry-ginny-talking-the-burrow-christmas-christmas-tree-app-landscape.jpg","details":{"size":99264,"image":{"width":2000,"height":1333}},"fileName":"hp-f6-harry-ginny-talking-the-burrow-christmas-christmas-tree-app-landscape.jpg","contentType":"image/jpeg"}}},"intro":"Hogwarts, The Burrow or even… Grimmauld Place?! Which of these is the best location for festive fun? From Dumbledore in a flowered bonnet, to family activities featuring the dulcet tones of Celestina Warbeck, to Sirius crooning carols, it’s a tricky choice. Three writers make the case for their favourite wizarding world location.","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"7zeFHiPP0YRqwlYE79dNLO","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2023-12-01T16:13:09.428Z","updatedAt":"2023-12-01T16:13:09.428Z","_updatedAt":"2023-12-01T16:13:09.428Z","entryTitle":"where-would-you-spend-a-wizarding-christmas-text-section-1","text":"## The case for Hogwarts\nOh, this is *such* an easy one – Christmas is best spent at [Hogwarts](/fact-file/locations/hogwarts). Disagree? You would be wrong. Case closed. \n\nOk, we can go into more detail – we just love a bit of Hogwarts Christmas holiday fun! Let’s start with the way the castle is transformed into a gorgeous wintry wonderland. Suits of armour singing Christmas carols – festive. Twelve giant, frost-covered Christmas trees lining the [Great Hall](/fact-file/locations/the-great-hall) – even more festive. The Great Hall adorned with streamers of holly and mistletoe and enchanted snow falling warm and dry from the ceiling – festive with a capital F – the most festively festive festivities we could ever dream of. The decorations alone are enough to make you feel as Christmassy as the fabulous gnome atop the Weasley’s Christmas tree.\n\nBut that’s not all, let’s talk about the feast. We all know that Christmas is all about the food (and spending time with your loved ones and so on… but mainly food). And at Hogwarts, this is a feast more magical than anywhere else in the wizarding world. There are no skirmishes over the last roast potato here – with a hundred fat turkeys, piles of roast and boiled potatoes, platters of chipolatas, buttered peas, gravy, cranberry sauce and flaming Christmas puddings (our mouths are watering just thinking about it) there’s enough to feed even the hungriest giant… or Ron. \n\nCrackers! We almost forgot. You won’t find Christmas crackers like these in the Muggle world. Rather than a flimsy paper hat and rubbish toy, these crackers contain everything from live mice to an Admiral’s hat – Dumbledore even got a wonderful, flowered bonnet (which he immediately wore, of course). \n\nStill need convincing? Right then, rather than having to wait until your entire family are ready to open presents, yours will appear at the end of your bed for you to open at *your* leisure. Then there’s the fact you can spend Christmas having snowball fights with your best friends (like Harry did with the Weasleys) rather than having awkward conversation with boring relatives. No Aunt Muriel here, thankfully. Most importantly, everything is just there ready and waiting for you to enjoy. There will be no need to help prepare dinner, do the washing up or, the task more horrifying than facing a [Dementor](/fact-file/creatures/dementor) down a dark alley, peel the sprouts. \n\nUnlike The Burrow – where we know that chores are required and unwelcome guests pop up (like a certain Minister for Magic or estranged brother), or Grimmauld Place – gloomy, with shrieking portraits and a serious lack of Christmas spirit, Hogwarts is *the* place to have the perfect festive day – just the way *you* want it.\n","linkedEntries":[{"contentfulId":"1XSuLCkIDaFqMwGPFrQKCo","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"factFilePage","createdAt":"2023-05-25T14:51:29.070Z","updatedAt":"2023-06-14T20:39:03.777Z","_updatedAt":"2023-06-14T20:39:03.777Z"},{"contentfulId":"5jktF5n895aAzCL7UTCboy","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"factFilePage","createdAt":"2023-05-25T14:51:54.802Z","updatedAt":"2023-05-25T14:51:54.802Z","_updatedAt":"2023-05-25T14:51:54.802Z"},{"contentfulId":"63OWcyLalPAXB3PUyaQ53N","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"factFilePage","createdAt":"2023-05-25T15:07:29.003Z","updatedAt":"2023-05-25T15:07:29.003Z","_updatedAt":"2023-05-25T15:07:29.003Z"}]},{"contentfulId":"4G9qhXtXdzY1thDqtFPCqu","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2022-09-16T13:55:53.046Z","updatedAt":"2022-09-16T13:55:53.046Z","_updatedAt":"2022-09-16T13:55:53.046Z","entryTitle":"hp-f4-flitwick-choir-christmas-web-landscape","image":{"contentfulId":"2PwWHkMVrEjVbz6GHh5qlF","type":"Asset","contentTypeId":"asset","createdAt":"2022-09-16T13:55:44.870Z","updatedAt":"2022-09-16T13:55:44.870Z","_updatedAt":"2022-09-16T13:55:44.870Z","revision":1,"locale":"en-GB","title":"hp-f4-flitwick-choir-christmas-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2PwWHkMVrEjVbz6GHh5qlF/4a9b3cd260e4a8a0aa56b236bc397d0d/hp-f4-flitwick-choir-christmas-web-landscape.jpg","details":{"size":535823,"image":{"width":1219,"height":811}},"fileName":"hp-f4-flitwick-choir-christmas-web-landscape.jpg","contentType":"image/jpeg"}}},{"contentfulId":"2dxoGotIiBajoeJLEWVMKs","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2023-12-01T16:17:02.285Z","updatedAt":"2023-12-01T16:17:02.285Z","_updatedAt":"2023-12-01T16:17:02.285Z","entryTitle":"where-would-you-spend-a-wizarding-christmas-text-section-2","text":"## The case for The Burrow\nNo thanks, McGonagall, we won’t be putting our names down to stay at *school* for the holiday – we’re heading back to [The Burrow](/fact-file/locations/the-burrow). This charmingly crooked and cosy Christmas ornament of a family home, with its snow-dusted stack of rooms like the pieces of a gingerbread house, is so wrong that it’s just so right. After the draughty castle corridors and airy halls of Hogwarts, The Burrow’s leaning walls and low ceilings are a warm hug welcoming you home.\n\nAnd that’s just the wacky architecture! Don’t get us started on the decorations. Sure, Hogwarts’ Great Hall is decked so lavishly, but it’s all done for you. Are Christmas decorations really Christmas decorations unless you can see your own hand in them? Unless you strung the paper chains yourself, hung the baubles yourself, Stupefied the garden [gnome](/fact-file/creatures/gnome), and glued wings to its back and stuck it atop the tree yourself, it’s not really Christmas. Like a Weasley jumper, Christmas at The Burrow is everything it should be – homemade and perfectly imperfect. \n\nNow, a moment for the food. Whether it’s in the kitchen or duelling with Death Eaters, [Molly](/fact-file/characters-and-pets/molly-weasley) and her wand are undefeated. With seven children to feed and her door always open to guests, she can whip up a festive feast that the Great Hall tables would positively groan under the weight of. And yeah, you have to peel a mountain of sprouts to help out, but as Fred says – it’s “character-building”. Harry’s first Christmas lunch at The Burrow may have been interrupted by the distinctly un-Christmassy Scrimgeour, but that’s got to be better than dining with Trelawney and being told you’re going to die before you’ve even finished your roasties, right? \n\nBut the best thing about any Christmas dinner, is what comes after. No, not dessert – the turkey-induced nap, of course! Can you imagine climbing seven flights of changing staircases with missing steps and crawling through a portrait hole just to have an after-dinner lie-down? The Burrow offers the prospect of a short stumble to a squishy sofa and Celestina Warbeck’s *A Cauldron Full of Hot, Strong Love* playing on the wireless as you succumb to a snooze.\n\nAfter spending Christmas breaks researching in the library, drinking [Polyjuice Potion](/fact-file/plants-and-potions/polyjuice-potion), navigating the teenage trauma of a first school dance and spending the day on a closed St Mungo’s hospital ward, Harry’s sixth year was a Christmas wish come true – finally, a real family Christmas. And what a family! To be invited to a Weasley Christmas is to be given the gift of a loving community to spend the holiday with, and all the laughter, rows and madness that comes with it. In its grandness, Hogwarts can be a lonely place and signing up to stay there was usually because Harry had no other choice. But in The Burrow’s cosiness, where siblings and guests sleep at least three to a room, you can never really find yourself alone or bored.\n\nThe Weasleys’ Gringotts vault may be bare, but their home is abundant with joy. Though we’re debating the ultimate wizarding world Christmas location, the real magic of Christmas isn’t carolling suits of armour and enchanted snow. The Burrow is packed full of everything for a *truly* magical Christmas – togetherness, love and family.","linkedEntries":[{"contentfulId":"jMKNHbct9ziemVHR4KBG5","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"factFilePage","createdAt":"2023-05-25T15:00:55.158Z","updatedAt":"2023-05-25T15:00:55.158Z","_updatedAt":"2023-05-25T15:00:55.158Z"},{"contentfulId":"6W6plyM1lKQCuUslLUfZpI","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"factFilePage","createdAt":"2023-05-25T15:08:51.074Z","updatedAt":"2023-05-25T15:08:51.074Z","_updatedAt":"2023-05-25T15:08:51.074Z"},{"contentfulId":"aG0rSf868ZdCgcKZ8xqDx","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"factFilePage","createdAt":"2023-05-25T14:20:47.334Z","updatedAt":"2023-05-25T14:20:47.334Z","_updatedAt":"2023-05-25T14:20:47.334Z"},{"contentfulId":"1eFV64Xn8uL8HyCaFeP5Oc","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"factFilePage","createdAt":"2023-05-25T14:38:52.193Z","updatedAt":"2023-05-25T14:38:52.193Z","_updatedAt":"2023-05-25T14:38:52.193Z"}]},{"contentfulId":"7nqLdNfdCSZyiU5CrSqNtL","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-06T13:50:50.197Z","updatedAt":"2021-12-06T13:50:50.197Z","_updatedAt":"2021-12-06T13:50:50.197Z","entryTitle":"HP-F6-half-blood-prince-harry-ginny-talking-the-burrow-christmas-christmas-tree-web-landscape","image":{"contentfulId":"wjNlVCrwkL9sxCSIsiTk6","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-06T13:50:43.200Z","updatedAt":"2021-12-06T13:50:43.200Z","_updatedAt":"2021-12-06T13:50:43.200Z","revision":1,"locale":"en-GB","title":"HP-F6-half-blood-prince-harry-ginny-talking-the-burrow-christmas-christmas-tree-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/wjNlVCrwkL9sxCSIsiTk6/843ebc6c2dfecb411914070a52dfd652/HP-F6-half-blood-prince-harry-ginny-talking-the-burrow-christmas-christmas-tree-web-landscape","details":{"size":1756978,"image":{"width":2000,"height":1333}},"fileName":"HP-F6-half-blood-prince-harry-ginny-talking-the-burrow-christmas-christmas-tree-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"5c2mZe756Zsr2MY2EJjWmt","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-28T12:35:05.995Z","updatedAt":"2019-10-28T16:40:18.076Z","_updatedAt":"2019-10-28T16:40:18.076Z","entryTitle":"HP-F6","displayTitle":"Harry Potter and the Half-Blood Prince","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Half-Blood Prince","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-half-blood-prince"}]},{"contentfulId":"5AZ3TM7Fj2IICxE5Ihb45F","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2023-12-01T16:51:57.846Z","updatedAt":"2023-12-11T10:19:18.241Z","_updatedAt":"2023-12-11T10:19:18.241Z","entryTitle":"where-would-you-spend-a-wizarding-christmas-text-section-3","text":"## The case for 12 Grimmauld Place \nThat’s right, you heard. Sure, the *obvious* choice for a magical Christmas getaway may be lovely old Hogwarts or the warm family atmosphere of The Burrow, but we’re going rogue. [Grimmauld Place](/fact-file/locations/number-twelve-grimmauld-place) is actually the best place to celebrate Christmas. What do you *mean*, what are we talking about?! We think you’ll find 12 Grimmauld Place is actually crammed with festive magic! And, sure, also Doxys and Boggarts and screaming paintings. But that’s just all part of the unpredictable fun! And isn’t that what Christmas is all about? Cleaning all the Dark secrets out of an ancient, decrepit house, hoping you don’t bump into a sinister house-elf who carries a lot of Dark energy? Except maybe in your household, it’s your tipsy uncle. Same difference! It wouldn’t be Christmas without someone causing mayhem in the corner somewhere, would it? \n\nSo, Harry spends Christmas at 12 Grimmauld Place, [Sirius Black’s](/fact-file/characters-and-pets/sirius-black) inherited family home, for distinctly un-festive reasons. Amid Lord Voldemort’s ascent to power, Arthur Weasley has been attacked, and the family must spend Christmas in the safety of the Order of the Phoenix headquarters while they await news. Okay, yep, understood, not very Christmassy so far. But once we hear of Arthur’s recovery, things take an upward swing. And with Mrs Weasley around – no place – no matter how dank and abandoned, carrying the evils of Dark wizards and witches of the past – will be left looking unhomely for very long. With Molly at the helm, 12 Grimmauld Place was soon transformed from The House of Black into The House of Snacks – and that’s not all: at the thought of having *company* for Christmastime, Sirius is turned into a new man – singing Christmas carols, cooking bacon and generally, just seeming… *happy*.\n\nWouldn’t you love to be tucking into a mince pie while the coolest Marauder sang God Rest Ye Merry Hippogriffs in the background? Of course, you would! And by the time Sirius is done decorating the house (with chandeliers festooned with holly and gold and silver streamers, you guys!) the place is described as “almost unrecognisable”. Almost unrecognisable! Mundungus Fletcher even obtains* (* probably stole) a Christmas tree with live fairies! The carpets are covered in glittery snow! The stuffed house-elf heads mounted on the wall are wearing Christmas ha-oh okay, maybe let’s skip over that last one. But nonetheless! With the newfound Yuletide joy of Sirius jazzing up the household, 12 Grimmauld Place is sounding like *quite* the hip, happening holiday venue, complete with rustic charm. \n\n*And* being at the headquarters of the [Order of the Phoenix](/fact-file/magical-miscellany/order-of-the-phoenix) means you get all manner of awesome Aurors sporadically popping round too – the more, the merrier. And this means the most important thing of all: extra presents. Tonks gets Harry a cute little flying model of his Firebolt – that’s a *great* gift. Nope, we’re standing firm on this one – 12 Grimmauld Place is an underrated Christmas classic – with interesting visitors, bespoke Christmas carols and the distinct lack of Professor Umbridge, who had ruined the vibe at Hogwarts in Harry’s fifth year anyway. We rest our case!","linkedEntries":[{"contentfulId":"1CifxTEZ4mOmYLowAN4tFG","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"factFilePage","createdAt":"2023-05-25T15:00:43.751Z","updatedAt":"2023-05-25T15:00:43.751Z","_updatedAt":"2023-05-25T15:00:43.751Z"},{"contentfulId":"74OZTubdCamCAqH5kEDqxy","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"factFilePage","createdAt":"2023-05-25T14:24:26.913Z","updatedAt":"2023-06-13T15:49:13.986Z","_updatedAt":"2023-06-13T15:49:13.986Z"},{"contentfulId":"3o8LLEcIny9rYtg9MJBvSY","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"factFilePage","createdAt":"2023-05-25T15:16:12.124Z","updatedAt":"2023-05-25T15:16:12.124Z","_updatedAt":"2023-05-25T15:16:12.124Z"}]},{"contentfulId":"6OlWUQeqnAd5o9APPlX4Aq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-10-25T13:28:19.132Z","updatedAt":"2021-10-25T13:28:19.132Z","_updatedAt":"2021-10-25T13:28:19.132Z","entryTitle":"HP-F5-order-of-the-phoenix-weasleys-christmas-grimmauld-place-web-landscape","image":{"contentfulId":"yzOg13hw0sgBTcoyqVEcy","type":"Asset","contentTypeId":"asset","createdAt":"2021-10-25T13:28:13.500Z","updatedAt":"2021-10-25T13:28:13.500Z","_updatedAt":"2021-10-25T13:28:13.500Z","revision":1,"locale":"en-GB","title":"HP-F5-order-of-the-phoenix-weasleys-christmas-grimmauld-place-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/yzOg13hw0sgBTcoyqVEcy/e7060d6cca54531097bc2ff35653c5ea/HP-F5-order-of-the-phoenix-weasleys-christmas-grimmauld-place-web-landscape","details":{"size":2177108,"image":{"width":2000,"height":1333}},"fileName":"HP-F5-order-of-the-phoenix-weasleys-christmas-grimmauld-place-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"6vSblg4bo8ERfWv6wulvcW","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T14:17:38.549Z","updatedAt":"2019-10-28T16:39:54.558Z","_updatedAt":"2019-10-28T16:39:54.558Z","entryTitle":"HP-F5","displayTitle":"Harry Potter and the Order of the Phoenix","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Order of the Phoenix","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-order-of-the-phoenix"}]},{"contentfulId":"20Me79hJN91RuOIPuYup6t","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2023-12-01T17:11:53.328Z","updatedAt":"2023-12-01T17:11:53.328Z","_updatedAt":"2023-12-01T17:11:53.328Z","entryTitle":"where-would-you-spend-a-wizarding-christmas-text-section-4","text":"***\nBut what do you think? What is the most idyllic Christmassy getaway in the wizarding world?\n\nIf you're in the mood for some more wizarding world discussions why don't you have a look at some of our other debate club features?\n\nSee who you think had the [hardest first year at Hogwarts, Harry Potter or Ginny Weasley](https://www.wizardingworld.com/features/whose-first-year-was-harder-harry-potter-ginny-weasley).\n\nOr decide whether you think [Sirius Black was a role model or reckless rogue](https://www.wizardingworld.com/features/sirius-black-role-model-or-bad-influence-the-debate)."}],"publishDate":"2023-12-04T00:00+00:00"},{"contentfulId":"4vT6sAiqj4NUwju5TnFMP9","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"article","createdAt":"2022-12-21T17:58:48.010Z","updatedAt":"2022-12-21T19:57:15.123Z","_updatedAt":"2022-12-21T19:57:15.123Z","entryTitle":"WEB-FEATURE-what-would-be-your-perfect-wizarding-christmas-present","displayTitle":"What would be your perfect wizarding Christmas present?","activationDate":"2022-12-21T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"}],"externalId":"what-would-be-your-perfect-wizarding-christmas-present","mainImage":{"contentfulId":"4TJqQ15b25cIm4rnEK3yo1","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-04-07T14:00:58.945Z","updatedAt":"2021-04-07T14:00:58.945Z","_updatedAt":"2021-04-07T14:00:58.945Z","entryTitle":"WB-HP-F3-hermione-and-ron-taunted-by-invisibility-cloak","image":{"contentfulId":"1UIkSYc0wnbbUSRFNAcz1C","type":"Asset","contentTypeId":"asset","createdAt":"2021-04-07T13:59:48.629Z","updatedAt":"2021-04-07T13:59:48.629Z","_updatedAt":"2021-04-07T13:59:48.629Z","revision":1,"locale":"en-GB","title":"WB-HP-F3-hermione-and-ron-taunted-by-invisibility-cloak","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1UIkSYc0wnbbUSRFNAcz1C/3cba39d5e18f2101647dc7be18c3f7f2/WB-HP-F3-hermione-and-ron-taunted-by-invisibility-cloak.jpg","details":{"size":3403541,"image":{"width":2000,"height":1321}},"fileName":"WB-HP-F3-hermione-and-ron-taunted-by-invisibility-cloak.jpg","contentType":"image/jpeg"}}},"intro":"If you were getting ready for a wizarding world Christmas (we can but dream), what presents would you want to see underneath the tree? We’ve put together a few suggestions, depending on your preferences and personality traits.","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"1HFSXGxqpY3uMoWLf4mqeX","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-12-21T14:17:22.621Z","updatedAt":"2022-12-21T14:17:22.621Z","_updatedAt":"2022-12-21T14:17:22.621Z","entryTitle":"web-feature-what-would-be-your-perfect-wizarding-christmas-present-text-section-1","text":"## If you’re known for being forgetful, your perfect gift would be… a Remembrall\n\nDo you often get the unnerving sensation that you’ve forgotten something? Then you  need to get your hands on a Remembrall. This wizarding world alternative to the far less exciting Muggle phone reminder would have the added bonus of also being a lot more festive, as the Remembrall glows as red as a reindeer’s nose when it wants to attract your attention. Useful and Christmassy. Sounds perfect.\n\n## If you like to keep up-to-date with the latest trends, you might expect… new dress robes\n\nAnd no, we most definitely do not mean Ron Weasley’s infamous lace-trimmed maroon confection. Think smart, think elegant, think refined. You know, something you might wear to the Yule Ball, or a Slug Club party. That sort of thing. You’d look magic, we just know it.\n\n## If you prefer keeping warm and cosy, keep your fingers crossed for a… Weasley jumper\n\nPerhaps you’re more of a relax-it’s-Christmas kind of person, in which case we think you’d fit right into the Weasley clan. You never know, perhaps you’d fit in so well you might actually receive your own lumpily-wrapped but highly unique [hand-knitted Weasley jumper](https://www.wizardingworld.com/features/the-importance-of-the-weasley-jumper). You do like maroon, right?\n\n## If you’ve got a to-do list as long as your arm, you need… Hermione’s homework planner\n\nChristmas admin getting you down? Maybe you just need a helping hand, which is surely what Hermione intended when she gifted Ron and Harry a magical diary full of not-at-all-irritating reminders. We’re sure you’d be much more grateful than Ron and Harry. After all, if you’re the one stuck organising Christmas, what on earth could be better than a nagging voice reminding you about everything you have left to do?\n"},{"contentfulId":"4rKTaRV9lneFhMRdN5UlOH","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-11-22T12:21:34.700Z","updatedAt":"2022-06-13T16:50:57.508Z","_updatedAt":"2022-06-13T16:50:57.508Z","entryTitle":"HP-F1-philosophers-stone-harry-lantern-restricted-section-cloak-web-landscape","image":{"contentfulId":"2fNxyDMvmmZxPflWsft0QS","type":"Asset","contentTypeId":"asset","createdAt":"2021-11-22T12:21:24.691Z","updatedAt":"2021-11-22T12:21:24.691Z","_updatedAt":"2021-11-22T12:21:24.691Z","revision":1,"locale":"en-GB","title":"HP-F1-philosophers-stone-harry-lantern-restricted-section-cloak-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2fNxyDMvmmZxPflWsft0QS/2af72a6aa67e3a3fe50cb23660cae0aa/HP-F1-philosophers-stone-harry-lantern-restricted-section-cloak-web-landscape","details":{"size":2103191,"image":{"width":2000,"height":1321}},"fileName":"HP-F1-philosophers-stone-harry-lantern-restricted-section-cloak-web-landscape","contentType":"image/jpeg"}},"imageAltText":"Harry holding a lantern up to look at the books in the Restricted Section of the Hogwarts Library. His Invisibility Cloak is close by. "},{"contentfulId":"1JYjwr3cENOpdQSt6Ur8Nr","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-12-21T14:19:28.642Z","updatedAt":"2022-12-21T14:19:28.642Z","_updatedAt":"2022-12-21T14:19:28.642Z","entryTitle":"web-feature-what-would-be-your-perfect-wizarding-christmas-present-text-section-","text":"## If you’re a book-lover, you should expect… well, a bunch of wizarding books, obviously\n\nMaybe the set Sirius and Lupin once bought Harry – Practical Defensive Magic and its Use Against the Dark Arts. Maybe the New Theory of Numerology book Harry once bought Hermione. Maybe Quidditch Through the Ages or even Twelve Fail-Safe Ways to Charm Witches. Whatever your new festive read, we’re sure it would beat a regular Muggle book.\n\n## If you love a board game, then… a bottle of Felix Felicis would come in very useful\n\nJust imagine! One sip of Felix Felicis with your Christmas dinner and you could be sweeping the board at monopoly, winning every hand of cards, acing the family quiz. It might not be fun for anyone else but you’d be having a great time, wouldn’t you? Besides, someone has to win these things. \n\n## If you prefer a more challenging Christmas game, you should get… a Wizard Chess Set\n\nWe’re not sure how much help the old Felix Felicis would be if you were steering actual miniature troops around, as we presume even magical ivory chess pieces cannot be force-fed liquid luck. Anyway, chess is not a game of luck, but one of skill. And Wizard Chess would be a great way to put your skills to the test.\n\n## If you enjoy a festive tipple, you should hope for… some Butterbeer\n\nThis hugely versatile wizarding world beverage can be served warm or cold – which makes it pretty perfect for the Christmas and New Year period, if you ask us. As we all know, however, it’s pretty strong for House-Elves, which would be all the more reason to keep it to yourself.\n\n## If you’re a fan of plants, look out for… some Mimbulus mimbletonia under the tree\n\nA rare plant with incredible defensive properties, we imagine Mimbulus mimbletonia would make an interesting addition to any collection. It would certainly be good for warding off predators – there’d be no chance of any birds or bees nibbling on a plant that looks like a small grey cactus, is covered in boils, and spurts out Stinksap when threatened.\n\n## If you like to indulge your sweet tooth, here’s hoping for some… magical sweets and treats\n\nMrs Weasley’s homemade fudge. Toothflossing Stringmints. Bertie Bott’s Every-Flavour Beans. Chocolate Frogs. Nut brittle. Everything Honeydukes ever made. Any one of these delicious items would be a welcome addition to a wizarding world Christmas stocking – and tis the season to indulge, right?\n"}],"publishDate":"2022-12-21T00:00+00:00"},{"contentfulId":"4ZNiauUgRMsltx7Xkvh8jC","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"article","createdAt":"2022-12-15T12:59:55.793Z","updatedAt":"2022-12-15T13:15:17.623Z","_updatedAt":"2022-12-15T13:15:17.623Z","entryTitle":"WEB-FEATURE-which-harry-potter-character-would-you-like-to-spend-christmas-with","displayTitle":"Which Harry Potter character would you like to spend Christmas with?","activationDate":"2022-12-15T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"}],"externalId":"which-harry-potter-character-would-you-like-to-spend-christmas-with","mainImage":{"contentfulId":"7nqLdNfdCSZyiU5CrSqNtL","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-06T13:50:50.197Z","updatedAt":"2021-12-06T13:50:50.197Z","_updatedAt":"2021-12-06T13:50:50.197Z","entryTitle":"HP-F6-half-blood-prince-harry-ginny-talking-the-burrow-christmas-christmas-tree-web-landscape","image":{"contentfulId":"wjNlVCrwkL9sxCSIsiTk6","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-06T13:50:43.200Z","updatedAt":"2021-12-06T13:50:43.200Z","_updatedAt":"2021-12-06T13:50:43.200Z","revision":1,"locale":"en-GB","title":"HP-F6-half-blood-prince-harry-ginny-talking-the-burrow-christmas-christmas-tree-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/wjNlVCrwkL9sxCSIsiTk6/843ebc6c2dfecb411914070a52dfd652/HP-F6-half-blood-prince-harry-ginny-talking-the-burrow-christmas-christmas-tree-web-landscape","details":{"size":1756978,"image":{"width":2000,"height":1333}},"fileName":"HP-F6-half-blood-prince-harry-ginny-talking-the-burrow-christmas-christmas-tree-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"5c2mZe756Zsr2MY2EJjWmt","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-28T12:35:05.995Z","updatedAt":"2019-10-28T16:40:18.076Z","_updatedAt":"2019-10-28T16:40:18.076Z","entryTitle":"HP-F6","displayTitle":"Harry Potter and the Half-Blood Prince","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Half-Blood Prince","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-half-blood-prince"}]},"intro":"At Hogwarts, Harry found Christmas cheer in his new wizarding family. But which Harry Potter character would you like to share a cracker with?","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"57TXzcamDNxBnDMkFZpNo5","type":"Entry","revision":8,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-12-15T12:51:33.433Z","updatedAt":"2022-12-15T13:14:51.910Z","_updatedAt":"2022-12-15T13:14:51.910Z","entryTitle":"web-feature-which-harry-potter-character-would-you-want-to-spend-christmas-with-text-section-1","text":"## If there’s no time for small-talk and you just want to eat, you’d spend Christmas with Ron\n\n![HP-F1-philosophers-stone-harry-ron-great-hall-christmas-weasley-jumpers-decorations-web-landscape](//contentful.harrypotter.com/usf1vwtuqyxm/57v17EyqVzwS7FhM7Pr0TZ/4d97482b99b4ed33970b196697562413/HP-F1-philosophers-stone-harry-ron-great-hall-christmas-weasley-jumpers-decorations-web-landscape)\n\nLook, it’s all well and good discussing the ways of the world with those around the dinner table – but some of us have bigger priorities. Namely: eating. Don’t you hate it when someone asks you a profound question that requires quite a long answer, but your mouth is full to the brim with roast potatoes? Tell us about it. It sounds like you could use a dining companion who likes to capitalise on the actual dining, and we can’t think of a better one than Ron Weasley. Ron is usually to be found at Hogwarts feasts doing what you’re supposed to do – feasting! Talking can come later! Christmas dinner is a sacred moment! The only chit-chat you want to be doing is “nom nom nom”, and we assure you that Ron would happily oblige. \n\n## If you love all the festive novelties of the season, you’d spend Christmas with Dumbledore\n\n![HP-F1-dumbledore-baby-harry-web-header](//contentful.harrypotter.com/usf1vwtuqyxm/3gKLTB02o2VmhDUDAJCLbt/934c56265e1ed8778028218c88f980d0/harry-brighter.jpg)\n\nChristmas can be a silly old time – all of a sudden there are bright, twinkling lights everywhere, people are dressing up in sparkly things, and generally, that merry feeling can be quite infectious. Professor Dumbledore certainly seemed to enjoy it, as we saw during the Christmas dinner in *Harry Potter and the Prisoner of Azkaban*. Always a man who enjoyed the small amusements of life, Dumbledore couldn’t wait to pop a cracker and put on a flowery bonnet. And who can blame the guy? This season is full of kooky traditions, such as hiding coins in Christmas puddings, playing daft games, telling bad jokes, adding sleigh bells on EVERY song and – of course – donning silly hats. Dumbledore totally gets it. And we’re saving you a seat next to him at the Hogwarts table. \n\n## If you simply love a good old singalong, you’d spend Christmas with Sirius \n\n![HP-F5-order-of-the-phoenix-sirius-grimmauld-place-web-landscape](//contentful.harrypotter.com/usf1vwtuqyxm/74FKAcUf0SGx2geIRjJtpc/1d38ead3ec7a261094e1fdecb3bb904d/HP-F5-order-of-the-phoenix-sirius-grimmauld-place-web-landscape)\n\nWe wouldn’t have had Sirius down as a particularly festive chap – Sirius had a tough life and came out of Azkaban as a brooding, hardened character. But during *Harry Potter and the Order of the Phoenix*, upon the news Harry and the Weasleys would be staying with him at Grimmauld Place, [Harry’s godfather positively lit up,](https://www.wizardingworld.com/features/7-of-our-favourite-sirius-black-moments) creating a Christmassy atmosphere around his decidedly not-that-Christmassy house, providing a healthy supply of Butterbeer and even putting his own spin on a famous Christmas carol: God Rest Ye Merry… Hippogriffs?! If you say so, Sirius, mate. If you get a bit competitive during a Christmas singalong, we reckon Sirius would enjoy being your harmonising partner. "},{"contentfulId":"3VE1AR5dz5FdohKFfYYQWC","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-12-15T12:54:16.591Z","updatedAt":"2022-12-15T13:12:46.345Z","_updatedAt":"2022-12-15T13:12:46.345Z","entryTitle":"web-feature-which-harry-potter-character-would-you-want-to-spend-christmas-with-text-section-2","text":"## If you go a bit OTT on the Christmas decorations, you’d spend Christmas with Dobby or Professor Flitwick\n\nLook, we know the sort. You’re walking down the street on a frosty evening, and you can’t help looking at peoples’ windows and seeing how strong their Christmas decoration game is. If you’re reading this, we reckon you’re the type that has a real smorgasbord of lights, tinsel, dangly reindeers and all sorts going up this time of the year. Or maybe you have a very strict festive colour scheme. And we bet you put up your tree super-early too. Hey, we’re not judging! \n\n![HP-F1-philosophers-stone-flitwick-decorating-christmas-tree-great-hall-web-landscape](//contentful.harrypotter.com/usf1vwtuqyxm/2SnLEqBsmsGnWxuo3Rh2Cn/c785e7a129f03be45bf086001d3607af/HP-F1-philosophers-stone-flitwick-decorating-christmas-tree-great-hall-web-landscape)\n\nWe spotted two Harry Potter characters who, like you, very much enjoy putting their stamp on things during the festive period, with distinctly different decorating styles. While Flitwick enjoys the classy approach, adding charming fairies to the Hogwarts Christmas trees, Dobby once decorated the Room of Requirement with “Have a very Harry Christmas!” in Harry’s honour, of course. Well, it’s good to have unique aesthetic tastes – otherwise life would be very boring. You, Flitwick and Dobby are the ones making this time of year look so special. \n\n## If you get a bit stressed out this time of year, you’d spend Christmas with Hagrid\n\n![HP-F1-philosophers-stone-hagrid-fang-outside-hagrids-hut-playing-flute-web-landscape](//contentful.harrypotter.com/usf1vwtuqyxm/6MYGoPvMPUJz2biUkBUyxJ/3987a8685e5c4fe9e8c5c4367f327637/HP-F1-philosophers-stone-hagrid-fang-outside-hagrids-hut-playing-flute-web-landscape)\n\nWe’ve established that Christmas certainly looks nice (and tastes nice!) but that doesn’t mean it’s not an all-mighty stress to actually get to that point. Cooking Christmas dinner is an Olympic sport in itself, (don’t mind actually eating it) buying all the presents is a particularly emotionally taxing time, and don’t get us started on wrapping them. We think you need a calm presence around you during Christmas, and who better than one Rubeus Hagrid, who always manages to diffuse a particularly arduous situation, whether that’s dealing with slug vomit or quite dangerous magical creatures. Hagrid is also *very* good at carrying huge Christmas trees to the Great Hall, so you know he’d be up for a few manual tasks if you need help around the house. And not to mention he can reach those high-up places. Trust us, with Hagrid by your side, your festive preparations will go off without a hitch – as long as you don’t ask him to help out in the kitchen. "},{"contentfulId":"1wgGTgPxgx5FVg9x9fzLJc","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-12-15T12:55:44.863Z","updatedAt":"2022-12-15T13:10:24.270Z","_updatedAt":"2022-12-15T13:10:24.270Z","entryTitle":"web-feature-which-harry-potter-character-would-you-want-to-spend-christmas-with-text-section-3","text":"## If you like to spend this time of year reading, you’d spend Christmas with Hermione\n\n![WB-HP-F7-hermone-reading-book-in-winter](//contentful.harrypotter.com/usf1vwtuqyxm/3bu0nZ4nRcDZO5TPciGFaX/1a4702ad45ec7c1d491f215bed5d1653/WB-HP-F7-hermone-reading-book-in-winter.jpg)\n\nWhile some like to spend the festive season in a constant state of persistent party spirit until at *least* January 2nd, some like to spend this time in a realm of tranquility, curled up with a blanket, stuck in a good book, and nobody interrupting. You know our girl Hermione is definitely one for that, which is why we think you two would be the perfect Christmas pair. Just think! You could take turns on tea-making duties and recommend the best tomes to each other! No small-talk with your uncle’s cousin this year. Just a good, engrossing story to get your head lost in. Maybe this is why Ron and Hermione work so well together. She can read in peace while he quietly feasts on the third helping of Christmas dinner. Bliss.\n\n## If you love nailing your perfect festive outfit, you’d spend Christmas with Luna\n\n![LunaLovegood WB F6 LunaLovegoodSlugClubChristmasPartyWithSanguiniAndEldredWorple Still 080615 Port](//contentful.harrypotter.com/usf1vwtuqyxm/4i0wa5BOBWYACKeQyUyaSo/ba0a6c04fa6c7cb2c2cf59eeadd0ba39/LunaLovegood_WB_F6_LunaLovegoodSlugClubChristmasPartyWithSanguiniAndEldredWorple_Still_080615_Port.jpg)\n\nChristmas is a time for food and family, yes, yes, yes – but it is also a time for looking fabulous. Luna knows this, hence her tremendous little sparkly number for Slughorn’s Christmas party, where she actually looked like a decoration. This. Is. What. This. Festive. Time. Is. All. About. If you’re not dressed like you could actually be *on* the Christmas tree itself – you’re doing it wrong! Go home and put on at least five more reams of tinsel. We’re sure Luna could lend you a few signature pieces to make your festive outfit look more editorial. Her fashion outlook was truly not appreciated in her own time.\n\n## If you’re all about the parties, you’d spend Christmas with Professor Slughorn\n\n![HP-F6-horace-slughorn-food](//contentful.harrypotter.com/usf1vwtuqyxm/2EKc0oex6NqMYfUFJZ3Gxc/5b70ed6a504dbfb52dc6eb117d61b97b/slughorn.jpg)\n\nIf there’s one man who knows how to put on a good ‘do, it is Horace Slughorn, the Potions Professor with a proficiency for partying. Who knew that the man who once disguised himself as a big armchair to hide from Professor Dumbledore would actually be very sociable, in fact so sociable, he even has his own Slug Club for the elite of Hogwarts. [You may not agree with Slughorn’s cliquey ways](https://www.wizardingworld.com/features/the-pros-and-cons-of-joining-the-slug-club), but if you’re in that clique, you’ll bet you’re going to have a good time. Not only does Slughorn bring the most interesting of guests (an actual vampire, anyone?) but he always knows how to stir up the best conversations. And you could always swig a bit of Felix Felicis if you need a bit of liquid luck talking to that person you fancy. "}],"relatedArticleHeader":"Have a very Harry Christmas with more festive reads","relatedArticleReference":[{"contentfulId":"2tTtWVYSmgMRn3oqTdGnEE","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"article","createdAt":"2022-12-13T11:29:53.998Z","updatedAt":"2022-12-13T12:22:11.846Z","_updatedAt":"2022-12-13T12:22:11.846Z","entryTitle":"WEB-FEATURE-the-importance-of-the-weasley-jumper","displayTitle":"The importance of the Weasley jumper","activationDate":"2022-12-13T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"}],"externalId":"the-importance-of-the-weasley-jumper","mainImage":{"contentfulId":"2USnYCyDPEOaFRRgQY4wcO","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-21T17:26:51.961Z","updatedAt":"2021-12-21T17:26:51.961Z","_updatedAt":"2021-12-21T17:26:51.961Z","entryTitle":"hp-f1-ron-weasley-jumper-christmas-common-room-eating-bertie-botts-app-landscape","image":{"contentfulId":"5mNxcrPooS6QSwEnuvP2sv","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-21T17:26:48.764Z","updatedAt":"2021-12-21T17:26:48.764Z","_updatedAt":"2021-12-21T17:26:48.764Z","revision":1,"locale":"en-GB","title":"hp-f1-ron-weasley-jumper-christmas-common-room-eating-bertie-botts-app-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5mNxcrPooS6QSwEnuvP2sv/4e204a1c2f41b30827894aabb57dba2f/hp-f1-ron-weasley-jumper-christmas-common-room-eating-bertie-botts-app-landscape.jpg","details":{"size":83022,"image":{"width":2000,"height":1306}},"fileName":"hp-f1-ron-weasley-jumper-christmas-common-room-eating-bertie-botts-app-landscape.jpg","contentType":"image/jpeg"}}},"intro":"Many families have their own holiday traditions, and the Weasleys were no exception – Christmas just wouldn’t be complete without every Weasley (and honorary Weasley) donning a hand-knitted, one-of-a-kind, Molly Weasley-designed creation. But the Weasley jumper was never just about cosy loungewear. It represented much more.","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"2vkpmeTJllS0GJjj3LaJRB","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-12-13T11:18:21.379Z","updatedAt":"2022-12-13T11:18:21.379Z","_updatedAt":"2022-12-13T11:18:21.379Z","entryTitle":"web-feature-the-importance-of-the-Weasley-jumper-text-section-1","text":"For Harry, receiving his first Weasley jumper was a surprise, not least because at that point he had only met Ron’s mum very briefly. But from the outset Molly Weasley seemed to sense instinctively what Harry needed: a family who would actually care for him.\n\nSo Harry’s first Weasley jumper – an emerald-green creation that came with a large box of home-made fudge – was Molly’s way of welcoming him to the fold. She was moved to add a jumper for Harry to her knitting pile after Ron said Harry wasn’t expecting any presents. Sure enough, within a year or two, he was basically part of the family. It’s almost as if the jumper itself bestowed upon Harry some honorary Weasley status. Fred and George helped Ron rescue him from the Dursley’s; Arthur secured an extra Quidditch World Cup ticket for him; Molly comforted him after Cedric’s death. (Of course, much later, Ginny actually married him, but let’s not get ahead of ourselves.)\n\nIn the meantime, every year, there was a new Weasley jumper for Harry. Which must have taken some doing, if you think about it. Even if Molly used magic to help with her festive [knitwear](https://www.wizardingworld.com/features/an-appreciation-of-harry-potter-knitwear-web) production line, she had at least 8 to produce every year: one for each of her own 7 children, plus Harry, and that’s assuming there were no other jumper recipients on her list.\n\nBut the effort was what it was all about – even though, let’s face it, not everybody appreciated a Weasley jumper. Ron complained his were always maroon, Malfoy once mocked Harry’s, and when Percy was estranged from his family, he sent it back unopened. \n\nStill, Molly kept making them. For her, it was about more than the item itself. The real magic was in its creation, and we don’t just mean the wand-work. Whatever the finished item looked like, receiving a Weasley jumper on Christmas morning was a clear demonstration of Molly’s affection for the recipient. It said: ‘you’re part of this family.’ No wonder Dobby was so pleased when Ron bestowed one on him one Christmas. Dobby definitely didn’t mind maroon."},{"contentfulId":"494m9a6urrnmYzg1q9TuND","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"quote","createdAt":"2022-12-13T11:23:36.822Z","updatedAt":"2022-12-13T11:23:36.822Z","_updatedAt":"2022-12-13T11:23:36.822Z","entryTitle":"HP4-dobby-thank-ron-for-weasley-jumper","activationDate":"2022-12-13T00:00+00:00","quoteText":"Dobby looked quite overwhelmed. ‘Sir is very kind!’ he squeaked, his eyes brimming with tears again, bowing deeply to Ron. ‘Dobby knew sir must be a great wizard, for he is Harry Potter’s greatest friend, but Dobby did not know that he was also as generous of spirit, as noble, as selfless –’","quoteAttributionTitle":"Harry Potter and the Goblet of Fire"},{"contentfulId":"3pLWTGflqdALb0RXTfmalO","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-12-13T11:26:17.565Z","updatedAt":"2022-12-13T11:26:17.565Z","_updatedAt":"2022-12-13T11:26:17.565Z","entryTitle":"web-feature-the-importance-of-the-Weasley-jumper-text-section-2","text":"And so the Weasley Christmas jumper became a regular festive tradition. We can just picture Harry and the Weasleys lounging around after Christmas dinner at [The Burrow](https://www.wizardingworld.com/features/4-reasons-we-always-wanted-to-run-away-to-the-burrow), woolly jumpers on for a snooze on the sofa. Or Ron and Harry wearing one under a Hogwarts cloak, keeping warm as they threw snowballs at Fred and George. And no doubt they were perfect for keeping off the chill of those draughty Hogwarts corridors.\n\nThe Weasley jumper was also a masterclass in gift-giving, if you ask us. A hand-made gift, unique to the wearer, lovingly created with a specific individual in mind? It ticks a lot of boxes (even if Mrs Weasley did repeatedly forget that Ron didn’t like maroon…)\n\nOverall, though, the Weasley jumper was important because of what it represented – particularly to Harry, who had never before experienced what it was like to be part of a warm, loving, slightly chaotic family. Cosy, comforting, and with ample space to snuggle in, it was basically an extension of the Weasley family home. Those jumpers did a lot more than keep out the chill for Harry. Right from the very beginning, they were symbolic of the very thing he needed: a family who actually cared for him.\n\nBring on Weasley jumper season, we say."}],"relatedArticleHeader":"Dig out your Weasley jumper and dig into these Weasley favourites","relatedArticleReference":[{"contentfulId":"cYZR86HoSetvImyc5hF4n","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2022-03-01T09:00:52.104Z","updatedAt":"2022-03-01T09:00:52.104Z","_updatedAt":"2022-03-01T09:00:52.104Z","entryTitle":"WEB-FEATURE-seven-times-ron-weasley-was-a-brilliant-friend","displayTitle":"Seven times Ron Weasley was a brilliant friend","activationDate":"2022-03-01T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","creat decorating-christmas-tree-great-hall-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"17tbLef7PppiWU0cVDrWBV","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T15:14:31.179Z","updatedAt":"2019-10-28T16:37:58.697Z","_updatedAt":"2019-10-28T16:37:58.697Z","entryTitle":"HP-F1","displayTitle":"Harry Potter and the Philosopher's Stone ","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Philosopher's Stone ","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-philosophers-stone"}]},"intro":"Christmas in the wizarding world is an extra special experience. But where would you spend the festive season? From The Burrow to St Mungo’s, we’ve made some deductions based on your personality.","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"tSFquOaeOdJxOgXs4GcVu","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-12-06T16:27:18.286Z","updatedAt":"2021-12-06T16:27:18.286Z","_updatedAt":"2021-12-06T16:27:18.286Z","entryTitle":"where-would-you-spend-christmas-in-the-wizarding-world-text-section-1","text":"## If the festive season is all about family for you… you’d spend Christmas at The Burrow\nChristmas at The Burrow sounds like the most wholesome way you could possibly spend this day. With a roaring fire, a slap-up family meal, a lovingly (yet haphazardly) decorated tree and the company of all those who are nearest and dearest to you – what could be better? If you’re the type of person who thinks that Christmas is a time for family and simple pleasures, such as all settling down to watch your favourite festive film, then we think this would be perfect for you. We can just see you now, helping Fred and George wrangle a gnome for the top of the tree, listening to Celestina Warbeck on the wireless with Mrs Weasley and doing it all whilst wearing your very own Weasley jumper."},{"contentfulId":"7nqLdNfdCSZyiU5CrSqNtL","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-06T13:50:50.197Z","updatedAt":"2021-12-06T13:50:50.197Z","_updatedAt":"2021-12-06T13:50:50.197Z","entryTitle":"HP-F6-half-blood-prince-harry-ginny-talking-the-burrow-christmas-christmas-tree-web-landscape","image":{"contentfulId":"wjNlVCrwkL9sxCSIsiTk6","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-06T13:50:43.200Z","updatedAt":"2021-12-06T13:50:43.200Z","_updatedAt":"2021-12-06T13:50:43.200Z","revision":1,"locale":"en-GB","title":"HP-F6-half-blood-prince-harry-ginny-talking-the-burrow-christmas-christmas-tree-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/wjNlVCrwkL9sxCSIsiTk6/843ebc6c2dfecb411914070a52dfd652/HP-F6-half-blood-prince-harry-ginny-talking-the-burrow-christmas-christmas-tree-web-landscape","details":{"size":1756978,"image":{"width":2000,"height":1333}},"fileName":"HP-F6-half-blood-prince-harry-ginny-talking-the-burrow-christmas-christmas-tree-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"5c2mZe756Zsr2MY2EJjWmt","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-28T12:35:05.995Z","updatedAt":"2019-10-28T16:40:18.076Z","_updatedAt":"2019-10-28T16:40:18.076Z","entryTitle":"HP-F6","displayTitle":"Harry Potter and the Half-Blood Prince","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Half-Blood Prince","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-half-blood-prince"}]},{"contentfulId":"3qMFUntI8NRbHWbal5w3fq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-12-06T16:27:48.970Z","updatedAt":"2021-12-06T16:27:48.970Z","_updatedAt":"2021-12-06T16:27:48.970Z","entryTitle":"where-would-you-spend-christmas-in-the-wizarding-world-text-section-2","text":"## If you’re all about that festive food… you’d spend Christmas feasting in the Great Hall\nChristmas at Hogwarts is brilliant in many ways – with the beautiful decorations, suits of armour singing Christmas carols and the cosy common rooms to hang out in. But arguably the best thing has to be the fantastic Christmas feast. From the one hundred turkeys, to the mountains of roast potatoes, to the lashings of gravy, the platters of chipolatas and not forgetting flaming Christmas puddings, it’s certainly a very impressive, not to mention tasty, banquet. If you live for Christmas food but can take or leave the rest of the holiday traditions, always comes back for seconds (or thirds) and thinks a Christmas dinner is no good without every single one of the trimmings, then you’d love nothing more than to spend the entire day feasting in the Great Hall."},{"contentfulId":"3GrZqdgxrUceKsaMVzkAmb","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-06T13:44:33.997Z","updatedAt":"2021-12-06T13:47:27.875Z","_updatedAt":"2021-12-06T13:47:27.875Z","entryTitle":"HP-F1-philosophers-stone-ron-harry-hermione-great-hall-chess-christmas-decorated-web-landscape","image":{"contentfulId":"2DrzUL4vRTtBkVc67pd0FU","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-06T13:44:27.789Z","updatedAt":"2021-12-06T13:44:27.789Z","_updatedAt":"2021-12-06T13:44:27.789Z","revision":1,"locale":"en-GB","title":"HP-F1-philosophers-stone-ron-harry-hermione-great-hall-chess-christmas-decorated-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2DrzUL4vRTtBkVc67pd0FU/4e4fea44a248055cc5bba01adafd5277/HP-F1-philosophers-stone-ron-harry-hermione-great-hall-chess-christmas-decorated-web-landscape","details":{"size":2367416,"image":{"width":2000,"height":1299}},"fileName":"HP-F1-philosophers-stone-ron-harry-hermione-great-hall-chess-christmas-decorated-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"17tbLef7PppiWU0cVDrWBV","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T15:14:31.179Z","updatedAt":"2019-10-28T16:37:58.697Z","_updatedAt":"2019-10-28T16:37:58.697Z","entryTitle":"HP-F1","displayTitle":"Harry Potter and the Philosopher's Stone ","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Philosopher's Stone ","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-philosophers-stone"}]},{"contentfulId":"2eKGVOrEfVzplXJDB6p6uU","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-12-06T16:28:22.338Z","updatedAt":"2021-12-06T16:28:22.338Z","_updatedAt":"2021-12-06T16:28:22.338Z","entryTitle":"where-would-you-spend-christmas-in-the-wizarding-world-text-section-3","text":"## If you’d like to help those less fortunate than yourself… you’d spend Christmas at St Mungo’s\nChristmas isn’t always the easiest time of year – especially if you feel as though you can’t join in the fun and festivities for some reason. If you can’t stand the idea of other people having a miserable yuletide, then we think you would probably spend at least some of your day trying to spread some Christmas cheer. And if that was in the wizarding world, we think you’d gravitate towards St Mungo’s. We can picture you visiting the witches and wizards in the hospital, bringing them some treats from Honeyduke’s or a trick from Weasley’s Wizard Wheezes – just to help put a smile on their face. Hopefully that would make their Christmas that little bit better. "},{"contentfulId":"5Mp5VFHTkjVDXzHiQ9XZch","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-12-06T16:28:44.502Z","updatedAt":"2021-12-06T16:28:44.502Z","_updatedAt":"2021-12-06T16:28:44.502Z","entryTitle":"where-would-you-spend-christmas-in-the-wizarding-world-text-section-4","text":"## If you would love to celebrate with friends… you’d spend Christmas at the Three Broomsticks\nIf would prefer to have a relaxed Christmas rather than a big formal hullabaloo, then we think you would enjoy spending the day drinking Butterbeer with your friends at the Three Broomsticks. With no pressure to make a massive Christmas dinner, or to be forced to listen to the same boring story your uncle has told a million times, you would be free to focus on having a casual yet great time. And with the warm and pleasant atmosphere of the pub setting your festive scene, we think you would still feel Christmassy even if your day was not entirely traditional."},{"contentfulId":"3jhEVXffgv9BFlrfM2sHVk","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-07-07T10:38:14.869Z","updatedAt":"2022-02-22T13:12:11.986Z","_updatedAt":"2022-02-22T13:12:11.986Z","entryTitle":"HP-F6-half-blood-prince-horace-slughorn-three-broomsticks-web-landscape","image":{"contentfulId":"5Ow0nHNGycHy3gWMeY7LD8","type":"Asset","contentTypeId":"asset","createdAt":"2021-07-07T10:37:53.386Z","updatedAt":"2021-07-07T10:37:53.386Z","_updatedAt":"2021-07-07T10:37:53.386Z","revision":1,"locale":"en-GB","title":"HP-F6-half-blood-prince-horace-slughorn-three-broomsticks-web-landscape","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5Ow0nHNGycHy3gWMeY7LD8/07fb55e94f874c2e1066adadda68a6e6/HP-F6-half-blood-prince-horace-slughorn-three-broomsticks-web-landscape","details":{"size":1946904,"image":{"width":2000,"height":1333}},"fileName":"HP-F6-half-blood-prince-horace-slughorn-three-broomsticks-web-landscape","contentType":"image/jpeg"}},"imageAltText":"Professor Slughorn with a Butterbeer at the Three Broomsticks","source":[{"contentfulId":"5c2mZe756Zsr2MY2EJjWmt","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-28T12:35:05.995Z","updatedAt":"2019-10-28T16:40:18.076Z","_updatedAt":"2019-10-28T16:40:18.076Z","entryTitle":"HP-F6","displayTitle":"Harry Potter and the Half-Blood Prince","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Half-Blood Prince","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-half-blood-prince"}]},{"contentfulId":"3VZV3TyIcoNn40iBf20nhz","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-12-06T16:29:58.598Z","updatedAt":"2021-12-06T16:29:58.598Z","_updatedAt":"2021-12-06T16:29:58.598Z","entryTitle":"where-would-you-spend-christmas-in-the-wizarding-world-text-section-5","text":"## If you love a good old festive knees-up… you’d spend Christmas at the Yule Ball\nThe Christmas season means one thing, lots of Christmas parties and festive shindigs. If you can’t wait to dust off your glitteriest outfit, throw on your dancing shoes and show off your best moves, then we think it would be a dream come true to go the Yule Ball. We can just imagine you looking resplendent in the finest dress robes, while enjoying the dulcet tones of the Weird Sisters, as you dance in the winter wonderland that the Great Hall has become. And you can be confident that an event like this would not be short of entertainment – what with a room full of romance, laughter and festive merriment. So, if you’re a social butterfly that loves a good time, this would be the perfect Christmas for you."},{"contentfulId":"2jsnDijGVENQrL7kCNvJuP","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-06T13:45:42.463Z","updatedAt":"2021-12-06T13:45:42.463Z","_updatedAt":"2021-12-06T13:45:42.463Z","entryTitle":"HP-F4-goblet-fire-cho-cedric-walking-into-yule-ball-together-happy-web-landscape","image":{"contentfulId":"7Gg3rW3wpho401kh28ueXG","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-06T13:45:27.169Z","updatedAt":"2021-12-06T13:45:27.169Z","_updatedAt":"2021-12-06T13:45:27.169Z","revision":1,"locale":"en-GB","title":"HP-F4-goblet-fire-cho-cedric-walking-into-yule-ball-together-happy-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7Gg3rW3wpho401kh28ueXG/2ce6bdeb293a9f962407b31ab38c3c2b/HP-F4-goblet-fire-cho-cedric-walking-into-yule-ball-together-happy-web-landscape","details":{"size":2430214,"image":{"width":2000,"height":1331}},"fileName":"HP-F4-goblet-fire-cho-cedric-walking-into-yule-ball-together-happy-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"15fY8suSs8UHkOzysj3ldD","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-28T11:43:57.874Z","updatedAt":"2019-10-28T16:39:29.286Z","_updatedAt":"2019-10-28T16:39:29.286Z","entryTitle":"HP-F4","displayTitle":"Harry Potter and the Goblet of Fire","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Goblet of Fire","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-goblet-of-fire"}]},{"contentfulId":"2twovssr2NQuNEHuRPVUL1","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2021-12-06T16:30:23.857Z","updatedAt":"2021-12-10T10:09:22.844Z","_updatedAt":"2021-12-10T10:09:22.844Z","entryTitle":"where-would-you-spend-christmas-in-the-wizarding-world-text-section-6","text":"## If you’d rather shut out all Christmassy things… you’d spend Christmas in the Forbidden Forest\nFor some people Christmas can be their worst nightmare. Just the thought of endless Christmas music, overcrowded shops, forced merriment and tacky decorations is enough to make them break out in hives. If this sounds like you, then we think you would adore getting away from the Christmas hubbub in the (relative) tranquillity of the Forbidden Forest. There you could shut out all the holiday rows, the never-ending list of gifts to buy and just find some peace and quiet. And yes, you might have to navigate your way around a tricky Acromantula encounter – but you’d would much rather be doing that than being forced to join in with the singing of yet another Christmas carol."},{"contentfulId":"3myRNgJmGnwTUkI85URyC6","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-06T13:49:44.526Z","updatedAt":"2021-12-06T13:49:44.526Z","_updatedAt":"2021-12-06T13:49:44.526Z","entryTitle":"HP-F5-order-of-the-phoenix-harry-luna-forbidden-forest-clearing-sunny-web-landscape","image":{"contentfulId":"6mAk75fLsEJ8V9esGmW54d","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-06T13:49:37.413Z","updatedAt":"2021-12-06T13:49:37.413Z","_updatedAt":"2021-12-06T13:49:37.413Z","revision":1,"locale":"en-GB","title":"HP-F5-order-of-the-phoenix-harry-luna-forbidden-forest-clearing-sunny-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6mAk75fLsEJ8V9esGmW54d/2d77d397508145a60e5a42daa31a11e5/HP-F5-order-of-the-phoenix-harry-luna-forbidden-forest-clearing-sunny-web-landscape","details":{"size":2876107,"image":{"width":2000,"height":1333}},"fileName":"HP-F5-order-of-the-phoenix-harry-luna-forbidden-forest-clearing-sunny-web-landscape","contentType":"image/jpeg"}},"source":[{"contentfulId":"6vSblg4bo8ERfWv6wulvcW","type":"Entry","revision":3,"locale":"en-GB","cont tTypeId":"image","createdAt":"2019-10-01T18:33:03.052Z","updatedAt":"2019-10-01T18:33:03.052Z","_updatedAt":"2019-10-01T18:33:03.052Z","entryTitle":"PMARCHIVE-WB F4 Yule Ball Professor Flitwick Christmas HP4D-14922 Cg2NJTxeWOQ2GSQy6wUoY-b7","image":{"contentfulId":"2PqxPMpnpKqoMYkcgAsEKC","type":"Asset","contentTypeId":"asset","createdAt":"2019-09-20T18:20:16.774Z","updatedAt":"2019-09-24T05:33:11.387Z","_updatedAt":"2019-09-24T05:33:11.387Z","revision":10,"locale":"en-GB","title":"WB F4 Yule Ball Professor Flitwick Christmas HP4D-14922","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2PqxPMpnpKqoMYkcgAsEKC/6f562eed0e669f7f59f4dd6f3f2c1ce5/WB_F4_Yule_Ball_Professor_Flitwick_Christmas_HP4D-14922.jpg","details":{"size":1526402,"image":{"width":4064,"height":2704}},"fileName":"WB F4 Yule Ball Professor Flitwick Christmas HP4D-14922.jpg","contentType":"image/jpeg"}},"imageCaption":"Harry Potter and the Goblet of Fire"},"intro":"How did we rank all seven of Harry’s Christmases from the Harry Potter books?","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"nqzZvkGxlqtl0jRHQrBxc","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2020-12-15T17:32:02.769Z","updatedAt":"2020-12-15T17:43:41.988Z","_updatedAt":"2020-12-15T17:43:41.988Z","entryTitle":"2020-WEB-TEXTSECTION-harry-christmases-ranked","text":"## Last place: Harry Potter and the Deathly Hallows\n\nIf camping out in the freezing cold is not your idea of a relaxing Christmas break, you’ll probably understand Harry’s final Christmas in the series being bottom of our ranking. Alone with Hermione after Ron had left the trio after a huge row, the pair ended up spending Christmas Eve being attacked by Nagini disguised as Bathilda Bagshot at Godric’s Hollow. Seeing the graves of his parents for the first time earlier in the evening was literally cold comfort. In fact, they didn’t even notice it was Christmas time until Hermione noticed the lights of the neighbouring village. Things improved a bit when Ron returned and saved Harry’s life by destroying the locket Horcrux after Harry ventured into a freezing pool to attempt to retrieve the sword of Gryffindor.\n\n![GodricsHollow WB F7 GodricsHollowReferencePhoto Still 080615 Land](//contentful.harrypotter.com/usf1vwtuqyxm/4CPPszLrFuuG0cSMm6WUcU/a738f6ae98e2719d4c2c6e04453ae0fc/GodricsHollow_WB_F7_GodricsHollowReferencePhoto_Still_080615_Land.jpg)\n\n## Sixth place: Harry Potter and the Order of the Phoenix\n\nIn Order of the Phoenix, Harry finds himself in the strange situation of visiting Arthur Weasley at St Mungo’s Hospital for Magical Maladies during the Christmas period. After seeing Arthur attacked by Nagini at the Department of Mysteries in a ‘dream’, it is Harry that sounds the alarm to Dumbledore, leading to Arthur’s rescue before it is too late. While Arthur recovered, Harry spent a lot of time back at Grimmauld Place hiding away because he was worried he was possessed by Voldemort. Hermione eventually coaxed him out and Ginny was able to convince him he wasn’t, despite his vision of Nagini coming to him from the snake’s point of view. Worries about possession don’t make for a happy Christmas.\n\u003cbr\u003e\n## Fifth place: Harry Potter and the Chamber of Secrets\n\nOn the plus side, Harry’s second year saw him spend Christmas at Hogwarts with Ron and Hermione. But it was a little fraught. Hermione finished brewing up some Polyjuice Potion on Christmas Day itself. She might have preferred another tipple, because she accidentally added a cat hair to the mix, transforming herself partially into a cat rather than Millicent Bulstrode. Harry and Ron did better, disguising themselves as Goyle and Crabbe in order to gain access to the Slytherin common room and quiz Malfoy about whether he was the Heir of Slytherin opening the Chamber of Secrets. It turned out he wasn’t. It was probably worth it – but Hermione had to spend the rest of the holidays in the hospital wing.\n\n![WB F2 PolyjuicePotion HarryAndRonDrinkPolyjuice 3533](//contentful.harrypotter.com/usf1vwtuqyxm/1I6nL8oXM0qEEGQie4Y6ia/d39c418de43e014d91ea339ae4cce141/WB_F2_PolyjuicePotion_HarryAndRonDrinkPolyjuice_3533.jpg)\n\n## Fourth place: Harry Potter and the Half-Blood Prince\n\nYou’d think Christmas at the Burrow with Lupin and the Weasleys would be great. Well, it was, until Percy turned up with Minister of Magic, Rufus Scrimgour, on Christmas Day itself. Giving them short shrift, Harry was then able to focus on his present from Kreacher: a parcel full of maggots! Still, it wasn’t as bad as the ‘My Sweetheart’ necklace that Ron received from Lavender Brown.\n\u003cbr\u003e\n## Third place: Harry Potter and the Goblet of Fire\n\nThe most extraordinary Christmas at Hogwarts saw the holding of the Yule Ball during the Triwizard Tournament. A lavish and loved-up affair where the students could bring dates to the dance, there was a lot of tension simmering under the surface. Harry attended with Parvati Patil, but would have preferred to go with Cho Chang, who instead went with Hufflepuff champion Cedric Diggory. Hermione linked arms with Durmstrung Champion and Quidditch superstar Victor Krum, filling Ron with jealousy (there with Padma Patil – the ball was hard on the Patils) which culminated in a row between the friends. Worst of all, Harry overheard a conversation between Snape and headmaster of Durmstrang Igor Karkaroff, where the latter said that his Dark Mark was burning – a sign of Voldemort’s growing power. This Christmas event presaged the tragedy to come at the Tournament’s conclusion…\n\n![WB F4 Yule Ball Professors Christmas HP4D-15050](//contentful.harrypotter.com/usf1vwtuqyxm/2v39qjuVg8oyiCg4YIyiUy/73c1409331ea9f1517941736caa1774e/WB_F4_Yule_Ball_Professors_Christmas_HP4D-15050.jpg)\n## Second place: Harry Potter and the Prisoner of Azkaban\n\nOnce again joined by Ron and Hermione, on Harry’s third Christmas at Hogwarts he received an excellent gift: the Firebolt. Hermione suspected it was from Sirius Black, at that point the notorious escapee of Azkaban, and she notified Professor McGonagall. Nothing like receiving a pressie and not being able to play with it!\n\u003cbr\u003e\n## First place: Harry Potter and the Philosopher’s Stone\n\nAfter a lifetime of Christmases at the Dursleys, it’s not surprising that Harry chose to spend Christmas at Hogwarts during his first year. It was a lot of fun, mainly because all the Weasley boys also stayed. The snowbound japes included Fred and George pelting Professor Quirrell with snow balls. But this Christmas was also tainted with personal pain. After he received the Cloak of Invisibility from Dumbledore, Harry whiled away this sleepiest part of the year exploring the nooks and crannies of Hogwarts. It was then he came upon the Mirror of Erised and a glimpse of his deceased parents: a bittersweet tang of long-lost affection in an otherwise cosy festive sea\n\n![HP-F1-harry-ron-hermione-christmas-chess](//contentful.harrypotter.com/usf1vwtuqyxm/4Lw5wUzD4UKYtxZ8CEwISM/475fae4c1508a6e533b09191419a331b/christmas-portrait-harry-ron.jpg)"}],"relatedArticleReference":[{"contentfulId":"2Ie7jIboVPbnlhKn3jM9Tq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2019-12-25T10:00:11.866Z","updatedAt":"2019-12-25T10:00:11.866Z","_updatedAt":"2019-12-25T10:00:11.866Z","entryTitle":"WEB-FEATURE-wizarding-world-christmas-cracker-jokes","displayTitle":"Some Wizarding World Christmas cracker jokes","activationDate":"2019-12-16T00:00+00:00","tags":[{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"},{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"}],"displayTag":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"web-wizarding-world-christmas-cracker-jokes","mainImage":{"contentfulId":"4BFMNY2EKPBqIqf9aKTKQl","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-12-16T16:05:44.367Z","updatedAt":"2019-12-16T16:13:39.506Z","_upd
