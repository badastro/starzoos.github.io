:1920,"height":1080}},"fileName":"HP_BTH25_AnnouncementTease_Static_Sept1_16x9.png","contentType":"image/png"}}},"intro":"Hey, what’s that sound? Yes! It’s the Hogwarts Express merrily chugging along for a new Back to Hogwarts season! From magic on Snapchat to film screenings across the world, find out how to celebrate all things Potter in the run up to 1st September.","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"5FXtAGlTFDsw7PeVlv1zVb","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:25.700Z","updatedAt":"2025-07-23T07:59:25.700Z","_updatedAt":"2025-07-23T07:59:25.700Z","entryTitle":"back-to-hogwarts-2025-text-section-1","text":"🚨 __Keep an eye on this page! It will magically update with more updates as and when we have them.__ 🚨 \n\nEvery year, on the 1st September, Hogwarts students return to the wonders of Hogwarts School of Witchcraft and Wizardry for a new year of start-of-term surprises. And here in our Muggle lives, we’ve taken that day under our wing and made it special for fans all across the globe every year. \n\nBut how is 2025 shaping up? Come and see all of the Hogwarts happenings."},{"contentfulId":"2NVjs6Jiw6Bx5gwkJutVhs","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-04-01T11:46:34.908Z","updatedAt":"2025-04-01T11:46:34.908Z","_updatedAt":"2025-04-01T11:46:34.908Z","entryTitle":"BTH-2025-key-art-landscape","image":{"contentfulId":"5LNArQZ8fJuj1HkO1Yl0r1","type":"Asset","contentTypeId":"asset","createdAt":"2025-04-01T11:46:32.120Z","updatedAt":"2025-04-01T11:46:32.120Z","_updatedAt":"2025-04-01T11:46:32.120Z","revision":1,"locale":"en-GB","title":"BTH-1-September-2025-key-art-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5LNArQZ8fJuj1HkO1Yl0r1/45745b5be4f050ac2088621567dc0f3a/HP_BTH25_AnnouncementTease_Static_Sept1_16x9.png","details":{"size":2184584,"image":{"width":1920,"height":1080}},"fileName":"HP_BTH25_AnnouncementTease_Static_Sept1_16x9.png","contentType":"image/png"}}},{"contentfulId":"O0M8iRC1Zj8TuRuUDSW3W","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:32.673Z","updatedAt":"2025-07-23T07:59:32.673Z","_updatedAt":"2025-07-23T07:59:32.673Z","entryTitle":"back-to-hogwarts-2025-text-section-2","text":"## First up... get ready for our Back to Hogwarts showcase\n\nWell, wait just a second now – we couldn’t celebrate Back to Hogwarts without a worldwide online showcase! So even if you can’t make any of these Harry Potter fan events below, you can log on with us at around 10.40 BST / 5.40 ET for our annual start-of-term announcements across Instagram, YouTube and TikTok for many magical surprises and news fresher than a recently-owl-delivered Daily Prophet. [You can subscribe to our YouTube channel right now to get ready.](https://www.youtube.com/@harrypotter?sub_confirmation=1)\n\n## It's the 20-year anniversary of Harry Potter and the Goblet of Fire!"},{"contentfulId":"6gUsy3EV8PX6BhYwKqBbc2","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-02-12T12:00:35.934Z","updatedAt":"2024-02-12T12:00:35.934Z","_updatedAt":"2024-02-12T12:00:35.934Z","entryTitle":"WB-HP-F4-goblet-of-fire-harry-potter-in-gryffindor-outfit-web-landscape","image":{"contentfulId":"4Zbo8zBFeRUtr473oxA9CN","type":"Asset","contentTypeId":"asset","createdAt":"2024-02-12T12:00:32.563Z","updatedAt":"2024-02-12T12:00:32.563Z","_updatedAt":"2024-02-12T12:00:32.563Z","revision":1,"locale":"en-GB","title":"WB-HP-F4-goblet-of-fire-harry-potter-in-gryffindor-outfit-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4Zbo8zBFeRUtr473oxA9CN/afceef57b322b8fac0d97e89fb1d9f1b/WB-HP-F4-goblet-of-fire-harry-potter-in-gryffindor-outfit-web-landscape.jpg","details":{"size":2583598,"image":{"width":2000,"height":1331}},"fileName":"WB-HP-F4-goblet-of-fire-harry-potter-in-gryffindor-outfit-web-landscape.jpg","contentType":"image/jpeg"}}},{"contentfulId":"5VGzj9fRFtYTo99POtP2uZ","type":"Entry","revision":6,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:36.421Z","updatedAt":"2025-08-18T10:19:45.785Z","_updatedAt":"2025-08-18T10:19:45.785Z","entryTitle":"back-to-hogwarts-2025-text-section-3","text":"This year’s Back to Hogwarts season is extra special, as it coincides with a huge milestone for the fourth Harry Potter story – 20 years since *Goblet of Fire* film hit our screens. Earlier this year, the Studio Tour in London celebrated in fiery fashion, when a [life-sized Hungarian Horntail](https://www.harrypotter.com/news/hungarian-horntail-takes-over-london-for-studio-tour-summer-stunt) turned up in the Big Smoke – but we’re not quite finished yet! \n\nTo commemorate the occasion accordingly, the film will return to cinemas worldwide, including a special screening in London’s Leicester Square on 31st August featuring James and Oliver Phelps, AKA the Weasley twins! Let’s hope they turn up with big, long white beards after a hearty swig of Ageing Potion. IYKYK.\n\nTheir special Q\u0026A will be hosted by Yinka Bokinni. Plus, whether it’s your house robes or your Yule Ball finest, remember to don your best wizarding attire – there will be costume competitions, giveaways and photo opportunities too! \n\nUpdate: this event is now sold out, [BUT there's still a chance to win a pair of tickets here.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fmc6m8w8vs3rqw7164shtyl7t087m.pub.sfmc-content.com%2Fy0xktjxxmha)\n\nIn the US, fans can check out the [Fandango website](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.fandango.com%2F) to find special screenings happening all over the states across the season. More theatres in Canada, EMEA and International territories will be joining in the fun very soon. [Keep watching this space as more are revealed. ](https://www.harrypotter.com/news/international-screenings-guide-for-back-to-hogwarts-2025)\n\n## Snapchat releases Harry Potter Bitmoji Lenses \n\n3D Harry Potter lenses are coming soon to Snapchat. Launching in mid-August, Snap users can transform their Snapchat Bitmojis Back to Hogwarts style: place your Bitmoji in iconic locations, such as the Wizard Chess sequence, Platform Nine and Three-Quarters, the [Goblet of Fire](https://www.harrypotter.com/fact-file/objects/the-goblet-of-fire) moment in the Great Hall, and the Privet Drive scene with Harry’s influx of Hogwarts letters. Again, we’ll keep you posted when these features are live and can’t wait to see your combinations. \n\n## Global celebrations \n"},{"contentfulId":"2rmOMdQQWAqrqUW2OribNa","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-09-02T08:38:09.204Z","updatedAt":"2024-09-02T08:38:09.204Z","_updatedAt":"2024-09-02T08:38:09.204Z","entryTitle":"BTH-2024-Japan-Tokyo-celebrations-at-studio-tour-web-landscape","image":{"contentfulId":"5gq1Q1av9IESFd5oUFv0cv","type":"Asset","contentTypeId":"asset","createdAt":"2024-09-02T08:38:07.089Z","updatedAt":"2025-08-01T11:51:22.369Z","_updatedAt":"2025-08-01T11:51:22.369Z","revision":2,"locale":"en-GB","title":"BTH-2024-Japan-Tokyo-celebrations-at-studio-tour-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5gq1Q1av9IESFd5oUFv0cv/f84748832eb8b47c5f74e867b715cab3/JAPAN_Studio-Tour-Tokyo_BTH-compressed.jpg","details":{"size":408330,"image":{"width":1900,"height":1267}},"fileName":"JAPAN_Studio-Tour-Tokyo_BTH-compressed.jpg","contentType":"image/jpeg"}}},{"contentfulId":"1W75rbzsp0jjXI4Mt0JweE","type":"Entry","revision":6,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:54.046Z","updatedAt":"2025-08-18T10:17:42.181Z","_updatedAt":"2025-08-18T10:17:42.181Z","entryTitle":"back-to-hogwarts-2025-text-section-4","text":"Click on the following territories to see what Back to Hogwarts activity is going on for you! This list is charmed, so expect it to magically grow.\n\n\u003cspan id=\"top\"\u003e\u003c/span\u003e\n\n\u003cul\u003e\n    \u003cli\u003e\u003ca href=\"#uk\"\u003eThe UK\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#north-america\"\u003eNorth America and Canada\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#france\"\u003eFrance\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#germany\"\u003eGermany\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#italy\"\u003eItaly\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#spain\"\u003eSpain\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#japan\"\u003eJapan\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#china\"\u003eChina\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#singapore\"\u003eSingapore\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#australia\"\u003eAustralia\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#mexico\"\u003eMexico\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#uae\"\u003eUAE\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"uk\"\u003eThe UK\u003c/h2\u003e\n\n### Free screening of Harry Potter and the Goblet of Fire in Leicester Square with Phelps twins Q\u0026A\n\nAs we mentioned above, Cineworld Leicester Square will play host to a free screening of the fourth Harry Potter film on 31st August. Fans can enjoy a live Q\u0026A with the Weasley twins, James and Oliver Phelps with TV and radio host Yinka Bokinni as our fantastic MC – and you can bet they’ll be some fun in the foyer before the show too! If you’re lucky enough to snap up a ticket, we recommend you get your wizarding gladrags on and join like-minded fans for a very special night of magic.\n\n__[You could be in with a chance to span up a pair of tickets here, thanks to Wizarding Wednesdays.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fmc6m8w8vs3rqw7164shtyl7t087m.pub.sfmc-content.com%2Fy0xktjxxmha)__\n\nLook out for goodies galore, including a complementary Wizarding World Micro Magical Moments Year 4 Collectible Figure set from Spinmaster. \n\n__[Check out other Goblet of Fire anniversary screenings at Cineworld UK right this way.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.cineworld.co.uk%2Ffilms%2Fharry-potter-the-goblet-of-fire-20th-anniversary%2Fho00013228%23%2Fbuy-tickets-by-film%3Fin-cinema%3Dlondon%26at%3D2025-08-25%26for-movie%3Dho00013228%26view-mode%3Dlist)__"},{"contentfulId":"cqDtIHanUkU44w0guYkEA-img","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-10-01T18:18:51.117Z","updatedAt":"2021-04-20T13:23:18.877Z","_updatedAt":"2021-04-20T13:23:18.877Z","entryTitle":"PMARCHIVE-FredAndGeorge WB F5 AtGrimmauldPlace HP5-FX-00152r 1P4ITB7tGUw6gW0qc4UK4i","image":{"contentfulId":"cqDtIHanUkU44w0guYkEA","type":"Asset","contentTypeId":"asset","createdAt":"2019-09-20T17:59:02.131Z","updatedAt":"2021-02-08T10:12:19.783Z","_updatedAt":"2021-02-08T10:12:19.783Z","revision":13,"locale":"en-GB","title":"FredAndGeorge WB F5 AtGrimmauldPlace HP5-FX-00152r","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/cqDtIHanUkU44w0guYkEA/c41d8c953ee5259a49a0db98bf23d6c0/FredAndGeorge_WB_F5_AtGrimmauldPlace_HP5-FX-00152r.jpg","details":{"size":1823873,"image":{"width":3139,"height":1894}},"fileName":"FredAndGeorge_WB_F5_AtGrimmauldPlace_HP5-FX-00152r.jpg","contentType":"image/jpeg"}},"imageCaption":"Harry Potter and the Order of the Phoenix","imageAltText":"Fred and George Weasley ","source":[{"contentfulId":"6vSblg4bo8ERfWv6wulvcW","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T14:17:38.549Z","updatedAt":"2019-10-28T16:39:54.558Z","_updatedAt":"2019-10-28T16:39:54.558Z","entryTitle":"HP-F5","displayTitle":"Harry Potter and the Order of the Phoenix","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Order of the Phoenix","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-order-of-the-phoenix"}]},{"contentfulId":"4FPIvtGEgAh9S3QZesu09I","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:57.955Z","updatedAt":"2025-08-18T10:37:13.888Z","_updatedAt":"2025-08-18T10:37:13.888Z","entryTitle":"back-to-hogwarts-2025-text-section-5","text":"### Wizarding Wednesdays return \n\nOur weekly competition, Wizarding Wednesdays, is back back back, inviting UK folks to sweep up spellbinding prizes. [Keep a watchful eye on our social channels](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fmc6m8w8vs3rqw7164shtyl7t087m.pub.sfmc-content.com%2Fy0xktjxxmha) every Wednesday to  see what you could win. \n\n### Warner Bros. Studio Tour London will host an 11am countdown on 1st September|\n\n[Warner Bros. Studio Tour London – the Making of Harry Potter](https://www.wbstudiotour.co.uk/) will host 300 lucky guests at a celebratory 11am countdown moment at the Studio Tour, held on the platform next to the iconic Hogwarts Express live on 1st Sept. Tickets are exclusively available by entering a competition to win, visit @wbtourlondon for more details on how to enter before the competition closes. The contest closes on 11th August, so you’ve got time! \n\n### The Platform 9 ¾ shop has a new merchandise and a photo opp \n\nThe official Harry Potter shop, tucked away at King’s Cross Station, is getting into the Back to Hogwarts spirit in all sorts of ways – including some fresh merchandise for 2025 and a photo opportunity frame. If you’re London-based, the shop begins celebrating from 28th July. \n\n### Meet \u0026 Greet at MinaLima"},{"contentfulId":"2C2ZSbjvCweKGsMWykkyek-img","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-10-01T17:53:19.175Z","updatedAt":"2019-10-01T17:53:19.175Z","_updatedAt":"2019-10-01T17:53:19.175Z","entryTitle":"PMARCHIVE-ML House of MinaLima exterior shop front photography x3JYuQfzmo8iieekSYYAw","image":{"contentfulId":"2C2ZSbjvCweKGsMWykkyek","type":"Asset","contentTypeId":"asset","createdAt":"2019-09-20T20:12:15.464Z","updatedAt":"2019-09-24T06:22:02.700Z","_updatedAt":"2019-09-24T06:22:02.700Z","revision":2,"locale":"en-GB","title":"ML House of MinaLima exterior shop front photography","description":"House of MinaLima exterior","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2C2ZSbjvCweKGsMWykkyek/a8f047eedd02341d161fd5887cf4674b/House_of_MinaLima_Exterior.jpg","details":{"size":6200774,"image":{"width":3508,"height":2338}},"fileName":"House of MinaLima_Exterior.jpg","contentType":"image/jpeg"}},"imageCaption":"House of MinaLima in Soho, London.","imageAltText":"House of MinaLima, 26 Greek Street in London"},{"contentfulId":"7kpwCh0ajLnE5YP3n828Cy","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-22T20:19:00.702Z","updatedAt":"2025-07-22T20:19:00.702Z","_updatedAt":"2025-07-22T20:19:00.702Z","entryTitle":"back-to-hogwarts-2025-text-section-6","text":"Also in London, fans can visit the headquarters of design team MinaLima, the masterminds behind many of the magical details of the Harry Potter films. Their shop is hosting a meet and greet event on the 31st August, where limited-edition Back to Hogwarts badges, exclusive for 2025, will be available to snap up. Make sure to practice your Seeker reflexes though: they won’t last long! All the info you need for this one is over on the [MinaLima official site.](https://minalima.com/)\n\nSpecial Hogwarts notice: alas, we must once again discourage fans from attending King’s Cross Station on 1st September, as there will be no countdown or train announcement occurring in 2025. Safety first, folks.\n\n\u003ch2 id=\"north-america\"\u003eNorth America and Canada\u003c/h2\u003e\n\n### Harry Potter: New York and Harry Potter: Chicago release Back to Hogwarts time-limited merchandise \n\nIf you’re [New York](https://www.harrypotterstore.com/) or [Chicago](https://harrypottershop.com/pages/chicago?srsltid=AfmBOoqzzViOYPGLJwWXGoHaGV1R7eEtlO8TMrQkDSvwOvqX1flg1ngH) based, why not rock on down to the official Harry Potters shops in your area for some exclusive time-limited goodies for Back to Hogwarts 2025? Visit from 28th July to see what new items are on offer.\n\n### Harry Potter: A Forbidden Forest Experience comes to Chicago\n\nMore spellbinding stuff for Chicago fans! The Forbidden Forest Experience has been casting a Dark spell on fans over the past few years, and now, the immersive experience is coming to the Windy City. Visit the official website to find out more.\n\n### Cursed Child on Broadway offering shows for 19 dollars"},{"contentfulId":"2LAIk5x2RxJASCFkaBHsHK","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-03-28T17:01:58.540Z","updatedAt":"2025-03-28T17:01:58.540Z","_updatedAt":"2025-03-28T17:01:58.540Z","entryTitle":"HPCC-Broadway-2025-Albus-and-harry-casting-fire-web-landscape","image":{"contentfulId":"1Y4ZPY1SfQmudLmVmSEWOS","type":"Asset","contentTypeId":"asset","createdAt":"2025-03-28T17:01:56.285Z","updatedAt":"2025-03-28T17:01:56.285Z","_updatedAt":"2025-03-28T17:01:56.285Z","revision":1,"locale":"en-GB","title":"HPCC-Broadway-2025-Albus-and-harry-casting-fire-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1Y4ZPY1SfQmudLmVmSEWOS/3024b843ef71a0b48f5e421411a8d8c4/HPCC_BROADWAY_11_12_24_S_0091_EditV6__1_.jpg","details":{"size":625504,"image":{"width":3782,"height":2522}},"fileName":"HPCC_BROADWAY_11_12_24_S_0091_EditV6 (1).jpg","contentType":"image/jpeg"}}},{"contentfulId":"6PTFvFsxwoFP6NeT0D84IT","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T08:00:02.520Z","updatedAt":"2025-07-30T14:19:03.010Z","_updatedAt":"2025-07-30T14:19:03.010Z","entryTitle":"back-to-hogwarts-2025-text-section-7","text":"As the play is set 19 years later, the Cursed Child production in New York has had the ingenious idea to release tickets to their shows for only 19 bucks. The special priced ticket will only be available to grab on 1st September, so mark this in your calendars and visit [harrypotterbroadway.com](https://broadway.harrypottertheplay.com/) or at the Lyric Theatre Box Office to get the full lowdown. \n\n\u003ch2 id=\"france\"\u003eFrance\u003c/h2\u003e\n\n### Take your exams at the Sainte-Geneviève Library \n\nSacre bleu! Exams?! Yes, you heard that right. You’re invited to a free ticketed event in the beautiful university library, crammed with almost as much history as Hogwarts! But don’t worry – it’s not *that* kind of exam, this is a fun, interactive quiz event for Harry Potter fans to test their magical acumen.\n\nThere will also be an appearance from actor Solange Boulanger, who dubbed Dolores Umbridge in the Harry Potter films. Solange will be providing a special dictation session for visitors (remember: it’s Levi-O-sah...) while LEGO and Harry Potter Haribo displays will also be scattered around. \n\nFans who can’t make the event physically can get a proper wizarding education online from [https://examen.retourapoudlard.fr/](https://examen.retourapoudlard.fr/) - check it out from 30th August – 6th September. \n\n\u003ch2 id=\"germany\"\u003eGermany\u003c/h2\u003e\n\n### Westfield Hamburg-Überseequartier to host Back to Hogwarts 3-day bonanza\n\nWhy celebrate Back to Hogwarts day for one day when you could do it for three? This Hamburg-based shopping centre has the right idea about things, with Harry Potter activities galore available across 29th August, 30th August, 1st September. Thalia, LEGO, Haribo and Harry Potter and the Cursed Child are all getting involved, so keep your ear to the ground for bewitching giveaways.\n\nIf you're old enough, you can find out more on our German Harry Potter social channels.\n\n### Select Thalia book stores will have a Back to Hogwarts takeover\n\nSpeaking of Thalia, the book store chain is getting into the Hogwarts spirit in more ways than one this summer, with select stores bringing a little slither of the wizarding world into 10 of their shops. Visitors can expect prize draws, Harry Potter displays, and of course, plenty of opportunities for a magical snap.\n\n[Visit the website here to learn more.](https://www.thalia.de/themenwelten/harry-potter/back-to-hogwarts/tour)\n\n### From takeovers...to sleepovers!\n\nAnd in Dusseldorf, Hannover, Leipzig and Hamburg, there will be four Back to Hogwarts-themed sleepover events taking place in Thalia stores too! If you sign up by the 8th August, you can join fellow fans for a wizarding all-nighter if you’re lucky enough to snag a free ticket.\n\n[Details are right over here.](https://thalia.de/themenwelten/harry-potter/back-to-hogwarts)\n\n### Harry Potter and the Cursed Child brings Back to Hogwarts fever to Hamburg"},{"contentfulId":"1OQXOJbajI807OYJn17CWb","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-09T10:09:42.185Z","updatedAt":"2021-12-09T10:09:42.185Z","_updatedAt":"2021-12-09T10:09:42.185Z","entryTitle":"HPCC-cursed-child-hamburg-stage-curtain-call-applause-cast","image":{"contentfulId":"5BU7Fe9tN1qJa0TJSKj1zw","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-09T10:09:36.409Z","updatedAt":"2021-12-09T10:09:36.409Z","_updatedAt":"2021-12-09T10:09:36.409Z","revision":1,"locale":"en-GB","title":"HPCC-cursed-child-hamburg-stage-curtain-call-applause-cast","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5BU7Fe9tN1qJa0TJSKj1zw/1b57b57b6d40015fca03f4b708eb006f/HPCC-cursed-child-hamburg-stage-curtain-call-applause-cast.jpg","details":{"size":2367505,"image":{"width":2000,"height":1334}},"fileName":"HPCC-cursed-child-hamburg-stage-curtain-call-applause-cast.jpg","contentType":"image/jpeg"}},"source":[{"contentfulId":"KNlAjfZtVzdWu31pBG6Ob","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-28T14:11:06.043Z","updatedAt":"2022-10-03T10:30:18.494Z","_updatedAt":"2022-10-03T10:30:18.494Z","entryTitle":"CC","displayTitle":"Harry Potter and the Cursed Child","sourceType":"Play","purchaseLink":"https://www.wizardingworld.com/discover/books/harry-potter-and-the-cursed-child-parts-one-and-two-screenplay"}]},{"contentfulId":"1G2fiUJJVvA3hLs6A72Kli","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T08:00:06.464Z","updatedAt":"2025-08-22T12:13:32.530Z","_updatedAt":"2025-08-22T12:13:32.530Z","entryTitle":"back-to-hogwarts-2025-text-section-8","text":"The hit play is recognising Back to Hogwarts season with a start-of-term special on 31st August, with magical offers on this day and a costume competition to boot. [Check out the official website to see what’s in store](https://www.atgtickets.de/musicals-shows/harry-potter-und-das-verwunschene-kind/back-to-hogwarts/).\n\n### Universal Beijing Resort promises themed merchandise, special entertainment and even a feast\n\nMUCH fun can be had at Universal Beijing Resort during the Back to Hogwarts season. Just a few things to look forward to... *deep breath* A Collectors Edition interactive Wand exclusive to the park, themed merchandise packages, a Back to Hogwarts feast, Hogwarts house-themed face painting, \nand much more. \n\nFor the full list of details, [simply visit the official site.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.universalbeijingresort.com%2Fen%2FBTH2025)\n\n\u003ch2 id=\"italy\"\u003eItaly\u003c/h2\u003e\n\n### Back to Hogwarts event to take place in Teatro Nazionale, Milan \n\nThe fashion capital of Italy will most likely see a storm of Hogwarts robes on 1st September, as Harry Potter fans are invited to a countdown ceremony and a wonderful array of activities to go alongside. Expect quizzes, performances and even surprise guests! \nVisit here for more.\n\n\u003ch2 id=\"spain\"\u003eSpain\u003c/h2\u003e\n\n### Magic is coming to Museo del Ferrocarril in Madrid\n\nVamos! On 31st August and 1st September, Madrid will host a fan event at Museo del Ferrocarril (the Railway museum)\n\nVisitors will enjoy two magical days of Hogwarts-themed fun, including a special 11 o’clock countdown!\n\n[Click here to find out more](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fbacktohogwartsmadrid.com%2F)\n\n\u003ch2 id=\"japan\"\u003eJapan\u003c/h2\u003e\n\n### The Saitama Seibu Lions will be casting a spell on baseball fans\n\nIt's been a huge year for Harry Potter fans in Japan – and the magic certainly doesn’t stop now. From the 29th August to the 31st August, the wizarding world is coming to the baseball pitch, dubbed Harry Potter x Lions. Fans of the team will discover bespoke products while attending games, and will even be treated to a special appearance from a Harry Potter and the Cursed Child cast member...\n\nWho knew the Saitama Seibu Lions were Harry Potter fans? We bet they’re all Gryffindors. \n\n\u003ch2 id=\"china\"\u003eChina\u003c/h2\u003e\n\n### Prisoner of Azkaban and Goblet of Fire in Concert plays in Shanghai"},{"contentfulId":"32oN0BK8TtpehVF7F54B14","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2023-09-18T11:11:23.494Z","updatedAt":"2023-09-18T11:11:23.494Z","_updatedAt":"2023-09-18T11:11:23.494Z","entryTitle":"hp-f3-dumbledore-great-hall-lectern-start-of-term-web-landscape","image":{"contentfulId":"UKtUI0NroDt2Q8lNYnfgW","type":"Asset","contentTypeId":"asset","createdAt":"2023-09-18T11:11:20.055Z","updatedAt":"2023-09-18T11:11:20.055Z","_updatedAt":"2023-09-18T11:11:20.055Z","revision":1,"locale":"en-GB","title":"hp-f3-dumbledore-great-hall-lectern-start-of-term-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/UKtUI0NroDt2Q8lNYnfgW/612cbf5f14d90abd38d4c38d71399986/hp-f3-dumbledore-great-hall-lectern-start-of-term-web-landscape.jpg","details":{"size":462087,"image":{"width":1176,"height":784}},"fileName":"hp-f3-dumbledore-great-hall-lectern-start-of-term-web-landscape.jpg","contentType":"image/jpeg"}}},{"contentfulId":"27mmB8iq55YUuvTlY3uhGE","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T08:00:10.160Z","updatedAt":"2025-08-18T10:08:08.488Z","_updatedAt":"2025-08-18T10:08:08.488Z","entryTitle":"back-to-hogwarts-2025-text-section-9","text":"From 7th August to 10th August, the third and fourth Harry Potter films will be brought to life in spectacular fashion with the In Concert series coming to Shanghai, complete with a live symphony orchestra. \n\n[The official website has a handy map of all upcoming locations for these gorgeous shows.](https://harrypotterinconcert.com/tickets)\n\n### The West Lake becomes...The Great Lake?\n\nIn Hangzhou, on 30th August – 1st September, a Back to Hogwarts celebration set against the iconic backdrop of the West Lake will take place, with a plethora of community activities expected. The Harry Potter China social channels can tell you more about this one.\n\n\u003ch2 id=\"singapore\"\u003eSingapore\u003c/h2\u003e\n\n### Harry Potter: Visions of Magic promises Back to Hogwarts merriment\n\nVisitors of [Harry Potter: Visions of Magic](https://www.harrypotter.com/discover-experiences/experiences/harry-potter-visions-of-magic), the experiential and interactive art experience that has been spreading wonder around the globe, is upping the ante in Singapore for Back to Hogwarts day. If you have a ticket already and turn up in Hogwarts house regalia, there’s a chance to win complimentary gifts. Watch out for other surprises on site.\n\n\u003ch2 id=\"australia\"\u003eAustralia\u003c/h2\u003e\n\n### Harry Potter: The Exhibition offers special ticket offer on 1st September \n\nAll the way down under, Harry Potter fans can enjoy behind-the-scenes film magic with [Harry Potter: The Exhibition](https://harrypotterexhibition.com/), currently happening in Melbourne. But on 1st September, fans should stay tuned for a very special ticket offer... Ooh, mysterious. Maybe bookmark the official site and keep an eye out.\n\n\u003ch2 id=\"Mexico\"\u003eMexico\u003c/h2\u003e \n\n### Meanwhile, a collectible poster is up for grabs at Harry Potter: Visions of Magic in Mexico City\n\nFans who attend the ethereal experience in [Mexico City](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottervisionsofmagic.com%2F) between 26th August to 31st August will receive a special Back to Hogwarts collectible poster!\n\n\u003ch2 id=\"UAE\"\u003eUAE\u003c/h2\u003e \n\n### Dress to impress in Harry Potter: The Exhibition in Abu Dhabi\n\nSpeaking of Harry Potter: The Exhibition, we heartily encourage attendees to dress up in their Hogwarts house colours, should you be attending on 1st September. A Hogwarts house-themed prize is up for grabs! (If you're in Melbourne or Salt Lake City - look out for similar contests.) \n\n***\n\n__Phew! And that’s just a couple of things for the time being... [sign up to our newsletter](https://www.harrypotter.com/register) as we reveal more info on Back to Hogwarts 2025 or keep fervently refreshing this page as more magic presents itself.__ "},{"contentfulId":"5FwPpDmg7seTor2KcpeqYu","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"poll","createdAt":"2025-08-04T11:07:09.904Z","updatedAt":"2025-08-04T11:07:09.904Z","_updatedAt":"2025-08-04T11:07:09.904Z","entryTitle":"homepage-poll-bth-most-excited","displayTitle":"What would you be most excited to get back to Hogwarts for?","activationDate":"2025-08-03T00:00+01:00","answer":["The classes","My friends","Playing Quidditch","The food"],"ctaLabel":"Find out how you can celebrate Back to Hogwarts season this year here!","ctaURL":"https://www.harrypotter.com/back-to-hogwarts"}],"relatedArticleReference":[{"contentfulId":"6dFG0iTG2t8EhWJGxx2CzW","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"article","createdAt":"2025-08-04T10:37:20.952Z","updatedAt":"2025-08-05T10:36:16.995Z","_updatedAt":"2025-08-05T10:36:16.995Z","entryTitle":"WEB-gift-guide-bth-2025","eyebrow":"DIAGON ALLEY VIBES","displayTitle":"Your Back to Hogwarts gift guide for 2025","activationDate":"2025-08-04T00:00+01:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"back-to-hogwarts-gift-guide-2025","mainImage":{"contentfulId":"3QIFPXKgnByGvQCDgjeg7H","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-07-25T11:42:56.986Z","updatedAt":"2025-07-25T11:42:56.986Z","_updatedAt":"2025-07-25T11:42:56.986Z","entryTitle":"HP-shop-hogwarts-robes-lifestyle-web-landscape","image":{"contentfulId":"6LE9SN3CXXazPffofQJW9g","type":"Asset","contentTypeId":"asset","createdAt":"2025-07-25T11:42:4 -GB","title":"hp-f1-hagrid-motorbike-privet-drive-hero","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2y6qo8eTmlyXsXcx7kcpI0/28145b4c601dc856731593de11044a5d/hp-f1-hagrid-motorbike-privet-drive-hero.jpg","details":{"size":60298,"image":{"width":900,"height":1121}},"fileName":"hp-f1-hagrid-motorbike-privet-drive-hero.jpg","contentType":"image/jpeg"}}},"intro":"Embrace magic on the big screen with a trip to see Harry Potter, returning to cinemas near you, during Back to Hogwarts season. With this year’s celebrations coinciding with the 20th anniversary of the fourth film, you can expect a Goblet of Fire twist.","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"3FNIfWTFoIdsKeTbmPRDmi","type":"Entry","revision":9,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-08-04T10:24:40.000Z","updatedAt":"2025-09-18T13:03:38.133Z","_updatedAt":"2025-09-18T13:03:38.133Z","entryTitle":"international-screenings-guide-for-back-to-hogwarts-2025-text-section-1","text":"__A quick Hogwarts notice: this article will magically update every time we have new screening information to share with you. Keep an eye out for further updates as soon as we have them.__ \n\nCan you hear the stirring sounds of your favourite film score? Or that hint of magic in the air? That’s because all the Harry Potter films are returning to theatres this summer.  \n\nGet your comfiest robes ready because in some select cinemas, they are even hosting an eight-movie marathon! \n\nExcitingly, this year’s Back to Hogwarts is even more special with 2025 marking 20 years since *Goblet of Fire* hit our screens. This year, cinemas are embracing eternal glory and bringing the Triwizard Tournament back to the big screen worldwide.  \n\nSo, wherever you are, we hope you’re prepared for the ultimate cinematic extravaganza. \n\n__Using some technological wizardry, click on your local area you’ll jump straight down to your relevant listings.__ \n\u003cbr\u003e \u003cspan id=\"top\"\u003e\u003c/span\u003e\n[Europe](#europe) \u003cbr\u003e\n[North America](#northamerica) \u003cbr\u003e \n[Latin America](#latinamerica) \u003cbr\u003e \n[Australasia](#australasia) \u003cbr\u003e\n[Asia](#asia) \u003cbr\u003e  \n\u003cspan id=\"europe\"\u003e\u003c/span\u003e\n# Europe  \n### United Kingdom\n__31st August__\u003cbr\u003e\nOn the eve of Back to Hogwarts an extra special screening of Goblet of Fire is coming to Cineworld Leicester Square. What makes it extra special? The one-and-only (two-and-only?) James and Oliver Phelps, AKA the Weasley twins, will be there for a special Q\u0026A hosted by Yinka Bokinni. Plus, whether it’s your house robes or your Yule Ball finest, remember to don your best wizarding attire – there will be costume competitions, giveaways and photo opportunities too! \n\n__Update:__ this event is now sold out, [BUT there's still a chance to win a pair of tickets here.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fmc6m8w8vs3rqw7164shtyl7t087m.pub.sfmc-content.com%2Fy0xktjxxmha)\n\n__25th – 31st August__\u003cbr\u003e\nFrom Bank Holiday Monday, and continuing across the Back to Hogwarts weekend, anniversary screenings of *Harry Potter and the Goblet of Fire* will be playing in cinemas throughout the UK. For full information, check your local listings.\u003cbr\u003e  \n\n[Click here for showings at Cineworld](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.cineworld.co.uk%2Ffilms%2Fharry-potter-the-goblet-of-fire-20th-anniversary%2Fho00013228%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DTV%26utm_content%3Dbthglobalscreenings2025%23%252Fbuy-tickets-by-film%253Ffor-movie%3Dho00013228%26view-mode%3Dlist) \u003cbr\u003e\n[Find out more about 20th anniversary screenings at Vue](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.myvue.com%2Ffilm%2Fharry-potter-and-the-goblet-of-fire-20th-anniversary%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DTV%26utm_content%3Dbthglobalscreenings2025) \u003cbr\u003e\n[For information about Odeon screenings click here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.odeon.co.uk%2Ffilms%2Fharry-potter-and-the-goblet-of-fire-20th-ann%2FHO00007480%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DTV%26utm_content%3Dbthglobalscreenings2025) \u003cbr\u003e\n\n### Belgium\n__30th – 31st August__\u003cbr\u003e\nGet ready for a movie marathon as all eight of the Harry Potter films will be playing back-to-back in Kinepolis, Pathé and Imagix cinemas across Belgium. \u003cbr\u003e\n\nFor Kinepolis screenings: \u003cbr\u003e\n[Click here for French](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fkinepolis.be%2Ffr%2Fmovies%2Fdetail%2F4467%2FHO00009238%2F0000000020%2Fharry-potter-film-marathon%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DTV%26utm_content%3Dbthglobalscreenings2025)\u003cbr\u003e\n[Click here for Dutch](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fkinepolis.be%2Fnl%2Fmovies%2Fdetail%2F4467%2FHO00009238%2F0000000020%2Fharry-potter-film-marathon%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DTV%26utm_content%3Dbthglobalscreenings2025)\u003cbr\u003e\n\nInformation about Pathé screenings can be found: \u003cbr\u003e\n[Here in French](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.pathe.be%2Ffr%2Fevenements%2Ffilm-marathon-harry-potter%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DTV%26utm_content%3Dbthglobalscreenings2025)\u003cbr\u003e\n[Here in Dutch](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.pathe.be%2Fnl%2Fevenementen%2Ffilm-marathon-harry-potter-36134%2Ffilters%2Fdate-2025-08-30%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DTV%26utm_content%3Dbthglobalscreenings2025)\u003cbr\u003e\n\n[Find screenings at Imagix on their website](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Ftickets.imagix.be%2Fmovie%2F25009%2Fmarathon-harry-potter%2Fspecial%2F9%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DTV%26utm_content%3Dbthglobalscreenings2025)\u003cbr\u003e\n\n### France\n__July – September__\u003cbr\u003e\nAll eight of the Harry Potter films will be playing at selected cinemas across France this summer. Check your local listings for further details.\u003cbr\u003e \n\n[Click here for the Allocine screening of Harry Potter and the Deathly Hallows Part One](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.allocine.fr%2Fseance%2Ffilm-126693%2Fpres-de-583191%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DTV%26utm_content%3Dbthglobalscreenings2025%23shwt_date%3D2025-09-07) \n\n### Germany\n__1st September__\u003cbr\u003e\nSettle in, as cinemas across Germany will be playing a Harry Potter marathon over the Back to Hogwarts weekend. Or if you want to spread the joy, selected cinemas will be playing all eight films across eight weekends. \n\nCheck your local listings with CinemaxX, Kinopolis, Cineplex, and Indi Cinemas for more details. \n\n### Spain\n__31st August__ \u003cbr\u003e\nThere will be special anniversary screenings of *Harry Potter and the Goblet of Fire* playing in cinemas across Spain. For further information, please look at your local listings. Or, if you're old enough, you can find out more on the Harry Potter Spain social channels.\n\n\u003cspan id=\"northamerica\"\u003e\u003c/span\u003e\n# North America\n### United States \n\n__1st July – 1st October__\u003cbr\u003e\nGet ready to go back to Hogwarts, as all the Harry Potter films will be shown at selected cinemas across the US including Regal, Cinemark, IPIC, Alamo Drafthouse, Marcus, Harkins, Cinepolis, National Amusements and more! \u003cbr\u003e\n[Find your local listing on Fandango](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.fandango.com%2Fmovie-news%2Fcelebrate-harry-potter-and-back-to-hogwarts-in-theaters-755159%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DTV%26utm_content%3Dbthglobalscreenings2025)  \n\n### Canada \n__1st July – 1st October__ \u003cbr\u003e\nThis summer, you can watch all eight of the Harry Potter films at cinemas across Canada. Please check your local listings for further details.\u003cbr\u003e\n[Find information on the Landmark screening of the first film here.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.landmarkcinemas.com%2Ffilm-info%2Fharry-potter-and-the-sorcerers-stone%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DTV%26utm_content%3Dbthglobalscreenings2025) \n\n\u003cspan id=\"latinamerica\"\u003e\u003c/span\u003e\n# Latin America \n### Argentina/Bolivia/ Costa Rica/ El Salvador/ Guatemala/ Honduras/ Nicaragua/Panama/ Paraguay/ Uruguay/ Venezuela \n\n__13th November__\u003cbr\u003e\nBe transported to the electric atmosphere of the Triwizard Tournament as *Harry Potter and the Goblet of Fire* will be rereleased for a special anniversary screening in various cinemas. If you would like more information, please check your local listings.  \n\n### Chile/ Colombia/ Peru\n__20th November__\u003cbr\u003e\nAs this year marks the 20th anniversary of the fourth Harry Potter film, there will be special screenings playing across various locations. For further details please consult your local listings. \n\n### Brazil\n__15th November \u0026 13th December__\u003cbr\u003e\nTo celebrate 20 years since *Goblet of Fire* hit our screens, there will be a special one-day event, 15th November, and further screenings, 13th December, in cinemas. Please check local listings for more information.  \n\n### Mexico\n__18th September__ \u003cbr\u003e\nIn a special event with Cinemex, the magic of the first four Harry Potter films will be brought back to the big screen in theatres across the country. You can find more information in your local listings.  \n\n\u003cspan id=\"australasia\"\u003e\u003c/span\u003e\n# Australasia\n\n### Australia \n__31st August \u0026 4th September – 25th September__\u003cbr\u003e\nThere will be plenty of opportunity to experience the magic of the Harry Potter films across Australia this summer. During the month of September, all eight films will be playing over four weekends at Village Cinemas. Event Cinema will be playing Harry Potter and the Goblet of Fire.\n\nThere will also be special screenings of *Goblet of Fire* at both Village and Event theatres on 31st August. Please check your local listings for more details.  \n\n### New Zealand \n__28th August – 3rd September__ \u003cbr\u003e\nOver the course of the Back to Hogwarts week, Event Cinemas will be playing *Harry Potter and the Goblet of Fire* at all of their cinemas in New Zealand. For more information, please check your local listings.  \n\n\u003cspan id=\"asia\"\u003e\u003c/span\u003e\n# Asia  \n### Malaysia\n__18th September – 23rd October__\u003cbr\u003e\nThe autumn, get ready for the ultimate movie marathon as all eight Harry Potter films will be playing at GSC theatres in late October. If you want to experience the film wizardry before that, then films five to eight will be playing from September. Check local listings for more information.  \n\n### Philippines\n__16th August – 31st August__\u003cbr\u003e\nTo celebrate Back to Hogwarts season, there will be screenings of all the Harry Potter films over two weekends in August. Films one to four will be shown on the 16th and 17th and five to eight will play on the 30th and 31st. For further details, please check your local listings.  \n\n### Sri Lanka\n__22nd August – 26th September__\u003cbr\u003e\nExperience the joy of every single Harry Potter film this Back to Hogwarts, as all eight will be playing at IMAX cinemas. Please look at your local listings to find out more.  \n\n### Thailand\n__18th September – 6th November__\u003cbr\u003e\nThis autumn, get lost in the drama of the final three Harry Potter films as they return to cinemas in a series of monthly screenings. Kicking things off, *Half-Blood Prince* will be playing on 18th September, *Deathly Hallows Part One* on 9th October and the final film on 6th November. Check your local listings for further information. \n\n***\n\n__We have plenty to celebrate this Back to Hogwarts season so be sure to join us on 1st September for worldwide [celebrations](http://harrypotter.com/back-to-hogwarts).__\n\n__In the meantime, [sign up to our newsletter](https://www.harrypotter.com/register) to make sure you don't miss out on any Back to Hogwarts news!__  "}],"relatedArticleReference":[{"contentfulId":"C4jSoe7RsQlLCjjtT414A","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"article","createdAt":"2025-07-23T08:01:39.247Z","updatedAt":"2025-08-06T15:26:54.107Z","_updatedAt":"2025-08-06T15:26:54.107Z","entryTitle":"WEB-NEWS-everything-you-need-to-know-about-back-to-hogwarts-2025","eyebrow":"THE MAGIC IS RETURNING","displayTitle":"How we're celebrating Back to Hogwarts season in 2025 ","activationDate":"2 O1Yl0r1/45745b5be4f050ac2088621567dc0f3a/HP_BTH25_AnnouncementTease_Static_Sept1_16x9.png","details":{"size":2184584,"image":{"width":1920,"height":1080}},"fileName":"HP_BTH25_AnnouncementTease_Static_Sept1_16x9.png","contentType":"image/png"}}},"intro":"Hey, what’s that sound? Yes! It’s the Hogwarts Express merrily chugging along for a new Back to Hogwarts season! From magic on Snapchat to film screenings across the world, find out how to celebrate all things Potter in the run up to 1st September.","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"5FXtAGlTFDsw7PeVlv1zVb","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:25.700Z","updatedAt":"2025-07-23T07:59:25.700Z","_updatedAt":"2025-07-23T07:59:25.700Z","entryTitle":"back-to-hogwarts-2025-text-section-1","text":"🚨 __Keep an eye on this page! It will magically update with more updates as and when we have them.__ 🚨 \n\nEvery year, on the 1st September, Hogwarts students return to the wonders of Hogwarts School of Witchcraft and Wizardry for a new year of start-of-term surprises. And here in our Muggle lives, we’ve taken that day under our wing and made it special for fans all across the globe every year. \n\nBut how is 2025 shaping up? Come and see all of the Hogwarts happenings."},{"contentfulId":"2NVjs6Jiw6Bx5gwkJutVhs","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-04-01T11:46:34.908Z","updatedAt":"2025-04-01T11:46:34.908Z","_updatedAt":"2025-04-01T11:46:34.908Z","entryTitle":"BTH-2025-key-art-landscape","image":{"contentfulId":"5LNArQZ8fJuj1HkO1Yl0r1","type":"Asset","contentTypeId":"asset","createdAt":"2025-04-01T11:46:32.120Z","updatedAt":"2025-04-01T11:46:32.120Z","_updatedAt":"2025-04-01T11:46:32.120Z","revision":1,"locale":"en-GB","title":"BTH-1-September-2025-key-art-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5LNArQZ8fJuj1HkO1Yl0r1/45745b5be4f050ac2088621567dc0f3a/HP_BTH25_AnnouncementTease_Static_Sept1_16x9.png","details":{"size":2184584,"image":{"width":1920,"height":1080}},"fileName":"HP_BTH25_AnnouncementTease_Static_Sept1_16x9.png","contentType":"image/png"}}},{"contentfulId":"O0M8iRC1Zj8TuRuUDSW3W","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:32.673Z","updatedAt":"2025-07-23T07:59:32.673Z","_updatedAt":"2025-07-23T07:59:32.673Z","entryTitle":"back-to-hogwarts-2025-text-section-2","text":"## First up... get ready for our Back to Hogwarts showcase\n\nWell, wait just a second now – we couldn’t celebrate Back to Hogwarts without a worldwide online showcase! So even if you can’t make any of these Harry Potter fan events below, you can log on with us at around 10.40 BST / 5.40 ET for our annual start-of-term announcements across Instagram, YouTube and TikTok for many magical surprises and news fresher than a recently-owl-delivered Daily Prophet. [You can subscribe to our YouTube channel right now to get ready.](https://www.youtube.com/@harrypotter?sub_confirmation=1)\n\n## It's the 20-year anniversary of Harry Potter and the Goblet of Fire!"},{"contentfulId":"6gUsy3EV8PX6BhYwKqBbc2","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-02-12T12:00:35.934Z","updatedAt":"2024-02-12T12:00:35.934Z","_updatedAt":"2024-02-12T12:00:35.934Z","entryTitle":"WB-HP-F4-goblet-of-fire-harry-potter-in-gryffindor-outfit-web-landscape","image":{"contentfulId":"4Zbo8zBFeRUtr473oxA9CN","type":"Asset","contentTypeId":"asset","createdAt":"2024-02-12T12:00:32.563Z","updatedAt":"2024-02-12T12:00:32.563Z","_updatedAt":"2024-02-12T12:00:32.563Z","revision":1,"locale":"en-GB","title":"WB-HP-F4-goblet-of-fire-harry-potter-in-gryffindor-outfit-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4Zbo8zBFeRUtr473oxA9CN/afceef57b322b8fac0d97e89fb1d9f1b/WB-HP-F4-goblet-of-fire-harry-potter-in-gryffindor-outfit-web-landscape.jpg","details":{"size":2583598,"image":{"width":2000,"height":1331}},"fileName":"WB-HP-F4-goblet-of-fire-harry-potter-in-gryffindor-outfit-web-landscape.jpg","contentType":"image/jpeg"}}},{"contentfulId":"5VGzj9fRFtYTo99POtP2uZ","type":"Entry","revision":6,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:36.421Z","updatedAt":"2025-08-18T10:19:45.785Z","_updatedAt":"2025-08-18T10:19:45.785Z","entryTitle":"back-to-hogwarts-2025-text-section-3","text":"This year’s Back to Hogwarts season is extra special, as it coincides with a huge milestone for the fourth Harry Potter story – 20 years since *Goblet of Fire* film hit our screens. Earlier this year, the Studio Tour in London celebrated in fiery fashion, when a [life-sized Hungarian Horntail](https://www.harrypotter.com/news/hungarian-horntail-takes-over-london-for-studio-tour-summer-stunt) turned up in the Big Smoke – but we’re not quite finished yet! \n\nTo commemorate the occasion accordingly, the film will return to cinemas worldwide, including a special screening in London’s Leicester Square on 31st August featuring James and Oliver Phelps, AKA the Weasley twins! Let’s hope they turn up with big, long white beards after a hearty swig of Ageing Potion. IYKYK.\n\nTheir special Q\u0026A will be hosted by Yinka Bokinni. Plus, whether it’s your house robes or your Yule Ball finest, remember to don your best wizarding attire – there will be costume competitions, giveaways and photo opportunities too! \n\nUpdate: this event is now sold out, [BUT there's still a chance to win a pair of tickets here.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fmc6m8w8vs3rqw7164shtyl7t087m.pub.sfmc-content.com%2Fy0xktjxxmha)\n\nIn the US, fans can check out the [Fandango website](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.fandango.com%2F) to find special screenings happening all over the states across the season. More theatres in Canada, EMEA and International territories will be joining in the fun very soon. [Keep watching this space as more are revealed. ](https://www.harrypotter.com/news/international-screenings-guide-for-back-to-hogwarts-2025)\n\n## Snapchat releases Harry Potter Bitmoji Lenses \n\n3D Harry Potter lenses are coming soon to Snapchat. Launching in mid-August, Snap users can transform their Snapchat Bitmojis Back to Hogwarts style: place your Bitmoji in iconic locations, such as the Wizard Chess sequence, Platform Nine and Three-Quarters, the [Goblet of Fire](https://www.harrypotter.com/fact-file/objects/the-goblet-of-fire) moment in the Great Hall, and the Privet Drive scene with Harry’s influx of Hogwarts letters. Again, we’ll keep you posted when these features are live and can’t wait to see your combinations. \n\n## Global celebrations \n"},{"contentfulId":"2rmOMdQQWAqrqUW2OribNa","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-09-02T08:38:09.204Z","updatedAt":"2024-09-02T08:38:09.204Z","_updatedAt":"2024-09-02T08:38:09.204Z","entryTitle":"BTH-2024-Japan-Tokyo-celebrations-at-studio-tour-web-landscape","image":{"contentfulId":"5gq1Q1av9IESFd5oUFv0cv","type":"Asset","contentTypeId":"asset","createdAt":"2024-09-02T08:38:07.089Z","updatedAt":"2025-08-01T11:51:22.369Z","_updatedAt":"2025-08-01T11:51:22.369Z","revision":2,"locale":"en-GB","title":"BTH-2024-Japan-Tokyo-celebrations-at-studio-tour-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5gq1Q1av9IESFd5oUFv0cv/f84748832eb8b47c5f74e867b715cab3/JAPAN_Studio-Tour-Tokyo_BTH-compressed.jpg","details":{"size":408330,"image":{"width":1900,"height":1267}},"fileName":"JAPAN_Studio-Tour-Tokyo_BTH-compressed.jpg","contentType":"image/jpeg"}}},{"contentfulId":"1W75rbzsp0jjXI4Mt0JweE","type":"Entry","revision":6,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:54.046Z","updatedAt":"2025-08-18T10:17:42.181Z","_updatedAt":"2025-08-18T10:17:42.181Z","entryTitle":"back-to-hogwarts-2025-text-section-4","text":"Click on the following territories to see what Back to Hogwarts activity is going on for you! This list is charmed, so expect it to magically grow.\n\n\u003cspan id=\"top\"\u003e\u003c/span\u003e\n\n\u003cul\u003e\n    \u003cli\u003e\u003ca href=\"#uk\"\u003eThe UK\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#north-america\"\u003eNorth America and Canada\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#france\"\u003eFrance\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#germany\"\u003eGermany\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#italy\"\u003eItaly\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#spain\"\u003eSpain\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#japan\"\u003eJapan\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#china\"\u003eChina\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#singapore\"\u003eSingapore\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#australia\"\u003eAustralia\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#mexico\"\u003eMexico\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#uae\"\u003eUAE\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"uk\"\u003eThe UK\u003c/h2\u003e\n\n### Free screening of Harry Potter and the Goblet of Fire in Leicester Square with Phelps twins Q\u0026A\n\nAs we mentioned above, Cineworld Leicester Square will play host to a free screening of the fourth Harry Potter film on 31st August. Fans can enjoy a live Q\u0026A with the Weasley twins, James and Oliver Phelps with TV and radio host Yinka Bokinni as our fantastic MC – and you can bet they’ll be some fun in the foyer before the show too! If you’re lucky enough to snap up a ticket, we recommend you get your wizarding gladrags on and join like-minded fans for a very special night of magic.\n\n__[You could be in with a chance to span up a pair of tickets here, thanks to Wizarding Wednesdays.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fmc6m8w8vs3rqw7164shtyl7t087m.pub.sfmc-content.com%2Fy0xktjxxmha)__\n\nLook out for goodies galore, including a complementary Wizarding World Micro Magical Moments Year 4 Collectible Figure set from Spinmaster. \n\n__[Check out other Goblet of Fire anniversary screenings at Cineworld UK right this way.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.cineworld.co.uk%2Ffilms%2Fharry-potter-the-goblet-of-fire-20th-anniversary%2Fho00013228%23%2Fbuy-tickets-by-film%3Fin-cinema%3Dlondon%26at%3D2025-08-25%26for-movie%3Dho00013228%26view-mode%3Dlist)__"},{"contentfulId":"cqDtIHanUkU44w0guYkEA-img","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-10-01T18:18:51.117Z","updatedAt":"2021-04-20T13:23:18.877Z","_updatedAt":"2021-04-20T13:23:18.877Z","entryTitle":"PMARCHIVE-FredAndGeorge WB F5 AtGrimmauldPlace HP5-FX-00152r 1P4ITB7tGUw6gW0qc4UK4i","image":{"contentfulId":"cqDtIHanUkU44w0guYkEA","type":"Asset","contentTypeId":"asset","createdAt":"2019-09-20T17:59:02.131Z","updatedAt":"2021-02-08T10:12:19.783Z","_updatedAt":"2021-02-08T10:12:19.783Z","revision":13,"locale":"en-GB","title":"FredAndGeorge WB F5 AtGrimmauldPlace HP5-FX-00152r","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/cqDtIHanUkU44w0guYkEA/c41d8c953ee5259a49a0db98bf23d6c0/FredAndGeorge_WB_F5_AtGrimmauldPlace_HP5-FX-00152r.jpg","details":{"size":1823873,"image":{"width":3139,"height":1894}},"fileName":"FredAndGeorge_WB_F5_AtGrimmauldPlace_HP5-FX-00152r.jpg","contentType":"image/jpeg"}},"imageCaption":"Harry Potter and the Order of the Phoenix","imageAltText":"Fred and George Weasley ","source":[{"contentfulId":"6vSblg4bo8ERfWv6wulvcW","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T14:17:38.549Z","updatedAt":"2019-10-28T16:39:54.558Z","_updatedAt":"2019-10-28T16:39:54.558Z","entryTitle":"HP-F5","displayTitle":"Harry Potter and the Order of the Phoenix","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Order of the Phoenix","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-order-of-the-phoenix"}]},{"contentfulId":"4FPIvtGEgAh9S3QZesu09I","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:57.955Z","updatedAt":"2025-08-18T10:37:13.888Z","_updatedAt":"2025-08-18T10:37:13.888Z","entryTitle":"back-to-hogwarts-2025-text-section-5","text":"### Wizarding Wednesdays return \n\nOur weekly competition, Wizarding Wednesdays, is back back back, inviting UK folks to sweep up spellbinding prizes. [Keep a watchful eye on our social channels](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fmc6m8w8vs3rqw7164shtyl7t087m.pub.sfmc-content.com%2Fy0xktjxxmha) every Wednesday to  see what you could win. \n\n### Warner Bros. Studio Tour London will host an 11am countdown on 1st September|\n\n[Warner Bros. Studio Tour London – the Making of Harry Potter](https://www.wbstudiotour.co.uk/) will host 300 lucky guests at a celebratory 11am countdown moment at the Studio Tour, held on the platform next to the iconic Hogwarts Express live on 1st Sept. Tickets are exclusively available by entering a competition to win, visit @wbtourlondon for more details on how to enter before the competition closes. The contest closes on 11th August, so you’ve got time! \n\n### The Platform 9 ¾ shop has a new merchandise and a photo opp \n\nThe official Harry Potter shop, tucked away at King’s Cross Station, is getting into the Back to Hogwarts spirit in all sorts of ways – including some fresh merchandise for 2025 and a photo opportunity frame. If you’re London-based, the shop begins celebrating from 28th July. \n\n### Meet \u0026 Greet at MinaLima"},{"contentfulId":"2C2ZSbjvCweKGsMWykkyek-img","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-10-01T17:53:19.175Z","updatedAt":"2019-10-01T17:53:19.175Z","_updatedAt":"2019-10-01T17:53:19.175Z","entryTitle":"PMARCHIVE-ML House of MinaLima exterior shop front photography x3JYuQfzmo8iieekSYYAw","image":{"contentfulId":"2C2ZSbjvCweKGsMWykkyek","type":"Asset","contentTypeId":"asset","createdAt":"2019-09-20T20:12:15.464Z","updatedAt":"2019-09-24T06:22:02.700Z","_updatedAt":"2019-09-24T06:22:02.700Z","revision":2,"locale":"en-GB","title":"ML House of MinaLima exterior shop front photography","description":"House of MinaLima exterior","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2C2ZSbjvCweKGsMWykkyek/a8f047eedd02341d161fd5887cf4674b/House_of_MinaLima_Exterior.jpg","details":{"size":6200774,"image":{"width":3508,"height":2338}},"fileName":"House of MinaLima_Exterior.jpg","contentType":"image/jpeg"}},"imageCaption":"House of MinaLima in Soho, London.","imageAltText":"House of MinaLima, 26 Greek Street in London"},{"contentfulId":"7kpwCh0ajLnE5YP3n828Cy","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-22T20:19:00.702Z","updatedAt":"2025-07-22T20:19:00.702Z","_updatedAt":"2025-07-22T20:19:00.702Z","entryTitle":"back-to-hogwarts-2025-text-section-6","text":"Also in London, fans can visit the headquarters of design team MinaLima, the masterminds behind many of the magical details of the Harry Potter films. Their shop is hosting a meet and greet event on the 31st August, where limited-edition Back to Hogwarts badges, exclusive for 2025, will be available to snap up. Make sure to practice your Seeker reflexes though: they won’t last long! All the info you need for this one is over on the [MinaLima official site.](https://minalima.com/)\n\nSpecial Hogwarts notice: alas, we must once again discourage fans from attending King’s Cross Station on 1st September, as there will be no countdown or train announcement occurring in 2025. Safety first, folks.\n\n\u003ch2 id=\"north-america\"\u003eNorth America and Canada\u003c/h2\u003e\n\n### Harry Potter: New York and Harry Potter: Chicago release Back to Hogwarts time-limited merchandise \n\nIf you’re [New York](https://www.harrypotterstore.com/) or [Chicago](https://harrypottershop.com/pages/chicago?srsltid=AfmBOoqzzViOYPGLJwWXGoHaGV1R7eEtlO8TMrQkDSvwOvqX1flg1ngH) based, why not rock on down to the official Harry Potters shops in your area for some exclusive time-limited goodies for Back to Hogwarts 2025? Visit from 28th July to see what new items are on offer.\n\n### Harry Potter: A Forbidden Forest Experience comes to Chicago\n\nMore spellbinding stuff for Chicago fans! The Forbidden Forest Experience has been casting a Dark spell on fans over the past few years, and now, the immersive experience is coming to the Windy City. Visit the official website to find out more.\n\n### Cursed Child on Broadway offering shows for 19 dollars"},{"contentfulId":"2LAIk5x2RxJASCFkaBHsHK","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-03-28T17:01:58.540Z","updatedAt":"2025-03-28T17:01:58.540Z","_updatedAt":"2025-03-28T17:01:58.540Z","entryTitle":"HPCC-Broadway-2025-Albus-and-harry-casting-fire-web-landscape","image":{"contentfulId":"1Y4ZPY1SfQmudLmVmSEWOS","type":"Asset","contentTypeId":"asset","createdAt":"2025-03-28T17:01:56.285Z","updatedAt":"2025-03-28T17:01:56.285Z","_updatedAt":"2025-03-28T17:01:56.285Z","revision":1,"locale":"en-GB","title":"HPCC-Broadway-2025-Albus-and-harry-casting-fire-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1Y4ZPY1SfQmudLmVmSEWOS/3024b843ef71a0b48f5e421411a8d8c4/HPCC_BROADWAY_11_12_24_S_0091_EditV6__1_.jpg","details":{"size":625504,"image":{"width":3782,"height":2522}},"fileName":"HPCC_BROADWAY_11_12_24_S_0091_EditV6 (1).jpg","contentType":"image/jpeg"}}},{"contentfulId":"6PTFvFsxwoFP6NeT0D84IT","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T08:00:02.520Z","updatedAt":"2025-07-30T14:19:03.010Z","_updatedAt":"2025-07-30T14:19:03.010Z","entryTitle":"back-to-hogwarts-2025-text-section-7","text":"As the play is set 19 years later, the Cursed Child production in New York has had the ingenious idea to release tickets to their shows for only 19 bucks. The special priced ticket will only be available to grab on 1st September, so mark this in your calendars and visit [harrypotterbroadway.com](https://broadway.harrypottertheplay.com/) or at the Lyric Theatre Box Office to get the full lowdown. \n\n\u003ch2 id=\"france\"\u003eFrance\u003c/h2\u003e\n\n### Take your exams at the Sainte-Geneviève Library \n\nSacre bleu! Exams?! Yes, you heard that right. You’re invited to a free ticketed event in the beautiful university library, crammed with almost as much history as Hogwarts! But don’t worry – it’s not *that* kind of exam, this is a fun, interactive quiz event for Harry Potter fans to test their magical acumen.\n\nThere will also be an appearance from actor Solange Boulanger, who dubbed Dolores Umbridge in the Harry Potter films. Solange will be providing a special dictation session for visitors (remember: it’s Levi-O-sah...) while LEGO and Harry Potter Haribo displays will also be scattered around. \n\nFans who can’t make the event physically can get a proper wizarding education online from [https://examen.retourapoudlard.fr/](https://examen.retourapoudlard.fr/) - check it out from 30th August – 6th September. \n\n\u003ch2 id=\"germany\"\u003eGermany\u003c/h2\u003e\n\n### Westfield Hamburg-Überseequartier to host Back to Hogwarts 3-day bonanza\n\nWhy celebrate Back to Hogwarts day for one day when you could do it for three? This Hamburg-based shopping centre has the right idea about things, with Harry Potter activities galore available across 29th August, 30th August, 1st September. Thalia, LEGO, Haribo and Harry Potter and the Cursed Child are all getting involved, so keep your ear to the ground for bewitching giveaways.\n\nIf you're old enough, you can find out more on our German Harry Potter social channels.\n\n### Select Thalia book stores will have a Back to Hogwarts takeover\n\nSpeaking of Thalia, the book store chain is getting into the Hogwarts spirit in more ways than one this summer, with select stores bringing a little slither of the wizarding world into 10 of their shops. Visitors can expect prize draws, Harry Potter displays, and of course, plenty of opportunities for a magical snap.\n\n[Visit the website here to learn more.](https://www.thalia.de/themenwelten/harry-potter/back-to-hogwarts/tour)\n\n### From takeovers...to sleepovers!\n\nAnd in Dusseldorf, Hannover, Leipzig and Hamburg, there will be four Back to Hogwarts-themed sleepover events taking place in Thalia stores too! If you sign up by the 8th August, you can join fellow fans for a wizarding all-nighter if you’re lucky enough to snag a free ticket.\n\n[Details are right over here.](https://thalia.de/themenwelten/harry-potter/back-to-hogwarts)\n\n### Harry Potter and the Cursed Child brings Back to Hogwarts fever to Hamburg"},{"contentfulId":"1OQXOJbajI807OYJn17CWb","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-09T10:09:42.185Z","updatedAt":"2021-12-09T10:09:42.185Z","_updatedAt":"2021-12-09T10:09:42.185Z","entryTitle":"HPCC-cursed-child-hamburg-stage-curtain-call-applause-cast","image":{"contentfulId":"5BU7Fe9tN1qJa0TJSKj1zw","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-09T10:09:36.409Z","updatedAt":"2021-12-09T10:09:36.409Z","_updatedAt":"2021-12-09T10:09:36.409Z","revision":1,"locale":"en-GB","title":"HPCC-cursed-child-hamburg-stage-curtain-call-applause-cast","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5BU7Fe9tN1qJa0TJSKj1zw/1b57b57b6d40015fca03f4b708eb006f/HPCC-cursed-child-hamburg-stage-curtain-call-applause-cast.jpg","details":{"size":2367505,"image":{"width":2000,"height":1334}},"fileName":"HPCC-cursed-child-hamburg-stage-curtain-call-applause-cast.jpg","contentType":"image/jpeg"}},"source":[{"contentfulId":"KNlAjfZtVzdWu31pBG6Ob","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-28T14:11:06.043Z","updatedAt":"2022-10-03T10:30:18.494Z","_updatedAt":"2022-10-03T10:30:18.494Z","entryTitle":"CC","displayTitle":"Harry Potter and the Cursed Child","sourceType":"Play","purchaseLink":"https://www.wizardingworld.com/discover/books/harry-potter-and-the-cursed-child-parts-one-and-two-screenplay"}]},{"contentfulId":"1G2fiUJJVvA3hLs6A72Kli","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T08:00:06.464Z","updatedAt":"2025-08-22T12:13:32.530Z","_updatedAt":"2025-08-22T12:13:32.530Z","entryTitle":"back-to-hogwarts-2025-text-section-8","text":"The hit play is recognising Back to Hogwarts season with a start-of-term special on 31st August, with magical offers on this day and a costume competition to boot. [Check out the official website to see what’s in store](https://www.atgtickets.de/musicals-shows/harry-potter-und-das-verwunschene-kind/back-to-hogwarts/).\n\n### Universal Beijing Resort promises themed merchandise, special entertainment and even a feast\n\nMUCH fun can be had at Universal Beijing Resort during the Back to Hogwarts season. Just a few things to look forward to... *deep breath* A Collectors Edition interactive Wand exclusive to the park, themed merchandise packages, a Back to Hogwarts feast, Hogwarts house-themed face painting, \nand much more. \n\nFor the full list of details, [simply visit the official site.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.universalbeijingresort.com%2Fen%2FBTH2025)\n\n\u003ch2 id=\"italy\"\u003eItaly\u003c/h2\u003e\n\n### Back to Hogwarts event to take place in Teatro Nazionale, Milan \n\nThe fashion capital of Italy will most likely see a storm of Hogwarts robes on 1st September, as Harry Potter fans are invited to a countdown ceremony and a wonderful array of activities to go alongside. Expect quizzes, performances and even surprise guests! \nVisit here for more.\n\n\u003ch2 id=\"spain\"\u003eSpain\u003c/h2\u003e\n\n### Magic is coming to Museo del Ferrocarril in Madrid\n\nVamos! On 31st August and 1st September, Madrid will host a fan event at Museo del Ferrocarril (the Railway museum)\n\nVisitors will enjoy two magical days of Hogwarts-themed fun, including a special 11 o’clock countdown!\n\n[Click here to find out more](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fbacktohogwartsmadrid.com%2F)\n\n\u003ch2 id=\"japan\"\u003eJapan\u003c/h2\u003e\n\n### The Saitama Seibu Lions will be casting a spell on baseball fans\n\nIt's been a huge year for Harry Potter fans in Japan – and the magic certainly doesn’t stop now. From the 29th August to the 31st August, the wizarding world is coming to the baseball pitch, dubbed Harry Potter x Lions. Fans of the team will discover bespoke products while attending games, and will even be treated to a special appearance from a Harry Potter and the Cursed Child cast member...\n\nWho knew the Saitama Seibu Lions were Harry Potter fans? We bet they’re all Gryffindors. \n\n\u003ch2 id=\"china\"\u003eChina\u003c/h2\u003e\n\n### Prisoner of Azkaban and Goblet of Fire in Concert plays in Shanghai"},{"contentfulId":"32oN0BK8TtpehVF7F54B14","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2023-09-18T11:11:23.494Z","updatedAt":"2023-09-18T11:11:23.494Z","_updatedAt":"2023-09-18T11:11:23.494Z","entryTitle":"hp-f3-dumbledore-great-hall-lectern-start-of-term-web-landscape","image":{"contentfulId":"UKtUI0NroDt2Q8lNYnfgW","type":"Asset","contentTypeId":"asset","createdAt":"2023-09-18T11:11:20.055Z","updatedAt":"2023-09-18T11:11:20.055Z","_updatedAt":"2023-09-18T11:11:20.055Z","revision":1,"locale":"en-GB","title":"hp-f3-dumbledore-great-hall-lectern-start-of-term-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/UKtUI0NroDt2Q8lNYnfgW/612cbf5f14d90abd38d4c38d71399986/hp-f3-dumbledore-great-hall-lectern-start-of-term-web-landscape.jpg","details":{"size":462087,"image":{"width":1176,"height":784}},"fileName":"hp-f3-dumbledore-great-hall-lectern-start-of-term-web-landscape.jpg","contentType":"image/jpeg"}}},{"contentfulId":"27mmB8iq55YUuvTlY3uhGE","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T08:00:10.160Z","updatedAt":"2025-08-18T10:08:08.488Z","_updatedAt":"2025-08-18T10:08:08.488Z","entryTitle":"back-to-hogwarts-2025-text-section-9","text":"From 7th August to 10th August, the third and fourth Harry Potter films will be brought to life in spectacular fashion with the In Concert series coming to Shanghai, complete with a live symphony orchestra. \n\n[The official website has a handy map of all upcoming locations for these gorgeous shows.](https://harrypotterinconcert.com/tickets)\n\n### The West Lake becomes...The Great Lake?\n\nIn Hangzhou, on 30th August – 1st September, a Back to Hogwarts celebration set against the iconic backdrop of the West Lake will take place, with a plethora of community activities expected. The Harry Potter China social channels can tell you more about this one.\n\n\u003ch2 id=\"singapore\"\u003eSingapore\u003c/h2\u003e\n\n### Harry Potter: Visions of Magic promises Back to Hogwarts merriment\n\nVisitors of [Harry Potter: Visions of Magic](https://www.harrypotter.com/discover-experiences/experiences/harry-potter-visions-of-magic), the experiential and interactive art experience that has been spreading wonder around the globe, is upping the ante in Singapore for Back to Hogwarts day. If you have a ticket already and turn up in Hogwarts house regalia, there’s a chance to win complimentary gifts. Watch out for other surprises on site.\n\n\u003ch2 id=\"australia\"\u003eAustralia\u003c/h2\u003e\n\n### Harry Potter: The Exhibition offers special ticket offer on 1st September \n\nAll the way down under, Harry Potter fans can enjoy behind-the-scenes film magic with [Harry Potter: The Exhibition](https://harrypotterexhibition.com/), currently happening in Melbourne. But on 1st September, fans should stay tuned for a very special ticket offer... Ooh, mysterious. Maybe bookmark the official site and keep an eye out.\n\n\u003ch2 id=\"Mexico\"\u003eMexico\u003c/h2\u003e \n\n### Meanwhile, a collectible poster is up for grabs at Harry Potter: Visions of Magic in Mexico City\n\nFans who attend the ethereal experience in [Mexico City](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottervisionsofmagic.com%2F) between 26th August to 31st August will receive a special Back to Hogwarts collectible poster!\n\n\u003ch2 id=\"UAE\"\u003eUAE\u003c/h2\u003e \n\n### Dress to impress in Harry Potter: The Exhibition in Abu Dhabi\n\nSpeaking of Harry Potter: The Exhibition, we heartily encourage attendees to dress up in their Hogwarts house colours, should you be attending on 1st September. A Hogwarts house-themed prize is up for grabs! (If you're in Melbourne or Salt Lake City - look out for similar contests.) \n\n***\n\n__Phew! And that’s just a couple of things for the time being... [sign up to our newsletter](https://www.harrypotter.com/register) as we reveal more info on Back to Hogwarts 2025 or keep fervently refreshing this page as more magic presents itself.__ "},{"contentfulId":"5FwPpDmg7seTor2KcpeqYu","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"poll","createdAt":"2025-08-04T11:07:09.904Z","updatedAt":"2025-08-04T11:07:09.904Z","_updatedAt":"2025-08-04T11:07:09.904Z","entryTitle":"homepage-poll-bth-most-excited","displayTitle":"What would you be most excited to get back to Hogwarts for?","activationDate":"2025-08-03T00:00+01:00","answer":["The classes","My friends","Playing Quidditch","The food"],"ctaLabel":"Find out how you can celebrate Back to Hogwarts season this year here!","ctaURL":"https://www.harrypotter.com/back-to-hogwarts"}],"relatedArticleReference":[{"contentfulId":"6dFG0iTG2t8EhWJGxx2CzW","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"article","createdAt":"2025-08-04T10:37:20.952Z","updatedAt":"2025-08-05T10:36:16.995Z","_updatedAt":"2025-08-05T10:36:16.995Z","entryTitle":"WEB-gift-guide-bth-2025","eyebrow":"DIAGON ALLEY VIBES","displayTitle":"Your Back to Hogwarts gift guide for 2025","activationDate":"2025-08-04T00:00+01:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"back-to-hogwarts-gift-guide-2025","mainImage":{"contentfulId":"3QIFPXKgnByGvQCDgjeg7H","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-07-25T11:42:56.986Z","updatedAt":"2025-07-25T11:42:56.986Z","_updatedAt":"2025-07-25T11:42:56.986Z","entryTitle":"HP-shop-hogwarts-robes-lifestyle-w
