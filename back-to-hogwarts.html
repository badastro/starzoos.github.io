-bth-2025-web-landscape","image":{"contentfulId":"7EvkAdVEl1TXwD7ZggZJN1","type":"Asset","contentTypeId":"asset","createdAt":"2025-08-31T16:52:37.228Z","updatedAt":"2025-08-31T16:52:37.228Z","_updatedAt":"2025-08-31T16:52:37.228Z","revision":1,"locale":"en-GB","title":"showcase-bth-2025-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7EvkAdVEl1TXwD7ZggZJN1/9198bb3e7ba67bf5aa8658260c56b64e/showcase-bth-2025-web-landscape.jpg","details":{"size":416857,"image":{"width":1920,"height":1080}},"fileName":"showcase-bth-2025-web-landscape.jpg","contentType":"image/jpeg"}}},"intro":"A familiar face is reprising their role in the upcoming HBO television series… A magical new podcast is heading your way… An exclusive excerpt of the new, full-cast audiobook… here’s everything you need to know from our annual showcase on all things Harry Potter!","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"rtdsYF1ixTpdQCOAqwiQZ","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-01T10:12:29.677Z","updatedAt":"2025-09-01T11:29:08.517Z","_updatedAt":"2025-09-01T11:29:08.517Z","entryTitle":"ARTICLE-15-exciting-things-we-learnt-in-the-back-to-hogwarts-showcase-2025-TEXTSECTION-1","text":"On Back to Hogwarts day, we like to kick things off with a few start-of-term announcements – much like Albus Dumbledore. As well as getting nostalgic and looking back... here’s a glimpse into the beyond. \n\nFrom TV to publishing to a rather special anniversary, here’s everything to look forward to in the world of Harry Potter. \n\n__Using some technological wizardry, jump straight to the announcements you’re most excited for!__\n\u003cspan id=\"top\"\u003e\u003c/span\u003e\n\u003cbr\u003e[The latest news from HBO's Harry Potter series](#latesttv) \u003cbr\u003e\n[Wizards of Baking season 2](#wizardsofbaking)\n[Amazing audio announcements](#audioannouncements) \u003cbr\u003e\n[A special 25th anniversary](#25thanniversary) \u003cbr\u003e\n[Harry Potter and the Cursed Child revelations](#cursedchild) \u003cbr\u003e\n[A new chapter for books](#booksnews) \u003cbr\u003e\n[Your gaming adventure](#gamingnews) \u003cbr\u003e\n[Exciting experiences](#experiencesnews) \u003cbr\u003e\n[Christmas is coming](#christmasiscoming) \u003cbr\u003e\n\u003cbr\u003e"},{"contentfulId":"1JtPF5yGZJ8ImgDg5j0NLE","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-08-31T16:59:54.504Z","updatedAt":"2025-09-01T10:12:32.672Z","_updatedAt":"2025-09-01T10:12:32.672Z","entryTitle":"ARTICLE-15-exciting-things-we-learnt-in-the-back-to-hogwarts-showcase-2025-TEXTSECTION-2","text":"\u003cspan id=\"latesttv\"\u003e\u003c/span\u003e\n__The latest TV news__\n\n## Warwick Davis is set to reprise his role as Professor Flitwick in HBO’s Harry Potter series "},{"contentfulId":"2zRkRyTY9vvSZK7BE9mxkz","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-08-31T17:09:24.106Z","updatedAt":"2025-08-31T17:09:24.106Z","_updatedAt":"2025-08-31T17:09:24.106Z","entryTitle":"hbo-showcase-news-warwick-hogwarts-express-web-portrait","image":{"contentfulId":"YMvaD0bStKMfTtkgZABBc","type":"Asset","contentTypeId":"asset","createdAt":"2025-08-31T17:09:16.626Z","updatedAt":"2025-08-31T17:09:16.626Z","_updatedAt":"2025-08-31T17:09:16.626Z","revision":1,"locale":"en-GB","title":"hbo-showcase-news-warwick-hogwarts-express-web-portrait","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/YMvaD0bStKMfTtkgZABBc/2f0d8eb4510b778cfb6a8e676818fc69/hbo-showcase-news-warwick-hogwarts-express-web-portrait.jpg","details":{"size":604652,"image":{"width":4000,"height":5000}},"fileName":"hbo-showcase-news-warwick-hogwarts-express-web-portrait.jpg","contentType":"image/jpeg"}}},{"contentfulId":"50wHp8OycldPaHqv4QFI3H","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-01T10:12:35.803Z","updatedAt":"2025-09-01T10:12:35.803Z","_updatedAt":"2025-09-01T10:12:35.803Z","entryTitle":"ARTICLE-15-exciting-things-we-learnt-in-the-back-to-hogwarts-showcase-2025-TEXTSECTION-3","text":"With filming underway, our excitement for HBO’s Harry Potter series is only growing… especially with the reveal that Warwick Davis is to walk the halls of Hogwarts once more. In a rather *Charming* turn of events, he will be reprising his role as the wise Head of Ravenclaw house, Filius Flitwick!  \n\nHe’s not alone! Set to join him at the teachers’ table is Sirine Saba as Professor Pomona Sprout and Richard Durden as Professor Cuthbert Binns. We also learnt that the Hogwarts Hospital Wing is now fully staffed, as Bríd Brennan takes on the role Madam Poppy Pomfrey. \n\nThe house tables are filling up too with more Hogwarts students announced. Elijah Oshin is Harry’s fellow Gryffindor, Dean Thomas. Plus, Draco Malfoy now has his Slytherin buddies, with Finn Stephens as Vincent Crabbe, and William Nash as Gregory Goyle. \n\nOutside of Hogwarts, we learnt that Leigh Gill will play goblin and Gringotts’ employee, Griphook. 2027 can’t come soon enough! "},{"contentfulId":"3xqT7XklZ20Z1aRXKLA7J7","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-09-01T10:12:40.048Z","updatedAt":"2025-09-01T10:12:40.048Z","_updatedAt":"2025-09-01T10:12:40.048Z","entryTitle":"hbo-casting-showcase-web-portrait","image":{"contentfulId":"7D6RQOpzXeMRxV8Cby1DK8","type":"Asset","contentTypeId":"asset","createdAt":"2025-08-31T17:10:17.882Z","updatedAt":"2025-08-31T17:10:17.882Z","_updatedAt":"2025-08-31T17:10:17.882Z","revision":1,"locale":"en-GB","title":"hbo-casting-showcase-web-portrait","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7D6RQOpzXeMRxV8Cby1DK8/451c41b1f9af6648ab77f8f449b30477/hbo-casting-showcase-web-portrait.jpg","details":{"size":269079,"image":{"width":1080,"height":1350}},"fileName":"hbo-casting-showcase-web-portrait.jpg","contentType":"image/jpeg"}}},{"contentfulId":"HvJcLY72CbtX8I9fZdoXZ","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-01T10:12:42.943Z","updatedAt":"2025-09-01T11:29:47.777Z","_updatedAt":"2025-09-01T11:29:47.777Z","entryTitle":"ARTICLE-15-exciting-things-we-learnt-in-the-back-to-hogwarts-showcase-2025-TEXTSECTION-4","text":"[Have more questions about the TV show? We have everything you need to know right here. \n](https://www.harrypotter.com/features/everything-we-know-about-the-harry-potter-tv-series-so-far)\n\n\u003cspan id=\"wizardsofbaking\"\u003e\u003c/span\u003e\n## Harry Potter: Wizards of Baking is back for season two "},{"contentfulId":"lZFu5hw7zlA38b6HGafLK","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-08-31T17:13:47.147Z","updatedAt":"2025-08-31T17:13:47.147Z","_updatedAt":"2025-08-31T17:13:47.147Z","entryTitle":"wob-showcase-screengrab-web-landscape","image":{"contentfulId":"5ImBvlJMJ8GxxGJD529s16","type":"Asset","contentTypeId":"asset","createdAt":"2025-08-31T17:13:43.371Z","updatedAt":"2025-08-31T17:13:43.371Z","_updatedAt":"2025-08-31T17:13:43.371Z","revision":1,"locale":"en-GB","title":"wob-showcase-screengrab-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5ImBvlJMJ8GxxGJD529s16/e91c66a5c7029771196d0f653fea2d42/wob-showcase-screengrab-web-landscape.jpg","details":{"size":466213,"image":{"width":2874,"height":1584}},"fileName":"wob-showcase-screengrab-web-landscape.jpg","contentType":"image/jpeg"}}},{"contentfulId":"2GKm6SuPgEbCVsADGrMU0C","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-01T10:12:48.067Z","updatedAt":"2025-09-01T10:12:48.067Z","_updatedAt":"2025-09-01T10:12:48.067Z","entryTitle":"ARTICLE-15-exciting-things-we-learnt-in-the-back-to-hogwarts-showcase-2025-TEXTSECTION-5","text":"Who wouldn’t want another slice of this show whose recipe is an inspired mix of the wonder of Harry Potter, spectacular bakes and some serious talent? Yes! Harry Potter: Wizards of Baking, courtesy of Food Network (available to stream on HBO Max), is back for season two. With James and Oliver Phelps, aka the Weasley twins, hosting once more, plus new teams of talented bakers ready to create more delicious concoctions – this is set to be another spectacular season. \n\n[Refresh your Wizards of Baking memory here.](https://www.harrypotter.com/harry-potter-wizards-of-baking) \n\n\u003cspan id=\"audioannouncements\"\u003e\u003c/span\u003e\n__Amazing audio announcements__\n\n## A behind the scenes glimpse of the upcoming Harry Potter: Full-Cast Audio Editions  "},{"contentfulId":"2N4rFx65tsKFk0reXxqSqb","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-08-31T17:16:20.410Z","updatedAt":"2025-08-31T17:16:20.410Z","_updatedAt":"2025-08-31T17:16:20.410Z","entryTitle":"audible-full-cast-bts-hugh-laurie-web-landscape","image":{"contentfulId":"6frd64qtAE2ntGfkNKu3vf","type":"Asset","contentTypeId":"asset","createdAt":"2025-08-31T17:16:16.914Z","updatedAt":"2025-08-31T17:16:16.914Z","_updatedAt":"2025-08-31T17:16:16.914Z","revision":1,"locale":"en-GB","title":"audible-full-cast-bts-hugh-laurie-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6frd64qtAE2ntGfkNKu3vf/248ee4689a0d06943528db6ae7f68f3c/audible-full-cast-bts-hugh-laurie-web-landscape.jpg","details":{"size":427452,"image":{"width":1920,"height":1080}},"fileName":"audible-full-cast-bts-hugh-laurie-web-landscape.jpg","contentType":"image/jpeg"}}},{"contentfulId":"2OuTs6lesc6cStP7MaD7ZX","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-01T10:12:51.190Z","updatedAt":"2025-09-01T10:12:51.190Z","_updatedAt":"2025-09-01T10:12:51.190Z","entryTitle":"ARTICLE-15-exciting-things-we-learnt-in-the-back-to-hogwarts-showcase-2025-TEXTSECTION-6","text":"Ok, we don’t know about you, but we were thrilled to catch a glimpse of the behind-the-scenes wizardry that went into this huge feat of audio storytelling from Pottermore Publishing and Audible. The way Hugh Laurie delivered, *‘I am not worried, Harry… I am with you’* as Albus Dumbledore in that clip? Electrifying. In fact, it has left us feeling rather emotional – and that was just one line!  \n\nWe were also treated to yet more exciting casting news: Mark Addy lends his voice as Rubeus Hagrid, Daniel Mays as Dobby, Alex Hassell as Lucius Malfoy, and Sara and Avni Deshmukh as the Patil twins. The project boasts a truly star-studded cast, with previously announced Matthew Macfadyen as Lord Voldemort, Riz Ahmed as Professor Snape, Michelle Gomez as Professor McGonagall, and Cush Jumbo as narrator. This new audiobook series certainly promises to bring the Harry Potter stories to life as never heard before. \n\nPlus, with the release of *Harry Potter and the Philosopher’s/Sorcerer’s Stone* just around the corner (4th November 2025), [you can now pre-order the whole series from Audible](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.audible.com%2Fharrypotter%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DAudible%26utm_content%3Dbthshowcasewrap2025).\n\n## News of a brand-new Harry Potter podcast is music to our ears "},{"contentfulId":"4xJ7mHc68qfmyXvZ6oIEsL","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-09-01T10:12:55.220Z","updatedAt":"2025-09-01T10:12:55.220Z","_updatedAt":"2025-09-01T10:12:55.220Z","entryTitle":"podcast-showcase-recording-web-landscape","image":{"contentfulId":"AOzFTZaiCDKN9KMlLPUWD","type":"Asset","contentTypeId":"asset","createdAt":"2025-08-31T17:19:15.506Z","updatedAt":"2025-08-31T17:19:15.506Z","_updatedAt":"2025-08-31T17:19:15.506Z","revision":1,"locale":"en-GB","title":"podcast-showcase-recording-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/AOzFTZaiCDKN9KMlLPUWD/5024c748d7fe51836d28f2202643d653/podcast-showcase-recording-web-landscape.jpg","details":{"size":813600,"image":{"width":1920,"height":1080}},"fileName":"podcast-showcase-recording-web-landscape.jpg","contentType":"image/jpeg"}}},{"contentfulId":"4460wB86ePyfE3hLPSm8sW","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-01T10:12:58.402Z","updatedAt":"2025-09-01T10:12:58.402Z","_updatedAt":"2025-09-01T10:12:58.402Z","entryTitle":"ARTICLE-15-exciting-things-we-learnt-in-the-back-to-hogwarts-showcase-2025-TEXTSECTION-7","text":"That’s right! There’s going to be new Harry Potter podcast heading your way in 2026. With so much still to be revealed, keep your eyes peeled. Though with the tease that this has been 25 years in the making, and 2026 also marking 25 years since the release of the first Harry Potter film, we’re confident you can expect some serious nostalgia as the hosts look back at the films. \n\n\u003cspan id=\"25thanniversary\"\u003e\u003c/span\u003e\n__A special 25th anniversary__"},{"contentfulId":"4D3ZBYYbc1GV1UMGhdyyZi","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-09-01T10:13:06.656Z","updatedAt":"2025-09-01T10:13:06.656Z","_updatedAt":"2025-09-01T10:13:06.656Z","entryTitle":"25th","image":{"contentfulId":"4ve3VNWXp2GHPMzHwOMlgG","type":"Asset","contentTypeId":"asset","createdAt":"2025-09-01T10:13:03.850Z","updatedAt":"2025-09-01T10:13:03.850Z","_updatedAt":"2025-09-01T10:13:03.850Z","revision":1,"locale":"en-GB","title":"HP25 Core KeyArt 1920X1080","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4ve3VNWXp2GHPMzHwOMlgG/37d788dc0282b93f035101283b49f89a/HP25_Core_KeyArt_1920X1080.jpg","details":{"size":557527,"image":{"width":1920,"height":1080}},"fileName":"HP25_Core_KeyArt_1920X1080.jpg","contentType":"image/jpeg"}}},{"contentfulId":"3FitC56Z3oQplYBKHsgS12","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-01T10:13:09.625Z","updatedAt":"2025-09-01T10:13:09.625Z","_updatedAt":"2025-09-01T10:13:09.625Z","entryTitle":"ARTICLE-15-exciting-things-we-learnt-in-the-back-to-hogwarts-showcase-2025-TEXTSECTION-8","text":"Speaking of which, can you believe that next year will be the 25th anniversary of *Harry Potter and the Philosopher’s/Sorcerer’s Stone*? Of course, we will be celebrating all year long with lots of plans, big and small, in the pipeline. \n\nIf you’re old enough, keep an eye on the Harry Potter social accounts and website for all the news on what's happening where you are. \n\n\u003cspan id=\"cursedchild\"\u003e\u003c/span\u003e\n__Harry Potter and the Cursed Child revelations__\n\n## Draco Malfoy is back and coming to Broadway – Tom Felton to reprise his famous role "},{"contentfulId":"4Esr8Bccj40nOrFVbWCRRv","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-08-31T17:25:23.665Z","updatedAt":"2025-08-31T17:25:23.665Z","_updatedAt":"2025-08-31T17:25:23.665Z","entryTitle":"HPCC-new-draco-casting-photoshoot-crop","image":{"contentfulId":"3PqrVcHzWpnwVj0iS5vhDb","type":"Asset","contentTypeId":"asset","createdAt":"2025-06-05T08:20:24.259Z","updatedAt":"2025-06-05T08:30:50.260Z","_updatedAt":"2025-06-05T08:30:50.260Z","revision":2,"locale":"en-GB","title":"HPCC-new-draco-casting-photoshoot-crop","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3PqrVcHzWpnwVj0iS5vhDb/2c6d20b726abdddfdb0669712d3d25f1/Draco-253_PJZEDIT_v001__1_.jpg","details":{"size":288554,"image":{"width":2435,"height":1123}},"fileName":"Draco-253_PJZEDIT_v001__1_.jpg","contentType":"image/jpeg"}}},{"contentfulId":"2WzM5xGsp2uozxAIjz1OHf","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-01T10:13:12.700Z","updatedAt":"2025-09-01T10:13:12.700Z","_updatedAt":"2025-09-01T10:13:12.700Z","entryTitle":"ARTICLE-15-exciting-things-we-learnt-in-the-back-to-hogwarts-showcase-2025-TEXTSECTION-9","text":"With the sound of ‘Pottah!’ still ringing in our ears, we can’t wait to see Tom Felton join the cast of *Harry Potter and the Cursed Child* on Broadway. Nearly 25 years since he first graced our screens as the sneering Slytherin, you can watch Tom embody the role of Malfoy once again from 11th November. \n\n[Ticket information can be found here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fbroadway.harrypottertheplay.com%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DTCC%26utm_content%3Dbthshowcasewrap2025).\n\n## Harry Potter and the Cursed Child is coming to the Netherlands  \n\nIn exciting news for fans in the Netherlands, the showcase also revealed that the eighth story is set to open 3rd March 2026 – with tickets now available. \n\n[More information can be found here.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.stage-entertainment.nl%2Fshows%2Ftheater%2Fharrypotter%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DTCC%26utm_content%3Dbthshowcasewrap2025) \n\n## The North American tour is set to return \n\nNot forgetting fans in North America, the locations of the next tour have been revealed. Starting in 2025 and heading into 2026, from Colorado to California, there will be plenty of opportunities to experience the magic of *Cursed Child*. \n\n## The 10th anniversary of the original production \n\n2026 is an important year for *Cursed Child* – it will be the 10 years since the original production opened in London! Stay tuned for more information about how this milestone will be celebrated, July 2026. \n\n\u003cspan id=\"booksnews\"\u003e\u003c/span\u003e\n__A new chapter for books__\n\n## Exclusive sneak peek at the latest Pocket Potters "},{"contentfulId":"2zpZu6JZELCbXQs0VNqKJo","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-08-31T17:28:57.679Z","updatedAt":"2025-08-31T17:28:57.679Z","_updatedAt":"2025-08-31T17:28:57.679Z","entryTitle":"pocket-potters-dobby-showcase-web","image":{"contentfulId":"1D4fg9BzNydGxtL3wCEsKh","type":"Asset","contentTypeId":"asset","createdAt":"2025-08-31T17:28:53.750Z","updatedAt":"2025-08-31T17:28:53.750Z","_updatedAt":"2025-08-31T17:28:53.750Z","revision":1,"locale":"en-GB","title":"pocket-potters-dobby-showcase-web","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1D4fg9BzNydGxtL3wCEsKh/4b557a4344518a260531327099682de0/pocket-potters-dobby-showcase-web.jpg","details":{"size":1250680,"image":{"width":5760,"height":3840}},"fileName":"pocket-potters-dobby-showcase-web.jpg","contentType":"image/jpeg"}}},{"contentfulId":"FiO7HwkI9xKfA8PCYkCkg","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-01T10:13:15.724Z","updatedAt":"2025-09-01T10:13:15.724Z","_updatedAt":"2025-09-01T10:13:15.724Z","entryTitle":"ARTICLE-15-exciting-things-we-learnt-in-the-back-to-hogwarts-showcase-2025-TEXTSECTION-10","text":"Packed full of favourite story moments, must-know spells and unforgettable pets, *Pocket Potters* is the brand-new series of little guides to the Harry Potter stories, featuring all your favourite witches and wizards. \n\nWith each book coming with its own unique illustrator, you can dive deeper into the wizarding world and explore your favourite characters. As the showcase just revealed, there are two more to add to the collection in 2026! Dobby and Hagrid will be joining Harry Potter, Ron Weasley, Hermione Granger, Luna Lovegood and Professor Dumbledore in August next year. \n\n[Start collecting now and pre-order globally from Bloomsbury (excluding the US)](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.bloomsbury.com%2Fdiscover%2Fsuperpages%2Fharry-potter%2Fpocket-potters-pre-order-offer%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DBloomsbury%26utm_content%3Dbthshowcasewrap2025)\n\n[Or pre-order from Scholastic if you’re in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.scholastic.com%2Fharrypotter%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DScholastic%26utm_content%3Dbthshowcasewrap2025)\n\n## Champions, get ready for this extremely glorious edition of Harry Potter and the Goblet of Fire! "},{"contentfulId":"2nXorPHy24RkwV2SyZO2OC","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-08-31T17:30:27.353Z","updatedAt":"2025-08-31T17:30:27.353Z","_updatedAt":"2025-08-31T17:30:27.353Z","entryTitle":"goblet illustrated","image":{"contentfulId":"2KsbTf5SI72ccsdiwmFbz2","type":"Asset","contentTypeId":"asset","createdAt":"2025-02-17T16:03:12.116Z","updatedAt":"2025-02-17T16:03:12.116Z","_updatedAt":"2025-02-17T16:03:12.116Z","revision":1,"locale":"en-GB","title":"Scholastic-Goblet-of-Fire-Illustration-The-Yule-Ball","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2KsbTf5SI72ccsdiwmFbz2/9db7f2afe5ea64d3f18f6872e1520ff6/9781546154419_03__1___1_.jpg","details":{"size":790824,"image":{"width":2133,"height":1600}},"fileName":"9781546154419_03 (1) (1).jpg","contentType":"image/jpeg"}}},{"contentfulId":"3celz26vhMmlt6PMnkWnoY","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-01T10:13:18.848Z","updatedAt":"2025-09-01T10:13:18.848Z","_updatedAt":"2025-09-01T10:13:18.848Z","entryTitle":"ARTICLE-15-exciting-things-we-learnt-in-the-back-to-hogwarts-showcase-2025-TEXTSECTION-11","text":"The fourth Harry Potter story has been brought to life once more with this stunning interactive edition, containing over 150 full-colour illustrations and some exceedingly clever papercraft.  \n\n[Available 14th October, pre-order globally from Bloomsbury (excluding the US)](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.bloomsbury.com%2Fuk%2Fharry-potter-and-the-goblet-of-fire-interactive-illustrated-edition-9781526691262%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DBloomsbury%26utm_content%3Dbthshowcasewrap2025) \n\n[Or pre-order from Scholastic if you’re in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.scholastic.com%2Fharrypotter%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DScholastic%26utm_content%3Dbthshowcasewrap2025)\n\n\u003cspan id=\"gamingnews\"\u003e\u003c/span\u003e\n__Your gaming adventure__\n\n## Look out for new additions to Harry Potter: Puzzles \u0026 Spells "},{"contentfulId":"2eRusXM0poGDmnnXMgqheB","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-09-01T10:13:22.945Z","updatedAt":"2025-09-01T10:13:22.945Z","_updatedAt":"2025-09-01T10:13:22.945Z","entryTitle":"puzzles-and-spells-showcase-web","image":{"contentfulId":"4KilCVEzeXyBkPAJMsmdhY","type":"Asset","contentTypeId":"asset","createdAt":"2025-08-31T17:33:19.039Z","updatedAt":"2025-08-31T17:33:19.039Z","_updatedAt":"2025-08-31T17:33:19.039Z","revision":1,"locale":"en-GB","title":"puzzles-and-spells-showcase-web","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4KilCVEzeXyBkPAJMsmdhY/4ad6d97f4976b834c82cd2a5175e921f/puzzles-and-spells-showcase-web.jpg","details":{"size":349310,"image":{"width":1920,"height":1080}},"fileName":"puzzles-and-spells-showcase-web.jpg","contentType":"image/jpeg"}}},{"contentfulId":"5K4MZNpVbB76RDouxx9sBD","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-01T10:13:26.286Z","updatedAt":"2025-09-01T10:13:26.286Z","_updatedAt":"2025-09-01T10:13:26.286Z","entryTitle":"ARTICLE-15-exciting-things-we-learnt-in-the-back-to-hogwarts-showcase-2025-TEXTSECTION-12","text":"We adore the whimsical features that bubble up in Harry Potter: Puzzles and Spells, the addictive mobile game that invites you to battle your way through colourful challenges. The showcase revealed that players are about to face their biggest yet with the Battle of Hogwarts – the biggest Club Challenge to date! Solve puzzles to grow in power to defeat your foes and prove the importance of teamwork as you band together with other clubs to fight for the light.  \n\n[Download the app here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.zynga.com%2Fgames%2Fharry-potter-puzzles-and-spells%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3Dmobilegames%26utm_content%3Dbthshowcasewrap2025)\n\n## A new year begins with Harry Potter: Hogwarts Mystery "},{"contentfulId":"1d31WfZze5HKRJOGSt3A1h","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-08-31T17:34:52.619Z","updatedAt":"2025-08-31T17:34:52.619Z","_updatedAt":"2025-08-31T17:34:52.619Z","entryTitle":"HPHM-harvest-feature-web-landscape ","image":{"contentfulId":"44QbQKWAeGqqO5KrKXRx6T","type":"Asset","contentTypeId":"asset","createdAt":"2025-05-23T11:19:27.514Z","updatedAt":"2025-05-23T11:19:27.514Z","_updatedAt":"2025-05-23T11:19:27.514Z","revision":1,"locale":"en-GB","title":"HPHM-harvest-feature-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/44QbQKWAeGqqO5KrKXRx6T/15a928911140ad5cf4e8d46fb8d144ae/HP_1606455906_EN_1920x1080_April25_CGBanners_PlantCare__1_.jpg","details":{"size":364293,"image":{"width":1920,"height":1080}},"fileName":"HP_1606455906_EN_1920x1080_April25_CGBanners_PlantCare (1).jpg","contentType":"image/jpeg"}}},{"contentfulId":"4sC0i2uu5MH5rWZHKC0oUV","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-01T10:13:29.450Z","updatedAt":"2025-09-01T10:13:29.450Z","_updatedAt":"2025-09-01T10:13:29.450Z","entryTitle":"ARTICLE-15-exciting-things-we-learnt-in-the-back-to-hogwarts-showcase-2025-TEXTSECTION-13","text":"We love how we can immerse ourselves in our own wizarding mystery with this mobile game. From fresh adventures to locations we haven’t seen before, and not forgetting an entire Dark Arts month just in time for spooky season, we are excited to see that there are plenty of new additions on the horizon. \n\n[Check the official website](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.warnerbros.com%2Fgames-and-apps%2Fharry-potter-hogwarts-mystery%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3Dmobilegames%26utm_content%3Dbthshowcasewrap2025) to download or simply learn more about this mobile game. \n\n\u003cspan id=\"experiencesnews\"\u003e\u003c/span\u003e\n__Exciting experiences__\n\n## All aboard the Harry Potter: A Hogwarts Express Adventure "},{"contentfulId":"52oTmYzAZdxziy2umUpOku","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-08-31T17:36:14.319Z","updatedAt":"2025-08-31T17:36:14.319Z","_updatedAt":"2025-08-31T17:36:14.319Z","entryTitle":"hogwarts-express-adventure-showcase-web","image":{"contentfulId":"1njHOm97XQsPHaSy2yyIyf","type":"Asset","contentTypeId":"asset","createdAt":"2025-08-31T17:36:10.866Z","updatedAt":"2025-08-31T17:36:10.866Z","_updatedAt":"2025-08-31T17:36:10.866Z","revision":1,"locale":"en-GB","title":"hogwarts-express-adventure-showcase-web","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1njHOm97XQsPHaSy2yyIyf/88b3ad4fa8f3594c3c7ebe3a4fe9ff1e/hogwarts-express-adventure-showcase-web.jpg","details":{"size":528299,"image":{"width":5472,"height":3648}},"fileName":"hogwarts-express-adventure-showcase-web.jpg","contentType":"image/jpeg"}}},{"contentfulId":"49DbQBRa7iBU1NL9SXoE8u","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-01T10:13:44.546Z","updatedAt":"2025-09-01T10:13:44.546Z","_updatedAt":"2025-09-01T10:13:44.546Z","entryTitle":"ARTICLE-15-exciting-things-we-learnt-in-the-back-to-hogwarts-showcase-2025-TEXTSECTION-14","text":"Every time we board a Muggle train, we just can’t help but wish it was a giant red steam engine, full of wizards and witches, awaiting our snacks from a roaming Trolley Witch. Oh, with the destination being Hogwarts, naturally. Well! Thanks to Harry Potter: A Hogwarts Express Adventure, you can experience something close to the magic. \n\nSet to hit the rails in 2026, we were delighted to see a behind-the-scenes snippet of what you can expect. From that special moment when the Hogwarts Express departs, to some friendly competitions with Hogwarts hosts – this will be a journey you’re unlikely to forget.  \n\n[Boarding in 2026 – find out more here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottertrainadventure.com%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DTR%26utm_content%3Dbthshowcasewrap2025)\n\n\u003cspan id=\"christmasiscoming\"\u003e\u003c/span\u003e\n__Christmas is coming!__"},{"contentfulId":"1LnttX3cRMt9ImFipuHf8L","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-09-01T10:13:42.031Z","updatedAt":"2025-09-01T10:13:42.031Z","_updatedAt":"2025-09-01T10:13:42.031Z","entryTitle":"shop","image":{"contentfulId":"2O6dQKQzV3uifGXPO5EeNI","type":"Asset","contentType 7:02.200Z","revision":1,"locale":"en-GB","title":"LEGO-Harry-Potter-2025-set-hogwarts-lifestyle","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2g507ScB4bTMrusuLXohr7/470ba47c5bf338f1a0c97063858abffc/76454_Lifestyle_envr__1_.jpg","details":{"size":325538,"image":{"width":2208,"height":1655}},"fileName":"76454_Lifestyle_envr (1).jpg","contentType":"image/jpeg"}}},{"contentfulId":"4y1NaUfhQBWeCLebPShPZL","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-05-30T10:45:35.906Z","updatedAt":"2025-05-30T10:53:42.869Z","_updatedAt":"2025-05-30T10:53:42.869Z","entryTitle":"new-lego-harry-potter-sets-for-summer-2025-text-section-2","text":"[Take a closer look](https://www.lego.com/product/hogwarts-castle-the-main-tower-76454)\n\nThe biggest minifigure-scale model yet of The Main Hogwarts Tower, this play-and-display set includes a trapdoor to escape from Fluffy and a swivelling staircase leading to Dumbledore’s Office. We love the drama of it!\n\n## Hogwarts™ Castle: Herbology Class"},{"contentfulId":"3q0yQLd7J5sUCyaxUcoXIB","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-05-30T10:14:13.909Z","updatedAt":"2025-05-30T10:14:13.909Z","_updatedAt":"2025-05-30T10:14:13.909Z","entryTitle":"LEGO-Harry-Potter-2025-herbology","image":{"contentfulId":"7Gl7IxtojHKVprS4wzSLq8","type":"Asset","contentTypeId":"asset","createdAt":"2025-05-30T10:14:11.418Z","updatedAt":"2025-05-30T10:14:11.418Z","_updatedAt":"2025-05-30T10:14:11.418Z","revision":1,"locale":"en-GB","title":"LEGO-Harry-Potter-2025-herbology","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7Gl7IxtojHKVprS4wzSLq8/64f285c560b004e1986471df49bb243f/b2ce2ef7-7770-4008-9803-2488ded553b4.jpg","details":{"size":401807,"image":{"width":2560,"height":1919}},"fileName":"b2ce2ef7-7770-4008-9803-2488ded553b4.jpg","contentType":"image/jpeg"}}},{"contentfulId":"4f3XoO0MW1MTmaPyy0K410","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-05-30T10:40:09.798Z","updatedAt":"2025-05-30T10:54:38.683Z","_updatedAt":"2025-05-30T10:54:38.683Z","entryTitle":"new-lego-harry-potter-sets-for-summer-2025-text-section-3","text":"[GROW your LEGO collection](https://www.lego.com/product/hogwarts-castle-herbology-class-76445) \n\nEmbrace your green thumb with this adorable Herbology classroom playset, complete with LEGO Mandrakes and Neville Longbottom, Hermione Granger and Professor Sprout minifigures. The buildable greenhouse opens up to reveal the whole scene, resplendent with magical plants.\n\n## Book Nook: Hogwarts™ Express"},{"contentfulId":"70f5fPwZ1PO0Pg1md0MM87","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-05-30T10:17:08.154Z","updatedAt":"2025-05-30T10:17:08.154Z","_updatedAt":"2025-05-30T10:17:08.154Z","entryTitle":"LEGO-Harry-Potter-2025-Book-Nook","image":{"contentfulId":"5qSlDqrypDHhOAIb5oED5G","type":"Asset","contentTypeId":"asset","createdAt":"2025-05-30T10:17:05.507Z","updatedAt":"2025-05-30T10:17:05.507Z","_updatedAt":"2025-05-30T10:17:05.507Z","revision":1,"locale":"en-GB","title":"LEGO-Harry-Potter-2025-Book-Nook","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5qSlDqrypDHhOAIb5oED5G/ea4d0c113e41aa1c8f9a14fb2aeeb999/9aa8b222-edcf-43b5-bec0-d92e7e314fa5.jpg","details":{"size":403969,"image":{"width":2560,"height":1919}},"fileName":"9aa8b222-edcf-43b5-bec0-d92e7e314fa5.jpg","contentType":"image/jpeg"}}},{"contentfulId":"69CvZO6sweoHtFAITQftep","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-05-30T10:39:47.667Z","updatedAt":"2025-05-30T12:48:38.493Z","_updatedAt":"2025-05-30T12:48:38.493Z","entryTitle":"new-lego-harry-potter-sets-for-summer-2025-text-section-4","text":"[Choo choo choose this one?](https://www.lego.com/product/book-nook-hogwarts-express-76450)\n\nThis buildable [Hogwarts Express](https://www.harrypotter.com/fact-file/magical-miscellany/hogwarts-express) set is for all the bookworms out there – you can display the iconic steam engine on your bookshelves to hold together all of your favourite tomes. \n\nAlongside the scarlet train itself, you’ll find a selection of LEGO figures: Harry Potter, Ron Weasley, and their pets Hedwig and Scabbers.\n\n## Chomping Monster Book of Monsters\n"},{"contentfulId":"4nKrxnnkDpdZVzsDvoWXEn","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-05-30T10:19:18.723Z","updatedAt":"2025-05-30T10:19:18.723Z","_updatedAt":"2025-05-30T10:19:18.723Z","entryTitle":"LEGO-Harry-Potter-2025-Monster-Book-of-Monsters-Chomping","image":{"contentfulId":"1m92OSdfIEs8HyZxc0BgrP","type":"Asset","contentTypeId":"asset","createdAt":"2025-05-30T10:19:15.962Z","updatedAt":"2025-05-30T10:19:15.962Z","_updatedAt":"2025-05-30T10:19:15.962Z","revision":1,"locale":"en-GB","title":"LEGO-Harry-Potter-2025-Monster-Book-of-Monsters-Chomping","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1m92OSdfIEs8HyZxc0BgrP/5434ed20b61be2f78795746e06ed0f55/76449_WEB_PRI.jpg","details":{"size":2023314,"image":{"width":3641,"height":2048}},"fileName":"76449_WEB_PRI.jpg","contentType":"image/jpeg"}}},{"contentfulId":"5jVMjFxntYdOS6NCJTWX4q","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-05-30T10:33:47.824Z","updatedAt":"2025-05-30T10:33:55.615Z","_updatedAt":"2025-05-30T10:33:55.615Z","entryTitle":"new-lego-harry-potter-sets-for-summer-2025-text-section-5","text":"[Snap it up!](https://www.lego.com/product/chomping-monster-book-of-monsters-76449)\n\nThis LEGO creation comes with an extra bite – it’s your very own Monster Book of Monsters, now immortalised in LEGO bricks. And oh yes, the clue is in the title here: this one actually chomps. Thanks to its secret wheels and a pull-back function, you can watch in awe as your Care of Magical Creatures textbook goes on a crunching crusade.\n\nAn adorable Neville Longbottom minifigure (holding his own teeny tiny version of the book!!) is also included.\n\n## Privet Drive: Aunt Marge’s Visit \n"},{"contentfulId":"2hR7ai4n3VoXAP2BWJwuvz","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-05-30T10:21:08.378Z","updatedAt":"2025-05-30T10:21:08.378Z","_updatedAt":"2025-05-30T10:21:08.378Z","entryTitle":"LEGO-Harry-Potter-2025-Aunt-Marge-Privet-Drive","image":{"contentfulId":"3RFYx5BgouShfWItTDqkaH","type":"Asset","contentTypeId":"asset","createdAt":"2025-05-30T10:21:05.302Z","updatedAt":"2025-05-30T10:21:05.302Z","_updatedAt":"2025-05-30T10:21:05.302Z","revision":1,"locale":"en-GB","title":"LEGO-Harry-Potter-2025-Aunt-Marge-Privet-Drive","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3RFYx5BgouShfWItTDqkaH/61784df79aee5a08e2e836a770ba7f56/76451_WEB_PRI__1_.jpg","details":{"size":673350,"image":{"width":3641,"height":2048}},"fileName":"76451_WEB_PRI (1).jpg","contentType":"image/jpeg"}}},{"contentfulId":"nS61313rADqtAA2tYSAPx","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-05-30T10:35:12.318Z","updatedAt":"2025-05-30T10:56:16.420Z","_updatedAt":"2025-05-30T10:56:16.420Z","entryTitle":"new-lego-harry-potter-sets-for-summer-2025-text-section-6","text":"[Rescue Marge!](https://www.lego.com/product/privet-drive-aunt-marge-s-visit-76451)\n\nLook at her go! This set immortalises the moment that Harry accidentally 'blows up' his callous aunt during *Harry Potter and the Prisoner of Azkaban.*\n\nMinifigures (alongside a floating Marge, naturally) include Vernon Dursley, Petunia Dursley, Dudley Dursley, Harry Potter - and even Ripper the dog!\n\n## Fawkes™: Dumbledore's Phoenix"},{"contentfulId":"6sS7pi61KoYhQclKZuTnJc","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-05-30T10:26:25.307Z","updatedAt":"2025-05-30T10:26:25.307Z","_updatedAt":"2025-05-30T10:26:25.307Z","entryTitle":"LEGO-Harry-Potter-2025-fawkes-the-phoenix","image":{"contentfulId":"ZQ7EleUgrdt4pCduOs6RE","type":"Asset","contentTypeId":"asset","createdAt":"2025-05-30T10:26:16.601Z","updatedAt":"2025-05-30T10:26:16.601Z","_updatedAt":"2025-05-30T10:26:16.601Z","revision":1,"locale":"en-GB","title":"LEGO-Harry-Potter-2025-fawkes-the-phoenix","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/ZQ7EleUgrdt4pCduOs6RE/ad77ebd307ca034dbf483ad088146c9f/9c7e5381-ae4e-4803-85aa-f66c8675d611.jpg","details":{"size":475070,"image":{"width":2560,"height":2560}},"fileName":"9c7e5381-ae4e-4803-85aa-f66c8675d611.jpg","contentType":"image/jpeg"}}},{"contentfulId":"4tJs5ZNSp7sjwmK3Glb6Is","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-05-30T10:31:24.193Z","updatedAt":"2025-05-30T12:00:26.080Z","_updatedAt":"2025-05-30T12:00:26.080Z","entryTitle":"new-lego-harry-potter-sets-for-summer-2025-text-section-7","text":"[Pick him up here.](https://www.lego.com/product/fawkes-dumbledore-s-phoenix-76448)\n\nWe've always been jealous of Professor Dumbledore's fiery companion, Fawkes. But now - you can have your very own phoenix in YOUR office too!\n\nComplete with a brick-built Sword of Gryffindor and Sorting Hat, this set perfectly complements the iconic scenes from *Harry Potter and the Chamber of Secrets.*\n\n***\n\nOkay, we love all of these sets so much. How are we supposed to choose? Accio more Galleons, please? \n\n__You can visit the [main Harry Potter LEGO hub](https://www.lego.com/en-gb/themes/harry-potter) to check out all of the magical creations.__\n\n*Products referred to in this article are offered for sale by The LEGO® Group and are subject to availability. Before purchasing from LEGO, you will need to agree to their terms of purchase which you can find on the LEGO website. Any issues with your purchase should be directed to customer services teams at LEGO – you can find contact information on their website.*  "}],"publishDate":"2025-05-30T00:00+01:00"},{"contentfulId":"6dFG0iTG2t8EhWJGxx2CzW","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"article","createdAt":"2025-08-04T10:37:20.952Z","updatedAt":"2025-08-05T10:36:16.995Z","_updatedAt":"2025-08-05T10:36:16.995Z","entryTitle":"WEB-gift-guide-bth-2025","eyebrow":"DIAGON ALLEY VIBES","displayTitle":"Your Back to Hogwarts gift guide for 2025","activationDate":"2025-08-04T00:00+01:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"back-to-hogwarts-gift-guide-2025","mainImage":{"contentfulId":"3QIFPXKgnByGvQCDgjeg7H","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-07-25T11:42:56.986Z","updatedAt":"2025-07-25T11:42:56.986Z","_updatedAt":"2025-07-25T11:42:56.986Z","entryTitle":"HP-shop-hogwarts-robes-lifestyle-web-landscape","image":{"contentfulId":"6LE9SN3CXXazPffofQJW9g","type":"Asset","contentTypeId":"asset","createdAt":"2025-07-25T11:42:49.215Z","updatedAt":"2025-07-25T11:42:49.215Z","_updatedAt":"2025-07-25T11:42:49.215Z","revision":1,"locale":"en-GB","title":"HP-shop-hogwarts-robes-lifestyle-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6LE9SN3CXXazPffofQJW9g/c0182fe9817c79a3d8122189d8a8a393/HP-shop-hogwarts-robes-lifestyle-web-landscape.png","details":{"size":1024896,"image":{"width":1000,"height":667}},"fileName":"HP-shop-hogwarts-robes-lifestyle-web-landscape.png","contentType":"image/png"}}},"intro":"It’s Back to Hogwarts season and you know what that means – it’s the ideal time to celebrate and find the perfect present for your favourite Harry Potter fan! From Diagon Alley essentials to the fluffiest Pygmy Puff, we have all sorts of gift ideas for you…","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"5e8xDWCcBspUdUy9LaH25y","type":"Entry","revision":16,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-08-04T10:01:32.684Z","updatedAt":"2025-08-30T09:00:11.194Z","_updatedAt":"2025-08-30T09:00:11.194Z","entryTitle":"bth-gift-guide-2025-text-section-1","text":"__Which fan are you looking for?__\n\u003cspan id=\"top\"\u003e\u003c/span\u003e\n\u003cbr\u003e[Enjoy limited-time magical deals](#magicaldeals) \u003cbr\u003e\n[Celebrate Back to Hogwarts](#celebratebth) \u003cbr\u003e\n[Back to school essentials – wizarding style](#backtoschool) \u003cbr\u003e\n[For kids – must haves for the young witch or wizard](#forkids) \u003cbr\u003e\n[For fashionistas – magical looks](#forfashionistas)\u003cbr\u003e\n[For bookworms – channel your inner Hermione](#forbookworms) \u003cbr\u003e \n\u003cbr\u003e\nEvery year, on 1st September, Harry Potter fans from around the world gather to celebrate the magical moment when the Hogwarts Express sets off, taking young witches and wizards Back to Hogwarts. While we might not be heading off to the famous wizarding school, that doesn’t mean we can’t treat ourselves to some Back to Hogwarts goodies. From kids to fashionistas and to those who have been here since 1997, no matter the Harry Potter fan, we have you covered… \n\n\u003cspan id=\"magicaldeals\"\u003e\u003c/span\u003e\n# Enjoy limited-time magical deals\n\n### Get up to 80% off Harry Potter games\n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwarnerbrosgames.com%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/6NzUCnLbrL6rc94umKpqCA/905777de6a2bb0e04e59d58773ee046d/BTH-2025-gift-guide-games-offer.png\" \n       alt=\"The Hogwarts Legacy, Harry Potter: Quidditch Champions and the LEGO® Harry Potter collection covers\"/\u003e\n\u003c/a\u003e\n\nOne for all you gamers out there! Until 1st September, you can get up to 80% off on Hogwarts Legacy, Harry Potter: Quidditch Champions and the LEGO® Harry Potter collection. \\*** Whether you’re gambolling through the Scottish Highlands, taking to the skies on a broomstick or journeying (LEGO® style) through the Harry Potter stories – become the hero of your own wizarding world adventure. \\**\n\u003cbr\u003e\n\n[Discover your next great game here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwarnerbrosgames.com%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Find fantastic deals on Amazon\n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.co.uk%2Fstores%2Fpage%2FCBEB1362-DF53-4FA1-BE96-0753AB848AFB%2Fref%3Dacseu24_4%3Fpf_rd_r%3DS1H0KCRDDMP3T2E07FJY%26pf_rd_p%3Dd5d0c5ed-6823-4f99-bb85-6929d28cb394%26pf_rd_m%3DA3P5ROKL5A1OLE%26pf_rd_s%3Dmerchandised-search-4%26pf_rd_t%3D%26pf_rd_i%3D100549035031%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/1t1uXEDNAZjIxbxKBYnW5m/8a61222342bcf65fdff561ed9ab794b6/BTH-gift-guide-2025-lego-book-of-monsters.png\" \n       alt=\"The LEGO Monster Book of Monsters fully built\"/\u003e\n\u003c/a\u003e\n\nOver on Amazon, they’re celebrating Back to Hogwarts with some great savings on a fantastic range of Harry Potter toys and merchandise until 7th September. Build your own magic with Harry Potter LEGO®.  Show off your superfan status with an excellent T-shirt. Earn some serious cool points from the kid in your life by gifting them an excellent toy – and so much more. \\**\n\u003cbr\u003e\n\n[For fans in the UK](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.co.uk%2Fstores%2Fpage%2FCBEB1362-DF53-4FA1-BE96-0753AB848AFB%2Fref%3Dacseu24_4%3Fpf_rd_r%3DS1H0KCRDDMP3T2E07FJY%26pf_rd_p%3Dd5d0c5ed-6823-4f99-bb85-6929d28cb394%26pf_rd_m%3DA3P5ROKL5A1OLE%26pf_rd_s%3Dmerchandised-search-4%26pf_rd_t%3D%26pf_rd_i%3D100549035031%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[For fans in France](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.fr%2Fstores%2Fpage%2F78D50F84-AB25-4797-86F9-C558ECB1DAE6%3Fingress%3D0%26visitId%3Dd425c0ea-8880-4207-bbae-fa42d76b4569%26lp_query%3Dharry%2Bpotter%26lp_slot%3Dauto-sparkle-hsa-tetris%26store_ref%3DSB_A10430422DZC5UVO9IYXR%26ref_%3Dsbx_be_s_sparkle_lsi4d_hl%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[For fans in Germany](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.de%2Fstores%2Fpage%2F52C9AA9C-43E9-477D-AF49-06EA65471917%3Fingress%3D3%26visitId%3Dff46de73-0036-48a1-b04e-39a2cb60a24f%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[For fans in Italy](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.it%2Fstores%2Fpage%2FFC2AA5D3-158B-4163-8278-AF059051C04E%3Fingress%3D0%26visitId%3D9828d672-70b7-4ed3-b97b-fade639ec9ef%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[For fans in Spain](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.es%2Fstores%2Fpage%2FB055DC48-6A8E-4B62-B397-EE602AA0BBCD%3Fchannel%3Dbth25_wiwo_giftguide%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n\u003cspan id=\"celebratebth\"\u003e\u003c/span\u003e\n# Celebrate Back to Hogwarts \n\n### Back to Hogwarts collection | Harry Potter Shop \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Fback-to-hogwarts%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/17rgamnDTObFNnMMpcqYvm/88677aabc2998c38c584c3a5f3d84d43/BTH-2025-gift-guide-back-to-hogwarts-collection-hp-shop.jpg\" \n       alt=\"An open Hogwarts trunk with green and gold Back to Hogwarts items\"/\u003e\n\u003c/a\u003e\n\nWith the golden castle shining against a backdrop of green, go Back to Hogwarts in style with this fantastic collection from the Harry Potter Shop. From subtle socks to terrific t-shirts, you can celebrate from top to toe with this exclusive range of clothing, homeware and collectibles. \\*  \n\u003cbr\u003e\n[Shop here in the UK](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Fback-to-hogwarts%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[Shop here in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.com%2Fcollections%2Fback-to-hogwarts%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[Shop here for Japan](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.jp%2Fcollections%2Fback-to-hogwarts%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n\u003cspan id=\"backtoschool\"\u003e\u003c/span\u003e\n# Back to school essentials – wizarding style  \n\n### Personalised Hogwarts house robes | Harry Potter Shop  \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Fhogwarts-house-robes%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/focG9YLX14xxDckq6UQHG/6282d81a8cd14d76d01785652e6d0d28/BTH-2025-gift-guide-hp-shop-robes.jpg\" \n       alt=\"Four students wear each of the Hogwarts house robes\"/\u003e\n\u003c/a\u003e\n\nIt wouldn’t be the start of term without a fresh set of iconic Hogwarts robes. While we don’t have Madam Malkin’s, you can find a set of your own at the Harry Potter Shop. Feel like a true member of your house and wear your house colours and emblem with pride! Plus, to make them completely unique, you can have yours personalised with a special word that sits underneath the Hogwarts crest. \\*  \n\u003cbr\u003e\n[Click here if you’re in the UK](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Fhogwarts-house-robes%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[Or here in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.com%2Fcollections%2Fhogwarts-house-robes%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[Or here for Japan](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.jp%2Fcollections%2Fhogwarts-house-robes%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Hogwarts trunks | Harry Potter Shop \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Ftrunks%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/1H4nJC6iiz4lXrCnHgg6fK/8bbcebbb5b008c40ab4f04fe79b28dcd/BTH-2025-gift-guide-hogwarts-trunks-hp-shop.jpg\" \n       alt=\"A pile of different Hogwarts trunks on a lawn\"/\u003e\n\u003c/a\u003e\n\nFrom textbooks to cauldrons and not forgetting that spare pair of socks – becoming a witch or wizard involves a lot of equipment! Luckily, the students have their trunks to carry it all. Over at the Harry Potter Shop, you can find a whole range of these carefully crafted trunks. Filled with exclusive items, from wands to house-themed woolly hats, and with the option to have it personalised, they’d make a fantastic gift for the superfan in your life… especially if that superfan is you! \\*\n\u003cbr\u003e\n\n[UK fans shop here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Ftrunks%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[US fans can find more here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.com%2Fcollections%2Ftrunks%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[And fans in Japan can find more here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.jp%2Fcollections%2Ftrunk-station%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Goblet of Fire wand | Harry Potter Shop \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fproducts%2Fgoblet-of-fire-wand%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/2WIpyljZZgSAAhjHNTTr6Q/c4948ae11f6aad82e683b2f0152f655f/BTH-2025-gift-guide-goblet-of-fire-wand-hp-shop.jpg\" \n       alt=\"A Beauxbatons student holding a wand with a blue handle\"/\u003e\n\u003c/a\u003e\n\nThey say the wand chooses the wizard – will this exclusive Celebration Wand choose you? To celebrate 20 years since *Harry Potter and the Goblet of Fire* hit our screens, this elegant wand with blue flames has been inspired by the magical artifact that set the Triwizard Tournament in motion. With an intricate design, if you look closely, you might just spot a carved maze woven into the structure. The perfect collector’s wand for this anniversary year. \\*\n\u003cbr\u003e\n\n[For the fans in the UK](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fproducts%2Fgoblet-of-fire-wand%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[For fans in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.com%2Fproducts%2Fgoblet-of-fire-wand%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[For fans in Japan](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.jp%2Fproducts%2Fgoblet-of-fire-wand%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### The Celebration Wand for Harry Potter’s birthday | Noble Collection© \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fnoblecollection.co.uk%2Fproduct%2Fharry-potter-celebration-wand-2025%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/46frV5SqEDt2Y8eO95Zq1D/6a556f60b57774a8044e8e872a3f5dbd/BTH-2025-gift-guide-noble-collection-patronus-wand.jpg\" \n       alt=\"A blue and silver wand on a stand with a sign that says Expecto Patronum\"/\u003e\n\u003c/a\u003e\n\nWith the theme of celebration in mind, this new wand exclusively created for another momentous wizarding world moment, Harry Potter’s birthday, would be an excellent Back to Hogwarts gift. With a graceful design, inspired Harry’s Stag Patronus, you’ll have to be quick – this limited time wand by the Noble Collection is only available for one year. \\**\n\u003cbr\u003e\n\n[Shop here in the UK](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fnoblecollection.co.uk%2Fproduct%2Fharry-potter-celebration-wand-2025%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n\u003cspan id=\"forkids\"\u003e\u003c/span\u003e\n# For kids – must haves for the young witch or wizard \n\n### Hogsmeade Village Collectors’ Edition | LEGO®\n\n  \u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.lego.com%2Fen-gb%2Fproduct%2Fhogsmeade-village-collectors-edition-76457%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/7CDks0WAdY3S93CUHgfu6S/89375220130e7cc015dfa15caeeafbea/BTH-2025-gift-guide-lego-hogsmeade-collectors-edition.png\" \n       alt=\"A built LEGO Hogsmeade Collectors Edition on a table in front of smiling woman\"/\u003e\n\u003c/a\u003e\n\nIt wouldn’t feel like we had truly returned to Hogwarts without a trip to Hogsmeade. What if you could bring the wizarding village into your own living room? Well, as The LEGO Group have excitingly revealed their new Hogsmeade Village Collectors’ Edition, you’ll soon be able to. Featuring some of our favourite locations, from the colourful Honeydukes to the cosy Three Broomsticks (all complete with delightful snow-capped roofs), we think this would be a wise choice as a gift for the young Harry Potter fan in your life. \\**\n\u003cbr\u003e\n\nAvailable to own from 4th September, [find out more about this set here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.lego.com%2Fen-gb%2Fproduct%2Fhogsmeade-village-collectors-edition-76457%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025)\n\n### Harry Potter plushies | Squishmallows™️\n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.com%2Fstores%2Fpage%2F821A8D15-A36B-4FC8-A2BF-CF43BA5BED61%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/35RUymyW0vaACnBfNmsRJa/43776dad12fea88eee1bb62f6a561097/BTH-2025-gift-guide-buckbeak-squishmallow.jpg\" \n       alt=\"A cuddly Buckbeak Squishmallow plushie\"/\u003e\n\u003c/a\u003e\n\nOh, how we would love to squish these Squishmallows. We’ve never seen Buckbeak look more adorable – or Snape so friendly. These new Harry Potter plushies are the cutest and cuddliest companions for the kid in your life. \\**\n\u003cbr\u003e\n\n[Discover more here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.com%2Fstores%2Fpage%2F821A8D15-A36B-4FC8-A2BF-CF43BA5BED61%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Interactive Pygmy Puff | Harry Potter Shop \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fproducts%2Finteractive-pygmy-puff-plush-pet%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/34bAItX4Vfees8N1MbYxQs/8a3948d03a98416fc6c2e16e766c18f4/BTH-2025-gift-guide-interactive-pygmy-puff.jpg\" \n       alt=\"A pink interactive Pygmy Puff in its packaging\"/\u003e\n\u003c/a\u003e\n\nThe pink fluff! The adorable noises! The tiny ears! We totally understand why Ginny Weasley chose a Pygmy Puff as a pet. Not only does this interactive Pygmy Puff Plush Pet have over 35 extremely cute sounds, but it also responds to your touch – bringing its playful personality to life. Available from the Harry Potter Shop, this would be a charming and kid-friendly gift. \\*\n\u003cbr\u003e\n[For fans in the UK](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fproducts%2Finteractive-pygmy-puff-plush-pet%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e \n\n### ©Steiff Harry Potter collection | Harry Potter Shop \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Fsoft-toys%2Fsteiff%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/mnFYVp40UuZQk2Fxn2VOu/47e7c04dd783a8815a54ae438275b960/BTH-2025-gift-guide-steiff-plush-toys-hp-shop.jpg\" \n       alt=\"The four Steiff plushies in front of Hogwarts\"/\u003e\n\u003c/a\u003e\n\nEvery young Harry Potter fan deserves a magical friend who makes every day an epic story – these new plush companions from the Harry Potter collection by Steiff do just that. Carefully crafted, these little versions of Harry, his Patronus, Dobby and Hedwig are soft, huggable and ready for all sorts of adventures. \\*\n\u003cbr\u003e\n[If you’re in the UK](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Fsoft-toys%2Fsteiff%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[And if you’re in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.com%2Fcollections%2Fsoft-toys%2Fsteiff%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025)  \u003cbr\u003e\n[Or Japan](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.jp%2Fcollections%2Fsoft-toys%2Fsteiff%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Harry Potter Bitzee™️ | Spinmaster® \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.com%2FWizarding-World-Interactive-Characters-Digital%2Fdp%2FB0DSCJ49Y9%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/6eIaMO6UdIKZt5s9o6AHqA/a6c1343109b9d20dd9a0ab676c344f1b/BTH-2025-gift-guide-spinmaster-bitzee.jpg\" \n       alt=\"An open Bitzee with digital cartoon version of Harry Potter\"/\u003e\n\u003c/a\u003e\n\nIt’s a long old journey on the Hogwarts Express – the students could have done with the new Harry Potter Bitzee to keep them entertained from King’s Cross to Hogsmeade! This small pod, with eye-catching golden Hogwarts crest, contains a whole world of magic. With spells to cast, characters to collect and games to play, we think this would be a fun gift for the new generation of fans. \\**\n\u003cbr\u003e\n\n[Take a look](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.com%2FWizarding-World-Interactive-Characters-Digital%2Fdp%2FB0DSCJ49Y9%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Make it Mini Back to Hogwarts | ©MGA’s Miniverse  \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fshop.mgae.com%2Fcollections%2Fmgas-miniverse-harry-potter%2Fproducts%2Fmgas-miniverse-make-it-mini-back-to-hogwarts%25E2%2584%25A2-harry-potter%25E2%2584%25A2-mini-collectibles%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/2c4iIvThB4Ye9zkjlipncN/26f037ecade1294b50d40eba10f596e0/BTH-2025-gift-guide-mgas-make-it-mini-back-to-hogwarts.jpg\" \n       alt=\"A Make It Mini Ball surrounded by possible items you can get\"/\u003e\n\u003c/a\u003e\n\nIf you know a young Harry Potter fan with a creative streak, then we think they would enjoy the new Make It Mini Back to Hogwarts range. With 12 to collect, they can recreate and display their favourite items from the Harry Potter films – from the Nimbus 2000 to the Gryffindor scarf. Plus, for an extra fun twist, each one is a complete surprise! Will they discover them all? \\**\n\u003cbr\u003e\n\n[Shop here in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fshop.mgae.com%2Fcollections%2Fmgas-miniverse-harry-potter%2Fproducts%2Fmgas-miniverse-make-it-mini-back-to-hogwarts%25E2%2584%25A2-harry-potter%25E2%2584%25A2-mini-collectibles%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n\u003cspan id=\"forfashionistas\"\u003e\u003c/span\u003e\n# For fashionistas – magical style \n\n### Breanna Stewart x Harry Potter | Puma \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fus.puma.com%2Fus%2Fen%2Fcollaborations%2Fpartnerships%2Fharry-potter%25E2%2584%25A2%3Fsrsltid%3DAfmBOoolFOctL0ZbKrkQy-G9kPTcIa6w-M2-FI1cl3YbPZvwQ298YLTT%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/3BEqJGwOnR6fiSrC3CR6jO/9f4b6e51b6519b982e364c9a1f72300f/BTH-2025-gift-guide-breanna-stewart-puma.jpg\" \n       alt=\"Breanna Stewart in the Puma Harry Potter range sat down and throwing a basketball\"/\u003e\n\u003c/a\u003e\n\nThis new Breanna Stewart drop is a magical mashup of streetwear and sorcery. With everything from hoodies to joggers and some brilliant basketball shoes – inspired by Hedwig and Nagini – this range is perfect for the most stylish Harry Potter fan.\n\nPlus, for the Gryffindors and Slytherins, your Quidditch uniforms have been reimagined into something extremely cool – check it out. \\**\n\u003cbr\u003e\n\n[Discover more](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fus.puma.com%2Fus%2Fen%2Fcollaborations%2Fpartnerships%2Fharry-potter%25E2%2584%25A2%3Fsrsltid%3DAfmBOoolFOctL0ZbKrkQy-G9kPTcIa6w-M2-FI1cl3YbPZvwQ298YLTT%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Harry Potter collection | Vera Bradley® \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fverabradley.com%2Fcollections%2Fharry-potter-collection%3FproductListFilters%3D%26productListPgNo%3D1%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/78CWQXvOO50jb6Pa35EGul/f57e3c6498afd31a12c97360c8b334a0/BTH-2025-gift-guide-vera-bradley.jpg\" \n       alt=\"Three handbags from the Harry Potter collection on a white background\"/\u003e\n\u003c/a\u003e\n\nIf your most fashion-forward friend is also a fan of Hermione Granger, then they will adore the new collection from Vera Bradley. Inspired by the Hogwarts Library, this collection of bags and accessories celebrates the magic of learning and the thrill of discovery. \\**\n\u003cbr\u003e\n\n[For fans in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fverabradley.com%2Fcollections%2Fharry-potter-collection%3FproductListFilters%3D%26productListPgNo%3D1%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n\u003cspan id=\"forbookworms\"\u003e\u003c/span\u003e\n# For bookworms – channel your inner Hermione \n\n### Pocket Potters: Little guides to the Harry Potter stories | ©Bloomsbury \u0026 ©Scholastic \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.bloomsbury.com%2Fuk%2Fdiscover%2Fsuperpages%2Fharry-potter%2Fpocket-potters-pre-order-offer%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DBloomsbury%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/36QV30pFAC8GBQoR2FStC7/be283b71d551d1bc560cf56cb5c32e0f/BTH-2025-gift-guide-pocket-potters-book-covers-trio.png\" \n       alt=\"The Harry, Ron and Hermione covers of Pocket Potters\"/\u003e\n\u003c/a\u003e\n\nPacked full of favourite story moments, must-know spells and unforgettable pets, these cute companion books are a great gift for the reader in your life. With each book coming with its own unique illustrator, dive deeper into the wizarding world and explore your favourite characters. All available for pre-order, the first three Harry Potter, Ron Weasley and Hermione Granger are set to be published in 2025 with Luna Lovegood and Professor Dumbledore arriving in 2026. \\** \n\u003cbr\u003e\n\n[Pre-order globally (except the US)](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.bloomsbury.com%2Fuk%2Fdiscover%2Fsuperpages%2Fharry-potter%2Fpocket-potters-pre-order-offer%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DBloomsbury%26utm_content%3Dbthgiftguide2025)  \u003cbr\u003e\n[Pre-order here in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fkids.scholastic.com%2Fkid%2Fbooks%2Fharry-potter%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DScholastic%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Harry Potter and the Goblet of Fire Interactive Edition | Bloomsbury \u0026 Scholastic  \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.bloomsbury.com%2Fuk%2Fharry-potter-and-the-goblet-of-fire-interactive-illustrated-edition-9781526691262%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DBloomsbury%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/iKq7ISBSRuVCdhxNEOv43/c57496c2b12d15df117c247f9470bd66/BTH-2025-gift-guide-goblet-of-fire-interactive-edition.png\" \n       alt=\"The front cover of the Hary Potter and the Goblet of Fire Interactive Edition\"/\u003e\n\u003c/a\u003e\n\nThe fourth Harry Potter story has been brought to life once more with this stunning interactive edition, containing over 150 full-colour illustrations and some exceedingly clever papercraft. Available from the 14th October, it would be the ideal present for a Harry Potter bookworm, especially since this year marks the 25th anniversary since *Goblet of Fire* was first published! \\** \n\u003cbr\u003e\n\n[Global (except US) pre-orders](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.bloomsbury.com%2Fuk%2Fharry-potter-and-the-goblet-of-fire-interactive-illustrated-edition-9781526691262%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DBloomsbury%26utm_content%3Dbthgiftguide2025)  \u003cbr\u003e\n[US pre-orders](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fkids.scholastic.com%2Fkid%2Fbooks%2Fharry-potter%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DScholastic%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n*** \n\nThese are just a few humble gift ideas from us to get you going. We hope you find something special for that aspiring wizard or witch in your life!\n\nBe sure to join us on 1st September for worldwide [Back to Hogwarts celebrations](http://harrypotter.com/back-to-hogwarts).\n\n\\* *The Harry Potter Shop is operated by Warner Bros. Studios Leavesden Limited. Before making any purchase from the shop, please ensure that you read and are happy to agree to their terms of purchase. Any issues with your purchase should be directed to Warner Bros. Studios Leavesden Limited-you can find the relevant contact information [here](https://harrypottershop.co.uk/pages/contact-us).*\n\n\\** *Certain products on this website are offered by third parties. Before purchasing those items, you will need to agree to the third party’s purchase terms and conditions. Please ensure you read their terms and conditions before making any purchase. Any issues with your purchase should be directed to the relevant third party.*\n\n\\*** *Discount available on PlayStation Store, Xbox Store, Nintendo eShop, and Steam. Based on WB Games’ SRP. See retailers for more details. Terms apply. Final pricing is at the discretion of the retailer.*"}],"shop":[{"contentfulId":"15mmHEbN2Q6hX5WV12MHfD","type":"collection","revision":43,"locale":"en-GB","contentTypeId":"shopRow","createdAt":"2023-10-05T13:08:16.970Z","updatedAt":"2026-02-02T12:22:18.947Z","_updatedAt":"2026-02-02T12:22:18.947Z","entryTitle":"Homepage Shop Row","externalId":"homepage-shop-row","title":"Browse the bestsellers from the Harry Potter Shop","description":"From exclusive collectibles to custom wands, discover these fan favourites - perfect for gifting, or to treat yourself! ","shopifyItemId
