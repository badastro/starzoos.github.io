image/png"}}},"intro":"Hey, what’s that sound? Yes! It’s the Hogwarts Express merrily chugging along for a new Back to Hogwarts season! From magic on Snapchat to film screenings across the world, find out how to celebrate all things Potter in the run up to 1st September.","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"5FXtAGlTFDsw7PeVlv1zVb","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:25.700Z","updatedAt":"2025-07-23T07:59:25.700Z","_updatedAt":"2025-07-23T07:59:25.700Z","entryTitle":"back-to-hogwarts-2025-text-section-1","text":"🚨 __Keep an eye on this page! It will magically update with more updates as and when we have them.__ 🚨 \n\nEvery year, on the 1st September, Hogwarts students return to the wonders of Hogwarts School of Witchcraft and Wizardry for a new year of start-of-term surprises. And here in our Muggle lives, we’ve taken that day under our wing and made it special for fans all across the globe every year. \n\nBut how is 2025 shaping up? Come and see all of the Hogwarts happenings."},{"contentfulId":"2NVjs6Jiw6Bx5gwkJutVhs","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-04-01T11:46:34.908Z","updatedAt":"2025-04-01T11:46:34.908Z","_updatedAt":"2025-04-01T11:46:34.908Z","entryTitle":"BTH-2025-key-art-landscape","image":{"contentfulId":"5LNArQZ8fJuj1HkO1Yl0r1","type":"Asset","contentTypeId":"asset","createdAt":"2025-04-01T11:46:32.120Z","updatedAt":"2025-04-01T11:46:32.120Z","_updatedAt":"2025-04-01T11:46:32.120Z","revision":1,"locale":"en-GB","title":"BTH-1-September-2025-key-art-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5LNArQZ8fJuj1HkO1Yl0r1/45745b5be4f050ac2088621567dc0f3a/HP_BTH25_AnnouncementTease_Static_Sept1_16x9.png","details":{"size":2184584,"image":{"width":1920,"height":1080}},"fileName":"HP_BTH25_AnnouncementTease_Static_Sept1_16x9.png","contentType":"image/png"}}},{"contentfulId":"O0M8iRC1Zj8TuRuUDSW3W","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:32.673Z","updatedAt":"2025-07-23T07:59:32.673Z","_updatedAt":"2025-07-23T07:59:32.673Z","entryTitle":"back-to-hogwarts-2025-text-section-2","text":"## First up... get ready for our Back to Hogwarts showcase\n\nWell, wait just a second now – we couldn’t celebrate Back to Hogwarts without a worldwide online showcase! So even if you can’t make any of these Harry Potter fan events below, you can log on with us at around 10.40 BST / 5.40 ET for our annual start-of-term announcements across Instagram, YouTube and TikTok for many magical surprises and news fresher than a recently-owl-delivered Daily Prophet. [You can subscribe to our YouTube channel right now to get ready.](https://www.youtube.com/@harrypotter?sub_confirmation=1)\n\n## It's the 20-year anniversary of Harry Potter and the Goblet of Fire!"},{"contentfulId":"6gUsy3EV8PX6BhYwKqBbc2","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-02-12T12:00:35.934Z","updatedAt":"2024-02-12T12:00:35.934Z","_updatedAt":"2024-02-12T12:00:35.934Z","entryTitle":"WB-HP-F4-goblet-of-fire-harry-potter-in-gryffindor-outfit-web-landscape","image":{"contentfulId":"4Zbo8zBFeRUtr473oxA9CN","type":"Asset","contentTypeId":"asset","createdAt":"2024-02-12T12:00:32.563Z","updatedAt":"2024-02-12T12:00:32.563Z","_updatedAt":"2024-02-12T12:00:32.563Z","revision":1,"locale":"en-GB","title":"WB-HP-F4-goblet-of-fire-harry-potter-in-gryffindor-outfit-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4Zbo8zBFeRUtr473oxA9CN/afceef57b322b8fac0d97e89fb1d9f1b/WB-HP-F4-goblet-of-fire-harry-potter-in-gryffindor-outfit-web-landscape.jpg","details":{"size":2583598,"image":{"width":2000,"height":1331}},"fileName":"WB-HP-F4-goblet-of-fire-harry-potter-in-gryffindor-outfit-web-landscape.jpg","contentType":"image/jpeg"}}},{"contentfulId":"5VGzj9fRFtYTo99POtP2uZ","type":"Entry","revision":6,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:36.421Z","updatedAt":"2025-08-18T10:19:45.785Z","_updatedAt":"2025-08-18T10:19:45.785Z","entryTitle":"back-to-hogwarts-2025-text-section-3","text":"This year’s Back to Hogwarts season is extra special, as it coincides with a huge milestone for the fourth Harry Potter story – 20 years since *Goblet of Fire* film hit our screens. Earlier this year, the Studio Tour in London celebrated in fiery fashion, when a [life-sized Hungarian Horntail](https://www.harrypotter.com/news/hungarian-horntail-takes-over-london-for-studio-tour-summer-stunt) turned up in the Big Smoke – but we’re not quite finished yet! \n\nTo commemorate the occasion accordingly, the film will return to cinemas worldwide, including a special screening in London’s Leicester Square on 31st August featuring James and Oliver Phelps, AKA the Weasley twins! Let’s hope they turn up with big, long white beards after a hearty swig of Ageing Potion. IYKYK.\n\nTheir special Q\u0026A will be hosted by Yinka Bokinni. Plus, whether it’s your house robes or your Yule Ball finest, remember to don your best wizarding attire – there will be costume competitions, giveaways and photo opportunities too! \n\nUpdate: this event is now sold out, [BUT there's still a chance to win a pair of tickets here.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fmc6m8w8vs3rqw7164shtyl7t087m.pub.sfmc-content.com%2Fy0xktjxxmha)\n\nIn the US, fans can check out the [Fandango website](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.fandango.com%2F) to find special screenings happening all over the states across the season. More theatres in Canada, EMEA and International territories will be joining in the fun very soon. [Keep watching this space as more are revealed. ](https://www.harrypotter.com/news/international-screenings-guide-for-back-to-hogwarts-2025)\n\n## Snapchat releases Harry Potter Bitmoji Lenses \n\n3D Harry Potter lenses are coming soon to Snapchat. Launching in mid-August, Snap users can transform their Snapchat Bitmojis Back to Hogwarts style: place your Bitmoji in iconic locations, such as the Wizard Chess sequence, Platform Nine and Three-Quarters, the [Goblet of Fire](https://www.harrypotter.com/fact-file/objects/the-goblet-of-fire) moment in the Great Hall, and the Privet Drive scene with Harry’s influx of Hogwarts letters. Again, we’ll keep you posted when these features are live and can’t wait to see your combinations. \n\n## Global celebrations \n"},{"contentfulId":"2rmOMdQQWAqrqUW2OribNa","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-09-02T08:38:09.204Z","updatedAt":"2024-09-02T08:38:09.204Z","_updatedAt":"2024-09-02T08:38:09.204Z","entryTitle":"BTH-2024-Japan-Tokyo-celebrations-at-studio-tour-web-landscape","image":{"contentfulId":"5gq1Q1av9IESFd5oUFv0cv","type":"Asset","contentTypeId":"asset","createdAt":"2024-09-02T08:38:07.089Z","updatedAt":"2025-08-01T11:51:22.369Z","_updatedAt":"2025-08-01T11:51:22.369Z","revision":2,"locale":"en-GB","title":"BTH-2024-Japan-Tokyo-celebrations-at-studio-tour-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5gq1Q1av9IESFd5oUFv0cv/f84748832eb8b47c5f74e867b715cab3/JAPAN_Studio-Tour-Tokyo_BTH-compressed.jpg","details":{"size":408330,"image":{"width":1900,"height":1267}},"fileName":"JAPAN_Studio-Tour-Tokyo_BTH-compressed.jpg","contentType":"image/jpeg"}}},{"contentfulId":"1W75rbzsp0jjXI4Mt0JweE","type":"Entry","revision":6,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:54.046Z","updatedAt":"2025-08-18T10:17:42.181Z","_updatedAt":"2025-08-18T10:17:42.181Z","entryTitle":"back-to-hogwarts-2025-text-section-4","text":"Click on the following territories to see what Back to Hogwarts activity is going on for you! This list is charmed, so expect it to magically grow.\n\n\u003cspan id=\"top\"\u003e\u003c/span\u003e\n\n\u003cul\u003e\n    \u003cli\u003e\u003ca href=\"#uk\"\u003eThe UK\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#north-america\"\u003eNorth America and Canada\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#france\"\u003eFrance\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#germany\"\u003eGermany\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#italy\"\u003eItaly\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#spain\"\u003eSpain\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#japan\"\u003eJapan\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#china\"\u003eChina\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#singapore\"\u003eSingapore\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#australia\"\u003eAustralia\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#mexico\"\u003eMexico\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#uae\"\u003eUAE\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"uk\"\u003eThe UK\u003c/h2\u003e\n\n### Free screening of Harry Potter and the Goblet of Fire in Leicester Square with Phelps twins Q\u0026A\n\nAs we mentioned above, Cineworld Leicester Square will play host to a free screening of the fourth Harry Potter film on 31st August. Fans can enjoy a live Q\u0026A with the Weasley twins, James and Oliver Phelps with TV and radio host Yinka Bokinni as our fantastic MC – and you can bet they’ll be some fun in the foyer before the show too! If you’re lucky enough to snap up a ticket, we recommend you get your wizarding gladrags on and join like-minded fans for a very special night of magic.\n\n__[You could be in with a chance to span up a pair of tickets here, thanks to Wizarding Wednesdays.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fmc6m8w8vs3rqw7164shtyl7t087m.pub.sfmc-content.com%2Fy0xktjxxmha)__\n\nLook out for goodies galore, including a complementary Wizarding World Micro Magical Moments Year 4 Collectible Figure set from Spinmaster. \n\n__[Check out other Goblet of Fire anniversary screenings at Cineworld UK right this way.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.cineworld.co.uk%2Ffilms%2Fharry-potter-the-goblet-of-fire-20th-anniversary%2Fho00013228%23%2Fbuy-tickets-by-film%3Fin-cinema%3Dlondon%26at%3D2025-08-25%26for-movie%3Dho00013228%26view-mode%3Dlist)__"},{"contentfulId":"cqDtIHanUkU44w0guYkEA-img","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-10-01T18:18:51.117Z","updatedAt":"2021-04-20T13:23:18.877Z","_updatedAt":"2021-04-20T13:23:18.877Z","entryTitle":"PMARCHIVE-FredAndGeorge WB F5 AtGrimmauldPlace HP5-FX-00152r 1P4ITB7tGUw6gW0qc4UK4i","image":{"contentfulId":"cqDtIHanUkU44w0guYkEA","type":"Asset","contentTypeId":"asset","createdAt":"2019-09-20T17:59:02.131Z","updatedAt":"2021-02-08T10:12:19.783Z","_updatedAt":"2021-02-08T10:12:19.783Z","revision":13,"locale":"en-GB","title":"FredAndGeorge WB F5 AtGrimmauldPlace HP5-FX-00152r","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/cqDtIHanUkU44w0guYkEA/c41d8c953ee5259a49a0db98bf23d6c0/FredAndGeorge_WB_F5_AtGrimmauldPlace_HP5-FX-00152r.jpg","details":{"size":1823873,"image":{"width":3139,"height":1894}},"fileName":"FredAndGeorge_WB_F5_AtGrimmauldPlace_HP5-FX-00152r.jpg","contentType":"image/jpeg"}},"imageCaption":"Harry Potter and the Order of the Phoenix","imageAltText":"Fred and George Weasley ","source":[{"contentfulId":"6vSblg4bo8ERfWv6wulvcW","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-26T14:17:38.549Z","updatedAt":"2019-10-28T16:39:54.558Z","_updatedAt":"2019-10-28T16:39:54.558Z","entryTitle":"HP-F5","displayTitle":"Harry Potter and the Order of the Phoenix","sourceType":"Film","franchiseName":"Harry Potter","franchiseSubtitle":"and the Order of the Phoenix","purchaseLink":"https://www.wizardingworld.com/discover/films/harry-potter-and-the-order-of-the-phoenix"}]},{"contentfulId":"4FPIvtGEgAh9S3QZesu09I","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T07:59:57.955Z","updatedAt":"2025-08-18T10:37:13.888Z","_updatedAt":"2025-08-18T10:37:13.888Z","entryTitle":"back-to-hogwarts-2025-text-section-5","text":"### Wizarding Wednesdays return \n\nOur weekly competition, Wizarding Wednesdays, is back back back, inviting UK folks to sweep up spellbinding prizes. [Keep a watchful eye on our social channels](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fmc6m8w8vs3rqw7164shtyl7t087m.pub.sfmc-content.com%2Fy0xktjxxmha) every Wednesday to  see what you could win. \n\n### Warner Bros. Studio Tour London will host an 11am countdown on 1st September|\n\n[Warner Bros. Studio Tour London – the Making of Harry Potter](https://www.wbstudiotour.co.uk/) will host 300 lucky guests at a celebratory 11am countdown moment at the Studio Tour, held on the platform next to the iconic Hogwarts Express live on 1st Sept. Tickets are exclusively available by entering a competition to win, visit @wbtourlondon for more details on how to enter before the competition closes. The contest closes on 11th August, so you’ve got time! \n\n### The Platform 9 ¾ shop has a new merchandise and a photo opp \n\nThe official Harry Potter shop, tucked away at King’s Cross Station, is getting into the Back to Hogwarts spirit in all sorts of ways – including some fresh merchandise for 2025 and a photo opportunity frame. If you’re London-based, the shop begins celebrating from 28th July. \n\n### Meet \u0026 Greet at MinaLima"},{"contentfulId":"2C2ZSbjvCweKGsMWykkyek-img","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-10-01T17:53:19.175Z","updatedAt":"2019-10-01T17:53:19.175Z","_updatedAt":"2019-10-01T17:53:19.175Z","entryTitle":"PMARCHIVE-ML House of MinaLima exterior shop front photography x3JYuQfzmo8iieekSYYAw","image":{"contentfulId":"2C2ZSbjvCweKGsMWykkyek","type":"Asset","contentTypeId":"asset","createdAt":"2019-09-20T20:12:15.464Z","updatedAt":"2019-09-24T06:22:02.700Z","_updatedAt":"2019-09-24T06:22:02.700Z","revision":2,"locale":"en-GB","title":"ML House of MinaLima exterior shop front photography","description":"House of MinaLima exterior","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2C2ZSbjvCweKGsMWykkyek/a8f047eedd02341d161fd5887cf4674b/House_of_MinaLima_Exterior.jpg","details":{"size":6200774,"image":{"width":3508,"height":2338}},"fileName":"House of MinaLima_Exterior.jpg","contentType":"image/jpeg"}},"imageCaption":"House of MinaLima in Soho, London.","imageAltText":"House of MinaLima, 26 Greek Street in London"},{"contentfulId":"7kpwCh0ajLnE5YP3n828Cy","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-22T20:19:00.702Z","updatedAt":"2025-07-22T20:19:00.702Z","_updatedAt":"2025-07-22T20:19:00.702Z","entryTitle":"back-to-hogwarts-2025-text-section-6","text":"Also in London, fans can visit the headquarters of design team MinaLima, the masterminds behind many of the magical details of the Harry Potter films. Their shop is hosting a meet and greet event on the 31st August, where limited-edition Back to Hogwarts badges, exclusive for 2025, will be available to snap up. Make sure to practice your Seeker reflexes though: they won’t last long! All the info you need for this one is over on the [MinaLima official site.](https://minalima.com/)\n\nSpecial Hogwarts notice: alas, we must once again discourage fans from attending King’s Cross Station on 1st September, as there will be no countdown or train announcement occurring in 2025. Safety first, folks.\n\n\u003ch2 id=\"north-america\"\u003eNorth America and Canada\u003c/h2\u003e\n\n### Harry Potter: New York and Harry Potter: Chicago release Back to Hogwarts time-limited merchandise \n\nIf you’re [New York](https://www.harrypotterstore.com/) or [Chicago](https://harrypottershop.com/pages/chicago?srsltid=AfmBOoqzzViOYPGLJwWXGoHaGV1R7eEtlO8TMrQkDSvwOvqX1flg1ngH) based, why not rock on down to the official Harry Potters shops in your area for some exclusive time-limited goodies for Back to Hogwarts 2025? Visit from 28th July to see what new items are on offer.\n\n### Harry Potter: A Forbidden Forest Experience comes to Chicago\n\nMore spellbinding stuff for Chicago fans! The Forbidden Forest Experience has been casting a Dark spell on fans over the past few years, and now, the immersive experience is coming to the Windy City. Visit the official website to find out more.\n\n### Cursed Child on Broadway offering shows for 19 dollars"},{"contentfulId":"2LAIk5x2RxJASCFkaBHsHK","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-03-28T17:01:58.540Z","updatedAt":"2025-03-28T17:01:58.540Z","_updatedAt":"2025-03-28T17:01:58.540Z","entryTitle":"HPCC-Broadway-2025-Albus-and-harry-casting-fire-web-landscape","image":{"contentfulId":"1Y4ZPY1SfQmudLmVmSEWOS","type":"Asset","contentTypeId":"asset","createdAt":"2025-03-28T17:01:56.285Z","updatedAt":"2025-03-28T17:01:56.285Z","_updatedAt":"2025-03-28T17:01:56.285Z","revision":1,"locale":"en-GB","title":"HPCC-Broadway-2025-Albus-and-harry-casting-fire-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1Y4ZPY1SfQmudLmVmSEWOS/3024b843ef71a0b48f5e421411a8d8c4/HPCC_BROADWAY_11_12_24_S_0091_EditV6__1_.jpg","details":{"size":625504,"image":{"width":3782,"height":2522}},"fileName":"HPCC_BROADWAY_11_12_24_S_0091_EditV6 (1).jpg","contentType":"image/jpeg"}}},{"contentfulId":"6PTFvFsxwoFP6NeT0D84IT","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T08:00:02.520Z","updatedAt":"2025-07-30T14:19:03.010Z","_updatedAt":"2025-07-30T14:19:03.010Z","entryTitle":"back-to-hogwarts-2025-text-section-7","text":"As the play is set 19 years later, the Cursed Child production in New York has had the ingenious idea to release tickets to their shows for only 19 bucks. The special priced ticket will only be available to grab on 1st September, so mark this in your calendars and visit [harrypotterbroadway.com](https://broadway.harrypottertheplay.com/) or at the Lyric Theatre Box Office to get the full lowdown. \n\n\u003ch2 id=\"france\"\u003eFrance\u003c/h2\u003e\n\n### Take your exams at the Sainte-Geneviève Library \n\nSacre bleu! Exams?! Yes, you heard that right. You’re invited to a free ticketed event in the beautiful university library, crammed with almost as much history as Hogwarts! But don’t worry – it’s not *that* kind of exam, this is a fun, interactive quiz event for Harry Potter fans to test their magical acumen.\n\nThere will also be an appearance from actor Solange Boulanger, who dubbed Dolores Umbridge in the Harry Potter films. Solange will be providing a special dictation session for visitors (remember: it’s Levi-O-sah...) while LEGO and Harry Potter Haribo displays will also be scattered around. \n\nFans who can’t make the event physically can get a proper wizarding education online from [https://examen.retourapoudlard.fr/](https://examen.retourapoudlard.fr/) - check it out from 30th August – 6th September. \n\n\u003ch2 id=\"germany\"\u003eGermany\u003c/h2\u003e\n\n### Westfield Hamburg-Überseequartier to host Back to Hogwarts 3-day bonanza\n\nWhy celebrate Back to Hogwarts day for one day when you could do it for three? This Hamburg-based shopping centre has the right idea about things, with Harry Potter activities galore available across 29th August, 30th August, 1st September. Thalia, LEGO, Haribo and Harry Potter and the Cursed Child are all getting involved, so keep your ear to the ground for bewitching giveaways.\n\nIf you're old enough, you can find out more on our German Harry Potter social channels.\n\n### Select Thalia book stores will have a Back to Hogwarts takeover\n\nSpeaking of Thalia, the book store chain is getting into the Hogwarts spirit in more ways than one this summer, with select stores bringing a little slither of the wizarding world into 10 of their shops. Visitors can expect prize draws, Harry Potter displays, and of course, plenty of opportunities for a magical snap.\n\n[Visit the website here to learn more.](https://www.thalia.de/themenwelten/harry-potter/back-to-hogwarts/tour)\n\n### From takeovers...to sleepovers!\n\nAnd in Dusseldorf, Hannover, Leipzig and Hamburg, there will be four Back to Hogwarts-themed sleepover events taking place in Thalia stores too! If you sign up by the 8th August, you can join fellow fans for a wizarding all-nighter if you’re lucky enough to snag a free ticket.\n\n[Details are right over here.](https://thalia.de/themenwelten/harry-potter/back-to-hogwarts)\n\n### Harry Potter and the Cursed Child brings Back to Hogwarts fever to Hamburg"},{"contentfulId":"1OQXOJbajI807OYJn17CWb","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-12-09T10:09:42.185Z","updatedAt":"2021-12-09T10:09:42.185Z","_updatedAt":"2021-12-09T10:09:42.185Z","entryTitle":"HPCC-cursed-child-hamburg-stage-curtain-call-applause-cast","image":{"contentfulId":"5BU7Fe9tN1qJa0TJSKj1zw","type":"Asset","contentTypeId":"asset","createdAt":"2021-12-09T10:09:36.409Z","updatedAt":"2021-12-09T10:09:36.409Z","_updatedAt":"2021-12-09T10:09:36.409Z","revision":1,"locale":"en-GB","title":"HPCC-cursed-child-hamburg-stage-curtain-call-applause-cast","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5BU7Fe9tN1qJa0TJSKj1zw/1b57b57b6d40015fca03f4b708eb006f/HPCC-cursed-child-hamburg-stage-curtain-call-applause-cast.jpg","details":{"size":2367505,"image":{"width":2000,"height":1334}},"fileName":"HPCC-cursed-child-hamburg-stage-curtain-call-applause-cast.jpg","contentType":"image/jpeg"}},"source":[{"contentfulId":"KNlAjfZtVzdWu31pBG6Ob","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"source","createdAt":"2019-07-28T14:11:06.043Z","updatedAt":"2022-10-03T10:30:18.494Z","_updatedAt":"2022-10-03T10:30:18.494Z","entryTitle":"CC","displayTitle":"Harry Potter and the Cursed Child","sourceType":"Play","purchaseLink":"https://www.wizardingworld.com/discover/books/harry-potter-and-the-cursed-child-parts-one-and-two-screenplay"}]},{"contentfulId":"1G2fiUJJVvA3hLs6A72Kli","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T08:00:06.464Z","updatedAt":"2025-08-22T12:13:32.530Z","_updatedAt":"2025-08-22T12:13:32.530Z","entryTitle":"back-to-hogwarts-2025-text-section-8","text":"The hit play is recognising Back to Hogwarts season with a start-of-term special on 31st August, with magical offers on this day and a costume competition to boot. [Check out the official website to see what’s in store](https://www.atgtickets.de/musicals-shows/harry-potter-und-das-verwunschene-kind/back-to-hogwarts/).\n\n### Universal Beijing Resort promises themed merchandise, special entertainment and even a feast\n\nMUCH fun can be had at Universal Beijing Resort during the Back to Hogwarts season. Just a few things to look forward to... *deep breath* A Collectors Edition interactive Wand exclusive to the park, themed merchandise packages, a Back to Hogwarts feast, Hogwarts house-themed face painting, \nand much more. \n\nFor the full list of details, [simply visit the official site.](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.universalbeijingresort.com%2Fen%2FBTH2025)\n\n\u003ch2 id=\"italy\"\u003eItaly\u003c/h2\u003e\n\n### Back to Hogwarts event to take place in Teatro Nazionale, Milan \n\nThe fashion capital of Italy will most likely see a storm of Hogwarts robes on 1st September, as Harry Potter fans are invited to a countdown ceremony and a wonderful array of activities to go alongside. Expect quizzes, performances and even surprise guests! \nVisit here for more.\n\n\u003ch2 id=\"spain\"\u003eSpain\u003c/h2\u003e\n\n### Magic is coming to Museo del Ferrocarril in Madrid\n\nVamos! On 31st August and 1st September, Madrid will host a fan event at Museo del Ferrocarril (the Railway museum)\n\nVisitors will enjoy two magical days of Hogwarts-themed fun, including a special 11 o’clock countdown!\n\n[Click here to find out more](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fbacktohogwartsmadrid.com%2F)\n\n\u003ch2 id=\"japan\"\u003eJapan\u003c/h2\u003e\n\n### The Saitama Seibu Lions will be casting a spell on baseball fans\n\nIt's been a huge year for Harry Potter fans in Japan – and the magic certainly doesn’t stop now. From the 29th August to the 31st August, the wizarding world is coming to the baseball pitch, dubbed Harry Potter x Lions. Fans of the team will discover bespoke products while attending games, and will even be treated to a special appearance from a Harry Potter and the Cursed Child cast member...\n\nWho knew the Saitama Seibu Lions were Harry Potter fans? We bet they’re all Gryffindors. \n\n\u003ch2 id=\"china\"\u003eChina\u003c/h2\u003e\n\n### Prisoner of Azkaban and Goblet of Fire in Concert plays in Shanghai"},{"contentfulId":"32oN0BK8TtpehVF7F54B14","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2023-09-18T11:11:23.494Z","updatedAt":"2023-09-18T11:11:23.494Z","_updatedAt":"2023-09-18T11:11:23.494Z","entryTitle":"hp-f3-dumbledore-great-hall-lectern-start-of-term-web-landscape","image":{"contentfulId":"UKtUI0NroDt2Q8lNYnfgW","type":"Asset","contentTypeId":"asset","createdAt":"2023-09-18T11:11:20.055Z","updatedAt":"2023-09-18T11:11:20.055Z","_updatedAt":"2023-09-18T11:11:20.055Z","revision":1,"locale":"en-GB","title":"hp-f3-dumbledore-great-hall-lectern-start-of-term-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/UKtUI0NroDt2Q8lNYnfgW/612cbf5f14d90abd38d4c38d71399986/hp-f3-dumbledore-great-hall-lectern-start-of-term-web-landscape.jpg","details":{"size":462087,"image":{"width":1176,"height":784}},"fileName":"hp-f3-dumbledore-great-hall-lectern-start-of-term-web-landscape.jpg","contentType":"image/jpeg"}}},{"contentfulId":"27mmB8iq55YUuvTlY3uhGE","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-07-23T08:00:10.160Z","updatedAt":"2025-08-18T10:08:08.488Z","_updatedAt":"2025-08-18T10:08:08.488Z","entryTitle":"back-to-hogwarts-2025-text-section-9","text":"From 7th August to 10th August, the third and fourth Harry Potter films will be brought to life in spectacular fashion with the In Concert series coming to Shanghai, complete with a live symphony orchestra. \n\n[The official website has a handy map of all upcoming locations for these gorgeous shows.](https://harrypotterinconcert.com/tickets)\n\n### The West Lake becomes...The Great Lake?\n\nIn Hangzhou, on 30th August – 1st September, a Back to Hogwarts celebration set against the iconic backdrop of the West Lake will take place, with a plethora of community activities expected. The Harry Potter China social channels can tell you more about this one.\n\n\u003ch2 id=\"singapore\"\u003eSingapore\u003c/h2\u003e\n\n### Harry Potter: Visions of Magic promises Back to Hogwarts merriment\n\nVisitors of [Harry Potter: Visions of Magic](https://www.harrypotter.com/discover-experiences/experiences/harry-potter-visions-of-magic), the experiential and interactive art experience that has been spreading wonder around the globe, is upping the ante in Singapore for Back to Hogwarts day. If you have a ticket already and turn up in Hogwarts house regalia, there’s a chance to win complimentary gifts. Watch out for other surprises on site.\n\n\u003ch2 id=\"australia\"\u003eAustralia\u003c/h2\u003e\n\n### Harry Potter: The Exhibition offers special ticket offer on 1st September \n\nAll the way down under, Harry Potter fans can enjoy behind-the-scenes film magic with [Harry Potter: The Exhibition](https://harrypotterexhibition.com/), currently happening in Melbourne. But on 1st September, fans should stay tuned for a very special ticket offer... Ooh, mysterious. Maybe bookmark the official site and keep an eye out.\n\n\u003ch2 id=\"Mexico\"\u003eMexico\u003c/h2\u003e \n\n### Meanwhile, a collectible poster is up for grabs at Harry Potter: Visions of Magic in Mexico City\n\nFans who attend the ethereal experience in [Mexico City](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottervisionsofmagic.com%2F) between 26th August to 31st August will receive a special Back to Hogwarts collectible poster!\n\n\u003ch2 id=\"UAE\"\u003eUAE\u003c/h2\u003e \n\n### Dress to impress in Harry Potter: The Exhibition in Abu Dhabi\n\nSpeaking of Harry Potter: The Exhibition, we heartily encourage attendees to dress up in their Hogwarts house colours, should you be attending on 1st September. A Hogwarts house-themed prize is up for grabs! (If you're in Melbourne or Salt Lake City - look out for similar contests.) \n\n***\n\n__Phew! And that’s just a couple of things for the time being... [sign up to our newsletter](https://www.h 60}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"5e8xDWCcBspUdUy9LaH25y","type":"Entry","revision":16,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-08-04T10:01:32.684Z","updatedAt":"2025-08-30T09:00:11.194Z","_updatedAt":"2025-08-30T09:00:11.194Z","entryTitle":"bth-gift-guide-2025-text-section-1","text":"__Which fan are you looking for?__\n\u003cspan id=\"top\"\u003e\u003c/span\u003e\n\u003cbr\u003e[Enjoy limited-time magical deals](#magicaldeals) \u003cbr\u003e\n[Celebrate Back to Hogwarts](#celebratebth) \u003cbr\u003e\n[Back to school essentials – wizarding style](#backtoschool) \u003cbr\u003e\n[For kids – must haves for the young witch or wizard](#forkids) \u003cbr\u003e\n[For fashionistas – magical looks](#forfashionistas)\u003cbr\u003e\n[For bookworms – channel your inner Hermione](#forbookworms) \u003cbr\u003e \n\u003cbr\u003e\nEvery year, on 1st September, Harry Potter fans from around the world gather to celebrate the magical moment when the Hogwarts Express sets off, taking young witches and wizards Back to Hogwarts. While we might not be heading off to the famous wizarding school, that doesn’t mean we can’t treat ourselves to some Back to Hogwarts goodies. From kids to fashionistas and to those who have been here since 1997, no matter the Harry Potter fan, we have you covered… \n\n\u003cspan id=\"magicaldeals\"\u003e\u003c/span\u003e\n# Enjoy limited-time magical deals\n\n### Get up to 80% off Harry Potter games\n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwarnerbrosgames.com%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/6NzUCnLbrL6rc94umKpqCA/905777de6a2bb0e04e59d58773ee046d/BTH-2025-gift-guide-games-offer.png\" \n       alt=\"The Hogwarts Legacy, Harry Potter: Quidditch Champions and the LEGO® Harry Potter collection covers\"/\u003e\n\u003c/a\u003e\n\nOne for all you gamers out there! Until 1st September, you can get up to 80% off on Hogwarts Legacy, Harry Potter: Quidditch Champions and the LEGO® Harry Potter collection. \\*** Whether you’re gambolling through the Scottish Highlands, taking to the skies on a broomstick or journeying (LEGO® style) through the Harry Potter stories – become the hero of your own wizarding world adventure. \\**\n\u003cbr\u003e\n\n[Discover your next great game here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwarnerbrosgames.com%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Find fantastic deals on Amazon\n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.co.uk%2Fstores%2Fpage%2FCBEB1362-DF53-4FA1-BE96-0753AB848AFB%2Fref%3Dacseu24_4%3Fpf_rd_r%3DS1H0KCRDDMP3T2E07FJY%26pf_rd_p%3Dd5d0c5ed-6823-4f99-bb85-6929d28cb394%26pf_rd_m%3DA3P5ROKL5A1OLE%26pf_rd_s%3Dmerchandised-search-4%26pf_rd_t%3D%26pf_rd_i%3D100549035031%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/1t1uXEDNAZjIxbxKBYnW5m/8a61222342bcf65fdff561ed9ab794b6/BTH-gift-guide-2025-lego-book-of-monsters.png\" \n       alt=\"The LEGO Monster Book of Monsters fully built\"/\u003e\n\u003c/a\u003e\n\nOver on Amazon, they’re celebrating Back to Hogwarts with some great savings on a fantastic range of Harry Potter toys and merchandise until 7th September. Build your own magic with Harry Potter LEGO®.  Show off your superfan status with an excellent T-shirt. Earn some serious cool points from the kid in your life by gifting them an excellent toy – and so much more. \\**\n\u003cbr\u003e\n\n[For fans in the UK](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.co.uk%2Fstores%2Fpage%2FCBEB1362-DF53-4FA1-BE96-0753AB848AFB%2Fref%3Dacseu24_4%3Fpf_rd_r%3DS1H0KCRDDMP3T2E07FJY%26pf_rd_p%3Dd5d0c5ed-6823-4f99-bb85-6929d28cb394%26pf_rd_m%3DA3P5ROKL5A1OLE%26pf_rd_s%3Dmerchandised-search-4%26pf_rd_t%3D%26pf_rd_i%3D100549035031%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[For fans in France](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.fr%2Fstores%2Fpage%2F78D50F84-AB25-4797-86F9-C558ECB1DAE6%3Fingress%3D0%26visitId%3Dd425c0ea-8880-4207-bbae-fa42d76b4569%26lp_query%3Dharry%2Bpotter%26lp_slot%3Dauto-sparkle-hsa-tetris%26store_ref%3DSB_A10430422DZC5UVO9IYXR%26ref_%3Dsbx_be_s_sparkle_lsi4d_hl%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[For fans in Germany](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.de%2Fstores%2Fpage%2F52C9AA9C-43E9-477D-AF49-06EA65471917%3Fingress%3D3%26visitId%3Dff46de73-0036-48a1-b04e-39a2cb60a24f%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[For fans in Italy](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.it%2Fstores%2Fpage%2FFC2AA5D3-158B-4163-8278-AF059051C04E%3Fingress%3D0%26visitId%3D9828d672-70b7-4ed3-b97b-fade639ec9ef%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[For fans in Spain](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.es%2Fstores%2Fpage%2FB055DC48-6A8E-4B62-B397-EE602AA0BBCD%3Fchannel%3Dbth25_wiwo_giftguide%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n\u003cspan id=\"celebratebth\"\u003e\u003c/span\u003e\n# Celebrate Back to Hogwarts \n\n### Back to Hogwarts collection | Harry Potter Shop \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Fback-to-hogwarts%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/17rgamnDTObFNnMMpcqYvm/88677aabc2998c38c584c3a5f3d84d43/BTH-2025-gift-guide-back-to-hogwarts-collection-hp-shop.jpg\" \n       alt=\"An open Hogwarts trunk with green and gold Back to Hogwarts items\"/\u003e\n\u003c/a\u003e\n\nWith the golden castle shining against a backdrop of green, go Back to Hogwarts in style with this fantastic collection from the Harry Potter Shop. From subtle socks to terrific t-shirts, you can celebrate from top to toe with this exclusive range of clothing, homeware and collectibles. \\*  \n\u003cbr\u003e\n[Shop here in the UK](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Fback-to-hogwarts%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[Shop here in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.com%2Fcollections%2Fback-to-hogwarts%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[Shop here for Japan](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.jp%2Fcollections%2Fback-to-hogwarts%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n\u003cspan id=\"backtoschool\"\u003e\u003c/span\u003e\n# Back to school essentials – wizarding style  \n\n### Personalised Hogwarts house robes | Harry Potter Shop  \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Fhogwarts-house-robes%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/focG9YLX14xxDckq6UQHG/6282d81a8cd14d76d01785652e6d0d28/BTH-2025-gift-guide-hp-shop-robes.jpg\" \n       alt=\"Four students wear each of the Hogwarts house robes\"/\u003e\n\u003c/a\u003e\n\nIt wouldn’t be the start of term without a fresh set of iconic Hogwarts robes. While we don’t have Madam Malkin’s, you can find a set of your own at the Harry Potter Shop. Feel like a true member of your house and wear your house colours and emblem with pride! Plus, to make them completely unique, you can have yours personalised with a special word that sits underneath the Hogwarts crest. \\*  \n\u003cbr\u003e\n[Click here if you’re in the UK](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Fhogwarts-house-robes%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[Or here in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.com%2Fcollections%2Fhogwarts-house-robes%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[Or here for Japan](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.jp%2Fcollections%2Fhogwarts-house-robes%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Hogwarts trunks | Harry Potter Shop \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Ftrunks%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/1H4nJC6iiz4lXrCnHgg6fK/8bbcebbb5b008c40ab4f04fe79b28dcd/BTH-2025-gift-guide-hogwarts-trunks-hp-shop.jpg\" \n       alt=\"A pile of different Hogwarts trunks on a lawn\"/\u003e\n\u003c/a\u003e\n\nFrom textbooks to cauldrons and not forgetting that spare pair of socks – becoming a witch or wizard involves a lot of equipment! Luckily, the students have their trunks to carry it all. Over at the Harry Potter Shop, you can find a whole range of these carefully crafted trunks. Filled with exclusive items, from wands to house-themed woolly hats, and with the option to have it personalised, they’d make a fantastic gift for the superfan in your life… especially if that superfan is you! \\*\n\u003cbr\u003e\n\n[UK fans shop here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Ftrunks%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[US fans can find more here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.com%2Fcollections%2Ftrunks%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[And fans in Japan can find more here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.jp%2Fcollections%2Ftrunk-station%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Goblet of Fire wand | Harry Potter Shop \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fproducts%2Fgoblet-of-fire-wand%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/2WIpyljZZgSAAhjHNTTr6Q/c4948ae11f6aad82e683b2f0152f655f/BTH-2025-gift-guide-goblet-of-fire-wand-hp-shop.jpg\" \n       alt=\"A Beauxbatons student holding a wand with a blue handle\"/\u003e\n\u003c/a\u003e\n\nThey say the wand chooses the wizard – will this exclusive Celebration Wand choose you? To celebrate 20 years since *Harry Potter and the Goblet of Fire* hit our screens, this elegant wand with blue flames has been inspired by the magical artifact that set the Triwizard Tournament in motion. With an intricate design, if you look closely, you might just spot a carved maze woven into the structure. The perfect collector’s wand for this anniversary year. \\*\n\u003cbr\u003e\n\n[For the fans in the UK](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fproducts%2Fgoblet-of-fire-wand%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[For fans in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.com%2Fproducts%2Fgoblet-of-fire-wand%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[For fans in Japan](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.jp%2Fproducts%2Fgoblet-of-fire-wand%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### The Celebration Wand for Harry Potter’s birthday | Noble Collection© \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fnoblecollection.co.uk%2Fproduct%2Fharry-potter-celebration-wand-2025%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/46frV5SqEDt2Y8eO95Zq1D/6a556f60b57774a8044e8e872a3f5dbd/BTH-2025-gift-guide-noble-collection-patronus-wand.jpg\" \n       alt=\"A blue and silver wand on a stand with a sign that says Expecto Patronum\"/\u003e\n\u003c/a\u003e\n\nWith the theme of celebration in mind, this new wand exclusively created for another momentous wizarding world moment, Harry Potter’s birthday, would be an excellent Back to Hogwarts gift. With a graceful design, inspired Harry’s Stag Patronus, you’ll have to be quick – this limited time wand by the Noble Collection is only available for one year. \\**\n\u003cbr\u003e\n\n[Shop here in the UK](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fnoblecollection.co.uk%2Fproduct%2Fharry-potter-celebration-wand-2025%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n\u003cspan id=\"forkids\"\u003e\u003c/span\u003e\n# For kids – must haves for the young witch or wizard \n\n### Hogsmeade Village Collectors’ Edition | LEGO®\n\n  \u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.lego.com%2Fen-gb%2Fproduct%2Fhogsmeade-village-collectors-edition-76457%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/7CDks0WAdY3S93CUHgfu6S/89375220130e7cc015dfa15caeeafbea/BTH-2025-gift-guide-lego-hogsmeade-collectors-edition.png\" \n       alt=\"A built LEGO Hogsmeade Collectors Edition on a table in front of smiling woman\"/\u003e\n\u003c/a\u003e\n\nIt wouldn’t feel like we had truly returned to Hogwarts without a trip to Hogsmeade. What if you could bring the wizarding village into your own living room? Well, as The LEGO Group have excitingly revealed their new Hogsmeade Village Collectors’ Edition, you’ll soon be able to. Featuring some of our favourite locations, from the colourful Honeydukes to the cosy Three Broomsticks (all complete with delightful snow-capped roofs), we think this would be a wise choice as a gift for the young Harry Potter fan in your life. \\**\n\u003cbr\u003e\n\nAvailable to own from 4th September, [find out more about this set here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.lego.com%2Fen-gb%2Fproduct%2Fhogsmeade-village-collectors-edition-76457%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025)\n\n### Harry Potter plushies | Squishmallows™️\n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.com%2Fstores%2Fpage%2F821A8D15-A36B-4FC8-A2BF-CF43BA5BED61%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/35RUymyW0vaACnBfNmsRJa/43776dad12fea88eee1bb62f6a561097/BTH-2025-gift-guide-buckbeak-squishmallow.jpg\" \n       alt=\"A cuddly Buckbeak Squishmallow plushie\"/\u003e\n\u003c/a\u003e\n\nOh, how we would love to squish these Squishmallows. We’ve never seen Buckbeak look more adorable – or Snape so friendly. These new Harry Potter plushies are the cutest and cuddliest companions for the kid in your life. \\**\n\u003cbr\u003e\n\n[Discover more here](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.com%2Fstores%2Fpage%2F821A8D15-A36B-4FC8-A2BF-CF43BA5BED61%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Interactive Pygmy Puff | Harry Potter Shop \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fproducts%2Finteractive-pygmy-puff-plush-pet%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/34bAItX4Vfees8N1MbYxQs/8a3948d03a98416fc6c2e16e766c18f4/BTH-2025-gift-guide-interactive-pygmy-puff.jpg\" \n       alt=\"A pink interactive Pygmy Puff in its packaging\"/\u003e\n\u003c/a\u003e\n\nThe pink fluff! The adorable noises! The tiny ears! We totally understand why Ginny Weasley chose a Pygmy Puff as a pet. Not only does this interactive Pygmy Puff Plush Pet have over 35 extremely cute sounds, but it also responds to your touch – bringing its playful personality to life. Available from the Harry Potter Shop, this would be a charming and kid-friendly gift. \\*\n\u003cbr\u003e\n[For fans in the UK](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fproducts%2Finteractive-pygmy-puff-plush-pet%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e \n\n### ©Steiff Harry Potter collection | Harry Potter Shop \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Fsoft-toys%2Fsteiff%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/mnFYVp40UuZQk2Fxn2VOu/47e7c04dd783a8815a54ae438275b960/BTH-2025-gift-guide-steiff-plush-toys-hp-shop.jpg\" \n       alt=\"The four Steiff plushies in front of Hogwarts\"/\u003e\n\u003c/a\u003e\n\nEvery young Harry Potter fan deserves a magical friend who makes every day an epic story – these new plush companions from the Harry Potter collection by Steiff do just that. Carefully crafted, these little versions of Harry, his Patronus, Dobby and Hedwig are soft, huggable and ready for all sorts of adventures. \\*\n\u003cbr\u003e\n[If you’re in the UK](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.co.uk%2Fcollections%2Fsoft-toys%2Fsteiff%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n[And if you’re in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.com%2Fcollections%2Fsoft-toys%2Fsteiff%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025)  \u003cbr\u003e\n[Or Japan](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fharrypottershop.jp%2Fcollections%2Fsoft-toys%2Fsteiff%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DShop%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Harry Potter Bitzee™️ | Spinmaster® \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.com%2FWizarding-World-Interactive-Characters-Digital%2Fdp%2FB0DSCJ49Y9%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/6eIaMO6UdIKZt5s9o6AHqA/a6c1343109b9d20dd9a0ab676c344f1b/BTH-2025-gift-guide-spinmaster-bitzee.jpg\" \n       alt=\"An open Bitzee with digital cartoon version of Harry Potter\"/\u003e\n\u003c/a\u003e\n\nIt’s a long old journey on the Hogwarts Express – the students could have done with the new Harry Potter Bitzee to keep them entertained from King’s Cross to Hogsmeade! This small pod, with eye-catching golden Hogwarts crest, contains a whole world of magic. With spells to cast, characters to collect and games to play, we think this would be a fun gift for the new generation of fans. \\**\n\u003cbr\u003e\n\n[Take a look](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.amazon.com%2FWizarding-World-Interactive-Characters-Digital%2Fdp%2FB0DSCJ49Y9%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Make it Mini Back to Hogwarts | ©MGA’s Miniverse  \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fshop.mgae.com%2Fcollections%2Fmgas-miniverse-harry-potter%2Fproducts%2Fmgas-miniverse-make-it-mini-back-to-hogwarts%25E2%2584%25A2-harry-potter%25E2%2584%25A2-mini-collectibles%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/2c4iIvThB4Ye9zkjlipncN/26f037ecade1294b50d40eba10f596e0/BTH-2025-gift-guide-mgas-make-it-mini-back-to-hogwarts.jpg\" \n       alt=\"A Make It Mini Ball surrounded by possible items you can get\"/\u003e\n\u003c/a\u003e\n\nIf you know a young Harry Potter fan with a creative streak, then we think they would enjoy the new Make It Mini Back to Hogwarts range. With 12 to collect, they can recreate and display their favourite items from the Harry Potter films – from the Nimbus 2000 to the Gryffindor scarf. Plus, for an extra fun twist, each one is a complete surprise! Will they discover them all? \\**\n\u003cbr\u003e\n\n[Shop here in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fshop.mgae.com%2Fcollections%2Fmgas-miniverse-harry-potter%2Fproducts%2Fmgas-miniverse-make-it-mini-back-to-hogwarts%25E2%2584%25A2-harry-potter%25E2%2584%25A2-mini-collectibles%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n\u003cspan id=\"forfashionistas\"\u003e\u003c/span\u003e\n# For fashionistas – magical style \n\n### Breanna Stewart x Harry Potter | Puma \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fus.puma.com%2Fus%2Fen%2Fcollaborations%2Fpartnerships%2Fharry-potter%25E2%2584%25A2%3Fsrsltid%3DAfmBOoolFOctL0ZbKrkQy-G9kPTcIa6w-M2-FI1cl3YbPZvwQ298YLTT%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/3BEqJGwOnR6fiSrC3CR6jO/9f4b6e51b6519b982e364c9a1f72300f/BTH-2025-gift-guide-breanna-stewart-puma.jpg\" \n       alt=\"Breanna Stewart in the Puma Harry Potter range sat down and throwing a basketball\"/\u003e\n\u003c/a\u003e\n\nThis new Breanna Stewart drop is a magical mashup of streetwear and sorcery. With everything from hoodies to joggers and some brilliant basketball shoes – inspired by Hedwig and Nagini – this range is perfect for the most stylish Harry Potter fan.\n\nPlus, for the Gryffindors and Slytherins, your Quidditch uniforms have been reimagined into something extremely cool – check it out. \\**\n\u003cbr\u003e\n\n[Discover more](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fus.puma.com%2Fus%2Fen%2Fcollaborations%2Fpartnerships%2Fharry-potter%25E2%2584%25A2%3Fsrsltid%3DAfmBOoolFOctL0ZbKrkQy-G9kPTcIa6w-M2-FI1cl3YbPZvwQ298YLTT%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Harry Potter collection | Vera Bradley® \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fverabradley.com%2Fcollections%2Fharry-potter-collection%3FproductListFilters%3D%26productListPgNo%3D1%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/78CWQXvOO50jb6Pa35EGul/f57e3c6498afd31a12c97360c8b334a0/BTH-2025-gift-guide-vera-bradley.jpg\" \n       alt=\"Three handbags from the Harry Potter collection on a white background\"/\u003e\n\u003c/a\u003e\n\nIf your most fashion-forward friend is also a fan of Hermione Granger, then they will adore the new collection from Vera Bradley. Inspired by the Hogwarts Library, this collection of bags and accessories celebrates the magic of learning and the thrill of discovery. \\**\n\u003cbr\u003e\n\n[For fans in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fverabradley.com%2Fcollections%2Fharry-potter-collection%3FproductListFilters%3D%26productListPgNo%3D1%26utm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DCP%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n\u003cspan id=\"forbookworms\"\u003e\u003c/span\u003e\n# For bookworms – channel your inner Hermione \n\n### Pocket Potters: Little guides to the Harry Potter stories | ©Bloomsbury \u0026 ©Scholastic \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.bloomsbury.com%2Fuk%2Fdiscover%2Fsuperpages%2Fharry-potter%2Fpocket-potters-pre-order-offer%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DBloomsbury%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/36QV30pFAC8GBQoR2FStC7/be283b71d551d1bc560cf56cb5c32e0f/BTH-2025-gift-guide-pocket-potters-book-covers-trio.png\" \n       alt=\"The Harry, Ron and Hermione covers of Pocket Potters\"/\u003e\n\u003c/a\u003e\n\nPacked full of favourite story moments, must-know spells and unforgettable pets, these cute companion books are a great gift for the reader in your life. With each book coming with its own unique illustrator, dive deeper into the wizarding world and explore your favourite characters. All available for pre-order, the first three Harry Potter, Ron Weasley and Hermione Granger are set to be published in 2025 with Luna Lovegood and Professor Dumbledore arriving in 2026. \\** \n\u003cbr\u003e\n\n[Pre-order globally (except the US)](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.bloomsbury.com%2Fuk%2Fdiscover%2Fsuperpages%2Fharry-potter%2Fpocket-potters-pre-order-offer%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DBloomsbury%26utm_content%3Dbthgiftguide2025)  \u003cbr\u003e\n[Pre-order here in the US](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fkids.scholastic.com%2Fkid%2Fbooks%2Fharry-potter%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DScholastic%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n### Harry Potter and the Goblet of Fire Interactive Edition | Bloomsbury \u0026 Scholastic  \n\n\u003ca href=\"https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.bloomsbury.com%2Fuk%2Fharry-potter-and-the-goblet-of-fire-interactive-illustrated-edition-9781526691262%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DBloomsbury%26utm_content%3Dbthgiftguide2025\" target=\"_blank\"\u003e\n  \u003cimg src=\"https://contentful.harrypotter.com/usf1vwtuqyxm/iKq7ISBSRuVCdhxNEOv43/c57496c2b12d15df117c247f9470bd66/BTH-2025-gift-guide-goblet-of-fire-interactive-edition.png\" \n       alt=\"The front cover of the Hary Potter and the Goblet of Fire Interactive Edition\"/\u003e\n\u003c/a\u003e\n\nThe fourth Harry Potter story has been brought to life once more with this stunning interactive edition, containing over 150 full-colour illustrations and some exceedingly clever papercraft. Available from the 14th October, it would be the ideal present for a Harry Potter bookworm, especially since this year marks the 25th anniversary since *Goblet of Fire* was first published! \\** \n\u003cbr\u003e\n\n[Global (except US) pre-orders](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.bloomsbury.com%2Fuk%2Fharry-potter-and-the-goblet-of-fire-interactive-illustrated-edition-9781526691262%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DBloomsbury%26utm_content%3Dbthgiftguide2025)  \u003cbr\u003e\n[US pre-orders](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fkids.scholastic.com%2Fkid%2Fbooks%2Fharry-potter%2F%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DScholastic%26utm_content%3Dbthgiftguide2025) \u003cbr\u003e\n\n*** \n\nThese are just a few humble gift ideas from us to get you going. We hope you find something special for that aspiring wizard or witch in your life!\n\nBe sure to join us on 1st September for worldwide [Back to Hogwarts celebrations](http://harrypotter.com/back-to-hogwarts).\n\n\\* *The Harry Potter Shop is operated by Warner Bros. Studios Leavesden Limited. Before making any purchase from the shop, please ensure that you read and are happy to agree to their terms of purchase. Any issues with your purchase should be directed to Warner Bros. Studios Leavesden Limited-you can find the relevant contact information [here](https://harrypottershop.co.uk/pages/contact-us).*\n\n\\** *Certain products on this website are offered by third parties. Before purchasing those items, you will need to agree to the third party’s purchase terms and conditions. Please ensure you read their terms and conditions before making any purchase. Any issues with your purchase should be directed to the relevant third party.*\n\n\\*** *Discount available on PlayStation Store, Xbox Store, Nintendo eShop, and Steam. Based on WB Games’ SRP. See retailers for more details. Terms apply. Final pricing is at the discretion of the retailer.*"}],"shop":[{"contentfulId":"15mmHEbN2Q6hX5WV12MHfD","type":"collection","revision":43,"locale":"en-GB","contentTypeId":"shopRow","createdAt":"2023-10-05T13:08:16.970Z","updatedAt":"2026-02-02T12:22:18.947Z","_updatedAt":"2026-02-02T12:22:18.947Z","entryTitle":"Homepage Shop Row","externalId":"homepage-shop-row","title":"Browse the bestsellers from the Harry Potter Shop","description":"From exclusive collectibles to custom wands, discover these fan favourites - perfect for gifting, or to treat yourself! ","shopifyItemId":"ww-homepage","theme":"dark"}],"relatedArticleReference":[{"contentfulId":"C4jSoe7RsQlLCjjtT414A","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"article","createdAt":"2025-07-23T08:01:39.247Z","updatedAt":"2025-08-06T15:26:54.107Z","_updatedAt":"2025-08-06T15:26:54.107Z","entryTitle":"WEB-NEWS-everything-you-need-to-know-about-back-to-hogwarts-2025","eyebrow":"THE MAGIC IS RETURNING","displayTitle":"How we're celebrating Back to Hogwarts season in 2025 ","activationDate":"2025-07-23T00:00+01:00","tags":[{"contentfulId":"6PK6KxaPndhQsAFS54UCkr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:25:53.282Z","updatedAt":"2020-02-20T13:07:09.645Z","_updatedAt":"2020-02-20T13:07:09.645Z","name":"news"}],"externalId":"how-were-celebrating-back-to-hogwarts-2025","mainImage":{"contentfu l you need to do is create and post videos around the topic of Harry Potter, using the #HarryPotter and #BacktoHogwarts hashtags, for the chance to secure magical goodies.\n\nThe video can be anything you like (within reason, *Snape voice* obviously...) but the idea is to use as much artistic license as you can to [celebrate Back to Hogwarts with us.](https://www.harrypotter.com/news/how-were-celebrating-back-to-hogwarts-2025)\n\nHere's the lowdown: \n\n1. Once you've created your incredible video, upload it to TikTok with the hashtags #BacktoHogwarts and #HarryPotter.\u003cbr\u003e\n2. As a reward, you'll get a profile frame as a thank you for joining the Challenge. \n3. If your video gets a high number of views, you could snap up a second profile frame for going more viral than The Boy Who Lived.\u003cbr\u003e\n4. If you're UK or US based, the top 50 videos will win a gift code worth £50 or $50! We're breaking the Gringotts bank for this one. Sadly, anyone outside of these territories isn't eligible for this one. \u003cbr\u003e\n5. Once your video is out in the world, bask in the Eternal Glory of your creation.\u003cbr\u003e\n\nWe can't wait to see what you come up with. To join the Challenge, follow the links below:\n\nUS: [Participate in TikTok's Post Challenge Now!](https://nam11.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.tiktok.com%2Factivity%2Flanding%2Fintelligent_campaign%3Fecosystem_activity_channel%3Decosystem_activity_template%26ecosystem_activity_bundle%3Daoc%252Ftemplate.js%26use_spark%3D1%26enter_from%3Dothers%26ecosystem_activity_id%3D7527663557090213944%26preload_storage_keys%3D%255Becosys_campaign_7527663557090213944%255D\u0026data=05%7C02%7CReece.Allgood%40wwdigital.com%7C7587079c91f7495394ab08ddd15cb6a9%7C0eb48825e8714459bc72d0ecd68f1f39%7C0%7C0%7C638896918405844710%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C\u0026sdata=MPaZ7E5sV%2B56syIY1Jxij537AEH
