IME","displayTitle":"Recipe: Quidditch cheese-stuffed onion rings","activationDate":"2024-11-12T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"recipe-quidditch-cheese-onion-rings","mainImage":{"contentfulId":"2hnq8TfpCN4fU4GNt2WfMH","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-12T13:04:44.911Z","updatedAt":"2024-11-12T13:04:44.911Z","_updatedAt":"2024-11-12T13:04:44.911Z","entryTitle":"recipe-quidditch-cheese-onion-rings-hero","image":{"contentfulId":"5ve5IJYse0cmt7I5zN96K2","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-12T13:04:41.443Z","updatedAt":"2024-11-12T13:04:41.443Z","_updatedAt":"2024-11-12T13:04:41.443Z","revision":1,"locale":"en-GB","title":"recipe-quidditch-cheese-onion-rings-hero","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5ve5IJYse0cmt7I5zN96K2/6eadae161a84dc90b347f6065d74b296/Screenshot_2024-11-12_at_13.02.35.jpg","details":{"size":205933,"image":{"width":2902,"height":1640}},"fileName":"Screenshot 2024-11-12 at 13.02.35.jpg","contentType":"image/jpeg"}}},"intro":"In celebration of Harry Potter: Wizards of Baking, Food Network are gifting us with some Harry Potter recipes to try out! Quidditch fans - this one's for you. A crunchy snack inspired by the game's scoring hoops! ","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"4dulHZdPWTEdfrCuSNufj2","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-12T15:35:07.261Z","updatedAt":"2024-11-12T15:38:47.204Z","_updatedAt":"2024-11-12T15:38:47.204Z","entryTitle":"quidditch-onion-rings-text-section-1","text":"If you're planning on having a watching party for [Harry Potter: Wizards of Baking](https://www.harrypotter.com/news/everything-we-know-about-harry-potter-wizards-of-baking) (hey, why not?) you're going to need some snacks. Harry Potter-themed snacks. Pronto! \n\nThanks to our friends at Food Network, this savoury delight might be just perfect for such an occasion. Or indeed, any. Try out your very own Quidditch hoop cheesy onion rings. \n\nYou can watch the tutorial just below or - if you're based in the US - check out the [full recipe here.](https://www.foodnetwork.com/recipes/food-network-kitchen/quidditch-cheese-stuffed-onion-rings-20975204)"},{"contentfulId":"Y2ZngY4EsGTVX27Nb8RcB","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"video","createdAt":"2024-11-13T15:26:04.382Z","updatedAt":"2024-11-13T15:26:04.382Z","_updatedAt":"2024-11-13T15:26:04.382Z","entryTitle":"Quidditch-Hoop-Onion-Rings","displayTitle":"Quidditch hoop onion rings","activationDate":"2024-11-12T00:00+00:00","externalId":"quidditch-hoop-onion-rings","mainImage":{"contentfulId":"2hnq8TfpCN4fU4GNt2WfMH","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-12T13:04:44.911Z","updatedAt":"2024-11-12T13:04:44.911Z","_updatedAt":"2024-11-12T13:04:44.911Z","entryTitle":"recipe-quidditch-cheese-onion-rings-hero","image":{"contentfulId":"5ve5IJYse0cmt7I5zN96K2","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-12T13:04:41.443Z","updatedAt":"2024-11-12T13:04:41.443Z","_updatedAt":"2024-11-12T13:04:41.443Z","revision":1,"locale":"en-GB","title":"recipe-quidditch-cheese-onion-rings-hero","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5ve5IJYse0cmt7I5zN96K2/6eadae161a84dc90b347f6065d74b296/Screenshot_2024-11-12_at_13.02.35.jpg","details":{"size":205933,"image":{"width":2902,"height":1640}},"fileName":"Screenshot 2024-11-12 at 13.02.35.jpg","contentType":"image/jpeg"}}},"videoFileSource":"https://video.wizardingworld.com/onion/h264/playlist.m3u8"},{"contentfulId":"31U8AZPPYhpjNpb1VrcXXB","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-13T15:25:58.197Z","updatedAt":"2024-11-14T13:53:37.351Z","_updatedAt":"2024-11-14T13:53:37.351Z","entryTitle":"quidditch-onion-rings-text-section-2","text":"__Recipe__\n\n- 2 large white onions, peeled and cut into 1/2-inch-thick rings \n- 8 slices provolone cheese (5 to 6 ounces), cut into 1/2-inch-wide strips \n- Canola or vegetable oil, for frying \n- 2 3/4 cups panko breadcrumbs \n- 6 teaspoons all-purpose seasoning \n- 1 1/2 cups all-purpose flour \n- Kosher salt and freshly ground black pepper \n- 3 large eggs \n- 1 1/2 cups buttermilk \n- Marinara sauce, warmed, for dipping \n\n__Directions__\n\n__Special equipment: a deep-fry thermometer__\n\n- Separate the onion rings, then place a small ring inside a large ring on a cutting board or clean work surface.\u003cbr\u003e\n- Fill the gaps between the rings with strips of provolone cheese. The cheese should fit snugly between each onion ring so that it holds the rings together and keeps them from falling apart. Refrigerate until ready to use.\u003cbr\u003e\n- Meanwhile, pour enough oil into a large heavy-bottom pot or Dutch oven to reach 2 inches up the sides. Attach a deep-fry thermometer and place over medium heat. Bring to 350 degrees F.\u003cbr\u003e\n- Place the panko in a shallow baking dish and stir in 2 teaspoons of the all-purpose seasoning until evenly combined.\u003cbr\u003e\n- Place the flour, 2 teaspoons of the all-purpose seasoning, 1/2 teaspoon of salt and several grinds of black pepper in another shallow baking dish and whisk to combine.\u003cbr\u003e\n- Place the eggs, buttermilk, remaining 2 teaspoons all-purpose seasoning, 1/2 teaspoon of salt and several grinds of black pepper in a third shallow baking dish and whisk to combine.\u003cbr\u003e\n- Dip one cheese-filled onion ring in the flour mixture, then in the egg mixture, letting the excess egg drip off. Then dip the onion ring back into the flour mixture, then back into the egg mixture. Finally place it in the panko mixture, very gently tossing until it’s evenly and well coated.\n- Transfer to a baking sheet and repeat until all the rings are coated.\u003cbr\u003e\n- Working in batches, carefully place the onion rings into the hot oil.\u003cbr\u003e\n- Fry until golden brown and crisp, 2 to 3 minutes. Remove with a slotted spoon and drain on a plate lined with paper towels. Sprinkle with salt while still warm. Serve warm with warmed marinara sauce for dipping.\n\n***\n\nAnd voila! You too can be like the expert-bakers you will soon meet on Harry Potter: Wizards of Baking. Stay tuned for more magical bakes as we have them.\n\n__Spell-binding new competition series Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\n__The show is out now to [Max](https://www.max.com/?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow) and Food Network.__"}],"publishDate":"2024-11-12T00:00+00:00"}],"publishDate":"2024-11-18T00:00+00:00"},{"contentfulId":"XGXqMr6Yk660zfbZYbacd","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-11-25T11:19:42.982Z","updatedAt":"2024-11-25T11:19:42.982Z","_updatedAt":"2024-11-25T11:19:42.982Z","entryTitle":"WEB-FEATURE-WOB-episode-two-round-up","eyebrow":"A SECOND SLICE","displayTitle":"The best bites from Harry Potter: Wizards of Baking – episode two","activationDate":"2024-11-22T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"harry-potter-wizards-of-baking-episode-two-recap","mainImage":{"contentfulId":"5DYtG64gnvjb6wrlq3qFcq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-22T13:14:36.546Z","updatedAt":"2024-11-22T13:14:36.546Z","_updatedAt":"2024-11-22T13:14:36.546Z","entryTitle":"WOB-episode-2-gringotts-vault-cake-screenshot","image":{"contentfulId":"7vtSe3YutxN2yN3N8FlJaB","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-22T13:14:32.973Z","updatedAt":"2024-11-22T13:14:32.973Z","_updatedAt":"2024-11-22T13:14:32.973Z","revision":1,"locale":"en-GB","title":"WOB-episode-2-gringotts-vault-cake-screenshot","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7vtSe3YutxN2yN3N8FlJaB/44c9af740e599896d1682d30e3fb1143/HYTU102_0596.jpeg","details":{"size":556928,"image":{"width":850,"height":567}},"fileName":"HYTU102_0596.jpeg","contentType":"image/jpeg"}}},"intro":"This week, the bakers are *banking* on getting through to the next round with a series of Gringotts inspired cakes. And a very special guest who knows a thing or two about the wizarding bank was on hand to help out. ","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"5mGIT9mu9xIv9q8MJn0Lr7","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T13:30:31.828Z","updatedAt":"2024-11-22T15:05:09.276Z","_updatedAt":"2024-11-22T15:05:09.276Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-1","text":"## Griphook returns! \n\nIn our second episode, our baking teams were taken to explore the majestic [Gringotts Wizarding Bank set](https://www.harrypotter.com/news/first-look-at-gringotts-wizarding-bank-set-at-warner-bros-studio-tour-london) at Warner Bros. Studio Tour London - enjoying its opulent architecture, detailed goblins and... Warwick Davis?! "},{"contentfulId":"2mdWipi5vHcTS8l32ccWcg","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-22T13:20:23.762Z","updatedAt":"2024-11-22T13:20:23.762Z","_updatedAt":"2024-11-22T13:20:23.762Z","entryTitle":"WOB-screenshot-episode-two-warwick-and-goblin-surprise","image":{"contentfulId":"5302BLRck3f8AnnGq7V0xv","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-22T13:20:20.925Z","updatedAt":"2024-11-22T13:20:20.925Z","_updatedAt":"2024-11-22T13:20:20.925Z","revision":1,"locale":"en-GB","title":"WOB-screenshot-episode-two-warwick-and-goblin-surprise","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5302BLRck3f8AnnGq7V0xv/5d1f3acc32d682d8f6f530d9c15c790a/HYTU102_0228.jpeg","details":{"size":646985,"image":{"width":850,"height":567}},"fileName":"HYTU102_0228.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"2XxQ6oKJBTjBfd1FHYzwnS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T13:55:42.689Z","updatedAt":"2024-11-22T15:07:58.538Z","_updatedAt":"2024-11-22T15:07:58.538Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-2","text":"Yes, the Harry Potter legend came to visit the teams this week to observe their Gringotts-inspired bakes. Warwick played not one, not two, but three roles across the eight Harry Potter movies, including Professor Flitwick - but most pertinently for this episode - the prickly [Griphook](https://www.harrypotter.com/fact-file/characters-and-pets/griphook-fact-file): a goblin Gringotts worker, who gets caught up in Harry's adventures.\n\nFrom handling gold to judging gold-standard cakes... how will Warwick fair with our baking experts, who must create delicious showstoppers framed around the themes of the Wizarding Bank?"},{"contentfulId":"4NZu68Z9EuF78jjpursA89","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-22T13:19:40.408Z","updatedAt":"2024-11-22T13:19:40.408Z","_updatedAt":"2024-11-22T13:19:40.408Z","entryTitle":"WOB-screenshot-episode-two-gringotts-hallway","image":{"contentfulId":"4wOdGG1h3QmnovZOOvfP0k","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-22T13:19:37.271Z","updatedAt":"2024-11-22T13:19:37.271Z","_updatedAt":"2024-11-22T13:19:37.271Z","revision":1,"locale":"en-GB","title":"WOB-screenshot-episode-two-gringotts-hallway","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4wOdGG1h3QmnovZOOvfP0k/b3d83cddded8e85fc1b73da2b9567310/HYTU102_0291.jpeg","details":{"size":813240,"image":{"width":850,"height":567}},"fileName":"HYTU102_0291.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"2gGKS7f9615fMd0PKw8hkD","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:04:17.806Z","updatedAt":"2024-11-22T15:06:46.551Z","_updatedAt":"2024-11-22T15:06:46.551Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-3","text":"## Baking duels\n\nAnd this time around, there is a twist! The teams will partake in 'baking duels' (well, they can't be as messy as [Snape](https://www.harrypotter.com/collections/severus-snape) facing off [Lockhart](https://www.harrypotter.com/fact-file/characters-and-pets/gilderoy-lockhart) in Duelling Club...) having their showstopping desserts judged head-to-head with select other teams. In different groups, the teams are tasked with creating three-feet high cakes full of surprises, including an enchanting effect inspired by the spell, Revelio, with the risk of going home if they do not succeed in their 'duel'. "},{"contentfulId":"6SfQT9FXQ4L6vqoYnm89IN","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:04:14.489Z","updatedAt":"2024-11-22T15:04:14.489Z","_updatedAt":"2024-11-22T15:04:14.489Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-4","text":"## Beyond the cakes \n\nWhile the bakers set about preparing their showstoppers, we learnt a little more about the contestant's backstories. Miko reveals his background as a painter, a skill he has taken into his baking (\"cakes are my canvas\") while Juan reveals he was going to be a doctor before pivoting to this very different life! \n\nWe're also seeing that Lisa is becoming the joker of the group. When asked how her cake was going (inspired by the underground Gringotts cart sequence from *Harry Potter and the Deathly Hallows Part 2*) there could only be one answer: \"on track!\" "},{"contentfulId":"3Kp0OWghL9xBZiLP2a2BLG","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-22T13:22:53.879Z","updatedAt":"2024-11-22T13:22:53.879Z","_updatedAt":"2024-11-22T13:22:53.879Z","entryTitle":"WOB-screenshot-episode-two-lisas-train-tracks-cake","image":{"contentfulId":"4zyDUX0ZksZplGjGp08cn4","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-22T13:22:51.470Z","updatedAt":"2024-11-22T13:22:51.470Z","_updatedAt":"2024-11-22T13:22:51.470Z","revision":1,"locale":"en-GB","title":"WOB-screenshot-episode-two-lisas-train-tracks-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4zyDUX0ZksZplGjGp08cn4/e24764a333ef162666170cec467a6dfd/HYTU102_0450.jpeg","details":{"size":658941,"image":{"width":850,"height":567}},"fileName":"HYTU102_0450.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"5jIO9AShydh92yuo97fPMA","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:04:10.353Z","updatedAt":"2024-11-22T15:04:10.353Z","_updatedAt":"2024-11-22T15:04:10.353Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-5","text":"## A vault with a fault\n\nBut it's all fun and games until someone's bake starts going wrong... poor Ricardo found himself having a literal meltdown in the kitchen when his chocolate bank vault started losing shape. \n\nMeanwhile, Zoe and Jordan were having similar struggles with their showpiece, trying to perfect the details on the chandeliers we see in the Gringotts' main hallway on time. \n\n\"I'm in beaded hell!\" Jordan admitted.\n\nThankfully, the finished piece came out absolutely beautifully. If it was us, we would've probably cried at our kitchen counters, but hey, that's just us."},{"contentfulId":"9wOktxXVWWpcc3JNjcrVB","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-22T14:51:08.892Z","updatedAt":"2024-11-22T14:51:08.892Z","_updatedAt":"2024-11-22T14:51:08.892Z","entryTitle":"WOB-screenshot-episode-two-beaded-show-stopper","image":{"contentfulId":"1TxTDG7LbTLdXT3sc83Wka","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-22T14:51:06.122Z","updatedAt":"2024-11-22T14:51:06.122Z","_updatedAt":"2024-11-22T14:51:06.122Z","revision":1,"locale":"en-GB","title":"WOB-screenshot-episode-two-beaded-show-stopper","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1TxTDG7LbTLdXT3sc83Wka/9cc37b4598c9869ab9e4b23b6bca4ccd/HYTU102_0537.jpeg","details":{"size":633875,"image":{"width":850,"height":567}},"fileName":"HYTU102_0537.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"4jV1ZcQKuz1uDImBp5Fwka","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:04:24.438Z","updatedAt":"2024-11-22T15:04:24.438Z","_updatedAt":"2024-11-22T15:04:24.438Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-6","text":"## Showstopper of the episode \n\nWe hate to pick favourites, but one of the particular highlights of the episode was Elizabeth and Juan's 'Teller's Desk' cake, complete with a smoking dragon and magically wriggling quills. Oh, and it had champagne in it - which always, always helps. "},{"contentfulId":"1PShsNDLWj6Lu4ruQceRAr","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-22T13:26:45.358Z","updatedAt":"2024-11-22T13:26:45.358Z","_updatedAt":"2024-11-22T13:26:45.358Z","entryTitle":"WOB-screenshot-episode-two-screenshot-the-tellers-desk","image":{"contentfulId":"1T0B4dJbcFOCnWhlLV7Ew9","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-22T13:26:42.916Z","updatedAt":"2024-11-22T13:26:42.916Z","_updatedAt":"2024-11-22T13:26:42.916Z","revision":1,"locale":"en-GB","title":"WOB-screenshot-episode-two-screenshot-the-tellers-desk","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1T0B4dJbcFOCnWhlLV7Ew9/7fc0bf6d0df6b0cfdc913ea1a7113898/HYTU102_0524.jpeg","details":{"size":633674,"image":{"width":850,"height":567}},"fileName":"HYTU102_0524.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"4WGWSlccIVnfyXPHjv6v8P","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:04:28.390Z","updatedAt":"2024-11-22T15:04:28.390Z","_updatedAt":"2024-11-22T15:04:28.390Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-7","text":"## Glimmering details\n\nBut it wasn't just this particular piece that had our mouths watering. In fact, we were imagining *goblin* a lot of these cakes up. \n\nFrom chocolate jewels to golden skulls, the bakers once again excelled themselves with some of the finer nuances of their creations. We particularly enjoyed the easter egg of capturing Vault 687 here - eagle-eyed Potter experts will know all too well that's Harry's number! "},{"contentfulId":"30wfmpCsdMzCp0tnjj28VD","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-22T13:23:44.807Z","updatedAt":"2024-11-22T13:23:44.807Z","_updatedAt":"2024-11-22T13:23:44.807Z","entryTitle":"WOB-screenshot-episode-two-gringotts-vault-detailed-cake-close-up","image":{"contentfulId":"4Pd3xibbkW3JrIKJ0zKcNS","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-22T13:23:42.334Z","updatedAt":"2024-11-22T13:23:42.334Z","_updatedAt":"2024-11-22T13:23:42.334Z","revision":1,"locale":"en-GB","title":"WOB-screenshot-episode-two-gringotts-vault-detailed-cake-close-up","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4Pd3xibbkW3JrIKJ0zKcNS/58b7b9dafb1a4d8055fd5fc3e2c324b0/HYTU102_0610.jpeg","details":{"size":616387,"image":{"width":850,"height":567}},"fileName":"HYTU102_0610.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"4ruPrH72fGvB5Lx78RzIUJ","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:03:33.347Z","updatedAt":"2024-11-22T15:04:05.114Z","_updatedAt":"2024-11-22T15:04:05.114Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-8","text":"Once again, we're not going to spoil the ending for you here on which team got eliminated... but suffice to say it was a tough decision for judges Carla and Josef. After consuming all that sugar, how could you possibly send anyone home? \n\nAlas, one team did indeed have to respectfully withdraw (yes, that's another banking joke) - but at least they got to impress Warwick Davis before they left. "},{"contentfulId":"1DVKbMAP5SCvsd7eiUmFI2","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-22T13:18:52.135Z","updatedAt":"2024-11-22T13:18:52.135Z","_updatedAt":"2024-11-22T13:18:52.135Z","entryTitle":"WOB-screenshot-episode-two-warwick-and-phelps-twins","image":{"contentfulId":"1gjUcX44C5Zn36hXqfZ3Yq","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-22T13:18:49.063Z","updatedAt":"2024-11-22T13:18:49.063Z","_updatedAt":"2024-11-22T13:18:49.063Z","revision":1,"locale":"en-GB","title":"WOB-screenshot-episode-two-warwick-and-phelps-twins","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1gjUcX44C5Zn36hXqfZ3Yq/d8820fae757468724044c3ccdd9087c6/HYTU102_0097.jpeg","details":{"size":658141,"image":{"width":850,"height":567}},"fileName":"HYTU102_0097.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"5jFaypMCVLabZF75f3HT0z","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:03:59.849Z","updatedAt":"2024-11-22T15:03:59.849Z","_updatedAt":"2024-11-22T15:03:59.849Z","entryTitle":"wizards-of-baking-generic-text-section-cta","text":"__Spell-binding new competition series Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\nThe show is out now to [Max](https://www.max.com/geo-availability?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow) and Food Network - and you can learn more about the show at our [handy hub.](https://www.harrypotter.com/harry-potter-wizards-of-baking)"}],"relatedArticleReference":[{"contentfulId":"54aTtr3Fky6BxY6lU4j9Sq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-11-19T14:05:12.864Z","updatedAt":"2024-11-19T14:05:12.864Z","_updatedAt":"2024-11-19T14:05:12.864Z","entryTitle":"WEB-FEATURE-WOB-episode-one-round-up","eyebrow":"IN CASE YOU MISSED IT","displayTitle":"The best bites from Harry Potter: Wizards of Baking – episode one ","activationDate":"2024-11-18T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"harry-potter-wizards-of-baking-episode-one-recap","mainImage":{"contentfulId":"787OuhKCGm88hqBlJn7pI6","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T16:27:09.343Z","updatedAt":"2024-11-18T16:27:09.343Z","_updatedAt":"2024-11-18T16:27:09.343Z","entryTitle":"WOB-episode-1-screengrab-mirror-of-erised","image":{"contentfulId":"7bx6oqw7AO6FNo1KXnhTyd","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T16:27:06.864Z","updatedAt":"2024-11-18T16:27:06.864Z","_updatedAt":"2024-11-18T16:27:06.864Z","revision":1,"locale":"en-GB","title":"WOB-episode-1-screengrab-mirror-of-erised","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7bx6oqw7AO6FNo1KXnhTyd/e96d1c76b670868947b48314ff966632/HYTU101_AB_0112.jpeg","details":{"size":684259,"image":{"width":850,"height":567}},"fileName":"HYTU101_AB_0112.jpeg","contentType":"image/jpeg"}}},"intro":"From moving spiders to pesky Muggle ovens... episode one of Harry Potter: Wizards of Baking was a hearty mix of wholesome Harry Potter love and kitchen drama.","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"tXK2DpQnrlsx8ARV1Onwi","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T16:45:37.341Z","updatedAt":"2024-11-18T16:45:37.341Z","_updatedAt":"2024-11-18T16:45:37.341Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-1","text":"## The contestants entered the kitchen...via Floo Powder\n\nWell, why ever not? Yes, naturally, when it came to making an entrance in the kitchen, the bakers entered via Floo Powder, through a fireplace underneath the famous Fat Lady portrait. We wish we could dramatically enter our kitchens in such a manner - or indeed any rooms, ever. "},{"contentfulId":"7gxcwv3Dj9uEdtHo7WDxvs","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T16:30:06.177Z","updatedAt":"2024-11-18T16:30:06.177Z","_updatedAt":"2024-11-18T16:30:06.177Z","entryTitle":"WOB-episode-1-screengrab-contestants-through-the-fireplace","image":{"contentfulId":"7BJDycshwNqIWEvMIB7OB0","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T16:30:01.408Z","updatedAt":"2024-11-18T16:30:01.408Z","_updatedAt":"2024-11-18T16:30:01.408Z","revision":1,"locale":"en-GB","title":"HYTU101 0038","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7BJDycshwNqIWEvMIB7OB0/023c340f09507f89dac4910acec67d12/HYTU101_0038.jpeg","details":{"size":672694,"image":{"width":850,"height":567}},"fileName":"HYTU101_0038.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"3hQKEQL8tvqlQSWnZRkztO","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T16:46:48.179Z","updatedAt":"2024-11-18T16:46:48.179Z","_updatedAt":"2024-11-18T16:46:48.179Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-2","text":"## Absolutely everyone was starstruck to meet the Phelps twins! \n\nOnce the bakers had popped out of the fireplace, they immediately found themselves face-to-face with our esteemed hosts: James and Oliver Phelps! Scream! (In fact, many of them did.) Yes, our beloved Weasley twins are back at Warner Bros. Studio Tours London to lend their twinning energy to our teams. How excited were the contestants to meet our Harry Potter stars out of ten? Well, nine and a half, obviously. "},{"contentfulId":"5K7vCQK1yELYRl8dX7Rkp7","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T16:27:29.848Z","updatedAt":"2024-11-18T16:27:29.848Z","_updatedAt":"2024-11-18T16:27:29.848Z","entryTitle":"WOB-episode-1-screengrab-phelps-brothers-posing","image":{"contentfulId":"74Cy40uSYKcOi6EY1dPeZv","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T16:27:26.816Z","updatedAt":"2024-11-18T16:27:26.816Z","_updatedAt":"2024-11-18T16:27:26.816Z","revision":1,"locale":"en-GB","title":"HYTU101 0042","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/74Cy40uSYKcOi6EY1dPeZv/58beeb5c39ed70ab66a2665c18a3ada4/HYTU101_0042.jpeg","details":{"size":642906,"image":{"width":850,"height":567}},"fileName":"HYTU101_0042.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"3D1VGpihIXN3caK50iFDHl","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T17:13:09.715Z","updatedAt":"2024-11-18T17:13:09.715Z","_updatedAt":"2024-11-18T17:13:09.715Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-3","text":"## The bakes were inevitably very magical\n\nFrom a cake that literally pumped out Hogwarts letters, to moving, edible spiders outside the Whomping Willow, our professionals did not disappoint when it came to magical baking.\n\n![HYTU101 AB 0099](//contentful.harrypotter.com/usf1vwtuqyxm/opiRru6prsn86ETOE7l5h/d76db64b00a066b4663a124eb14538c5/HYTU101_AB_0099.jpeg)\n\nA beautiful depiction of the Mirror of Erised was especially powerful, while a colourful homage to Miss Luna Lovegood went down to every quirky detail - such as her snazzy Spectrespecs.\n\n![WOB-screengrab-episode-1-luna-lovegood-cake](//contentful.harrypotter.com/usf1vwtuqyxm/5TEAc9URsTAfqTvDlgDVhI/7e4da1d48615adfbba6515aa7b25d042/HYTU101_AB_0003.jpeg)\n\nWe had Hufflepuff representation with a delicious badger themed dessert, while the star of the episode was the Whomping Willow showpiece, complete with actual, moving, edible spiders - which were actually bon bons!\n\n![HYTU101 AB 0131](//contentful.harrypotter.com/usf1vwtuqyxm/2Rvki4SlGE0dfxZ3YoM4HU/f987efa5ed304f77a7a435f58549539d/HYTU101_AB_0131.jpeg)\n\nOther cake-masterpieces included the magnificent 'Power of Patronus' showstopper, detailed with almond cake lilies, while the Potions Cabinet-themed cake (complete with lemon curd bottles!) impressed our judges Carla and Josef. And might've even impressed a certain Professor Snape.\n\nAnd a Slytherin shoutout to this snake-inspired delight... is it us, or is that snake giving us side-eye? "},{"contentfulId":"5uyDAKRlOH340XhecDVbQ3","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T16:59:11.172Z","updatedAt":"2024-11-18T16:59:11.172Z","_updatedAt":"2024-11-18T16:59:11.172Z","entryTitle":"WOB-episode-1-screengrab-judges-snake-side-eye","image":{"contentfulId":"612kib753VTnA5DBPU18e2","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T16:59:08.549Z","updatedAt":"2024-11-18T16:59:08.549Z","_updatedAt":"2024-11-18T16:59:08.549Z","revision":1,"locale":"en-GB","title":"WOB-episode-1-screengrab-judges-snake-side-eye","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/612kib753VTnA5DBPU18e2/75993d668c6f6a167c03f4b01a01258b/HYTU101_AB_0230__1_.jpg","details":{"size":65002,"image":{"width":1000,"height":667}},"fileName":"HYTU101_AB_0230 (1).jpg","contentType":"image/jpeg"}}},{"contentfulId":"7gFC7b4x2kxCTC1WXvOwD6","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T17:13:14.760Z","updatedAt":"2024-11-18T17:13:14.760Z","_updatedAt":"2024-11-18T17:13:14.760Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-4","text":"## Miko suffered the classic baking faux pas...\n\nIt was bound to be someone!\n\nYes, in our very first episode, someone forgot to turn on their oven. A (baking) tale as old as time. On this occasion, poor [Miko](https://www.harrypotter.com/news/meet-the-teams-harry-potter-wizards-of-baking) was the victim. We blame Muggle technology, quite frankly."},{"contentfulId":"6I5qrnhSR5IbIVpm4Ptqcx","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T17:05:15.866Z","updatedAt":"2024-11-18T17:05:15.866Z","_updatedAt":"2024-11-18T17:05:15.866Z","entryTitle":"WOB-episode-1-screengrab-work-in-the-kitchen","image":{"contentfulId":"50OSIByBjBxEO8tTF0GlNX","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T17:05:02.429Z","updatedAt":"2024-11-18T17:05:02.429Z","_updatedAt":"2024-11-18T17:05:02.429Z","revision":1,"locale":"en-GB","title":"WOB-episode-1-screengrab-work-in-the-kitchen","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/50OSIByBjBxEO8tTF0GlNX/a01e35efe698a2648c01eb7a24d589de/HYTU101_0552.jpeg","details":{"size":699565,"image":{"width":850,"height":567}},"fileName":"HYTU101_0552.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"2f99BWIVPYEHCFkojyVf3X","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T17:13:18.401Z","updatedAt":"2024-11-18T17:13:18.401Z","_updatedAt":"2024-11-18T17:13:18.401Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-5","text":"## And we had to say goodbye to some of the teams!\n\nAccio tissues, please! Just as we were getting to know all the teams, Josef and Carla had the difficult task of having to say goodbye to a couple before the next episode. Equipped with tickets for the next round and an invite to go on Warner Bros. Studio Tour London's Hogwarts Express, many of our bakers were delighted to get the nod. However, a couple of teams missed out by a hair.\n\nWe won't spoil it here for you who goes home, but suffice to say, tears were shed - but wizarding world friendships were made forever.\n\nIn the words of a young Harry himself, 'I'm not going home, not really.' Blub!\n\n***\n\n__Spell-binding new competition series Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\n__The show is out now to [Max](https://www.max.com/geo-availability?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow) and Food Network.__"}],"relatedArticleReference":[{"contentfulId":"6qR0tdLL7Tcl5UaUyrkLmU","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-11-15T13:19:28.390Z","updatedAt":"2024-11-15T13:20:10.082Z","_updatedAt":"2024-11-15T13:20:10.082Z","entryTitle":"WEB-FEATURE-phelps-twins-quickfire-chat","eyebrow":"TWINNING","displayTitle":"\"We've been cracki jpg","contentType":"image/jpeg"}}},"videoFileSource":"https://video.wizardingworld.com/onion/h264/playlist.m3u8"},{"contentfulId":"31U8AZPPYhpjNpb1VrcXXB","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-13T15:25:58.197Z","updatedAt":"2024-11-14T13:53:37.351Z","_updatedAt":"2024-11-14T13:53:37.351Z"}],"publishDate":"2024-11-12T00:00+00:00"}],"publishDate":"2024-11-18T00:00+00:00"},{"contentfulId":"6qR0tdLL7Tcl5UaUyrkLmU","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-11-15T13:19:28.390Z","updatedAt":"2024-11-15T13:20:10.082Z","_updatedAt":"2024-11-15T13:20:10.082Z","entryTitle":"WEB-FEATURE-phelps-twins-quickfire-chat","eyebrow":"TWINNING","displayTitle":"\"We've been cracking eggs wrong all our lives!\" - the Phelps twins unpack Harry Potter: Wizards of Baking","activationDate":"2024-11-15T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"phelps-twins-unpack-harry-potter-wizards-of-baking","mainImage":{"contentfulId":"Hq6GZ63nsQJrcnNgslJbq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2022-03-28T16:09:54.611Z","updatedAt":"2022-03-28T16:09:54.611Z","_updatedAt":"2022-03-28T16:09:54.611Z","entryTitle":"HP-F5-order-of-the-phoenix-fred-george-grimmauld-place-smirking-web-landscape","image":{"contentfulId":"36sCgYCfRssVNuVo30TsJL","type":"Asset","contentTypeId":"asset","createdAt":"2022-03-28T16:09:48.584Z","updatedAt":"2024-11-15T12:23:26.420Z","_updatedAt":"2024-11-15T12:23:26.420Z","revision":2,"locale":"en-GB","title":"HP-F5-order-of-the-phoenix-fred-george-grimmauld-place-smirking-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/36sCgYCfRssVNuVo30TsJL/b5d6eaff37bbc26c82fc76ef4fbce204/HP-F5-order-of-the-phoenix-fred-george-grimmauld-place-smirking-web-landscape","details":{"size":659735,"image":{"width":1937,"height":954}},"fileName":"HP-F5-order-of-the-phoenix-fred-george-grimmauld-place-smirking-web-landscape","contentType":"image/jpeg"}},"imageAltText":"Fred and George sat down in Grimmauld place, wearing matching shirts and smirking.","source":[{"contentfulId":"6vSblg4bo8ERfWv6wulvcW","type":"Link"}]},"teaserImage":{"contentfulId":"5tCEVbJcNFMeAp6evw88yL","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-12T15:48:13.474Z","updatedAt":"2024-11-12T15:48:13.474Z","_updatedAt":"2024-11-12T15:48:13.474Z","entryTitle":"Phelps-brothers-WOB-crop","image":{"contentfulId":"3HuwDqCndz0Q2vszV6Hlti","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-12T15:48:10.314Z","updatedAt":"2024-11-12T15:48:10.314Z","_updatedAt":"2024-11-12T15:48:10.314Z","revision":1,"locale":"en-GB","title":"Phelps-brothers-WOB-crop","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3HuwDqCndz0Q2vszV6Hlti/cdf65cf4d64289579028651b3335f6a3/Phelps-brothers-WOB-crop.png","details":{"size":1236292,"image":{"width":1030,"height":480}},"fileName":"Phelps-brothers-WOB-crop.png","contentType":"image/png"}}},"intro":"James and Oliver Phelps are the hosts of Harry Potter: Wizards of Baking - the show where teams of talented bakers must create Harry Potter-inspired showstoppers. We had a quick chat with the brothers to discuss cake science, reuniting with old cast-members and much more.","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"4K2N2O9FYy14W7VmmH1qKi","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-15T13:19:25.904Z","updatedAt":"2024-11-15T13:24:01.006Z","_updatedAt":"2024-11-15T13:24:01.006Z","entryTitle":"phelps-twins-unpack-harry-potter-wizards-of-baking","text":"## How does it feel to be hosting a baking show?\n\nVery, very excited to be honest with you. It’s like something we’ve always watched with our families, baking shows. This is the first time in a long time I’ve said to my wife or daughter ‘oh yeah, we’re doing this show’ and they actually wanna come to set and see what’s going on – because we just love that format of show. \n\nI remember reading that the best host to be is: it's not about you, it's about the people you're shining a light on. So we definitely took that on board.\n\n## What was it like seeing all of these professionals from different cultures coming together?\n\nWell I think that’s what makes it – because we actually filmed at the [Warner Bros. Studio Tour London], where we filmed the movies, and these [contestants] are the best of the best at what they do. So getting them together, pairing them in teams, and they had never worked together before – so seeing those relationships form – ‘are they gonna get on?’ all that kind of thing, but it’s amazing how professional they can be to get a particular bake done in 10 hours that would usually take 2 weeks.\n\nIf you’re building a five-foot phoenix – yeah, that’s gonna take about 2 weeks to do. 'OK, you’ve got 10 hours!' And you’re gonna have two people coming over to ask 'how’s it going?’ But what was great to be there to witness the masters do what they do best. We enjoy baking – but even little things like learning how to properly crack an egg. I’ve been cracking eggs wrong my entire life! \n\n\u003ciframe width=\"560\" height=\"315\" src=\"https://www.youtube.com/embed/vPnOJpqkXzQ?si=yf11F5kS4Q3QyDLR\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen\u003e\u003c/iframe\u003e\n\n## Do you guys bake yourselves? And is one better than the other? \n\nWe definitely enjoy baking – as kids it was always something around us. Our grandmother would always be showing us how food was put together and our parents were the same. I don’t know if it was just to entertain us for a bit, but my dad would normally say, 'right, why don’t you go make some cakes in the kitchen' and we’d go and do it – so it was cool seeing that side of it.\n\nIt was very removed from a big professional kitchen with these guys. Here, you’ve got a baker but also got the patisserie chef – so you get to see the different types of baking as well which was really cool. A couple of contestants were molecular gastronomists (\"He's only saying that because he’s just learnt how to pronounce that\") who were pretty much scientists in the kitchen. \n\n## What kind of baking wizardry did you get to witness?\n\nThey would make stuff up – one contestant – [Mitzi](https://www.harrypotter.com/news/meet-the-teams-harry-potter-wizards-of-baking) made this mango caramel, which literally melted in your mouth when you had it. And I think she realised that we liked to taste samples to the point where she basically gave us a whole tray of it. Which is great, because we don’t have a casting vote on who goes through, so it's better because people kept being like, 'try this one, try this one' - definitely a perk of a job.\n\nBut Carla and Josef, the judges, they do such a great job of describing what everything tastes like, what flavours work with what – and it’s actually made me appreciate flavours of food I eat now. Because off-camera I asked Clara, “describe me eating this Twix” and it was so weird, she described everything that was in this chocolate bar. And she does that on camera too; yes it is about what things looks like, but ultimately this is a baking show. So it helps bring all the viewers in on it, but makes you very hungry too.\n\n## How was it reuniting with former cast members, such as Bonnie Wright, Evanna Lynch and Warwick Davies?\n\nThere were moments where it felt like we were in a time machine and there was no time between filming the last movie and this. And we had to film it at night, because it’s filmed at the Studio Tour – so they weren’t gonna close the studios off – so we we were filming at 1 or 2 in the morning on the set. So we were in this space, but at the same time, it just felt like, especially when we had Warwick, Bonnie and Evie with us, it was very much a case of “oh wow, a lot has happened in the past 12, 13 years since we were last here” but we just fell straight back into that world. And we think a lot of viewers will feel the same way, back in that nostalgic zone.\n\n## What are some of the biggest showstopper moments fans can expect to see?\n\nEven for the very first episode, the Patronus that Elizabeth crafted was just absolutely incredible. And you see the standard from the very beginning. It's not just “oh we’re gonna make a standard cake and put a Hogwarts scarf on it” – they really went to town and you realise early on that these are the best they do. \n\nIn that first episode, when Ricardo makes the crawling spiders – they tasted amazing and were actually peanut butter bon-bons, which was insane.\n\n***\n\n__Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\n__Harry Potter: Wizards of Baking is premiering tonight at 8|7c on Food Network and streaming on [Max](https://www.max.com/geo-availability?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow).__"}],"relatedArticleReference":[{"contentfulId":"6Gb1nUE1FfGSBdhVRYq13l","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-11-05T10:54:30.646Z","updatedAt":"2024-11-14T13:44:31.294Z","_updatedAt":"2024-11-14T13:44:31.294Z","entryTitle":"WEB-NEWS-everything-we-know-about-wizards-of-baking-so-far","eyebrow":"BAKING MAGIC","displayTitle":"Everything we know so far about Harry Potter: Wizards of Baking","activationDate":"2024-11-04T00:00+00:00","tags":[{"contentfulId":"6PK6KxaPndhQsAFS54UCkr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:25:53.282Z","updatedAt":"2020-02-20T13:07:09.645Z","_updatedAt":"2020-02-20T13:07:09.645Z","name":"news"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"}],"externalId":"everything-we-know-about-harry-potter-wizards-of-baking","mainImage":{"contentfulId":"1nvDfZdqWpW2baiqLjNROa","type":"Entry","revisio ://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"6OfOl5yN1ievYVqUcUK7Rr","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-05T10:43:35.719Z","updatedAt":"2024-11-15T15:15:19.570Z","_updatedAt":"2024-11-15T15:15:19.570Z","entryTitle":"everything-we-know-about-harry-potter-wizards-of-baking-text-section-1","text":"__UPDATE: Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\n__Harry Potter: Wizards of Baking is premiering tonight at 8|7c on Food Network and streaming on [Max.](https://www.max.com/?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow)__\n\nAnd here's a very special first look at the opening of the show!"},{"contentfulId":"29eFTdYSTL3Rse1KlOX8M9","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"video","createdAt":"2024-11-04T19:53:05.050Z","updatedAt":"2024-11-05T10:54:27.691Z","_updatedAt":"2024-11-05T10:54:27.691Z","entryTitle":"WOB-opening-segment","displayTitle":"Harry Potter: Wizards of Baking | Opening segment ","activationDate":"2024-11-04T00:00+00:00","externalId":"wizards-of-baking-opener","mainImage":{"contentfulId":"4KdQJz95z4Ls4CU5uk4YGB","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-05T10:54:23.466Z","updatedAt":"2024-11-05T10:54:23.466Z","_updatedAt":"2024-11-05T10:54:23.466Z","entryTitle":"WOB-logo-official","image":{"contentfulId":"VLXYc8eBTiuVNN9zLeWMR","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-05T10:54:18.884Z","updatedAt":"2024-11-05T10:54:18.884Z","_updatedAt":"2024-11-05T10:54:18.884Z","revision":1,"locale":"en-GB","title":"WOB-logo-official","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/VLXYc8eBTiuVNN9zLeWMR/3fbdcc318c68fb79e4b81bb59df8496f/WIZARDS_OF_BAKING_LOGO_300dpi__2_.jpg","details":{"size":223705,"image":{"width":1920,"height":1080}},"fileName":"WIZARDS OF BAKING LOGO 300dpi (2).jpg","contentType":"image/jpeg"}}},"videoFileSource":"https://video.wizardingworld.com/wob-open/h264/playlist.m3u8"},{"contentfulId":"307OILkHhY12oZuaWEZqE2","type":"Entry","revision":17,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-04T17:52:46.418Z","updatedAt":"2024-11-15T15:16:16.653Z","_updatedAt":"2024-11-15T15:16:16.653Z","entryTitle":"everything-we-know-about-harry-potter-wizards-of-baking-text-section-2","text":"## The series will stream on Max across available territories\n\nIf you're in the right territory to stream Max, ([you can find out here)](https://www.harrypotter.com/features/how-to-stream-harry-potter-wherever-you-are) Harry Potter: Wizards of Baking will be available via Food Network. The show launches exclusively on Prime Video in the UK and Ireland on 17th December.\n\n## The series is filmed at the home of the Harry Potter films\n\nYes! Our pastry chefs will be whisking, chopping, rolling and sprinkling their way through a series of spellbinding challenges at the most magical place of all: [Warner Bros. Studio Tour London.](https://www.wbstudiotour.co.uk/) Perhaps the magical settings will inspire our bakers. And at the end, their grand trophy will be presented to them in the Great Hall set - just as if it were the House Cup! \n\n## The Phelps twins are your esteemed hosts\n\nThey've conquered Weasleys' Wizard Wheezes, and now, the Phelps twins are entering the messy world of baking (well, the Weasley twins did perfect a Canary Cream once upon a time...) and they're not alone. Judges Carla Hall and Jozel Youssef will be on hand to offer culinary tips to the competing bakers.\n\n## Expect guests from the Harry Potter films\n\nIf it wasn't enough having to create show-stopping works of baked art, the bakers will also be greeted with some special visitors throughout the show! From Bonnie Wright to Warwick Davis to Evanna Lynch, will our celebrity guests inspire the contestants... or create a distraction?\n\n## The bakers will come in pairs\n\nBaking can be a stressful experience as many of you will know. But thankfully, for these professionals, they will be buddied up. \n\nEach team will come in pairs to create their confectionary creations. Teams competing are: Kimberly Adams (Milwaukee, MI) and Ashley Cardona (Charleston, SC), Lisa Altfest (Orange County, CA) and Mitzi Reyes (Los Angeles, CA), Hemu Basumatary (Katy, TX) and Riccardo Menicucci (Los Angeles, CA), Zoe Burmester (Brooklyn, NY) and Jordan Pilarski (Ojai, CA), Jess Lewis (Washington, DC) and Jamie Louks (Seattle, WA), Kayla Giddings(Lafayette, LA) and Yohann Le Bescond (Ocala, FL), Juan Gutierrez (Chicago, IL) and Elizabeth Rowe (Dallas, TX), Michael Russ II (Modesto, CA) and Conner Strackman (Smithville, TX), and Christopher Teixeira (Chicago, IL) and Miko Uy (Astoria, NY).\n\n## The showstoppers will be themed around characters, settings and magical moments from the Harry Potter series\n\nIn the clip above, we spotted a breathtaking [Patronus](https://www.harrypotter.com/features/what-is-a-patronus) piece, a Fawkes the Phoenix showstopper and a homage to the Whomping Willow (we wish we could be *chomping* that Willow!) complete with a moving spider! What other wizardry will our bakers conjure up?\n\n## The prize will be a Wizards of Baking Cup!\n\nAlongside an inclusion in the new Harry Potter cookbook. And in the words of Dumbledore, probably a bit of 'eternal glory' too. But who will it be - and what will be our favourite bewitching bake?! We are hungry for more already.\n\n***\n\n__Harry Potter: Wizards of Baking premieres Thursday, 14th November on Food Network and globally on [Max](https://www.max.com/?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow).__\n\n__Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\n__You can check out the #WizardsOfBaking hashtag (if you're old enough!) to follow the conversation.__"}],"relatedArticleReference":[{"contentfulId":"4kWrlrshvWzOctFc8wZRrq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-09-26T18:24:19.555Z","updatedAt":"2024-09-26T18:24:19.555Z","_updatedAt":"2024-09-26T18:24:19.555Z","entryTitle":"WEB-NEWS-hpwob-trailer-and-details-announced","eyebrow":"FEAST YOUR EYES","displayTitle":"Check out the new trailer and launch date for Harry Potter: Wizards of Baking","activationDate":"2024-09-26T00:00+01:00","tags":[{"contentfulId":"6PK6KxaPndhQsAFS54UCkr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:25:53.282Z","updatedAt":"2020-02-20T13:07:09.645Z","_updatedAt":"2020-02-20T13:07:09.645Z","name":"news"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"}],"externalId":"harry-potter-wizards-of-baking-releases-trailer-and-launch-date","mainImage":{"contentfulId":"6zzzVopC5pEP0VNypsw8g3","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-09-23T16:40:48.327
