":"image/jpeg"}}},"intro":"This new Harry Potter-themed baking show promises to make your mouth magically water. Launching on Food Network and streaming on Max now, here’s everything we know so far about this culinary competition series - and how you can tune in. ","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"6OfOl5yN1ievYVqUcUK7Rr","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-05T10:43:35.719Z","updatedAt":"2024-11-15T15:15:19.570Z","_updatedAt":"2024-11-15T15:15:19.570Z","entryTitle":"everything-we-know-about-harry-potter-wizards-of-baking-text-section-1","text":"__UPDATE: Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\n__Harry Potter: Wizards of Baking is premiering tonight at 8|7c on Food Network and streaming on [Max.](https://www.max.com/?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow)__\n\nAnd here's a very special first look at the opening of the show!"},{"contentfulId":"29eFTdYSTL3Rse1KlOX8M9","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"video","createdAt":"2024-11-04T19:53:05.050Z","updatedAt":"2024-11-05T10:54:27.691Z","_updatedAt":"2024-11-05T10:54:27.691Z","entryTitle":"WOB-opening-segment","displayTitle":"Harry Potter: Wizards of Baking | Opening segment ","activationDate":"2024-11-04T00:00+00:00","externalId":"wizards-of-baking-opener","mainImage":{"contentfulId":"4KdQJz95z4Ls4CU5uk4YGB","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-05T10:54:23.466Z","updatedAt":"2024-11-05T10:54:23.466Z","_updatedAt":"2024-11-05T10:54:23.466Z","entryTitle":"WOB-logo-official","image":{"contentfulId":"VLXYc8eBTiuVNN9zLeWMR","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-05T10:54:18.884Z","updatedAt":"2024-11-05T10:54:18.884Z","_updatedAt":"2024-11-05T10:54:18.884Z","revision":1,"locale":"en-GB","title":"WOB-logo-official","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/VLXYc8eBTiuVNN9zLeWMR/3fbdcc318c68fb79e4b81bb59df8496f/WIZARDS_OF_BAKING_LOGO_300dpi__2_.jpg","details":{"size":223705,"image":{"width":1920,"height":1080}},"fileName":"WIZARDS OF BAKING LOGO 300dpi (2).jpg","contentType":"image/jpeg"}}},"videoFileSource":"https://video.wizardingworld.com/wob-open/h264/playlist.m3u8"},{"contentfulId":"307OILkHhY12oZuaWEZqE2","type":"Entry","revision":17,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-04T17:52:46.418Z","updatedAt":"2024-11-15T15:16:16.653Z","_updatedAt":"2024-11-15T15:16:16.653Z","entryTitle":"everything-we-know-about-harry-potter-wizards-of-baking-text-section-2","text":"## The series will stream on Max across available territories\n\nIf you're in the right territory to stream Max, ([you can find out here)](https://www.harrypotter.com/features/how-to-stream-harry-potter-wherever-you-are) Harry Potter: Wizards of Baking will be available via Food Network. The show launches exclusively on Prime Video in the UK and Ireland on 17th December.\n\n## The series is filmed at the home of the Harry Potter films\n\nYes! Our pastry chefs will be whisking, chopping, rolling and sprinkling their way through a series of spellbinding challenges at the most magical place of all: [Warner Bros. Studio Tour London.](https://www.wbstudiotour.co.uk/) Perhaps the magical settings will inspire our bakers. And at the end, their grand trophy will be presented to them in the Great Hall set - just as if it were the House Cup! \n\n## The Phelps twins are your esteemed hosts\n\nThey've conquered Weasleys' Wizard Wheezes, and now, the Phelps twins are entering the messy world of baking (well, the Weasley twins did perfect a Canary Cream once upon a time...) and they're not alone. Judges Carla Hall and Jozel Youssef will be on hand to offer culinary tips to the competing bakers.\n\n## Expect guests from the Harry Potter films\n\nIf it wasn't enough having to create show-stopping works of baked art, the bakers will also be greeted with some special visitors throughout the show! From Bonnie Wright to Warwick Davis to Evanna Lynch, will our celebrity guests inspire the contestants... or create a distraction?\n\n## The bakers will come in pairs\n\nBaking can be a stressful experience as many of you will know. But thankfully, for these professionals, they will be buddied up. \n\nEach team will come in pairs to create their confectionary creations. Teams competing are: Kimberly Adams (Milwaukee, MI) and Ashley Cardona (Charleston, SC), Lisa Altfest (Orange County, CA) and Mitzi Reyes (Los Angeles, CA), Hemu Basumatary (Katy, TX) and Riccardo Menicucci (Los Angeles, CA), Zoe Burmester (Brooklyn, NY) and Jordan Pilarski (Ojai, CA), Jess Lewis (Washington, DC) and Jamie Louks (Seattle, WA), Kayla Giddings(Lafayette, LA) and Yohann Le Bescond (Ocala, FL), Juan Gutierrez (Chicago, IL) and Elizabeth Rowe (Dallas, TX), Michael Russ II (Modesto, CA) and Conner Strackman (Smithville, TX), and Christopher Teixeira (Chicago, IL) and Miko Uy (Astoria, NY).\n\n## The showstoppers will be themed around characters, settings and magical moments from the Harry Potter series\n\nIn the clip above, we spotted a breathtaking [Patronus](https://www.harrypotter.com/features/what-is-a-patronus) piece, a Fawkes the Phoenix showstopper and a homage to the Whomping Willow (we wish we could be *chomping* that Willow!) complete with a moving spider! What other wizardry will our bakers conjure up?\n\n## The prize will be a Wizards of Baking Cup!\n\nAlongside an inclusion in the new Harry Potter cookbook. And in the words of Dumbledore, probably a bit of 'eternal glory' too. But who will it be - and what will be our favourite bewitching bake?! We are hungry for more already.\n\n***\n\n__Harry Potter: Wizards of Baking premieres Thursday, 14th November on Food Network and globally on [Max](https://www.max.com/?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow).__\n\n__Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\n__You can check out the #WizardsOfBaking hashtag (if you're old enough!) to follow the conversation.__"}],"relatedArticleReference":[{"contentfulId":"4kWrlrshvWzOctFc8wZRrq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-09-26T18:24:19.555Z","updatedAt":"2024-09-26T18:24:19.555Z","_updatedAt":"2024-09-26T18:24:19.555Z","entryTitle":"WEB-NEWS-hpwob-trailer-and-details-announced","eyebrow":"FEAST YOUR EYES","displayTitle":"Check out the new trailer and launch date for Harry Potter: Wizards of Baking","activationDate":"2024-09-26T00:00+01:00","tags":[{"contentfulId":"6PK6KxaPndhQsAFS54UCkr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:25:53.282Z","updatedAt":"2020-02-20T13:07:09.645Z","_updatedAt":"2020-02-20T13:07:09.645Z","name":"news"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"}],"externalId":"harry-potter-wizards-of-baking-releases-trailer-and-launch-date","mainImage":{"contentfulId":"6zzzVopC5pEP0VNypsw8g3","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-09-23T16:40:48.327Z","updatedAt":"2024-09-23T16:40:48.327Z","_updatedAt":"2024-09-23T16:40:48.327Z","entryTitle":"HP-WOB-host-shot-web-landscape","image":{"contentfulId":"4Aidew8BgoEKQdbknhQEMn","type":"Asset","contentTypeId":"asset","createdAt":"2024-09-23T16:40:45.390Z","updatedAt":"2024-09-23T16:40:45.390Z","_updatedAt":"2024-09-23T16:40:45.390Z","revision":1,"locale":"en-GB","title":"HP-WOB-host-shot-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4Aidew8BgoEKQdbknhQEMn/5133e92ce4c64c8fb4f3b0991c1d4d71/a29c3129-9025-4230-a6df-387c10981ce4.jpg","details":{"size":558085,"image":{"width":2560,"height":1706}},"fileName":"a29c3129-9025-4230-a6df-387c10981ce4.jpg","contentType":"image/jpeg"}}},"intro":"Who’s hungry? We’ve got a freshly baked new trailer for the upcoming collaboration with Food Network, Harry Potter: Wizards of Baking – and a few extra details on this upcoming competition series – launching this November. ","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"7oM7ITY1RJNxNaDNEKOpji","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-09-26T18:24:14.532Z","updatedAt":"2024-09-26T18:24:14.532Z","_updatedAt":"2024-09-26T18:24:14.532Z","entryTitle":"harry-potter-wizards-of-baking-releases-trailer-and-launch-date-text-section","text":"Hosted by James and Oliver Phelps, AKA the Weasley twins, Harry Potter: Wizards of Baking is an upcoming culinary competition with a Harry Potter twist. Launching 14th November (just in time for the festive season) here’s a little taster before the show launches. \n\n\u003ciframe width=\"560\" height=\"315\" src=\"https://www.youtube-nocookie.com/embed/vPnOJpqkXzQ?si=BGJopTkND4PY2VXO?rel=0\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen\u003e\u003c/iframe\u003e\n\nNine teams of pastry chefs will be pitted against each other across six episodes to deliver spellbinding showpieces to esteemed judges, Carla Hall and Jozef Youssef. And yes, each bake will be inspired by the themes of the wizarding world. But hopefully, no one will be inspired by Rubeus Hagrid’s famous rock cakes.\n\nFilmed in Leavesden, the home of the Harry Potter films, you can expect to see some magical alumni pop up to give their two cents. Warwick Davis, Evanna Lynch and Bonnie Wright will be stepping into the studio to share some nostalgic movie memories with us all - and probably a few sneaky tastes of the contestants’ concoctions too! \n\nEach team will come in pairs to create their confectionary creations. Teams competing are: Kimberly Adams (Milwaukee, MI) and Ashley Cardona (Charleston, SC), Lisa Altfest (Orange County, CA) and Mitzi Reyes (Los Angeles, CA), Hemu Basumatary  (Katy, TX) and Riccardo Menicucci (Los Angeles, CA), Zoe Burmester (Brooklyn, NY) and Jordan Pilarski (Ojai, CA), Jess Lewis (Washington, DC) and Jamie Louks (Seattle, WA), Kayla Giddings(Lafayette, LA) and Yohann Le Bescond(Ocala, FL), Juan Gutierrez (Chicago, IL) and Elizabeth Rowe (Dallas, TX), Michael Russ II (Modesto, CA) and Conner Strackman (Smithville, TX), and Christopher Teixeira (Chicago, IL) and Miko Uy (Astoria, NY). \n\nSo! Who will win the first-ever Wizards of Baking Cup? We can’t wait to find out. __Harry Potter: Wizards of Baking premieres Thursday, 14th November__ on Food Network and globally on Max where the platform is available (with further broadcasters to be announced). \n\n***\n\n*You can check out the #WizardsOfBaking hashtag to follow the conversation about the show. Maybe you can even show us your own kitchen creations!*"}],"publishDate":"2024-09-26T00:00+01:00"},{"contentfulId":"PbNNGVrEmh9T7Vqakgxha","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-05-15T15:15:19.447Z","updatedAt":"2024-05-15T15:25:22.637Z","_updatedAt":"2024-05-15T15:25:22.637Z","entryTitle":"WEB-NEWS-baking-show-announce","eyebrow":"WINGARDI-YUM LEVIOSA","displayTitle":"New competition show, Harry Potter: Wizards of Baking, coming soon!","activationDate":"2024-05-15T00:00+01:00","tags":[{"contentfulId":"6PK6KxaPndhQsAFS54UCkr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:25:53.282Z","updatedAt":"2020-02-20T13:07:09.645Z","_updatedAt":"2020-02-20T13:07:09.645Z","name":"news"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"}],"externalId":"harry-potter-wizards-of-baking-coming-soon","mainImage":{"contentfulId":"K46Wm0UOx4EieY4yHT9Ev","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-05-15T15:15:14.670Z","updatedAt":"2024-05-15T15:15:14.670Z","_updatedAt":"2024-05-15T15:15:14.670Z","entryTitle":"HP-Baking-Show-Homepage-Hero-generic","image":{"contentfulId":"nuS1ZkP62SDxqvNm31EB7","type":"Asset","contentTypeId":"asset","createdAt":"2024-05-15T15:15:00.362Z","updatedAt":"2024-05-15T15:15:00.362Z","_updatedAt":"2024-05-15T15:15:00.362Z","revision":1,"locale":"en-GB","title":"HP-Baking-Show-Homepage-Hero-generic","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/nuS1ZkP62SDxqvNm31EB7/25f05e218d2b36115cb600735bd20dcb/Partnership_Harry_Potter_Wizards_of_Baking_Thumbnail_V1_ALT.png","details":{"size":2861434,"image":{"width":1920,"height":1080}},"fileName":"Partnership Harry Potter_Wizards of Baking_Thumbnail_V1_ALT.png","contentType":"image/png"}}},"intro":"Accio aprons! Today, the Food Network announced the upcoming launch of an exciting new baking programme, all inspired by Harry Potter. Set at Warner Bros. Studio Tour London – the Making of Harry Potter, fans can expect spellbinding sweet creations, special guests and much more.","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"4ojB8JFsDOKvlf2ArnRRjW","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-05-14T13:34:28.235Z","updatedAt":"2024-05-15T15:27:16.293Z","_updatedAt":"2024-05-15T15:27:16.293Z","entryTitle":"harry-potter-wizards-of-baking-coming-soon-text-section-1","text":"What happens when the magic of the wizarding world meets pots, pans and lots and lots of cake mix? Well, we’re soon to find out, following the news today that the Food Network has a new baking competition straight out of the oven, all in the name of Harry Potter!\n\n\u003ciframe width=\"560\" height=\"315\" src=\"https://www.youtube-nocookie.com/embed/VR3z5Oyn4A4?si=7-NyJVe4SajWQguR?rel=0\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen\u003e\u003c/iframe\u003e\n\nHarry Potter: Wizards of Baking invites fans to mix, whisk and glaze their way to success, with professional pastry chefs competing against each other to create enchanting sweet treats, themed around the Harry Potter stories. Will the bakers be able to channel their inner Mrs Weasley? Or will their attempts be as successful as one of Seamus Finnigan’s exploding cauldrons?  \n\nFilmed in [Leavesden, the home of the Harry Potter film series](https://www.wizardingworld.com/discover/experiences/warner-bros-studio-tour-london-the-making-of-harry-potter), you’ll be able to watch the competition unfold at the very place where the stories were brought to life, with locations including The Burrow, The Great Hall and Gringotts Wizarding Bank. Perhaps these sets will help spur the contestants on, especially as they will then have their culinary creations inspected by a panel of judges. We hope the results will be Wingardi-yum Leviosa. \n\nHarry Potter: Wizards of Baking will be available to [stream on Max](https://www.wizardingworld.com/news/introducing-enhanced-streaming-service-max) and via The Food Network. We’ll reveal more about when the show is airing quicker than you can say treacle fudge. Stay tuned!  \n\n[Sign up to the Harry Potter Fan Club today](https://www.wizardingworld.com/register) to discover more Harry Potter news, hot off the press. "}],"publishDate":"2024-05-14T00:00+01:00"},{"contentfulId":"6xbX48aAgszoGXCDzTRBIp","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-09-01T10:03:57.520Z","updatedAt":"2024-09-01T10:11:34.328Z","_updatedAt":"2024-09-01T10:11:34.328Z","entryTitle":"WEB-NEWS-18-things-we-learnt-from-the-back-to-hogwarts-showcase","eyebrow":"START-OF-TERM VIBES","displayTitle":"18 things we learnt from the Back to Hogwarts showcase 2024","activationDate":"2024-08-28T00:00+01:00","tags":[{"contentfulId":"6PK6KxaPndhQsAFS54UCkr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:25:53.282Z","updatedAt":"2020-02-20T13:07:09.645Z","_updatedAt":"2020-02-20T13:07:09.645Z","name":"news"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"}],"externalId":"everything-we-learnt-from-the-back-to-hogwarts-showcase-2024","mainImage":{"contentfulId":"4BGT9VbDZ7x7soCLrqJvxF","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-08-30T10:35:08.228Z","updatedAt":"2024-08-30T10:35:08.228Z","_updatedAt":"2024-08-30T10:35:08.228Z","entryTitle":"Wizards-of-Baking-trailer-screengrab","image":{"contentfulId":"5qaLXFane6wJnJixkJ9U1W","type":"Asset","contentTypeId":"asset","createdAt":"2024-08-30T10:35:05.137Z","updatedAt":"2024-08-30T10:35:05.137Z","_updatedAt":"2024-08-30T10:35:05.137Z","revision":1,"locale":"en-GB","title":"Wizards-of-Baking-trailer-screengrab","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5qaLXFane6wJnJixkJ9U1W/ec6ead40e58b057346dddfda96a3b7bf/Screenshot_2024-08-30_at_11.34.14.png","details":{"size":6121904,"image":{"width":2884,"height":1496}},"fileName":"Screenshot 2024-08-30 at 11.34.14.png","contentType":"image/png"}}},"intro":"A nostalgic LEGO treat... A glimmer of Universal Epic Universe... a slice from upcoming show Harry Potter: Wizards of Baking... here’s everything you need to know from our annual showcase on all things Harry Potter!","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"32CgDHSa14Q2FE5aE1tpQc","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-08-30T10:37:20.992Z","updatedAt":"2024-09-03T13:13:45.948Z","_updatedAt":"2024-09-03T13:13:45.948Z","entryTitle":"everything-we-learnt-from-the-back-to-hogwarts-showcase-2024-text-section","text":"On Back to Hogwarts day, we like to kick things off with a few start-of-term announcements – much like Albus Dumbledore. As well as getting nostalgic and looking back... here’s a glimpse into the beyond. \n\nFrom experiences to games to new products, here’s everything to look forward to in the world of Harry Potter for 2024 and 2025. \n\n\u003ciframe width=\"560\" height=\"315\" src=\"https://www.youtube-nocookie.com/embed/g_F5_Jg9oOA?si=zGwJLMlufGt2uRlJ?rel=0\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen\u003e\u003c/iframe\u003e\n\n__TV__\n\n## Take a look at upcoming competition series, Harry Potter: Wizards of Baking\n\nWhile the likes of Severus Snape prefer to mix potions, we’re excited to watch Harry Potter-loving bakers battle with cake mix instead. Yes, Harry Potter: Wizards of Baking, courtesy of the Food Network (available to stream on Max) is coming to you very soon. Hosted by James and Oliver Phelps (the Weasley twins + baking? That’s never going to end well...) get ready for all sorts of delicious concoctions with a wizarding twist.\n\n\u003ciframe width=\"560\" height=\"315\" src=\"https://www.youtube-nocookie.com/embed/WG2CbG-QxQU?si=1G4JvEulzSSCgNpB?rel=0\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen\u003e\u003c/iframe\u003e\n\nWe already are in love with that Fawkes the Phoenix creation. How could you ever eat it!\n\n__Magical merch__\n\n## Puma launches new Harry Potter collaboration with Breanna Stewart\n\n![breanna-for-puma-harry-potter-collab](//contentful.harrypotter.com/usf1vwtuqyxm/LG8jnTZsdA1uDVMpBAHVc/90287eef05584575d6703fe8a06cd012/breanna-for-puma-harry-potter-collab.png)\n\nCelebrate the magic of basketball with this new launch of Harry Potter-themed kicks from Puma. Watch star of the WNBA, Breanna “Stewie” Stewart, embrace this bewitching new trainer design (we’re obsessed with her house tapestry too!) and see how you can pick up a pair yourself. This collaboration is a slam dunk.\n\nCheck out Stewie 3 Harry Potter – [out September 6th. ](https://www.wizardingworld.com/linkout?destination=https://us.puma.com/us/en/sport/basketball/stewie-collection)\n\n__Games__\n\n## Your final look at Harry Potter: Quidditch Champions \n\n\u003ciframe width=\"560\" height=\"315\" src=\"https://www.youtube-nocookie.com/embed/pi5lzRVpwaA?si=a_J5leJ3aG2f0X8C?rel=0\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen\u003e\u003c/iframe\u003e\n\nThis upcoming game promises to make you the star of the Quidditch field. Out 3rd September, here's a fresh trailer for you to get excited over before the game releases. Hold on to your brooms! \n\n## Look out for new additions to Harry Potter: Puzzles \u0026 Spells\n\nWe adore the whimsical features that bubble up in Harry Potter: Puzzles and Spells, the addictive mobile game that invites you to battle your way through colourful challenges.\n\n![puzzles-and-spells-alternative-key-art](//contentful.harrypotter.com/usf1vwtuqyxm/3lffyFqSHkcPFdO51OzH7p/211d57fec30629d8650eca3ca5025adf/HPPS_KeyArt_Final_Eyebrow.jpg)\n\nEvery month, new puzzles drop with new rewards to unlock. This month, look out for the beautiful, grey Thestral with the special Back to Hogwarts puzzle pass. \n\n[Download the app here.](https://www.wizardingworld.com/linkout?destination=https://www.zynga.com/games/harry-potter-puzzles-and-spells/)\n\n## The LEGO Harry Potter Collection is coming to PlayStation 5, Xbox Series X \u0026 S and PC\n\n![LEGO-remaster-coming-soon](//contentful.harrypotter.com/usf1vwtuqyxm/3za2b0cDOjvVE0QCszzw31/f511cb64fd3f3e711f810fe275965e6b/Screenshot_2024-09-01_at_11.02.13.png)\n\nYes, nostalgic millennials – we’re looking at you. Those old LEGO Harry Potter games that we loved growing up are now being upgraded for next generation platforms. You’ll have the chance to revisit the Harry Potter films via the medium of lovely LEGO all over again! Or if you’re a bit younger than us... for the first time! And you’re going to love it. Coming 8th October, this will be a real blast from the past.\n\n__Experiences__\n\n## Take a look at the Ministry of Magic and 1920s Paris at Universal Epic Universe\n\nStep through the Celestial Park at Universal Orlando Resort and discover a new part of the wizarding world. From the sophisticated streets of 1920s wizarding Paris to a new adventure at the  Ministry of Magic, today’s showcase treated us to a fresh sneak-peek of the park’s upcoming extension – whetting our appetite for the full experience, slated to open 2025.\n\n![MoM-preview-showcase-concept-umbridge-office](//contentful.harrypotter.com/usf1vwtuqyxm/5fYYO9Sp6teBgITlaZl71h/54548cc89179c7cabee5721f0c405ce3/Screenshot_2024-09-01_at_10.57.35.png)\n\nLearn more about [Epic Universe and The Wizarding World of Harry Potter – Ministry of Magic right here.](https://www.wizardingworld.com/news/universal-epic-universe-reveals-more-details-about-the-wizarding-world-of-harry-potter-ministry-of-magic)\n\n## Introducing: A Hogwarts Express Adventure\n\nEvery time we board a Muggle train, we just can’t help but wish it was a giant red steam engine, full of wizards and witches, awaiting our snacks from a roaming Trolley Witch. Oh, with the destination being Hogwarts, naturally.\n\n\u003ciframe width=\"560\" height=\"315\" src=\"https://www.youtube-nocookie.com/embed/H-H62SPcJJY?si=e4AJIgXz_UsLn997?rel=0\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen\u003e\u003c/iframe\u003e \n\nWell! Thanks to the good folks down at Rail Events, you can experience something close to the magic of the Hogwarts Express with their new Hogwarts Express Adventure, a family-friendly experience where you get to board a real-life moving train. \n\nLaunching Spring 2025, we can’t wait to tell you more about this one! \n\n## Warner Bros. Studio Tour London unleashes its 2025 summer plans\n\nFrom 7th May to 8th September 2025, get ready for a brand-new feature at the home of the Harry Potter films, Warner Bros. Studio Tour London. Prepare to uncover behind-the-scenes secrets as you explore the magic of the Triwizard Tournament, celebrating the 20th anniversary of the *Harry Potter and the Goblet of Fire* film release.\n\n[Visit the official website to see more.](https://www.wbstudiotour.co.uk/whats-on/triwizard?utm_medium=email\u0026utm_source=wizardingworld\u0026utm_campaign=triwizard)\n\n## Harry Potter: A Yule Ball Celebration is coming to Monterrey, Mexico \n\nChannel your inner Neville Longbottom and twirl your way to Harry Potter: A Yule Ball Celebration, a truly glamorous dancehall affair. In the showcase, we learnt about this experience’s next destination: Monterrey, Mexico! If you live close, we fully recommend putting together your most chic outfit (Harry Potter robes will also do the trick!) and join this elegant soiree, which comes with a full dance performance, themed drinks and sprinkles of Yule Ball excellence. \n\n[Visit the official site.](https://www.wizardingworld.com/linkout?destination=https://harrypotteryuleballcelebration.com/)\n\n## Harry Potter: Magic at Play is also coming to Mexico!\n\nAlongside the Yule Ball, Mexico-based Harry Potter fans can also try out Harry Potter: Magic at Play, a fun adventure-themed day out for all-ages. Immerse yourself in Hogwarts lessons, try out cute photo opps, and, quite simply, play! Next stop: Mexico City.\n\n[Learn more about tickets \u0026 locations!](https://www.wizardingworld.com/linkout?destination=https://harrypottermagicatplay.com/)\n\n## Harry Potter: A Forbidden Forest Experience comes to Washington DC, Austin, Texas and Mantauban\n\nIn the Harry Potter films/books, we were always told that the Forbidden Forest was, well, forbidden. But thankfully, this recreation of this mysterious woodlands is one you are absolutely welcome to explore. This beautiful trip through a fully realised forest invites you to find magical creatures and enjoy the beautiful light displays on a proper woodland trail. And how great to see the experience is ‘branching out’ to three new locations: Washington DC, Austin, Texas and Mantauban in France.\n\n[Find out more.](https://www.wizardingworld.com/linkout?destination=https://hpforbiddenforestexperience.com/)\n\n## Harry Potter: The Exhibition is on its way to Boston and Madrid\n\nExperience film-making magic. Yes, Harry Potter: The Exhibition invites you to go behind the scenes of the Harry Potter films and enjoy your favourite scenes in spellbinding celluloid form with this roaming exhibition. Discover authentic props and costumes and prepare for a multi-sensory experience.\n\nThe exhibition is also already open now in Sao Paulo and Macao - and soon to end in Munich – but Boston and Madrid are the next stops.\n\n## Harry Potter: Visions of Magic will come to Singapore\n\nThis mysterious, immersive art installation celebrates Harry Potter in a more ethereal way. Already open now in Brussels – the experience is planning on crossing (several) oceans to appear in Singapore next. Stay tuned for more details as we have them.\n\n[Visit the official website.](https://www.wizardingworld.com/linkout?destination=https://harrypottervisionsofmagic.com/)\n\n## Fantastic Beasts: The Wonder of Nature now open in Tapei\n\nHere's one for all you aspiring Magizoologists out there. Fantastic Beasts: The Wonder of Nature is a fascinating exhibition exploring the blurred lines between the creatures of the wizarding world and those from our Muggle world. Sometimes you’d be so amazed at the miracles of the animal kingdom, you’d swear they were a fantastical creation. The exhibition is moving to Asia for the first time, where you can currently visit in Tapei.\n\n## Harry Potter: Film Concert Series playing globally right now \n\nThis ‘symphonic love letter to the films’ gives fans the opportunity to watch the Harry Potter films with a live orchestra, playing John Williams’ iconic score. And it’s playing all over the world right now. Trust us, you don’t want to miss Hedwig’s Theme IRL. \n\n[Check the website for more details.](https://www.wizardingworld.com/linkout?destination=https://harrypotterinconcert.com/tickets)\n\n__Books and other digital reading experiences__\n\n## From the Wizarding Archive, narrated by Evanna Lynch, is now available\n\n![evanna-lynch-announces-from-the-wizarding-archive-video-thumbnail](//contentful.harrypotter.com/usf1vwtuqyxm/LTtRtuq3tZdcn3sqwdlcH/c4c7ddb209b46f5b4b0a8a32e2b4a172/Screenshot_2024-07-09_at_14.25.49.png)\n\nComprised of 80 pieces of writing from J.K. Rowling, this eBook/audiobook covers the lesser-known elements of the wizarding world. From family histories to the origins of some of the most important things from the Harry Potter books (how did the Hogwarts Express, a Muggle train, come to be, anyway?) – From the Wizarding Archive will answer all your questions.\n\n[Check here if you’re in the US](https://www.wizardingworld.com/linkout?destination=https://www.audible.com/pd/From-the-Wizarding-Archive-Audiobook/B0D8WJYH3L?qid=1724839042\u0026sr=1-1\u0026ref_pageloadid=not_applicable\u0026ref=a_search_c3_lProduct_1_1\u0026pf_rd_p=83218cca-c308-412f-bfcf-90198b687a2f\u0026pf_rd_r=KMNBV76T0Z91MCS8Q5FK\u0026pageLoadId=sHN5TihdGf4hn)\u003cbr\u003e\n[Check here if you’re in the UK](https://www.wizardingworld.com/linkout?destination=https://www.audible.co.uk/pd/From-the-Wizarding-Archive-Audiobook/B0D8WJGJ34?qid=1724839000\u0026sr=1-1\u0026ref_pageloadid=not_applicable\u0026ref=a_search_c3_lProduct_1_1\u0026pf_rd_p=c6e316b8-14da-418d-8f91-b3cad83c5183\u0026pf_rd_r=FC170QJH0B9K5G8DES57\u0026pageLoadId=HH2KJlHCQtS) \n\n## Get festive with the upcoming release of Christmas at Hogwarts\n\nIs there anything more festive than an ancient, glorious castle, blanketed in snow, while students in thick jumpers throw snowballs, play chess and tuck in for Christmas dinner? This is the sparkling joy of Christmastime in the Harry Potter stories – and with this new book – you can appreciate those specific moments with these beautiful new illustrations, as created by artist Ziyi Gao.\n\n[If you're US-based, visit the Scholastic website to pre-order](https://kids.scholastic.com/kid/books/harry-potter/).\u003cbr\u003e\n[If you're UK-based, visit the Bloomsbury website to pre-order.](https://www.bloomsbury.com/uk/christmas-at-hogwarts-9781526677082/)\n\n## Younger fans can experience all seven Harry Potter stories with YOTO\n\n![YOTO-harry-potter-series-key-art-hero](//contentful.harrypotter.com/usf1vwtuqyxm/1oz9soy7CCDi0j9ZICncQy/162953428df8341e8c07e20dd3fa4fa2/PottermoreNewsletter_static_UK.png)\n\nYoto creates inventive smart speakers for children to play audiobooks themselves, using a series of illustrated cards that they simply slot in and play. And now – Yoto have launched all seven Harry Potter audiobooks on this platform. \n\nThe Harry Potter stories can now be listened to on Yoto players in English, Latin American Spanish and French, with the cards on sale in the UK, US, Canada, Australia and France.\n\n[Take a look at the Yoto official website.](https://uk.yotoplay.com/harrypotter)\n\n***\n\nPhew! How’s that for a few start-of-term announcements? What are you most excited for? Stay with us all day for more [Back to Hogwarts](https://www.wizardingworld.com/back-to-hogwarts) love!"}],"publishDate":"2024-08-29T00:00+01:00"}],"publishDate":"2024-11-04T00:00+00:00"}]},{"contentfulId":"1iIKqdMnWff533ZL1FkuUO","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"contentList","createdAt":"2025-10-27T14:48:34.008Z","updatedAt":"2025-10-27T14:48:34.008Z","_updatedAt":"2025-10-27T14:48:34.008Z","entryTitle":"wob-page-multi-tile-chapter-one-catchup","externalId":"wob-page-multi-tile-chapter-one-catchup","header":"Catch up on Chapter One","subheader":"Missed Chapter One, or just need a refresher before sinking your teeth into Chapter Two? Catch up here. ","contentSlots":[{"contentfulId":"3PSSEMyooxYLmWC7uB8Kae","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-11-07T14:05:12.558Z","updatedAt":"2025-10-27T14:47:26.825Z","_updatedAt":"2025-10-27T14:47:26.825Z","entryTitle":"WEB-NEWS-meet-the-teams-harry-potter-wizards-of-baking","eyebrow":"Cake connoisseurs ","displayTitle":"Meet the teams of Harry Potter: Wizards of Baking Season 1","activationDate":"2024-11-07T00:00+00:00","tags":[{"contentfulId":"6PK6KxaPndhQsAFS54UCkr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:25:53.282Z","updatedAt":"2020-02-20T13:07:09.645Z","_updatedAt":"2020-02-20T13:07:09.645Z","name":"news"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"}],"externalId":"meet-the-teams-harry-potter-wizards-of-baking","mainImage":{"contentfulId":"2nNjZOPtbzBq1oakCvabn3","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T11:13:54.320Z","updatedAt":"2024-11-07T14:02:48.352Z","_updatedAt":"2024-11-07T14:02:48.352Z","entryTitle":"wizards-of-baking-full-team-shot-landscape","image":{"contentfulId":"2IsuoJZZL3MkDiUom9rqdo","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T13:52:10.576Z","updatedAt":"2024-11-07T14:01:51.188Z","_updatedAt":"2024-11-07T14:01:51.188Z","revision":3,"locale":"en-GB","title":"wizards-of-baking-full-team-shot-crop-2-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2IsuoJZZL3MkDiUom9rqdo/2bc4c0c57855b62fed769df7ed5b5118/1__1_.jpg","details":{"size":1580671,"image":{"width":9000,"height":3841}},"fileName":"1 (1).jpg","contentType":"image/jpeg"}}},"intro":"With the launch of Food Network’s new show Harry Potter: Wizards of Baking drawing ever closer, we thought now would be a great time to meet those culinary whizzes who add a little magic to their baking. It’s time to meet the teams…","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"B5CkHEdmCDJlBiBupMV2M","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:01:34.595Z","updatedAt":"2024-11-07T14:03:42.435Z","_updatedAt":"2024-11-07T14:03:42.435Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-1","text":"But before we meet those vying for victory, a little context about this exciting new baking programme from Food Network. Set at Warner Bros. Studio Tour London – the Making of Harry Potter, tune in as nine teams battle it out to create magical masterpieces and showstopping bakes, all inspired by Harry Potter. So, who are the bakers?"},{"contentfulId":"zep8rs25aeM0c9mjxMwBk","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:38:04.479Z","updatedAt":"2024-11-07T12:38:04.479Z","_updatedAt":"2024-11-07T12:38:04.479Z","entryTitle":"wizards-of-baking-meet-the-teams-elizabeth-juan-web-landscape","image":{"contentfulId":"2OWuFmdTF69uHgIxCxVmiY","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:38:00.261Z","updatedAt":"2024-11-07T12:38:00.261Z","_updatedAt":"2024-11-07T12:38:00.261Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-elizabeth-juan-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2OWuFmdTF69uHgIxCxVmiY/62d6149ec46960f075cde9e8ee137f46/wizards-of-baking-meet-the-teams-elizabeth-juan-web-landscape.png","details":{"size":1212161,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-elizabeth-juan-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"684QAoocFHPG9cqC8Cvdcm","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:07:53.412Z","updatedAt":"2024-11-07T13:09:33.641Z","_updatedAt":"2024-11-07T13:09:33.641Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-2","text":"Juan (left) and Elizabeth (right) \n\n### Elizabeth and Juan\nElizabeth is no slouch when it comes to baking competitions and is also a huge Harry Potter fan. In fact, she had thought about retiring from competitions, but her love of Harry Potter drew her back to Wizards of Baking. When it comes to her personality, she thinks of herself as rather Molly Weasley-esque. She’s ferocious, protective but has a sweet side! \n\nJuan is an executive pastry chef and chocolatier but most importantly (in our opinion) a Harry Potter fan. He always thought he was a Gryffindor, but it turns out he is actually a Hufflepuff! Though that came as a surprise, he’s very happy about it – as it speaks to who he is as a person.\n"},{"contentfulId":"4ukkqDgLYsOX5Ak0UOcq05","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:35:46.199Z","updatedAt":"2024-11-07T12:35:46.199Z","_updatedAt":"2024-11-07T12:35:46.199Z","entryTitle":"wizards-of-baking-meet-the-teams-jessica-jamie-web-landscape","image":{"contentfulId":"19mQtzdNoZNxKJ5UsylTLn","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:35:38.553Z","updatedAt":"2024-11-07T12:35:38.553Z","_updatedAt":"2024-11-07T12:35:38.553Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-jessica-jamie-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/19mQtzdNoZNxKJ5UsylTLn/2d2bfd2d56691843e749d9be385338b8/wizards-of-baking-meet-the-teams-jessica-jamie-web-landscape.png","details":{"size":1198984,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-jessica-jamie-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"2ZwbaMQK9JB4VBb7YJKsWd","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:11:31.074Z","updatedAt":"2024-11-07T13:12:31.610Z","_updatedAt":"2024-11-07T13:12:31.610Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-3","text":"Jessica (left) and Jamie (right) \n\n### Jessica and Jamie\nJamie is a pastry chef and cake designer. Fun fact! Jamie is known for her lifelike skulls and anatomical heart cakes – we’re both impressed and a little scared. She discovered her love of Harry Potter once the films came out and thinks it would be cool to recreate the moving staircase as a dessert.\n\nJessica is an award-winning pastry chef. She had thought she was a Hufflepuff but found herself sorted into Gryffindor. However, her Gryffindor vibe makes sense to us – especially as she thinks of herself as a bit of a Ron Weasley. She’s not too serious and loves a good laugh."},{"contentfulId":"2oEt5BkW64dWnCFEDFYVlq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:50:59.284Z","updatedAt":"2024-11-07T12:50:59.284Z","_updatedAt":"2024-11-07T12:50:59.284Z","entryTitle":"wizards-of-baking-meet-the-teams-miko-chris-web-landscape","image":{"contentfulId":"3nbVcAJLPsk54ppfGH6eQq","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:50:54.306Z","updatedAt":"2024-11-07T12:50:54.306Z","_updatedAt":"2024-11-07T12:50:54.306Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-miko-chris-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3nbVcAJLPsk54ppfGH6eQq/1513f465c3f0ec79aafc5c03f207c8d4/wizards-of-baking-meet-the-teams-miko-chris-web-landscape.png","details":{"size":1215085,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-miko-chris-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"4UQ28Tk4anuL4VxPULsHKj","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:13:39.661Z","updatedAt":"2024-11-07T14:03:01.558Z","_updatedAt":"2024-11-07T14:03:01.558Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-4","text":"Chris (left) and Miko (right)\n\n### Miko and Chris\nMiko is a cake artist who discovered his love of Harry Potter through the films. He still watches them to destress when life gets a little tough. His Harry Potter hot-take is that he thinks Snape is an unsung hero – Miko is a Slytherin though so that might explain his love for the slippery Snape.\n\nThe other member of this team, and fellow Slytherin, is Chris. An executive pastry chef, he is all about attention to detail. If he had the chance to recreate any Harry Potter location as a dessert, it would be the Forbidden Forest because of its mysterious ambience. \n"},{"contentfulId":"4QwFoafZTZ8ElE0etts4SZ","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:52:13.726Z","updatedAt":"2024-11-07T12:52:13.726Z","_updatedAt":"2024-11-07T12:52:13.726Z","entryTitle":"wizards-of-baking-meet-the-teams-yohann-kayla-web-landscape","image":{"contentfulId":"3zu5XsCGnTSwYC0m3L6oSt","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:52:11.253Z","updatedAt":"2024-11-07T12:52:11.253Z","_updatedAt":"2024-11-07T12:52:11.253Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-yohann-kayla-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3zu5XsCGnTSwYC0m3L6oSt/9478ec80c46b556fa3be85bff4c09e47/wizards-of-baking-meet-the-teams-yohann-kayla-web-landscape.png","details":{"size":1198886,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-yohann-kayla-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"7ETiqJVA59jcdFm501uWmF","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:15:13.279Z","updatedAt":"2024-11-07T13:15:13.279Z","_updatedAt":"2024-11-07T13:15:13.279Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-5","text":"Yohann (left) and Kayla (right) \n\n### Yohann and Kayla\nNext up we have Kayla, a cake designer known for her colourful creations.  Having always loved magic (and with a feeling that it could still be real), Kayla was drawn to Harry Potter when the films were released. She particularly likes the Great Hall because that is where all the excellent food is – a very smart choice. \n\nKayla’s team member, Yohann, is an executive pastry chef and a Gryffindor. He feels like this house suits him because they do what is right and he relates to that. Plus, they’re winners and he’s in this competition to win it! Yohann’s favourite character is Dumbledore because of how much knowledge he has and in Yohann’s words, knowledge is power. "},{"contentfulId":"6Fbv8T8a7d7FR7tT1syRET","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:49:11.452Z","updatedAt":"2024-11-07T12:49:11.452Z","_updatedAt":"2024-11-07T12:49:11.452Z","entryTitle":"wizards-of-baking-meet-the-teams-conner-michael-web-landscape","image":{"contentfulId":"XkRiMk8VxITcHARmgBx5U","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:49:07.650Z","updatedAt":"2024-11-07T12:49:07.650Z","_updatedAt":"2024-11-07T12:49:07.650Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-conner-michael-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/XkRiMk8VxITcHARmgBx5U/51389611415232bc701f103d542f1621/wizards-of-baking-meet-the-teams-conner-michael-web-landscape.png","details":{"size":1235723,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-conner-michael-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"55O8apvtkq6IyVFQ7D3kZQ","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:18:04.632Z","updatedAt":"2024-11-07T13:18:04.632Z","_updatedAt":"2024-11-07T13:18:04.632Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-6","text":"Michael (left) and Conner (right)\n\n### Conner and Michael\nNow we come to the youngest contestant in the competition, Conner. At 18 years old he is already a pastry chef. He also says that he embraces his identify as 100% a Gryffindor. Conner has big ambitions, he would love to create Hogwarts as a dessert…if he had unlimited time and chocolate that is. \n\nMichael is a professionally trained cake designer and a proud Harry Potter superfan! He has loved the books since his grandma bought them for him as a kid and has read them multiple times. He’s also a big fan of the movies and can quote them word for word – impressive! Michael’s two favourite characters are Dumbledore and… Voldemort. To him they represent the balance of good and evil. "},{"contentfulId":"4uU3l17GX9LI2nmkEcPr7Z","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:33:23.459Z","updatedAt":"2024-11-07T12:33:23.459Z","_updatedAt":"2024-11-07T12:33:23.459Z","entryTitle":"wizards-of-baking-meet-the-teams-mitzi-lisa-web-landscape","image":{"contentfulId":"12A9tVFAbK19LwNyBl3Zsx","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:33:20.361Z","updatedAt":"2024-11-07T12:33:20.361Z","_updatedAt":"2024-11-07T12:33:20.361Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-mitzi-lisa-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/12A9tVFAbK19LwNyBl3Zsx/b839fb927e6758b945db63f41726c8c5/wizards-of-baking-meet-the-teams-mitzi-lisa-web-landscape.png","details":{"size":1227532,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-mitzi-lisa-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"2Sjo7udt4UOEGo6iZHTk75","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:21:59.554Z","updatedAt":"2024-11-07T13:21:59.554Z","_updatedAt":"2024-11-07T13:21:59.554Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-7","text":"Mitzi (left) and Lisa (right)\n\n### Lisa and Mitzi\nLisa is known for her large cakes and what she describes as her ‘Hagrid-sized’ love of Harry Potter. Now that’s what we call a fan. She is also, in her own words, the ‘huffliest puffliest’ Hufflepuff. If she could create any Harry Potter location as a dessert it would be Hagrid’s Hut – complete with dragon egg. Does someone have a soft spot for this half-giant?\n\nThe other half of this duo is Mitzi, an executive pastry chef who loves molecular gastronomy (we wager she would be a fan of Potions class). Despite being a Gryffindor, Mitzi identifies with Luna Lovegood and all her eccentricates as she sees those qualities reflected in herself.\n"},{"contentfulId":"3EtwkxqjglpZ3EPtpjeIf5","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:51:47.053Z","updatedAt":"2024-11-07T12:51:47.053Z","_updatedAt":"2024-11-07T12:51:47.053Z","entryTitle":"wizards-of-baking-meet-the-teams-hemu-riccardo-web-landscape","image":{"contentfulId":"qNta3k0XXfu2cenIiYM5i","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:51:44.238Z","updatedAt":"2024-11-07T12:51:44.238Z","_updatedAt":"2024-11-07T12:51:44.238Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-hemu-riccardo-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/qNta3k0XXfu2cenIiYM5i/6b2874d7e08c1cf1d96a90324896239c/wizards-of-baking-meet-the-teams-hemu-riccardo-web-landscape.png","details":{"size":1234908,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-hemu-riccardo-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"1MXsctTo64h1uTm3eXKZv9","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:26:45.883Z","updatedAt":"2024-11-07T13:26:45.883Z","_updatedAt":"2024-11-07T13:26:45.883Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-8","text":"Riccardo (left) and Hemu (right)\n\n### Hemu and Riccardo\nRiccardo is an executive pastry chef whose love of Harry Potter started in high school when he was introduced to the wizarding world by watching *Goblet of Fire*! He enjoyed it so much he went back and watched the series from the start. Although he is a Gryffindor, Riccardo also thinks he is like Harry Potter and could easily have been a Slytherin.\n\nRiccardo’s fellow Gryffindor and team member is Hemu, a cake artist known for her hyper-realistic cakes. Hemu’s favourite character is Dobby. His cuteness does factor into this decision but the way he gives his life for his friends resonates with Hemu who also feels she would do anything for those she loved. \n"},{"contentfulId":"5zHEpz27nCK5q8xivRXDzX","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:50:00.804Z","updatedAt":"2024-11-07T12:50:00.804Z","_updatedAt":"2024-11-07T12:50:00.804Z","entryTitle":"wizards-of-baking-meet-the-teams-zoe-jordan-web-landscape","image":{"contentfulId":"52NeOIiXDPBElITboB7kfc","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:49:56.057Z","updatedAt":"2024-11-07T12:49:56.057Z","_updatedAt":"2024-11-07T12:49:56.057Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-zoe-jordan-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/52NeOIiXDPBElITboB7kfc/aed2cfa539dbc7190e4a107f67186adb/wizards-of-baking-meet-the-teams-zoe-jordan-web-landscape.png","details":{"size":1219334,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-zoe-jordan-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"6s1Pq6xg3HiJn3DbwuBKyH","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:27:28.187Z","updatedAt":"2024-11-07T13:27:28.187Z","_updatedAt":"2024-11-07T13:27:28.187Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-9","text":"Jordan (left) and Zoe (right) \n\n### Jordan and Zoe\nBefore she became a self-taught cake artist, Zoe worked in film and TV. In fact, this is how she discovered her love of Harry Potter when she got the opportunity to visit the set of *Philosopher’s Stone*. Very exciting! She then read the stories to her children, so Harry Potter has been in her life for a long time. She also happens to be a Hufflepuff.\n\nLike his fellow teammate, executive pastry chef Jordan is a Hufflepuff. This came as a bit of a surprise to him as he initially thought he was a Gryffindor. Though, as he describes himself as loyal, diligent and dedicated to his profession, we can see exactly why he was sorted into this house. Plus, Jordan thinks he is like Cedric Diggory, humble and smart in his own way – a true Hufflepuff.\n"},{"contentfulId":"6tTQyEvWb3bwvkqEzvw2nA","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:29:40.995Z","updatedAt":"2024-11-07T12:29:40.995Z","_updatedAt":"2024-11-07T12:29:40.995Z","entryTitle":"wizards-of-baking-meet-the-teams-kimberly-ashley-web-landscape","image":{"contentfulId":"5cW6P0sK6Iz8JFPtCCKfym","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:29:35.463Z","updatedAt":"2024-11-07T12:29:35.463Z","_updatedAt":"2024-11-07T12:29:35.463Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-kimberly-ashley-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5cW6P0sK6Iz8JFPtCCKfym/d0ada20dba5f25fcaa0b1e60fbf68f5d/wizards-of-baking-meet-the-teams-kimberly-ashley-web-landscape.png","details":{"size":1204408,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-kimberly-ashley-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"1WbBkYRnA09TYIkDQCbwza","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:29:35.847Z","updatedAt":"2024-11-14T13:52:12.620Z","_updatedAt":"2024-11-14T13:52:12.620Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-10","text":"Kimberly (left) and Ashley (right) \n\n### Kimberly and Ashley\nKimberly has been baking for 16 years, but only recently went to culinary school to make her dazzling wedding cakes even better. She has watched the films at least three times and has decided that twinkly-eyed Dumbledore is her favourite character. She loves the professor because he is wise and helps people – like Kimberly does in her day-to-day life. \n\nAshley is a French-trained pastry chef known for her gingerbread mansions. She also happens to be a Ravenclaw and thinks she was sorted into this house because she uses both the left and right side of her brain. Essentially, not only does she have a real passion for knowledge, but she happens to be creative and independent too. \n\n***\n\n__Spell-binding new competition series Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\n__The show is out now to [Max](https://www.max.com/?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow) and Food Network.__\n"}],"relatedArticleReference":[{"contentfulId":"5b7dA58OUVN6RgslpTytRJ","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"article","createdAt":"2022-11-24T13:11:27.946Z","updatedAt":"2022-11-24T13:25:44.989Z","_updatedAt":"2022-11-24T13:25:44.989Z","entryTitle":"WEB-FEATURE-importance-of-sweets-treats-in-wizarding-world","displayTitle":"The importance of sweets and treats in the wizarding world","activationDate":"2022-11-24T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"}],"externalId":"importance-of-sweets-treats-in-wizarding-world","mainImage":{"contentfulId":"3bDIfW8asWdRck1CF34KqM","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"image","createdAt":"2022-03-04T11:22:10.787Z","updatedAt":"2025-03-04T10:52:12.989Z","_updatedAt":"2025-03-04T10:52:12.989Z","entryTitle":"hp-f3-harry-ron-seamus-eat-sweets-in-gryffindor-common-room-web-landscape","image":{"contentfulId":"6I3xsjXKPvzvBEuFnJWBOS","type":"Asset","contentTypeId":"asset","createdAt":"2022-03-04T11:22:08.338Z","updatedAt":"2025-03-04T10:52:06.776Z","_updatedAt":"2025-03-04T10:52:06.776Z","revision":3,"locale":"en-GB","title":"hp-f3-harry-ron-seamus-eat-sweets-in-gryffindor-common-room-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6I3xsjXKPvzvBEuFnJWBOS/7937f08ee5fe9e9b5825668bbe190b55/HP-F3-prisoner-of-azkaban-harry-ron-seamus-eat-sweets-in-gryffindor-common-room.jpg","details":{"size":553752,"image":{"width":1500,"height":1001}},"fileName":"HP-F3-prisoner-of-azkaban-harry-ron-seamus-eat-sweets-in-gryffindor-common-room.jpg","contentType":"image/jpeg"}},"imageAltText":"Harry and Ron eat sweets in the Gryffindor common room, laughing.","source":[{"contentfulId":"20Vvqh8Xa6ssh3Ulkm4zeF","type":"Link"}]},"intro":"Sugar is sweet, and so is friendship… which might explain why confectionary was often the foundation on which relationships were formed in the wizarding world.","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"3FtrAkZ3seYKsrXhTs4v3t","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-11-24T12:34:02.458Z","updatedAt":"2022-11-24T15:26:50.488Z","_updatedAt":"2022-11-24T15:26:50.488Z","entryTitle":"sweets-and-treats-text-section-1","text":"## For bonding\n\n[The Hogwarts Express](https://www.wizardingworld.com/writing-by-jk-rowling/the-hogwarts-express) must have been the scene for many a burgeoning friendship, and we know of at least two sets of best friends who cemented their relationship with sugar. Obviously, Harry Potter and Ron Weasley were one such pair. Ron’s corned beef sandwich was quickly forgotten after Harry nearly cleaned out the Trolley Witch’s supplies, and they were soon bonding over Chocolate Frogs, pumpkin pasties and Bertie Bott’s Every-Flavour Beans.\n\nMaybe it was this famous example that Scorpius Malfoy’s mother, Astoria, had in mind years later, when she packed her son’s Hogwarts Express bag.\n"},{"contentfulId":"6Lxxwxz0uPTpA6AtI2Fe0J","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"quote","createdAt":"2022-11-24T12:33:59.378Z","updatedAt":"2022-11-24T12:33:59.378Z","_updatedAt":"2022-11-24T12:33:59.378Z","entryTitle":"HP8-cursed-child-scorpius-talks-about-sweets","activationDate":"2022-11-24T00:00+00:00","quoteText":"I’ve also got some Shock-o-Choc, Pepper Imps and some Jelly Slugs. Mum’s idea – she says (sings), ‘Sweets they always help you make friends’ (he realises that singing was a mistake). Stupid idea probably.","quoteAttribution":"Scorpius Malfoy","quoteAttributionTitle":"Harry Potter and the Cursed Child","source":[{"contentfulId":"KNlAjfZtVzdWu31pBG6Ob","type":"Link"}]},{"contentfulId":"42r09EeO0ORXJ69PeP1uob","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-11-24T12:34:27.534Z","updatedAt":"2022-11-24T12:34:27.534Z","_updatedAt":"2022-11-24T12:34:27.534Z","entryTitle":"sweets-and-treats-text-section-2","text":"It wasn’t a stupid idea, though. Harry’s first meeting with Scorpius’s father, Draco, was far from sweet, but when their sons met, things were quite different. Because Albus Potter stayed for Scorpius’s sweets, despite his cousin Rose’s best attempts. And that confectionary-filled moment kicked off another eventful relationship. "},{"contentfulId":"3yIFRaZ4d0xR9lB0G1hBFX","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-04-21T23:24:08.183Z","updatedAt":"2022-06-07T13:07:00.190Z","_updatedAt":"2022-06-07T13:07:00.190Z","entryTitle":"hpcc-scorpius-malfoy-photo-manuel-harlan","image":{"contentfulId":"1bRrBJfo5Sz0BCOmqtTWym","type":"Asset","contentTypeId":"asset","createdAt":"2021-04-21T23:23:50.487Z","updatedAt":"2021-04-21T23:24:04.002Z","_updatedAt":"2021-04-21T23:24:04.002Z","revision":2,"locale":"en-GB","title":"hpcc-photography-cursed-child-scorpius-in-bed-manuel-harlan","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1bRrBJfo5Sz0BCOmqtTWym/d50e995473e255a53cb3b3e13e4c1c6d/hpcc-scorpius-malfoy-photo-manuel-harlan.jpg","details":{"size":1917193,"image":{"width":2000,"height":1333}},"fileName":"hpcc-scorpius-malfoy-photo-manuel-harlan.jpg","contentType":"image/jpeg"}},"imageAltText":"Scorpius Malfoy is sat on his bed in his pyjamas. He has his duvet wrapped round him and is pulling a funny face."},{"contentfulId":"01sCpDZeV77fNoZMlLR4Rw","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-11-24T12:35:32.596Z","updatedAt":"2022-11-24T15:30:16.794Z","_updatedAt":"2022-11-24T15:30:16.794Z","entryTitle":"sweets-and-treats-text-section-3","text":"## For resilience \n\nJust as many Muggles indulge in the odd sugary snack, lots of our favourite wizarding world characters also turned to confectionary and cakes for the occasional pick-me-up.\n\nThe most obvious example of this was the [use of chocolate to diminish the impact of a Dementor](https://www.wizardingworld.com/writing-by-jk-rowling/dementors-and-chocolate). Professor Lupin initially alerted us to this remedy, and even though we have never experienced an actual Dementor attack, we can still appreciate the feeling Harry got when he ate his slab of chocolate after such an intense experience:"},{"contentfulId":"1XlSv2vgiVPCa8sc8zeElC","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"quote","createdAt":"2022-11-24T12:44:43.636Z","updatedAt":"2022-11-24T12:44:43.636Z","_updatedAt":"2022-11-24T12:44:43.636Z","entryTitle":"HP3-quote-harry-eats-chocolate-after-dementors","activationDate":"2022-11-24T00:00+00:00","quoteText":"Harry took a bite and to his great surprise felt warmth spread suddenly to the tips of his fingers and toes.","quoteAttributionTitle":"Harry Potter and the Prisoner of Azkaban"},{"contentfulId":"10CS17kYR4TN4pjZjSZxVH","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-11-24T12:45:06.996Z","updatedAt":"2022-11-24T15:30:46.335Z","_updatedAt":"2022-11-24T15:30:46.335Z","entryTitle":"sweets-and-treats-text-section-4","text":"Chocolate wasn’t just a post-Dementor pick-me-up, either. Harry’s friends sent him cake to help him get through the long summer holidays he spent with the Dursleys, Ron and Hermione bought him heaps of Honeydukes sweets when he couldn’t visit Hogsmeade, and when he was attempting to re-grow the 33 bones [Professor Lockhart](https://www.wizardingworld.com/writing-by-jk-rowling/gilderoy-lockhart) had mistakenly removed from his arm, it was cakes, sweets and pumpkin juice Harry’s friends brought to distract him. Because in such painful situations, fruit won’t cut it."},{"contentfulId":"2JgI6Kpbxhhmu6Fm7ZtuFr","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2019-11-13T15:59:09.784Z","updatedAt":"2019-11-13T15:59:09.784Z","_updatedAt":"2019-11-13T15:59:09.784Z","entryTitle":"HP-F3-harry-ron-sweets-HP3D-1224","image":{"contentfulId":"3dAIRPkGAHFluhbhLTBPDP","type":"Asset","contentTypeId":"asset","createdAt":"2019-11-13T15:58:52.530Z","updatedAt":"2019-11-13T15:58:52.530Z","_updatedAt":"2019-11-13T15:58:52.530Z","revision":1,"locale":"en-GB","title":"HP-F3-harry-ron-sweets-HP3D-1224","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3dAIRPkGAHFluhbhLTBPDP/f8645b1b8cc87256f0d1e2f8b572a5d8/harry-ron-sweets.jpg","details":{"size":105150,"image":{"width":900,"height":1121}},"fileName":"harry-ron-sweets.jpg","contentType":"image/jpeg"}},"source":[{"contentfulId":"20Vvqh8Xa6ssh3Ulkm4zeF","type":"Link"}]},{"contentfulId":"3Pa5EzSd5hN0HVVDBChp1D","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-11-24T12:45:29.144Z","updatedAt":"2022-11-24T15:31:32.781Z","_updatedAt":"2022-11-24T15:31:32.781Z","entryTitle":"sweets-and-treats-text-section-5","text":"## For comfort \n\nRegrowing bones might be an extreme example, but many of us turn to our favourite foods when in need of comfort. And there’s something about wizarding world treats that seemed particularly comforting in their sweetness. \n\nWhether it was warming hot Butterbeer, [Florean Fortescue’s](https://www.wizardingworld.com/writing-by-jk-rowling/florean-fortescue) ice-cream sundaes or second helpings of treacle tart, the treats Harry enjoyed were in such contrast to the mealtimes he spent with the Dursleys that they became part of the whole rich wizarding world tapestry. OK, being a wizard might have cost Harry his family, but it was only in the wizarding world that he finally felt at home – and was there ever anything more comforting than a [Hogwarts feast?](https://www.wizardingworld.com/features/hogwarts-feasts-crossword)"},{"contentfulId":"3jhEVXffgv9BFlrfM2sHVk","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2021-07-07T10:38:14.869Z","updatedAt":"2022-02-22T13:12:11.986Z","_updatedAt":"2022-02-22T13:12:11.986Z","entryTitle":"HP-F6-half-blood-prince-horace-slughorn-three-broomsticks-web-landscape","image":{"contentfulId":"5Ow0nHNGycHy3gWMeY7LD8","type":"Asset","contentTypeId":"asset","createdAt":"2021-07-07T10:37:53.386Z","updatedAt":"2021-07-07T10:37:53.386Z","_updatedAt":"2021-07-07T10:37:53.386Z","revision":1,"locale":"en-GB","title":"HP-F6-half-blood-prince-horace-slughorn-three-broomsticks-web-landscape","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5Ow0nHNGycHy3gWMeY7LD8/07fb55e94f874c2e1066adadda68a6e6/HP-F6-half-blood-prince-horace-slughorn-three-broomsticks-web-landscape","details":{"size":1946904,"image":{"width":2000,"height":1333}},"fileName":"HP-F6-half-blood-prince-horace-slughorn-three-broomsticks-web-landscape","contentType":"image/jpeg"}},"imageAltText":"Professor Slughorn with a Butterbeer at the Three Broomsticks","source":[{"contentfulId":"5c2mZe756Zsr2MY2EJjWmt","type":"Link"}]},{"contentfulId":"487E8TYDL9OMoEvkiqQR3v","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-11-24T12:47:00.375Z","updatedAt":"2022-11-24T12:47:00.375Z","_updatedAt":"2022-11-24T12:47:00.375Z","entryTitle":"sweets-and-treats-text-section-6","text":"## For love\n\nFrom Mrs Weasley’s celebratory dinners to Queenie Goldstein’s apple strudel, many witches and wizards used their talent for creating a sweet treat to show affection. Of course, not everyone had a talent for it – Hagrid’s rock cakes might have been a labour of love, but by all accounts they were pretty laborious to eat – but just as we Muggles show our appreciation by buying a box of chocolates, so too did many of our favourite Wizarding World characters. And sometimes, sweet wrappers were just as good. They were for Neville Longbottom, anyway:"},{"contentfulId":"1LzDmiTNcWOH4F533ZaNSf","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"quote","createdAt":"2022-11-24T12:46:53.147Z","updatedAt":"2022-11-24T12:46:53.147Z","_updatedAt":"2022-11-24T12:46:53.147Z","entryTitle":"HP5-quote-neville-gets-a-sweet-wrapper-from-mum","activationDate":"2022-11-24T00:00+00:00","quoteText":"She did not seem to want to speak, or perhaps she was not able to, but she made timid motions towards Neville, holding something in her outstretched hand.\n\n‘Again?’ said Mrs Longbottom, sounding slightly weary. ‘Very well, Alice dear, very well – Neville, take it, whatever it is.’\n\nBut Neville had already stretched out his hand, into which his mother dropped an empty Drooble’s Best Blowing Gum wrapper.","quoteAttributionTitle":"Harry Potter and the Order of the Phoenix","source":[{"contentfulId":"1yJXCBgIhAk5xQegODeIOJ","type":"Link"}]},{"contentfulId":"1WElff2Vrw1EjQG98w9dTu","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-11-24T12:47:17.020Z","updatedAt":"2022-11-24T15:32:11.964Z","_updatedAt":"2022-11-24T15:32:11.964Z","entryTitle":"sweets-and-treats-text-section-7","text":"## For celebration\n\nSweet treats also had an important part to play in celebrating happier moments – [like when Fred and George organised an impromptu post-Quidditch feast in the Gryffindor Common Room](https://www.wizardingworld.com/features/harry-potter-parties-we-all-wanted-to-go-to), and arrived armed with Butterbeer, pumpkin fizz and bags of Honeydukes sweets. Not to mention the many mouthwatering desserts that adorned the tables of actual Hogwarts feasts, or the delicious morsels Mrs Weasley had a knack for supplying seemingly at a moment’s notice. After all, nothing says ‘party’ like birthday cake."},{"contentfulId":"20s8i8wYq1liPOuY3wPxWQ","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2022-07-07T12:54:13.290Z","updatedAt":"2023-01-19T17:49:01.217Z","_updatedAt":"2023-01-19T17:49:01.217Z","entryTitle":"HP-F1-philosophers-stone-harry-birthday-cake-closeup-wand-web-landscape","image":{"contentfulId":"5YiBHchbx8emWtxGHXyuw3","type":"Asset","contentTypeId":"asset","createdAt":"2022-07-07T12:54:08.590Z","updatedAt":"2022-08-12T16:10:00.728Z","_updatedAt":"2022-08-12T16:10:00.728Z","revision":2,"locale":"en-GB","title":"HP-F1-philosophers-stone-harry-birthday-cake-closeup-wand-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5YiBHchbx8emWtxGHXyuw3/1f18de6b74f85f6e32c17f739097a7a8/HP-F1-philosophers-stone-harry-birthday-cake-closeup-wand-web-landscape","details":{"size":269323,"image":{"width":1993,"height":816}},"fileName":"HP-F1-philosophers-stone-harry-birthday-cake-closeup-wand-web-landscape","contentType":"image/jpeg"}},"imageAltText":"A close up image of Harry's pink birthday cake with green icing. ","source":[{"contentfulId":"17tbLef7PppiWU0cVDrWBV","type":"Link"}]},{"contentfulId":"4fHEnLk7YOfBJbfvL5Ll50","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2022-11-24T12:48:30.441Z","updatedAt":"2022-11-24T12:48:30.441Z","_updatedAt":"2022-11-24T12:48:30.441Z","entryTitle":"sweets-and-treats-text-section-8","text":"## For humour \n\nSometimes, the magical elements of sweets could make us laugh. It was the Weasley twins’ Skiving Snackboxes that really put sugary treats on the wizarding world map (not the Marauder’s Map, to be clear, although we’re pretty sure the Marauders would have approved of Weasley’s Wizard Wheezes.) \n\nA particular humorous confectionary highlight has to be Dudley Dursley becoming an unwitting guinea pig for Ton-Tongue Toffee. After the whole Hagrid-pig’s tail thing you’d think he’d be a bit wary about picking up something that had dropped out of a wizard’s pocket. But then, like a lot of us, Dudley never could resist a sweet treat."}],"relatedArticleReference":[{"contentfulId":"4gLhjeMLjTh22Mgn2JBhA3","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2022-11-17T10:07:40.760Z","updatedAt":"2022-11-17T10:07:40.760Z","_updatedAt":"2022-11-17T10:07:40.760Z","entryTitle":"WEB-FEATURE-the-best-and-worst-food-harry-had-in-the-wizarding-world","displayTitle":"The best and worst food Harry had in the wizarding world","activationDate":"2022-11-16T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"}],"externalId":"the-best-and-worst-food-harry-had-in-the-wizarding-world","mainImage":{"contentfulId":"3ZW5tf4GfPh1GX2OdnhLIY","type":"Link"},"intro":"From Mrs Weasley’s home cooking to the endless delights of a Hogwarts feast, Harry
