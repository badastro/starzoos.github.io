1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-11-02T12:00:49.948Z","updatedAt":"2025-11-02T12:00:49.948Z","_updatedAt":"2025-11-02T12:00:49.948Z","entryTitle":"WEB-NEWS-harry-potter-wizards-of-baking-meet-the-teams-season-2-TEXTSECTION-1","text":"On 2nd November, Wizards of Baking is back for its exciting next chapter. Set at Warner Bros. Studio Tour London – the Making of Harry Potter, eight teams battle it out to become champion – creating magical masterpieces and showstopping bakes, all inspired by Harry Potter. Let’s meet the teams vying for victory. \n\n### Alex Madrigal and Jenny Chambers"},{"contentfulId":"yQZYwLpwZs495mYAtqvyg","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"video","createdAt":"2025-11-02T12:00:33.235Z","updatedAt":"2025-11-02T12:00:33.235Z","_updatedAt":"2025-11-02T12:00:33.235Z","entryTitle":"video-jenny-alex","displayTitle":" ","activationDate":"2025-11-01T00:00+00:00","externalId":"video-jenny-alex","videoFileSource":"https://video.wizardingworld.com/jenny-and-alex-meet-the-teams-wizards-of-baking-season-2/h264/playlist.m3u8"},{"contentfulId":"3TlzfijXURRNjKNLeHgIqn","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-11-02T12:00:56.284Z","updatedAt":"2025-11-02T12:00:56.284Z","_updatedAt":"2025-11-02T12:00:56.284Z","entryTitle":"WEB-NEWS-harry-potter-wizards-of-baking-meet-the-teams-season-2-TEXTSECTION-2","text":"For a very long time, Jenny believed that she belonged to Hufflepuff. However, she has come to realise that as a bookworm with a thirst for knowledge, she thinks she might actually be a Ravenclaw.\n\nWhereas teammate Alex considers himself to be a lot like the mysterious Professor Snape. The Potion Master’s enigmatic energy and take great risks is something that Alex understands.\n\n### Andy Ortega and Stefan Rose\n"},{"contentfulId":"4bmBuReG5f7MMXbk6ifrEo","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"video","createdAt":"2025-11-02T12:02:08.546Z","updatedAt":"2025-11-02T12:02:08.546Z","_updatedAt":"2025-11-02T12:02:08.546Z","entryTitle":"video-andy-stefan","displayTitle":" ","activationDate":"2025-11-01T00:00+00:00","externalId":"video-andy-stefan","videoFileSource":"https://video.wizardingworld.com/stephen-and-andy-meet-the-teams-wizards-of-baking-season-2/h264/playlist.m3u8"},{"contentfulId":"34wRtIhj6a91h6wAstE6Jq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-11-02T12:01:02.378Z","updatedAt":"2025-11-02T12:01:02.378Z","_updatedAt":"2025-11-02T12:01:02.378Z","entryTitle":"WEB-NEWS-harry-potter-wizards-of-baking-meet-the-teams-season-2-TEXTSECTION-3","text":"Being back at Leavesden is bringing up a lot of memories for Stefan as he was lucky enough to be an extra in the first Harry Potter film where he played a Gryffindor!\n\nSpeaking of houses, teammate Andy believes that he is a Ravenclaw whose wit and intelligence sets him apart – his sharp mind can only help him in the competition!  \n\n### Angel Figueroa and Rui Mota \n"},{"contentfulId":"3ykXDbHHgTzxpeabvgawAo","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"video","createdAt":"2025-11-02T12:02:57.734Z","updatedAt":"2025-11-02T12:02:57.734Z","_updatedAt":"2025-11-02T12:02:57.734Z","entryTitle":"video-angel-rui","displayTitle":" ","activationDate":"2025-11-01T00:00+00:00","externalId":"video-angel-rui","videoFileSource":"https://video.wizardingworld.com/rui-and-angel-meet-the-teams-wizards-of-baking-season-2/h264/playlist.m3u8"},{"contentfulId":"2YgbL6R6DvDIrRO48yJx0j","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-11-02T12:01:08.996Z","updatedAt":"2025-11-02T12:01:08.996Z","_updatedAt":"2025-11-02T12:01:08.996Z","entryTitle":"WEB-NEWS-harry-potter-wizards-of-baking-meet-the-teams-season-2-TEXTSECTION-4","text":"Nature-loving Angel is a Hufflepuff who is embracing the experience with a quiet confidence and remembering the importance of having fun.\n\nHer partner, Rui, is a self-described superfan who would love to have the chance to recreate the maddening maze from the third Triwizard Tournament task.\n\n### Caitlin Taylor and Jaleesa Mason\n"},{"contentfulId":"63T4mp8cHHs4pGOkrIddMQ","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"video","createdAt":"2025-11-02T12:03:19.005Z","updatedAt":"2025-11-02T12:03:19.005Z","_updatedAt":"2025-11-02T12:03:19.005Z","entryTitle":"video-caitlin-jaleesa","displayTitle":" ","activationDate":"2025-11-01T00:00+00:00","externalId":"video-caitlin-jaleesa","videoFileSource":"https://video.wizardingworld.com/caitlin-and-jayleesa-meet-the-teams-wizards-of-baking-season-2/h264/playlist.m3u8"},{"contentfulId":"2Jl8Qi3Yz5nc5gVlaOuT4o","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-11-02T12:01:16.181Z","updatedAt":"2025-11-02T12:01:16.181Z","_updatedAt":"2025-11-02T12:01:16.181Z","entryTitle":"WEB-NEWS-harry-potter-wizards-of-baking-meet-the-teams-season-2-TEXTSECTION-5","text":"Having been an avid reader of the books since they hit our shelves, Caitlin believes that she qualifies as a superfan… we agree! \n\nDescribing herself as creative, logical and with the ability to think outside the box, her teammate Jaleesa considers herself a Ravenclaw. With that description? It sounds like an excellent match.\n\n### Heather Tocco and Kate Sigel\n"},{"contentfulId":"7f98esOQtbOeXebKpIMnKn","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"video","createdAt":"2025-11-02T12:03:43.452Z","updatedAt":"2025-11-02T12:03:43.452Z","_updatedAt":"2025-11-02T12:03:43.452Z","entryTitle":"video-heather-kate","displayTitle":" ","activationDate":"2025-11-01T00:00+00:00","externalId":"video-heather-kate","videoFileSource":"https://video.wizardingworld.com/heather-and-kate-meet-the-teams-wizards-of-baking-season-2/h264/playlist.m3u8"},{"contentfulId":"2dY4CTbmWYEIefVgUhq76s","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-11-02T12:01:26.112Z","updatedAt":"2025-11-02T12:01:26.112Z","_updatedAt":"2025-11-02T12:01:26.112Z","entryTitle":"WEB-NEWS-harry-potter-wizards-of-baking-meet-the-teams-season-2-TEXTSECTION-6","text":"Kate believes that her kind and loyal nature makes her a Hufflepuff, although she sees a part of herself reflected in Gryffindor too as she’s always willing to fight for the underdog. \n\nFellow baker Heather has read the Harry Potter books at least five times and lost count of how many times she has watched the films… that’s dedication.\n\n### Marj Santaromana and Sarah Arnold"},{"contentfulId":"71J3guc7I3aXHM0OyKZpHU","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"video","createdAt":"2025-11-02T12:04:02.720Z","updatedAt":"2025-11-02T12:04:02.720Z","_updatedAt":"2025-11-02T12:04:02.720Z","entryTitle":"video-marj-and-sarah","displayTitle":" ","activationDate":"2025-11-01T00:00+00:00","externalId":"video-marj-and-sarah","videoFileSource":"https://video.wizardingworld.com/sarah-and-marj-meet-the-teams-wizards-of-baking-season-2/h264/playlist.m3u8"},{"contentfulId":"m1td6q8o6gwBlH9Aquzln","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-11-02T12:01:32.039Z","updatedAt":"2025-11-02T12:01:32.039Z","_updatedAt":"2025-11-02T12:01:32.039Z","entryTitle":"WEB-NEWS-harry-potter-wizards-of-baking-meet-the-teams-season-2-TEXTSECTION-7","text":"Although Marj has been sorted into Hufflepuff, she finds herself drawn to Slytherin – and thinks her shrewd mind and rebellious vibes would suit the house well. \n\nHowever, Sarah sees herself reflected in Luna Lovegood – believing she shares the kindness and optimism of this unique Ravenclaw. \n\n### Molly Robbins and Priya Winsor\n"},{"contentfulId":"12JUSvdZvEi9WLnfROqQro","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"video","createdAt":"2025-11-02T12:04:28.539Z","updatedAt":"2025-11-02T12:04:28.539Z","_updatedAt":"2025-11-02T12:04:28.539Z","entryTitle":"video-molly-priya","displayTitle":" ","activationDate":"2025-11-01T00:00+00:00","externalId":"video-molly-priya","videoFileSource":"https://video.wizardingworld.com/molly-and-priya-meet-the-teams-wizards-of-baking-season-2/h264/playlist.m3u8"},{"contentfulId":"6fwf4oDhVZy13XQY4VGIl0","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-11-02T12:01:38.419Z","updatedAt":"2025-11-02T12:01:38.419Z","_updatedAt":"2025-11-02T12:01:38.419Z","entryTitle":"WEB-NEWS-harry-potter-wizards-of-baking-meet-the-teams-season-2-TEXTSECTION-8","text":"As the same age as Harry Potter, Molly feels as though she has grown up with the character. If fact, when Harry started Hogwarts she started secondary school!\n\nBrave and always able to make tough decisions, fellow baker, Priya, has always considered herself to be a Gryffindor. However, she was sorted into Ravenclaw and thinks it’s rather brilliant.\n\n### Jujhar Mann and Katie Bonzer\n"},{"contentfulId":"6Dyd5B78Hs5X5euz9Qk7zY","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"video","createdAt":"2025-11-02T12:04:49.445Z","updatedAt":"2025-11-02T12:04:49.445Z","_updatedAt":"2025-11-02T12:04:49.445Z","entryTitle":"video-jujhar-katie","displayTitle":" ","activationDate":"2025-11-01T00:00+00:00","externalId":"video-jujhar-katie","videoFileSource":"https://video.wizardingworld.com/jujhar-and-katie-meet-the-teams-wizards-of-baking-season-2/h264/playlist.m3u8"},{"contentfulId":"2Uxl6FeZtVSRQjmhsbTaUY","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-11-02T12:01:43.190Z","updatedAt":"2025-11-02T12:01:43.190Z","_updatedAt":"2025-11-02T12:01:43.190Z","entryTitle":"WEB-NEWS-harry-potter-wizards-of-baking-meet-the-teams-season-2-TEXTSECTION-10","text":"Katie has adored the Harry Potter books from the moment that they came out and is thrilled to see that her husband and children have embraced a love of the wizarding world too.\n\nAs someone with a lot of ambition, Jujhar believes that he belongs in Slytherin and is certainly not afraid to take a few risks.\n\n***\nPremiering Sunday, 2nd November, at 8pm ET/PT on Food Network, the series will stream the next day on HBO Max and will roll out globally with additional info to follow on international dates and times.\n"}],"publishDate":"2025-09-03T16:00+01:00"},{"contentfulId":"7rfR9d5hwmB5pzbdGLUhZE","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2025-11-02T13:33:46.148Z","updatedAt":"2025-11-02T13:33:46.148Z","_updatedAt":"2025-11-02T13:33:46.148Z","entryTitle":"WEB-NEWS-phelps-twins-reveal-more-about-harry-potter-wizards-of-baking-season-two","eyebrow":"OUR DELIGHTFUL DUO","displayTitle":"Watch: The Phelps twins reveal more about Harry Potter: Wizards of Baking season two","activationDate":"2025-09-03T00:00+01:00","tags":[{"contentfulId":"6PK6KxaPndhQsAFS54UCkr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:25:53.282Z","updatedAt":"2020-02-20T13:07:09.645Z","_updatedAt":"2020-02-20T13:07:09.645Z","name":"news"}],"externalId":"phelps-twins-reveal-more-about-harry-potter-wizards-of-baking-season-two","mainImage":{"contentfulId":"nzZgZ7RwD5SUnIKtEndE2","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-09-03T16:12:12.846Z","updatedAt":"2025-09-03T16:12:12.846Z","_updatedAt":"2025-09-03T16:12:12.846Z","entryTitle":"wob-season-2-james-oliver-phelps-web-landscape","image":{"contentfulId":"1yFSJIHHNfNW34r6c711Js","type":"Asset","contentTypeId":"asset","createdAt":"2025-09-03T16:12:10.227Z","updatedAt":"2025-09-03T16:12:10.227Z","_updatedAt":"2025-09-03T16:12:10.227Z","revision":1,"locale":"en-GB","title":"wob-season-2-james-oliver-phelps-web-landscape","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1yFSJIHHNfNW34r6c711Js/4c7f595309bd22bde5ef1777b5e3d743/wob-season-2-james-oliver-phelps-web-landscape.jpg","details":{"size":339612,"image":{"width":2700,"height":1801}},"fileName":"wob-season-2-james-oliver-phelps-web-landscape.jpg","contentType":"image/jpeg"}}},"intro":"Back for another season of baking magic, James and Oliver Phelps (aka the Weasley twins) are once again bringing their Weasley wit as the hosts of Harry Potter: Wizards of Baking. Watch this Q\u0026A with the delightful duo to learn more about the second chapter of the show.","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"Lk2fM8TGiZrFQwB56pybo","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-11-02T13:33:37.132Z","updatedAt":"2025-11-02T13:33:37.132Z","_updatedAt":"2025-11-02T13:33:37.132Z","entryTitle":"NEWS-phelps-twins-reveal-more-about-harry-potter-wizards-of-baking-season-two-TEXTSECTION-1","text":"You know them as the mischief-causing Fred and George from the Harry Potter films, but James and Oliver Phelps are also the hilarious hosts of Wizards of Baking! With season two upon us, from what exciting twists we can expect to which Harry Potter-themed goodie the twins would want to bake, we wanted to know all the gossip… and they’ve delivered. See for yourself!"},{"contentfulId":"3GOKHcKC4pkp0fc1KXw3Hd","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"video","createdAt":"2025-11-02T13:33:33.818Z","updatedAt":"2025-11-02T13:33:33.818Z","_updatedAt":"2025-11-02T13:33:33.818Z","entryTitle":"NEWS-phelps-twins-reveal-more-about-harry-potter-wizards-of-baking-season-two-VIDEO-1","displayTitle":" ","activationDate":"2025-11-01T00:00+00:00","externalId":"phelps-twins-reveal-more-about-harry-potter-wizards-of-baking-season-two-video","videoFileSource":"https://video.wizardingworld.com/wob-chapter-2-hosts-q-and-a/h264/playlist.m3u8"},{"contentfulId":"5IDlTclIulXDfrYDp4KbbR","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-11-02T13:33:40.230Z","updatedAt":"2025-11-02T13:33:40.230Z","_updatedAt":"2025-11-02T13:33:40.230Z","entryTitle":"NEWS-phelps-twins-reveal-more-about-harry-potter-wizards-of-baking-season-two-TEXTSECTION-2","text":"Thanks, lads! We can’t wait to see the new locations and stunning creations that this season promises! Also, we wish you luck with that Easter egg, biscuit, jelly-filled baking dream of yours! Although, we’re not quite sure that Molly Weasley would approve…\n\nStay tuned for extra slices about the show as \u0026 when we have them!\n\n***\nHarry Potter: Wizards of Baking is out now on HBO Max and Food Network. The baking wizardry will also be rolling out globally – so stay tuned for more information about how to watch where you are.  \n"}],"publishDate":"2025-09-03T16:00+01:00"},{"contentfulId":"2bfn8vLvD89OtrBhNjwYgt","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"article","createdAt":"2025-09-03T16:20:02.408Z","updatedAt":"2025-12-12T16:13:23.367Z","_updatedAt":"2025-12-12T16:13:23.367Z","entryTitle":"WEB-NEWS-harry-potter-wizards-of-baking-back-with-season-two-this-november","eyebrow":"Chapter Two","displayTitle":"Everything you need to know about Harry Potter: Wizards of Baking season two","activationDate":"2025-09-03T00:00+01:00","tags":[{"contentfulId":"6PK6KxaPndhQsAFS54UCkr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:25:53.282Z","updatedAt":"2020-02-20T13:07:09.645Z","_updatedAt":"2020-02-20T13:07:09.645Z","name":"news"}],"externalId":"harry-potter-wizards-of-baking-back-with-season-two-this-november","mainImage":{"contentfulId":"4GhBrjDoaPcU9wdPXvc0F","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-11-01T18:26:11.346Z","updatedAt":"2025-11-01T18:26:11.346Z","_updatedAt":"2025-11-01T18:26:11.346Z","entryTitle":"wob-chapter-2-hosts-james-and-oliver-with-competitors-katie-and-jujhar-web-landcape","image":{"contentfulId":"6lIGUhwNfhgN6TQbgohu8n","type":"Asset","contentTypeId":"asset","createdAt":"2025-11-01T18:26:07.608Z","updatedAt":"2025-11-01T18:26:07.608Z","_updatedAt":"2025-11-01T18:26:07.608Z","revision":1,"locale":"en-GB","title":"wob-chapter-2-hosts-james-and-oliver-with-competitors-katie-and-jujhar-web-landcape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6lIGUhwNfhgN6TQbgohu8n/767e522c17d3446a3a027a9ac737281f/wob-chapter-2-hosts-james-and-oliver-with-competitors-katie-and-jujhar-web-landcape.jpg","details":{"size":807136,"image":{"width":2700,"height":1801}},"fileName":"wob-chapter-2-hosts-james-and-oliver-with-competitors-katie-and-jujhar-web-landcape.jpg","contentType":"image/jpeg"}}},"intro":"With James and Oliver Phelps, aka the Weasley twins, hosting once more, Food Network’s Harry Potter: Wizards of Baking is back on 2nd November for a delicious new chapter. Here’s everything we know so far…","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"6Ua8ADWtJkXlWVy8whrjUc","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-03T16:11:21.233Z","updatedAt":"2025-10-31T13:17:40.007Z","_updatedAt":"2025-10-31T13:17:40.007Z","entryTitle":"NEWS-harry-potter-wizards-of-baking-back-with-season-two-this-november-TEXTSECTION-1","text":"First, with a recipe that includes dazzling dessert artistry, the magic of Harry Potter and some familiar faces, here’s a sneak peek at what is set to be another spectacular season…\n\n\u003ciframe width=\"560\" height=\"315\" src=\"https://www.youtube-nocookie.com/embed/wmYosP3aPRs?rel=0\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen\u003e\u003c/iframe\u003e"},{"contentfulId":"2l730pYqHnRLCXdZETstlJ","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-03T16:19:39.245Z","updatedAt":"2025-12-11T15:57:14.361Z","_updatedAt":"2025-12-11T15:57:14.361Z","entryTitle":"NEWS-harry-potter-wizards-of-baking-back-with-season-two-this-november-TEXTSECTION-2","text":"## Where to watch season two\n\n__Update:__ From indulgent golden apples to showstopping Snitches, all episodes of the second season of Wizards of Baking are now available to stream on [Prime Video in the UK and Ireland](https://www.amazon.co.uk/dp/B0DK43FRZM?utm_source=wwd_web\u0026utm_medium=newsarticle\u0026utm_campaign=wizardsofbaking\u0026utm_content=uk-amazon).\n\nPremiering 2nd November, you can watch the start of this new chapter on Food Network at 8pm ET/PT or stream the next day on [HBO Max](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.hbomax.com%2Fgeo-availability%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DMax%26utm_content%3Dwizards-of-baking-season-2-guide) (select territories, where HBO Max is available). The baking wizardry will also be rolling out globally – so stay tuned for more information about how to watch where you are."},{"contentfulId":"4tKAw0lY7Dl48fPCnbWpg0","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-09-03T16:03:34.069Z","updatedAt":"2025-09-03T16:03:34.069Z","_updatedAt":"2025-09-03T16:03:34.069Z","entryTitle":"wob-judges-carla-hall-and-jozef-youssef-with-phelps-twins-season-2-web-landscape","image":{"contentfulId":"7refRFXn7wtzTc5iKsrH3m","type":"Asset","contentTypeId":"asset","createdAt":"2025-09-03T16:03:30.861Z","updatedAt":"2025-09-03T16:03:30.861Z","_updatedAt":"2025-09-03T16:03:30.861Z","revision":1,"locale":"en-GB","title":"wob-judges-carla-hall-and-jozef-youssef-with-phelps-twins-season-2-web-landscape","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7refRFXn7wtzTc5iKsrH3m/ad17a3827e8a3ee2f80cf95ca29c10f7/wob-judges-carla-hall-and-jozef-youssef-with-phelps-twins-season-2-web-landscape.jpg","details":{"size":465506,"image":{"width":2700,"height":1801}},"fileName":"wob-judges-carla-hall-and-jozef-youssef-with-phelps-twins-season-2-web-landscape.jpg","contentType":"image/jpeg"}}},{"contentfulId":"5YjwAfPCme1iE8UFyU9JUt","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-03T16:19:42.294Z","updatedAt":"2025-10-31T13:18:08.833Z","_updatedAt":"2025-10-31T13:18:08.833Z","entryTitle":"NEWS-harry-potter-wizards-of-baking-back-with-season-two-this-november-TEXTSECTION-3","text":"## The hosts and judges will return\nEquipped with their signature Weasley wit and charm, James and Oliver Phelps (Fred and George Weasley) will be returning as hosts. Once again, they are joined by esteemed culinary judges, Carla Hall and Jozef Youssef – who bring discerning palates and high expectations to the table."},{"contentfulId":"4PnIkUh9Mysqmpl0JTzXdR","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-09-03T16:10:39.142Z","updatedAt":"2025-09-03T16:10:39.142Z","_updatedAt":"2025-09-03T16:10:39.142Z","entryTitle":"wob-judges-carla-hall-and-jozef-youssef-season-2-web-landscape","image":{"contentfulId":"21UZmecUO6ZmirxkpfCSdm","type":"Asset","contentTypeId":"asset","createdAt":"2025-09-03T16:10:35.807Z","updatedAt":"2025-09-03T16:10:35.807Z","_updatedAt":"2025-09-03T16:10:35.807Z","revision":1,"locale":"en-GB","title":"wob-judges-carla-hall-and-jozef-youssef-season-2-web-landscape","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/21UZmecUO6ZmirxkpfCSdm/c3661ad3047fa0ae87d8a284941f440d/wob-judges-carla-hall-and-jozef-youssef-season-2-web-landscape.jpg","details":{"size":402884,"image":{"width":2700,"height":1801}},"fileName":"wob-judges-carla-hall-and-jozef-youssef-season-2-web-landscape.jpg","contentType":"image/jpeg"}}},{"contentfulId":"1HdKAeTkJQLpkfuB4uDIUo","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-03T16:19:45.325Z","updatedAt":"2025-10-31T13:18:14.993Z","_updatedAt":"2025-10-31T13:18:14.993Z","entryTitle":"NEWS-harry-potter-wizards-of-baking-back-with-season-two-this-november-TEXTSECTION-4","text":"## Expect a few special guests\nFor an extra sprinkle of wizarding fun, throughout the six-episode series you can expect to see some by familiar Hogwarts residents return to your screen. Warwick Davis (aka Professor Flitwick), Afshan Azad (also known as Padma Patil) and Devon Murray (the one and only Seamus Finnigan) will take on the very important, and mouthwatering, task of helping to judge the competitors’ creations while taking a trip down memory lane (we’re not jealous *at all*)."},{"contentfulId":"2saK3NIqAOKChmPqjWdZ9h","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-09-03T16:08:21.401Z","updatedAt":"2025-09-03T16:08:21.401Z","_updatedAt":"2025-09-03T16:08:21.401Z","entryTitle":"wob-season-2-james-oliver-phelps-with-competitors-web-landscape","image":{"contentfulId":"m2HbDo0VwViE4v1a5Vbh9","type":"Asset","contentTypeId":"asset","createdAt":"2025-09-03T16:08:17.735Z","updatedAt":"2025-09-03T16:08:17.735Z","_updatedAt":"2025-09-03T16:08:17.735Z","revision":1,"locale":"en-GB","title":"wob-season-2-james-oliver-phelps-with-competitors-web-landscape","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/m2HbDo0VwViE4v1a5Vbh9/a81b3c9afca364b0a35e25d676ed7eee/wob-season-2-james-oliver-phelps-with-competitors-web-landscape.jpg","details":{"size":410002,"image":{"width":2700,"height":1801}},"fileName":"wob-season-2-james-oliver-phelps-with-competitors-web-landscape.jpg","contentType":"image/jpeg"}}},{"contentfulId":"2dw4DHjaA5hJSYJPF8VNjp","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-03T16:19:48.845Z","updatedAt":"2025-10-31T13:18:20.134Z","_updatedAt":"2025-10-31T13:18:20.134Z","entryTitle":"NEWS-harry-potter-wizards-of-baking-back-with-season-two-this-november-TEXTSECTION-5","text":"## There will be more enchanting artistry\nChapter two is set to take baking wizardry to new heights, with creations that convince you that magic must be real – thanks to the brand-new bakers and their ridiculous talent.  \n\nThis all starts with the exciting two-hour premiere. Not only do the bakers discover their Hogwarts house, courtesy of the Sorting Hat, but they then must immediately create a showstopper that is both enchanting and edible. With the stakes only set to get higher as they approach final, we’re going to be watching from the edge of our seats."},{"contentfulId":"1PS0OEFQSsGI3ZmvkykM8f","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-09-03T16:19:51.640Z","updatedAt":"2025-10-31T13:18:30.273Z","_updatedAt":"2025-10-31T13:18:30.273Z","entryTitle":"NEWS-harry-potter-wizards-of-baking-back-with-season-two-this-november-TEXTSECTION-6","text":"## And surprises!\nPlot twist! There’s been a secret ingredient added to this season… winning a task is no longer just about the glory and now comes with an extra bonus. Bakers will have the choice between selecting an advantage for their team in the next episode or having the chance to bestow an impediment to another… this could get delightfully messy.\n"},{"contentfulId":"5pthC1EgE3YrRJM0n9wNWq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-09-03T16:19:56.325Z","updatedAt":"2025-09-03T16:19:56.325Z","_updatedAt":"2025-09-03T16:19:56.325Z","entryTitle":"wob-season-2-james-oliver-phelps-with-competitors-2-web-landscape","image":{"contentfulId":"7w6xNdapPn06BZt5zpoRLl","type":"Asset","contentTypeId":"asset","createdAt":"2025-09-03T16:09:29.539Z","updatedAt":"2025-09-03T16:09:35.196Z","_updatedAt":"2025-09-03T16:09:35.196Z","revision":2,"locale":"en-GB","title":"wob-season-2-james-oliver-phelps-with-competitors-2-web-landscape","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7w6xNdapPn06BZt5zpoRLl/65e4b6259a42a9e4c254e066dad1c5e5/wob-season-2-james-oliver-phelps-with-competitors-2.jpg","details":{"size":738969,"image":{"width":2700,"height":1801}},"fileName":"wob-season-2-james-oliver-phelps-with-competitors-2.jpg","contentType":"image/jpeg"}}},{"contentfulId":"7FZvIW9taK7bYvRx6jtkyO","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-10-31T13:18:34.355Z","updatedAt":"2025-10-31T13:18:34.355Z","_updatedAt":"2025-10-31T13:18:34.355Z","entryTitle":"NEWS-harry-potter-wizards-of-baking-back-with-season-two-this-november-TEXTSECTION-7","text":"## There’s a whole new batch of brilliant bakers\nSo, who are the pairs ready behind these confectionary creations? This year, the teams come for all around the world and are: \u003cbr\u003e\n\n__Alex Madrigal__ (Playa Del Carmen, Mexico) and __Jenny Chambers__ (Salisbury, UK)\u003cbr\u003e\n__Andy Ortega__ (Yonkers, NY) and __Stefan Rose__ (Yorkshire, UK)\u003cbr\u003e\n__Angel Figueroa__ (Denver, CO) and __Rui Mota__ (Lisbon, Portugal)\u003cbr\u003e\n__Caitlin Taylor__ (Bowie, MD) and __Jaleesa Mason__ (Bloomfield, NJ)\u003cbr\u003e\n__Heather Tocco__ (Rochester, MI) and __Kate Sigel__ (Nashville, TN)\u003cbr\u003e\n__Marj Santaromana__ (Richmond, VA) and __Sarah Arnold__ (Charleston, SC)\u003cbr\u003e\n__Molly Robbins__ (Lancashire, UK) and __Priya Winsor__ (St. Albert, Alberta, Canada)\u003cbr\u003e\n__Jujhar Mann__ (Surrey, BC, Canada) and __Katie Bonzer__ (Orlando, FL) \u003cbr\u003e\n"},{"contentfulId":"RObFoT0kWQnBqWEGB09SM","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-10-31T13:18:38.303Z","updatedAt":"2025-10-31T15:02:56.650Z","_updatedAt":"2025-10-31T15:02:56.650Z","entryTitle":"NEWS-harry-potter-wizards-of-baking-back-with-season-two-this-november-TEXTSECTION-8","text":"## The series was created at the home of the Harry Potter films\nOnce again, Wizards of Baking was filmed at Warner Bros. Studio Tour London – The Making of Harry Potter. Filmed against the backdrop of some of the original sets, from Privet Drive to The Great Hall and even Gringotts Bank, keep an eye out for some famous wizarding locations.\n\nAlthough some of you might be able to see all of this in person! A group of lucky fans will have the opportunity to attend the grand finale. There you will witness the bakers create a showpiece that celebrates the Goblet of Fire in a nod to the 20th anniversary. \n\nA fitting conclusion, as in the end, only one team can emerge champion… who will take home the trophy and be crowned this season’s Wizards of Baking? \n\nYou’ll have to wait and see…\n\n***\nPremiering Sunday, 2nd November, at 8pm ET/PT on Food Network, the series will stream the next day on [HBO Max](https://www.harrypotter.com/linkout?destination=https%3A%2F%2Fwww.hbomax.com%2Fgeo-availability%3Futm_source%3Dwwd_web%26utm_medium%3Dnewsarticle%26utm_campaign%3DMax%26utm_content%3Dwizards-of-baking-season-2-guide) and will roll out globally with additional info to follow on international dates and times.\n"}],"publishDate":"2025-09-03T16:00+01:00"},{"contentfulId":"6YZ6iFrt9YEav6Hu3nR0Ic","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2025-03-25T11:01:40.884Z","updatedAt":"2025-03-25T11:01:40.884Z","_updatedAt":"2025-03-25T11:01:40.884Z","entryTitle":"WEB-NEWS-harry-potter-wizards-of-baking-official-companion-guide-out-now","eyebrow":"Revelio Recipes!","displayTitle":"A sneak peek at Harry Potter: Wizards of Baking: The Official Companion Guide – available now","activationDate":"2025-03-25T00:00+00:00","tags":[{"contentfulId":"6PK6KxaPndhQsAFS54UCkr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:25:53.282Z","updatedAt":"2020-02-20T13:07:09.645Z","_updatedAt":"2020-02-20T13:07:09.645Z","name":"news"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22 by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"38HgpOBWAswNYkcXWgwiVk","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-03-24T18:44:10.251Z","updatedAt":"2025-03-24T18:44:10.251Z","_updatedAt":"2025-03-24T18:44:10.251Z","entryTitle":"harry-potter-wizards-of-baking-official-companion-guide-out-now-text-section-1","text":"Last autumn, the exciting Harry Potter: Wizards of Baking graced our screens. Hosted by James and Oliver Phelps, and filmed at the Warner Bros. Studio Tour London, we watched nine teams of exceedingly talented bakers create showstopping masterpieces inspired by the world of Harry Potter. \n\nNow it’s your turn to whip up a veritable feast as *Harry Potter: Wizards of Baking: The Official Companion Guide* has been published today. Packed full of delicious recipes that made an appearance on screen, this book is perfect for fans of the show and the budding bakers among you. \n\nDid we mention that the book itself is rather gorgeous? Don’t just take our word for it, see for yourself as we can now reveal the cover…\n"},{"contentfulId":"68WJpqKCwRG0A7iZZrKuvY","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-03-24T18:34:02.401Z","updatedAt":"2025-03-24T18:34:02.401Z","_updatedAt":"2025-03-24T18:34:02.401Z","entryTitle":"HP-wizards-of-baking-companion-guide-cover-reveal","image":{"contentfulId":"4tZSvqwCq7awQSPTUETXms","type":"Asset","contentTypeId":"asset","createdAt":"2025-03-24T18:33:42.734Z","updatedAt":"2025-03-24T18:33:42.734Z","_updatedAt":"2025-03-24T18:33:42.734Z","revision":1,"locale":"en-GB","title":"HP-wizards-of-baking-companion-guide-cover-reveal","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4tZSvqwCq7awQSPTUETXms/32f82ec6a4e0f2e59cfb95cb59dbad7f/HP-wizards-of-baking-companion-guide-cover-reveal.png","details":{"size":1126713,"image":{"width":768,"height":950}},"fileName":"HP-wizards-of-baking-companion-guide-cover-reveal.png","contentType":"image/png"}}},{"contentfulId":"659jxopjxxAFJPHVp5pBgE","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-03-24T18:44:34.830Z","updatedAt":"2025-03-24T18:44:34.830Z","_updatedAt":"2025-03-24T18:44:34.830Z","entryTitle":"harry-potter-wizards-of-baking-official-companion-guide-out-now-text-section-2","text":"What you can find inside this book is pretty spectacular too. While this full-colour book is packed full of tasty recipes, it is also so much more. Featuring interviews with the judges, hosts, cast, and crew, behind the scenes pictures, and a foreword written by the winning team, it contains everything you need to know about this unique baking show."},{"contentfulId":"6oFByvzrMPaiBmT6AsQ0li","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-03-24T18:45:00.314Z","updatedAt":"2025-03-24T21:07:09.417Z","_updatedAt":"2025-03-24T21:07:09.417Z","entryTitle":"harry-potter-wizards-of-baking-official-companion-guide-out-now-text-section-3","text":"Meet the teams and discover why they truly are wizards of baking."},{"contentfulId":"srVVDfisoACONE6x9oMMy","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-03-24T20:52:45.455Z","updatedAt":"2025-03-24T20:52:45.455Z","_updatedAt":"2025-03-24T20:52:45.455Z","entryTitle":"HP-wizards-of-baking-companion-guide-teams","image":{"contentfulId":"63zVo7vMdR1JjeHNFRLZeP","type":"Asset","contentTypeId":"asset","createdAt":"2025-03-24T20:52:34.382Z","updatedAt":"2025-03-24T20:52:34.382Z","_updatedAt":"2025-03-24T20:52:34.382Z","revision":1,"locale":"en-GB","title":"HP-wizards-of-baking-companion-guide-teams","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/63zVo7vMdR1JjeHNFRLZeP/55266c9a48d6349a5e859bb1c75ddd8c/HP-wizards-of-baking-companion-guide-teams.png","details":{"size":1067133,"image":{"width":950,"height":574}},"fileName":"HP-wizards-of-baking-companion-guide-teams.png","contentType":"image/png"}}},{"contentfulId":"RwlsnV5kmzrQQ9KEVpzMO","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-03-24T18:45:15.447Z","updatedAt":"2025-03-24T21:06:58.320Z","_updatedAt":"2025-03-24T21:06:58.320Z","entryTitle":"harry-potter-wizards-of-baking-official-companion-guide-out-now-text-section-4","text":"Join them on as they embark on their journey from the very first task and relive what inspired their creations each week."},{"contentfulId":"7wtorCBmPAdk8oi4cwVTds","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-03-24T20:54:52.654Z","updatedAt":"2025-03-24T20:54:52.654Z","_updatedAt":"2025-03-24T20:54:52.654Z","entryTitle":"HP-wizards-of-baking-companion-guide-task-one","image":{"contentfulId":"6TG2fHvhy0DObWkf0CdOtH","type":"Asset","contentTypeId":"asset","createdAt":"2025-03-24T20:53:16.566Z","updatedAt":"2025-03-24T20:53:16.566Z","_updatedAt":"2025-03-24T20:53:16.566Z","revision":1,"locale":"en-GB","title":"HP-wizards-of-baking-companion-guide-task-one","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6TG2fHvhy0DObWkf0CdOtH/24dcedfbf8d572c8e3ce93cc2fc395c7/HP-wizards-of-baking-companion-guide-task-one.png","details":{"size":902658,"image":{"width":1000,"height":625}},"fileName":"HP-wizards-of-baking-companion-guide-task-one.png","contentType":"image/png"}}},{"contentfulId":"4O7knVxJuRWj57Rs08RCIr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-03-24T18:45:41.684Z","updatedAt":"2025-03-24T21:15:11.351Z","_updatedAt":"2025-03-24T21:15:11.351Z","entryTitle":"harry-potter-wizards-of-baking-official-companion-guide-out-now-text-section-5","text":"Admire their creativity and skill as you gaze upon the finished works of food art. From the Ravenclaw scarf to her famous Spectrespecs and is that a copy of *The Quibbler* we spy? This Luna inspired bake captures her personality perfectly."},{"contentfulId":"18q0Es1Mw4LPPLAArMYvUa","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-03-24T18:39:28.745Z","updatedAt":"2025-03-24T18:39:28.745Z","_updatedAt":"2025-03-24T18:39:28.745Z","entryTitle":"HP-wizards-of-baking-companion-guide-luna-bake","image":{"contentfulId":"3Wz5I9fk6X8juAuWO0uzX4","type":"Asset","contentTypeId":"asset","createdAt":"2025-03-24T18:39:19.617Z","updatedAt":"2025-03-24T18:39:19.617Z","_updatedAt":"2025-03-24T18:39:19.617Z","revision":1,"locale":"en-GB","title":"HP-wizards-of-baking-companion-guide-luna-bake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3Wz5I9fk6X8juAuWO0uzX4/9906a2e5e188b497a10cb2aeab7d708d/HP-wizards-of-baking-companion-guide-luna-bake.png","details":{"size":1101015,"image":{"width":1000,"height":563}},"fileName":"HP-wizards-of-baking-companion-guide-luna-bake.png","contentType":"image/png"}}},{"contentfulId":"1PcrA7NYOoh1eq5bNLsW90","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2025-03-24T18:46:21.577Z","updatedAt":"2025-03-24T21:18:26.000Z","_updatedAt":"2025-03-24T21:18:26.000Z","entryTitle":"harry-potter-wizards-of-baking-official-companion-guide-out-now-text-section-6","text":"## Winning recipes\nAt the end of a nail-biting season, it was revealed that Zoë and Jordan were crowned the winners of Wizards of Baking. If anything makes us believe that magic is real, it was their finale showstopper. Not only did they have to recreate an iconic scene in the Great Hall, but it also had to be six feet tall! This talented duo took the mammoth task in their stride, creating a magnificent bake that even snowed. \n\nNow you can learn from these brilliant bakers and make your own culinary magic. Every witch or wizard needs a wand but why not a wand that tastes particularly delicious? Inspired by Zoë and Jordan’s bake in the very first episode, create your own out of shortbread."},{"contentfulId":"54BbswxkeHdeI7eCCXqdRD","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-03-24T21:08:30.881Z","updatedAt":"2025-03-24T21:08:30.881Z","_updatedAt":"2025-03-24T21:08:30.881Z","entryTitle":"HP-wizards-of-baking-companion-guide-chocolate-wand-recipe-text","image":{"contentfulId":"4H52LDY8xHi2zdFZfPXHWo","type":"Asset","contentTypeId":"asset","createdAt":"2025-03-24T21:08:25.731Z","updatedAt":"2025-03-24T21:08:25.731Z","_updatedAt":"2025-03-24T21:08:25.731Z","revision":1,"locale":"en-GB","title":"Wand Recipe","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4H52LDY8xHi2zdFZfPXHWo/7a2bc28a1f59202bf958b29c258abdf7/Wand_Recipe.png","details":{"size":558073,"image":{"width":1500,"height":1875}},"fileName":"Wand Recipe.png","contentType":"image/png"}}},{"contentfulId":"7zazEe13CUyJlj4t8oShnr","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2025-03-24T21:09:43.238Z","updatedAt":"2025-03-24T21:09:43.238Z","_updatedAt":"2025-03-24T21:09:43.238Z","entryTitle":"HP-wizards-of-baking-companion-guide-chocolate-wand-recipe-image","image":{"contentfulId":"2hGw2PCpvMZLydNVtUpgur","type":"Asset","contentTypeId":"asset","createdAt":"2025-03-24T21:09:40.365Z","updatedAt":"2025-03-24T21:09:40.365Z","_updatedAt":"2025-03-24T21:09:40.365Z","revision":1,"locale":"en-GB","title":"Wand Recipe2","description":"","fil
