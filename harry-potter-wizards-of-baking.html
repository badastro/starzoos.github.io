Lonfa5oE76KcwF","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-11-29T17:17:36.062Z","updatedAt":"2024-12-02T11:41:03.059Z","_updatedAt":"2024-12-02T11:41:03.059Z","entryTitle":"WEB-FEATURE-WOB-episode-three-round-up","eyebrow":"THIRD HELPINGS","displayTitle":"The best bites from Harry Potter: Wizards of Baking – episode three","activationDate":"2024-11-22T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"harry-potter-wizards-of-baking-episode-three-recap","mainImage":{"contentfulId":"1MUoAhMGLnTV2ABJjYIIwk","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-29T13:50:15.150Z","updatedAt":"2024-11-29T13:50:15.150Z","_updatedAt":"2024-11-29T13:50:15.150Z","entryTitle":"WOB-episode-three-screengrab-cauldron-cake","image":{"contentfulId":"6w59D3UzDhU1L2DZuRIf3D","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-29T13:50:09.053Z","updatedAt":"2024-11-29T13:50:09.053Z","_updatedAt":"2024-11-29T13:50:09.053Z","revision":1,"locale":"en-GB","title":"WOB-episode-three-screengrab-cauldron-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6w59D3UzDhU1L2DZuRIf3D/783837e88ee812449621f25c8290aeb0/HYTU103_0240.jpeg","details":{"size":599876,"image":{"width":850,"height":567}},"fileName":"HYTU103_0240.jpeg","contentType":"image/jpeg"}}},"intro":"Things are heating up (literally, there are ovens at play here, people!) in Harry Potter: Wizards of Baking, as the contestants take to the cobbled streets of Diagon Alley for this week's baking theme. ","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"4xWZ1JC0zqppIIXmJKwIal","type":"Entry","revision":10,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-29T16:33:27.760Z","updatedAt":"2024-11-29T17:20:21.936Z","_updatedAt":"2024-11-29T17:20:21.936Z","entryTitle":"harry-potter-wizards-of-baking-episode-three-recap-text-section-1","text":"In our third episode, our contestants' concoctions are inspired by magical shops - from [Ollivander's](https://www.harrypotter.com/fact-file/locations/ollivanders) wand shop to [Flourish \u0026 Blotts.](https://www.harrypotter.com/fact-file/locations/flourish-and-blotts) And if that wasn't difficult enough - each bake must include an interactive element to wow the judges. \n\nBut that's not all! Inspired by the Doubling Curse (or you might know the [Duplication Charm](https://www.harrypotter.com/fact-file/spells/the-duplication-charm)), the teams must also create 50 small desserts to go alongside their showpieces!  \n\nIf the stakes couldn't get any higher, this week, it's not just the judges who will be dictating the teams' future in the competition: a tribe of Harry Potter superfans will be coming along to Warner Bros. Studio Tour London to help vote for their favourites! \n\nLisa, who is tasked with creating a Weasley's Wizard Wheezes dessert, sums up the situation beautifully: \"I feel like the inside of the Weasley store is what it's like inside of my brain.\" "},{"contentfulId":"EnhgszGC50eRIAa4k4qeH","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-29T16:30:35.701Z","updatedAt":"2024-11-29T16:30:35.701Z","_updatedAt":"2024-11-29T16:30:35.701Z","entryTitle":"WOB-episode-three-screengrab-teams-deliberate","image":{"contentfulId":"3PpqPwHMbkZsOW9cxnzxZN","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-29T16:30:32.054Z","updatedAt":"2024-11-29T16:30:32.054Z","_updatedAt":"2024-11-29T16:30:32.054Z","revision":1,"locale":"en-GB","title":"WOB-episode-three-screengrab-teams-deliberate","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3PpqPwHMbkZsOW9cxnzxZN/e4e93f3d680a31b4a45cf9651b412e9f/HYTU103_0018.jpg","details":{"size":75638,"image":{"width":1000,"height":667}},"fileName":"HYTU103_0018.jpg","contentType":"image/jpeg"}}},{"contentfulId":"58hEO7NmpaV8xgo4LyLSHh","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-29T16:41:57.444Z","updatedAt":"2024-11-29T16:58:40.990Z","_updatedAt":"2024-11-29T16:58:40.990Z","entryTitle":"harry-potter-wizards-of-baking-episode-three-recap-text-section-2","text":"## Stiff competition\n\nAs last week's winners of the Gringotts challenge, Elizabeth and Juan find themselves with an extra advantage. Gifted with the Petrificus Totalus card (that's the [Full-Body Bind curse](https://www.harrypotter.com/fact-file/spells/the-full-body-bind), for the our wizarding world novices, out there) the pair have the power to freeze one member of ALL opposing teams for ten minutes at the opportune moment. What evil fun! During the freeze, poor Lisa resorts to interpretive dance to boost the spirits. "},{"contentfulId":"44YPLjcW3lfH3aWjFsoMh1","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-29T16:59:01.171Z","updatedAt":"2024-11-29T16:59:01.171Z","_updatedAt":"2024-11-29T16:59:01.171Z","entryTitle":"harry-potter-wizards-of-baking-episode-three-recap-text-section-3","text":"## Opulent shops\n\nAs ever, our bakers set about building their magical creations. With Flourish \u0026 Blotts as their theme, Zoe and Jordan design delicious looking books, conscious they were in the bottom three last episode. "},{"contentfulId":"6qEn55yS54OHdcdoATmYgO","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-29T13:49:01.012Z","updatedAt":"2024-11-29T13:49:01.012Z","_updatedAt":"2024-11-29T13:49:01.012Z","entryTitle":"WOB-episode-three-screengrab-book-cake","image":{"contentfulId":"1zzXSFWF3aw7PVMRNEnPQZ","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-29T13:48:58.390Z","updatedAt":"2024-11-29T13:48:58.390Z","_updatedAt":"2024-11-29T13:48:58.390Z","revision":1,"locale":"en-GB","title":"WOB-episode-three-screengrab-book-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1zzXSFWF3aw7PVMRNEnPQZ/a95d1af6b2ecbd2f00c7707b762f6a83/HYTU103_0179.jpeg","details":{"size":701748,"image":{"width":850,"height":567}},"fileName":"HYTU103_0179.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"4oAEMYQzye2j02zorqXPWS","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-29T16:58:57.100Z","updatedAt":"2024-11-29T16:58:57.100Z","_updatedAt":"2024-11-29T16:58:57.100Z","entryTitle":"harry-potter-wizards-of-baking-episode-three-recap-text-section-4","text":"Hemu \u0026 Riccardo are tasked with recreating Ollivander's wand shop, complete with chocolate wands and multiple sponge layers, to replicate the bountiful array of boxes you find in the wandmaker's dusty dwelling."},{"contentfulId":"7AzeoGcWsLNuuRgKzHymJS","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-29T13:49:38.716Z","updatedAt":"2024-11-29T13:49:38.716Z","_updatedAt":"2024-11-29T13:49:38.716Z","entryTitle":"WOB-episode-three-screengrab-wand-box-cake","image":{"contentfulId":"1PnSsC67hRQzugbuDoUOVM","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-29T13:49:36.506Z","updatedAt":"2024-11-29T13:49:36.506Z","_updatedAt":"2024-11-29T13:49:36.506Z","revision":1,"locale":"en-GB","title":"WOB-episode-three-screengrab-wand-box-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1PnSsC67hRQzugbuDoUOVM/b6cdd9e6eb65931f10acd213988edf32/HYTU103_0280.jpeg","details":{"size":737345,"image":{"width":850,"height":567}},"fileName":"HYTU103_0280.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"yySX8HdLpd5SsR46sHcW1","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-29T16:58:47.054Z","updatedAt":"2024-11-29T17:02:42.380Z","_updatedAt":"2024-11-29T17:02:42.380Z","entryTitle":"harry-potter-wizards-of-baking-episode-three-recap-text-section-5","text":"## The grand Diagon Alley opening\n\nAfter another day of kitchen anxiety, the bakers return to the Diagon Alley set to show off their creations to a selection of Harry Potter superfans. But first, can we get a shoutout for another amazing Carla Hall outfit?! \n"},{"contentfulId":"4CUnL36QSmqgV8D0a2wtaH","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-29T17:05:06.122Z","updatedAt":"2024-11-29T17:05:06.122Z","_updatedAt":"2024-11-29T17:05:06.122Z","entryTitle":"WOB-episode-three-screengrab-carla-hall-in-diagon-alley","image":{"contentfulId":"72OluhHkF76HK0vjmOXLJ0","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-29T17:04:59.819Z","updatedAt":"2024-11-29T17:04:59.819Z","_updatedAt":"2024-11-29T17:04:59.819Z","revision":1,"locale":"en-GB","title":"WOB-episode-three-screengrab-carla-hall-in-diagon-alley","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/72OluhHkF76HK0vjmOXLJ0/c90a515c2624e1ba0ab128b0eb4f71e6/HYTU103_0247.jpeg","details":{"size":739589,"image":{"width":850,"height":567}},"fileName":"HYTU103_0247.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"hzF4SMBRwqhYs3dpUnELR","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-29T17:09:43.666Z","updatedAt":"2024-11-29T17:21:47.563Z","_updatedAt":"2024-11-29T17:21:47.563Z","entryTitle":"harry-potter-wizards-of-baking-episode-three-recap-text-section-7","text":"## That's elementary \n\nRemember that each bake has to involve one interactive element - and our bakers didn't dissapoint. Judge Josef is bowled over by the Ollivander's bake, where the wands magically lift out of the cake to 'choose' him. \n\nWe also see smoking cauldrons that LITERALLY bubble - and Carla gets to a grips with a screaming yo-yo design, inspired by the Weasley's Wizard Wheezes mischievous products.\n\nElizabeth and Juan are not slowing down after their win last week either - providing fluttering Golden Snitches to the awe of all."},{"contentfulId":"1MUoAhMGLnTV2ABJjYIIwk","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-29T13:50:15.150Z","updatedAt":"2024-11-29T13:50:15.150Z","_updatedAt":"2024-11-29T13:50:15.150Z","entryTitle":"WOB-episode-three-screengrab-cauldron-cake","image":{"contentfulId":"6w59D3UzDhU1L2DZuRIf3D","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-29T13:50:09.053Z","updatedAt":"2024-11-29T13:50:09.053Z","_updatedAt":"2024-11-29T13:50:09.053Z","revision":1,"locale":"en-GB","title":"WOB-episode-three-screengrab-cauldron-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6w59D3UzDhU1L2DZuRIf3D/783837e88ee812449621f25c8290aeb0/HYTU103_0240.jpeg","details":{"size":599876,"image":{"width":850,"height":567}},"fileName":"HYTU103_0240.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"6DOHA3ICsAKegomKaOR2ax","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-29T16:58:51.756Z","updatedAt":"2024-11-29T17:17:32.192Z","_updatedAt":"2024-11-29T17:17:32.192Z","entryTitle":"harry-potter-wizards-of-baking-episode-three-recap-text-section-8","text":"## And in the end...\n\nWith Harry Potter superfans joining in the judges' deliberations, an emotional Elizabeth and Juan managed to secure their SECOND win in two weeks.\n\nAlas, another team had to go home, despite creating magic on the cobbles of Diagon Alley. But we won't ruin the ending for you here. Watch the episode for yourself!\n\n***\n\nAnd with that, another baking adventure (and another oven!) comes to a close... and once again, we are staggered by the talent - and hungry. Always, always hungry. \n\nStay tuned for episode four next week where things are about to get spooky in the Forbidden Forest..."},{"contentfulId":"5jFaypMCVLabZF75f3HT0z","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:03:59.849Z","updatedAt":"2024-11-22T15:03:59.849Z","_updatedAt":"2024-11-22T15:03:59.849Z","entryTitle":"wizards-of-baking-generic-text-section-cta","text":"__Spell-binding new competition series Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\nThe show is out now to [Max](https://www.max.com/geo-availability?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow) and Food Network - and you can learn more about the show at our [handy hub.](https://www.harrypotter.com/harry-potter-wizards-of-baking)"}],"publishDate":"2024-11-22T00:00+00:00"},{"contentfulId":"2laRkwFG02alrKxydXMQaq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-12-06T20:19:43.613Z","updatedAt":"2025-11-01T18:16:35.998Z","_updatedAt":"2025-11-01T18:16:35.998Z","entryTitle":"WEB-FEATURE-WOB-episode-four-round-up","eyebrow":"FORBIDDEN FLOURISHES","displayTitle":"The best bites from Harry Potter: Wizards of Baking – episode four","activationDate":"2024-12-06T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"harry-potter-wizards-of-baking-episode-four-recap","mainImage":{"contentfulId":"6BnAIVQWIB3vNtJ9Uns4LH","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T19:52:22.827Z","updatedAt":"2024-12-06T19:52:22.827Z","_updatedAt":"2024-12-06T19:52:22.827Z","entryTitle":"HP-WOB-episode-four-screengrabs-horcrux-cake","image":{"contentfulId":"IPzFOMWnhUOmtjjWrYegQ","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T19:52:19.493Z","updatedAt":"2024-12-06T19:52:19.493Z","_updatedAt":"2024-12-06T19:52:19.493Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-horcrux-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/IPzFOMWnhUOmtjjWrYegQ/c68cdc385879a5a6e18eba8de28d0570/HYTU104_0312.jpeg","details":{"size":767558,"image":{"width":850,"height":567}},"fileName":"HYTU104_0312.jpeg","contentType":"image/jpeg"}}},"intro":"As the competition gets fiercer, today's episode got spookier, thanks to a foray into the Forbidden Forest. Thankfully, the always-delightful Evanna Lynch was on hand to bring some Luna-esque cheer to proceedings. ","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"472aMGahoZceVFerwYRKny","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T18:15:02.035Z","updatedAt":"2024-12-06T20:11:22.450Z","_updatedAt":"2024-12-06T20:11:22.450Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-1","text":"Last week, the bakers were overwhelmed by Diagon Alley-inspired tasks, with their wizarding shop-inspired bakes analysed by the judges... but also a full throng of Harry Potter superfans.\n\nSo, you'd think with all that stress, we can have a nice, wholesome, relaxing episode this week, right? Right? Wrong! \n\nThis week, with one less team in the competition, and a place in a semi-finals at stake, things are getting a little spooky, with Dark Arts-inspired creations and a visit to the Studio Tour's [Forbidden Forest](https://www.harrypotter.com/fact-file/locations/the-forbidden-forest) to get the contestants in the mood."},{"contentfulId":"6hIgldz3Pi7zBJZoUIhzMq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T18:17:30.480Z","updatedAt":"2024-12-06T18:17:30.480Z","_updatedAt":"2024-12-06T18:17:30.480Z","entryTitle":"HP-WOB-episode-four-screengrabs-invitation-to-create-dark-arts-bakes","image":{"contentfulId":"vLX818JjRXGwZn7a4udml","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T18:17:27.587Z","updatedAt":"2024-12-06T18:17:27.587Z","_updatedAt":"2024-12-06T18:17:27.587Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-invitation-to-create-dark-arts-bakes","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/vLX818JjRXGwZn7a4udml/d6f7ff4bb31e28ff620bf195a595d4f9/HYTU104_0006.jpeg","details":{"size":470257,"image":{"width":850,"height":567}},"fileName":"HYTU104_0006.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"EM5Cu5cfXhVOF5pRawlcf","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T18:55:30.202Z","updatedAt":"2024-12-06T18:55:30.202Z","_updatedAt":"2024-12-06T18:55:30.202Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-2","text":"## We *love* this *good* guest\n\nThankfully, we have a special guest from the Harry Potter family to cheer things up. It's Evanna Lynch! Famed for portraying Luna Lovegood in the films, Evanna is on-hand to support the bakers, alongside looking fabulous in the process. What, no Butterbeer cork necklace, though?"},{"contentfulId":"6AhPcT9s7znjzJDbMSvWnz","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T18:55:36.530Z","updatedAt":"2024-12-06T18:55:36.530Z","_updatedAt":"2024-12-06T18:55:36.530Z","entryTitle":"HP-WOB-episode-four-screengrabs-evanna-lynch-phelps-twins","image":{"contentfulId":"3BsUTNtmmWsIBP3cIFmNoL","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T17:55:04.976Z","updatedAt":"2024-12-06T17:55:04.976Z","_updatedAt":"2024-12-06T17:55:04.976Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-evanna-lynch-phelps-twins","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3BsUTNtmmWsIBP3cIFmNoL/5e8106bd543a3bc59142e6bf351a3498/HYTU104_0029.jpeg","details":{"size":646755,"image":{"width":850,"height":567}},"fileName":"HYTU104_0029.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"3ZLOBSyUZpciTuVCWfp9Lo","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T18:35:37.729Z","updatedAt":"2024-12-06T20:14:40.418Z","_updatedAt":"2024-12-06T20:14:40.418Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-3","text":"## Wingardi-yum Leviosa\n\nUnderstandably, the baking teams are thrilled, with Lisa tearfully divulging that she is raising her children to have the same kind-hearted energy as [Luna Lovegood](https://www.harrypotter.com/fact-file/characters-and-pets/luna-lovegood). N'aww! Okay, now we have something in our eye too. \n\nBut not for long! The teams have a long day of baking ahead of them, tasked with creating three-feet tall cakes and other delicious treats fashioned around the darker elements of the Harry Potter stories. Oh, and they also must contain tasting elements comprised of ten layers. And! There must also be an enchanting element, inspired by the levitating charm, [Wingardium Leviosa](https://www.harrypotter.com/fact-file/spells/the-levitation-charm) too. Merlin's beard!\n\nOne thing's for sure: Aunt Petunia's sugared violet pudding ain't got nothing on this."},{"contentfulId":"1pyjro02aImFFBZ6HrPcrv","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T18:34:29.705Z","updatedAt":"2024-12-06T18:34:29.705Z","_updatedAt":"2024-12-06T18:34:29.705Z","entryTitle":"HP-WOB-episode-four-screengrabs-contestants-react","image":{"contentfulId":"22ycIFZS7PK0IJ70OdknBB","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T18:34:25.934Z","updatedAt":"2024-12-06T18:34:25.934Z","_updatedAt":"2024-12-06T18:34:25.934Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-bakers-creating-in-the-kitchen","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/22ycIFZS7PK0IJ70OdknBB/b7a1086a14373067d468b53d57d96b3e/HYTU104_0098.jpeg","details":{"size":712005,"image":{"width":850,"height":567}},"fileName":"HYTU104_0098.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"pqPOEHMnfxfmBgCMdURKB","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T18:41:46.600Z","updatedAt":"2024-12-06T18:53:40.580Z","_updatedAt":"2024-12-06T18:53:40.580Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-4","text":"## Delicious Dolores?\n\nThe teams are assigned their Dark Arts themes, ranging from Boggarts, Dementors, Horcruxes and maybe the most dastardly of all: [Professor Dolores Umbridge](https://www.harrypotter.com/writing-by-jk-rowling/dolores-umbridge). Thinking about it, this character should lend quite well to a dessert, what with being so sickly sweet and all... \n\nEdible tea cups, pink macarons and even a cake-cat will be on the menu for Zoe and Jordan."},{"contentfulId":"7HWl7VsHeEHjnUg3jpHc8w","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T18:39:54.438Z","updatedAt":"2024-12-06T18:39:54.438Z","_updatedAt":"2024-12-06T18:39:54.438Z","entryTitle":"HP-WOB-episode-four-screengrabs-umbridge-cake-concept","image":{"contentfulId":"FVkuzablitV7oCBdaSYbv","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T18:39:51.358Z","updatedAt":"2024-12-06T18:39:51.358Z","_updatedAt":"2024-12-06T18:39:51.358Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-umbridge-cake-concept","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/FVkuzablitV7oCBdaSYbv/00f08862efc64bb46735460776e55f6c/HYTU104_0049.jpeg","details":{"size":745652,"image":{"width":566,"height":850}},"fileName":"HYTU104_0049.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"3LZfXuIBCILqffok4QeOw1","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T18:52:24.619Z","updatedAt":"2024-12-06T18:52:24.619Z","_updatedAt":"2024-12-06T18:52:24.619Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-5","text":"## A Riddikulus endeavour\n\nMeanwhile, Mitzi and Lisa are focusing on the defying gravity element of the task (we hope they're holding space for it!) infused into a Boggart. And for these two: that Boggart will be spider-themed. Ron would absolutely concur. In fact, the pair will be paying homage to how Ron manages to banish his Boggart - aka - making the image comical in some way. And what's funnier than a giant arachnid wearing retro rollerskates?"},{"contentfulId":"ZyGQb18PdBA7fj0XcLwUZ","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T18:43:52.440Z","updatedAt":"2024-12-06T18:43:52.440Z","_updatedAt":"2024-12-06T18:43:52.440Z","entryTitle":"HP-WOB-episode-four-screengrabs-lisa-and-mitsis-spider-cake","image":{"contentfulId":"2NvhQLSRocpciuTs9FxPs6","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T18:43:50.049Z","updatedAt":"2024-12-06T18:43:50.049Z","_updatedAt":"2024-12-06T18:43:50.049Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-lisa-and-mitsis-spider-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2NvhQLSRocpciuTs9FxPs6/195ccba1b038d8af5cf351a8bdce1d84/HYTU104_0291.jpeg","details":{"size":705635,"image":{"width":850,"height":567}},"fileName":"HYTU104_0291.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"7M0eJd2z25Aamnwkvtzts4","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T18:55:55.502Z","updatedAt":"2024-12-06T20:16:27.822Z","_updatedAt":"2024-12-06T20:16:27.822Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-6","text":"## A bit o' help\n\nElizabeth and Juan, fresh off the back of their back-to-back wins, are conscious there's a 'target on their back'... (making spooky cakes will hardly make them less paranoid, then) and are given another magical advantage. In the famous words of Dumbledore, they discover that 'help will be given to those who need it'.\n\nThat help comes in the form of judge Jozef! Brilliantly, Elizabeth and Juan only need this accomplished chef to do a bit of icing for them. Stay humble, Jozef, stay humble."},{"contentfulId":"oPZgjEazWsxptdgdCulVH","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T18:51:15.352Z","updatedAt":"2024-12-06T18:51:15.352Z","_updatedAt":"2024-12-06T18:51:15.352Z","entryTitle":"HP-WOB-episode-four-screengrabs-elizabeth-gets-to-work","image":{"contentfulId":"5V6EgJC1acLzjq8zvEmuff","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T18:51:13.025Z","updatedAt":"2024-12-06T18:51:13.025Z","_updatedAt":"2024-12-06T18:51:13.025Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-elizabeth-gets-to-work","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5V6EgJC1acLzjq8zvEmuff/8caf3e293aff9e3cec8fec8588cee4da/HYTU104_0074.jpeg","details":{"size":515653,"image":{"width":850,"height":567}},"fileName":"HYTU104_0074.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"1ObTz3kTv2oEBUJiwW1mdJ","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T18:56:12.609Z","updatedAt":"2024-12-06T19:48:44.330Z","_updatedAt":"2024-12-06T19:48:44.330Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-7","text":"## Broken cake alert!\n\nLisa and Mitzi soon learn the hard way that attaching rollerskates to a giant edible spider is...actually quite hard! (Who knew?!) leading to our first baking disaster of the episode. \n\nThankfully, these ladies are professionals, and those cake rollerskates (roller-cakes?) go straight in the fridge. Our Boggart is now a slightly wobbly cake after witnessing this baking misadventure."},{"contentfulId":"2B4unqwJWsYXRmh3bqvdXG","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T19:35:59.576Z","updatedAt":"2024-12-06T19:49:31.088Z","_updatedAt":"2024-12-06T19:49:31.088Z","entryTitle":"HP-WOB-episode-four-screengrabs-lisa-and-mitsi-work-on-spider","image":{"contentfulId":"4qhftOCP676yB7G92iTr0f","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T19:49:28.370Z","updatedAt":"2024-12-06T19:49:28.370Z","_updatedAt":"2024-12-06T19:49:28.370Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-lisa-and-mitsi-work-on-spider-2","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4qhftOCP676yB7G92iTr0f/da216ee5ccd8c21a3402b98fa80d3caa/HYTU104_0148.jpeg","details":{"size":617104,"image":{"width":850,"height":567}},"fileName":"HYTU104_0148.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"2SZVMCyRDXM9lV0NPxzZju","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T19:45:05.260Z","updatedAt":"2024-12-06T19:45:05.260Z","_updatedAt":"2024-12-06T19:45:05.260Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-8","text":"## Death by chocolate\n\nOver at Miko and Chris's station, the boys are working on a life-like Dementor. And how's this for a flex? They're making its ethereal cloak out of tempered chocolate. Yep, [the very thing that makes you feel better after a Dementor attack](https://www.harrypotter.com/writing-by-jk-rowling/dementors-and-chocolate). Smart. \n\nMiko's passion for hyper-real elements in his baking mean that his Dementor comes out looking worryingly realistic... damn, if we only had that [Patronus cake from episode one](https://www.harrypotter.com/features/harry-potter-wizards-of-baking-episode-one-recap) to conquer it! "},{"contentfulId":"3rRpFnXaoMngVBNMLmhPPT","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T19:50:14.324Z","updatedAt":"2024-12-06T19:50:14.324Z","_updatedAt":"2024-12-06T19:50:14.324Z","entryTitle":"HP-WOB-episode-four-screengrabs-dementor-cake","image":{"contentfulId":"37AKtUfCbcr2KCS8SFbTdi","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T19:50:11.123Z","updatedAt":"2024-12-06T19:50:11.123Z","_updatedAt":"2024-12-06T19:50:11.123Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-dementor-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/37AKtUfCbcr2KCS8SFbTdi/73c3860f6f19e99253b62b7bb6f43258/HYTU104_0232.jpeg","details":{"size":685019,"image":{"width":850,"height":567}},"fileName":"HYTU104_0232.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"1akftXvKPKFYuTwHyJRSjo","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T20:18:56.911Z","updatedAt":"2024-12-06T20:18:56.911Z","_updatedAt":"2024-12-06T20:18:56.911Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-9","text":"## Facing their fears\n\nJoined by special guest Evanna, the bakers and judges meet in the Forbidden Forest (as you do) to test out their scary bakes.\n\nZoe and Jordan's Umbridge cake is pretty in pink, but a few imperfections put them in danger."},{"contentfulId":"khgLypWP1R0befDgEZyzA","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T19:55:38.768Z","updatedAt":"2024-12-06T19:55:38.768Z","_updatedAt":"2024-12-06T19:55:38.768Z","entryTitle":"HP-WOB-episode-four-screengrabs-umbridge-cake","image":{"contentfulId":"6JznxkQPyc0HmmRaSOlM8o","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T19:55:35.897Z","updatedAt":"2024-12-06T19:55:35.897Z","_updatedAt":"2024-12-06T19:55:35.897Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-umbridge-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6JznxkQPyc0HmmRaSOlM8o/e1ab06a9e5006a1871117903635f71e9/HYTU104_0196.jpeg","details":{"size":656115,"image":{"width":850,"height":567}},"fileName":"HYTU104_0196.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"1FrxniESL8Vf606MPhl8uG","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T20:04:06.941Z","updatedAt":"2024-12-06T20:04:06.941Z","_updatedAt":"2024-12-06T20:04:06.941Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-10","text":"Miko and Chris's chocolate Dementor creation comes with a black forrest cake (shouldn't that be black...Forbidden Forest?) and gets a warm reception from the judges. Will it be enough to take them to the semi-finals, though? Or will they get the kiss-off?\n\nMeanwhile, Lisa and Mitzi's wobbly Boggart spider sparks certainly raises eyebrows, but the flavours win over the judges. Carla even does the ol' \"it's not good...it's great!\" trick - always a classic reality judge move. And it gets us every time! \n\nFor reigning champions Elizabeth and Juan, their Horcrux-inspired showpiece features the Hufflepuff cup, an edible version of Nagini and even rotating Basilisk fang. However, Jozef is concerned that the finishing is a bit 'messy'. Hey, wait a minute, didn't you help them make this, sir?"},{"contentfulId":"7abnAeCOqsNnoj0Ift8M8i","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T20:03:44.540Z","updatedAt":"2024-12-06T20:03:44.540Z","_updatedAt":"2024-12-06T20:03:44.540Z","entryTitle":"HP-WOB-episode-four-screengrabs-horcrux-cake-close-up","image":{"contentfulId":"2raJC1KTBPVrCGauLpWMOw","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T20:03:40.321Z","updatedAt":"2024-12-06T20:03:40.321Z","_updatedAt":"2024-12-06T20:03:40.321Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-horcrux-cake-close-up","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2raJC1KTBPVrCGauLpWMOw/0ca62c37304aa58c844edc230734f842/HYTU104_0318.jpeg","details":{"size":683986,"image":{"width":850,"height":567}},"fileName":"HYTU104_0318.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"2BTOIHkZ8ndF6gU0Zv07yx","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T20:08:04.446Z","updatedAt":"2024-12-06T20:18:47.254Z","_updatedAt":"2024-12-06T20:18:47.254Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-11","text":"## And in the end...\n\nIt is Miko and Chris's Dementor cake that takes the top prize, securing their safety for the next episode - and making them real contenders to take the all-important Wizards of Baking Cup.\n\nAs ever, we're not going to reveal who goes home here... but it is definitely emotional. \n\nNext week, the remaining teams hit Dumbledore's Office - and must make their biggest, most challenging showpieces yet! Come join us next week for more kitchen hi-jinks!"},{"contentfulId":"gJEjQFSEdJkmTERbuK65h","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T20:09:37.686Z","updatedAt":"2024-12-06T20:09:37.686Z","_updatedAt":"2024-12-06T20:09:37.686Z","entryTitle":"HP-WOB-episode-four-screengrabs-the-bakers-gather-in-the-forest","image":{"contentfulId":"4xbKRocL1StnXwefgPmrg0","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T20:09:34.883Z","updatedAt":"2024-12-06T20:09:34.883Z","_updatedAt":"2024-12-06T20:09:34.883Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-the-bakers-gather-in-the-forest","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4xbKRocL1StnXwefgPmrg0/5475378f5937428ea07a6ddd996cd963/HYTU104_0360.jpeg","details":{"size":778346,"image":{"width":850,"height":567}},"fileName":"HYTU104_0360.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"5jFaypMCVLabZF75f3HT0z","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:03:59.849Z","updatedAt":"2024-11-22T15:03:59.849Z","_updatedAt":"2024-11-22T15:03:59.849Z","entryTitle":"wizards-of-baking-generic-text-section-cta","text":"__Spell-binding new competition series Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\nThe show is out now to [Max](https://www.max.com/geo-availability?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow) and Food Network - and you can learn more about the show at our [handy hub.](https://www.harrypotter.com/harry-potter-wizards-of-baking)"}],"relatedArticleReference":[{"contentfulId":"54aTtr3Fky6BxY6lU4j9Sq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-11-19T14:05:12.864Z","updatedAt":"2024-11-19T14:05:12.864Z","_updatedAt":"2024-11-19T14:05:12.864Z","entryTitle":"WEB-FEATURE-WOB-episode-one-round-up","eyebrow":"IN CASE YOU MISSED IT","displayTitle":"The best bites from Harry Potter: Wizards of Baking – episode one ","activationDate":"2024-11-18T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"harry-potter-wizards-of-baking-episode-one-recap","mainImage":{"contentfulId":"787OuhKCGm88hqBlJn7pI6","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T16:27:09.343Z","updatedAt":"2024-11-18T16:27:09.343Z","_updatedAt":"2024-11-18T16:27:09.343Z","entryTitle":"WOB-episode-1-screengrab-mirror-of-erised","image":{"contentfulId":"7bx6oqw7AO6FNo1KXnhTyd","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T16:27:06.864Z","updatedAt":"2024-11-18T16:27:06.864Z","_updatedAt":"2024-11-18T16:27:06.864Z","revision":1,"locale":"en-GB","title":"WOB-episode-1-screengrab-mirror-of-erised","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7bx6oqw7AO6FNo1KXnhTyd/e96d1c76b670868947b48314ff966632/HYTU101_AB_0112.jpeg","details":{"size":684259,"image":{"width":850,"height":567}},"fileName":"HYTU101_AB_0112.jpeg","contentType":"image/jpeg"}}},"intro":"From moving spiders to pesky Muggle ovens... episode one of Harry Potter: Wizards of Baking was a hearty mix of wholesome Harry Potter love and kitchen drama.","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"tXK2DpQnrlsx8ARV1Onwi","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T16:45:37.341Z","updatedAt":"2024-11-18T16:45:37.341Z","_updatedAt":"2024-11-18T16:45:37.341Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-1","text":"## The contestants entered the kitchen...via Floo Powder\n\nWell, why ever not? Yes, naturally, when it came to making an entrance in the kitchen, the bakers entered via Floo Powder, through a fireplace underneath the famous Fat Lady portrait. We wish we could dramatically enter our kitchens in such a manner - or indeed any rooms, ever. "},{"contentfulId":"7gxcwv3Dj9uEdtHo7WDxvs","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T16:30:06.177Z","updatedAt":"2024-11-18T16:30:06.177Z","_updatedAt":"2024-11-18T16:30:06.177Z","entryTitle":"WOB-episode-1-screengrab-contestants-through-the-fireplace","image":{"contentfulId":"7BJDycshwNqIWEvMIB7OB0","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T16:30:01.408Z","updatedAt":"2024-11-18T16:30:01.408Z","_updatedAt":"2024-11-18T16:30:01.408Z","revision":1,"locale":"en-GB","title":"HYTU101 0038","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7BJDycshwNqIWEvMIB7OB0/023c340f09507f89dac4910acec67d12/HYTU101_0038.jpeg","details":{"size":672694,"image":{"width":850,"height":567}},"fileName":"HYTU101_0038.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"3hQKEQL8tvqlQSWnZRkztO","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T16:46:48.179Z","updatedAt":"2024-11-18T16:46:48.179Z","_updatedAt":"2024-11-18T16:46:48.179Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-2","text":"## Absolutely everyone was starstruck to meet the Phelps twins! \n\nOnce the bakers had popped out of the fireplace, they immediately found themselves face-to-face with our esteemed hosts: James and Oliver Phelps! Scream! (In fact, many of them did.) Yes, our beloved Weasley twins are back at Warner Bros. Studio Tours London to lend their twinning energy to our teams. How excited were the contestants to meet our Harry Potter stars out of ten? Well, nine and a half, obviously. "},{"contentfulId":"5K7vCQK1yELYRl8dX7Rkp7","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T16:27:29.848Z","updatedAt":"2024-11-18T16:27:29.848Z","_updatedAt":"2024-11-18T16:27:29.848Z","entryTitle":"WOB-episode-1-screengrab-phelps-brothers-posing","image":{"contentfulId":"74Cy40uSYKcOi6EY1dPeZv","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T16:27:26.816Z","updatedAt":"2024-11-18T16:27:26.816Z","_updatedAt":"2024-11-18T16:27:26.816Z","revision":1,"locale":"en-GB","title":"HYTU101 0042","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/74Cy40uSYKcOi6EY1dPeZv/58beeb5c39ed70ab66a2665c18a3ada4/HYTU101_0042.jpeg","details":{"size":642906,"image":{"width":850,"height":567}},"fileName":"HYTU101_0042.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"3D1VGpihIXN3caK50iFDHl","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T17:13:09.715Z","updatedAt":"2024-11-18T17:13:09.715Z","_updatedAt":"2024-11-18T17:13:09.715Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-3","text":"## The bakes were inevitably very magical\n\nFrom a cake that literally pumped out Hogwarts letters, to moving, edible spiders outside the Whomping Willow, our professionals did not disappoint when it came to magical baking.\n\n![HYTU101 AB 0099](//contentful.harrypotter.com/usf1vwtuqyxm/opiRru6prsn86ETOE7l5h/d76db64b00a066b4663a124eb14538c5/HYTU101_AB_0099.jpeg)\n\nA beautiful depiction of the Mirror of Erised was especially powerful, while a colourful homage to Miss Luna Lovegood went down to every quirky detail - such as her snazzy Spectrespecs.\n\n![WOB-screengrab-episode-1-luna-lovegood-cake](//contentful.harrypotter.com/usf1vwtuqyxm/5TEAc9URsTAfqTvDlgDVhI/7e4da1d48615adfbba6515aa7b25d042/HYTU101_AB_0003.jpeg)\n\nWe had Hufflepuff representation with a delicious badger themed dessert, while the star of the episode was the Whomping Willow showpiece, complete with actual, moving, edible spiders - which were actually bon bons!\n\n![HYTU101 AB 0131](//contentful.harrypotter.com/usf1vwtuqyxm/2Rvki4SlGE0dfxZ3YoM4HU/f987efa5ed304f77a7a435f58549539d/HYTU101_AB_0131.jpeg)\n\nOther cake-masterpieces included the magnificent 'Power of Patronus' showstopper, detailed with almond cake lilies, while the Potions Cabinet-themed cake (complete with lemon curd bottles!) impressed our judges Carla and Josef. And might've even impressed a certain Professor Snape.\n\nAnd a Slytherin shoutout to this snake-inspired delight... is it us, or is that snake giving us side-eye? "},{"contentfulId":"5uyDAKRlOH340XhecDVbQ3","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T16:59:11.172Z","updatedAt":"2024-11-18T16:59:11.172Z","_updatedAt":"2024-11-18T16:59:11.172Z","entryTitle":"WOB-episode-1-screengrab-judges-snake-side-eye","image":{"contentfulId":"612kib753VTnA5DBPU18e2","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T16:59:08.549Z","updatedAt":"2024-11-18T16:59:08.549Z","_updatedAt":"2024-11-18T16:59:08.549Z","revision":1,"locale":"en-GB","title":"WOB-episode-1-screengrab-judges-snake-side-eye","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/612kib753VTnA5DBPU18e2/75993d668c6f6a167c03f4b01a01258b/HYTU101_AB_0230__1_.jpg","details":{"size":65002,"image":{"width":1000,"height":667}},"fileName":"HYTU101_AB_0230 (1).jpg","contentType":"image/jpeg"}}},{"contentfulId":"7gFC7b4x2kxCTC1WXvOwD6","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T17:13:14.760Z","updatedAt":"2024-11-18T17:13:14.760Z","_updatedAt":"2024-11-18T17:13:14.760Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-4","text":"## Miko suffered the classic baking faux pas...\n\nIt was bound to be someone!\n\nYes, in our very first episode, someone forgot to turn on their oven. A (baking) tale as old as time. On this occasion, poor [Miko](https://www.harrypotter.com/news/meet-the-teams-harry-potter-wizards-of-baking) was the victim. We blame Muggle technology, quite frankly."},{"contentfulId":"6I5qrnhSR5IbIVpm4Ptqcx","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T17:05:15.866Z","updatedAt":"2024-11-18T17:05:15.866Z","_updatedAt":"2024-11-18T17:05:15.866Z","entryTitle":"WOB-episode-1-screengrab-work-in-the-kitchen","image":{"contentfulId":"50OSIByBjBxEO8tTF0GlNX","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T17:05:02.429Z","updatedAt":"2024-11-18T17:05:02.429Z","_updatedAt":"2024-11-18T17:05:02.429Z","revision":1,"locale":"en-GB","title":"WOB-episode-1-screengrab-work-in-the-kitchen","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/50OSIByBjBxEO8tTF0GlNX/a01e35efe698a2648c01eb7a24d589de/HYTU101_0552.jpeg","details":{"size":699565,"image":{"width":850,"height":567}},"fileName":"HYTU101_0552.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"2f99BWIVPYEHCFkojyVf3X","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T17:13:18.401Z","updatedAt":"2024-11-18T17:13:18.401Z","_updatedAt":"2024-11-18T17:13:18.401Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-5","text":"## And we had to say goodbye to some of the teams!\n\nAccio tissues, please! Just as we were getting to know all the teams, Josef and Carla had the difficult task of having to say goodbye to a couple before the next episode. Equipped with tickets for the next round and an invite to go on Warner Bros. Studio Tour London's Hogwarts Express, many of our bakers were delighted to get the nod. However, a couple of teams missed out by a hair.\n\nWe won't spoil it here for you who goes home, but suffice to say, tears were shed - but wizarding world friendships were made forever.\n\nIn the words of a young Harry himself, 'I'm not going home, not really.' Blub!\n\n***\n\n__Spell-binding new competition series Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\n__The show is out now to [Max](https://www.max.com/geo-availability?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow) and Food Network.__"}],"relatedArticleReference":[{"contentfulId":"6qR0tdLL7Tcl5UaUyrkLmU","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-11-15T13:19:28.390Z","updatedAt":"2024-11-15T13:20:10.082Z","_updatedAt":"2024-11-15T13:20:10.082Z","entryTitle":"WEB-FEATURE-phelps-twins-quickfire-chat","eyebrow":"TWINN ":{"width":850,"height":567}},"fileName":"HYTU102_0596.jpeg","contentType":"image/jpeg"}}},"intro":"This week, the bakers are *banking* on getting through to the next round with a series of Gringotts inspired cakes. And a very special guest who knows a thing or two about the wizarding bank was on hand to help out. ","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"5mGIT9mu9xIv9q8MJn0Lr7","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T13:30:31.828Z","updatedAt":"2024-11-22T15:05:09.276Z","_updatedAt":"2024-11-22T15:05:09.276Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-1","text":"## Griphook returns! \n\nIn our second episode, our baking teams were taken to explore the majestic [Gringotts Wizarding Bank set](https://www.harrypotter.com/news/first-look-at-gringotts-wizarding-bank-set-at-warner-bros-studio-tour-london) at Warner Bros. Studio Tour London - enjoying its opulent architecture, detailed goblins and... Warwick Davis?! "},{"contentfulId":"2mdWipi5vHcTS8l32ccWcg","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-22T13:20:23.762Z","updatedAt":"2024-11-22T13:20:23.762Z","_updatedAt":"2024-11-22T13:20:23.762Z","entryTitle":"WOB-screenshot-episode-two-warwick-and-goblin-surprise","image":{"contentfulId":"5302BLRck3f8AnnGq7V0xv","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-22T13:20:20.925Z","updatedAt":"2024-11-22T13:20:20.925Z","_updatedAt":"2024-11-22T13:20:20.925Z","revision":1,"locale":"en-GB","title":"WOB-screenshot-episode-two-warwick-and-goblin-surprise","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5302BLRck3f8AnnGq7V0xv/5d1f3acc32d682d8f6f530d9c15c790a/HYTU102_0228.jpeg","details":{"size":646985,"image":{"width":850,"height":567}},"fileName":"HYTU102_0228.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"2XxQ6oKJBTjBfd1FHYzwnS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T13:55:42.689Z","updatedAt":"2024-11-22T15:07:58.538Z","_updatedAt":"2024-11-22T15:07:58.538Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-2","text":"Yes, the Harry Potter legend came to visit the teams this week to observe their Gringotts-inspired bakes. Warwick played not one, not two, but three roles across the eight Harry Potter movies, including Professor Flitwick - but most pertinently for this episode - the prickly [Griphook](https://www.harrypotter.com/fact-file/characters-and-pets/griphook-fact-file): a goblin Gringotts worker, who gets caught up in Harry's adventures.\n\nFrom handling gold to judging gold-standard cakes... how will Warwick fair with our baking experts, who must create delicious showstoppers framed around the themes of the Wizarding Bank?"},{"contentfulId":"4NZu68Z9EuF78jjpursA89","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-22T13:19:40.408Z","updatedAt":"2024-11-22T13:19:40.408Z","_updatedAt":"2024-11-22T13:19:40.408Z","entryTitle":"WOB-screenshot-episode-two-gringotts-hallway","image":{"contentfulId":"4wOdGG1h3QmnovZOOvfP0k","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-22T13:19:37.271Z","updatedAt":"2024-11-22T13:19:37.271Z","_updatedAt":"2024-11-22T13:19:37.271Z","revision":1,"locale":"en-GB","title":"WOB-screenshot-episode-two-gringotts-hallway","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4wOdGG1h3QmnovZOOvfP0k/b3d83cddded8e85fc1b73da2b9567310/HYTU102_0291.jpeg","details":{"size":813240,"image":{"width":850,"height":567}},"fileName":"HYTU102_0291.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"2gGKS7f9615fMd0PKw8hkD","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:04:17.806Z","updatedAt":"2024-11-22T15:06:46.551Z","_updatedAt":"2024-11-22T15:06:46.551Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-3","text":"## Baking duels\n\nAnd this time around, there is a twist! The teams will partake in 'baking duels' (well, they can't be as messy as [Snape](https://www.harrypotter.com/collections/severus-snape) facing off [Lockhart](https://www.harrypotter.com/fact-file/characters-and-pets/gilderoy-lockhart) in Duelling Club...) having their showstopping desserts judged head-to-head with select other teams. In different groups, the teams are tasked with creating three-feet high cakes full of surprises, including an enchanting effect inspired by the spell, Revelio, with the risk of going home if they do not succeed in their 'duel'. "},{"contentfulId":"6SfQT9FXQ4L6vqoYnm89IN","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:04:14.489Z","updatedAt":"2024-11-22T15:04:14.489Z","_updatedAt":"2024-11-22T15:04:14.489Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-4","text":"## Beyond the cakes \n\nWhile the bakers set about preparing their showstoppers, we learnt a little more about the contestant's backstories. Miko reveals his background as a painter, a skill he has taken into his baking (\"cakes are my canvas\") while Juan reveals he was going to be a doctor before pivoting to this very different life! \n\nWe're also seeing that Lisa is becoming the joker of the group. When asked how her cake was going (inspired by the underground Gringotts cart sequence from *Harry Potter and the Deathly Hallows Part 2*) there could only be one answer: \"on track!\" "},{"contentfulId":"3Kp0OWghL9xBZiLP2a2BLG","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-22T13:22:53.879Z","updatedAt":"2024-11-22T13:22:53.879Z","_updatedAt":"2024-11-22T13:22:53.879Z","entryTitle":"WOB-screenshot-episode-two-lisas-train-tracks-cake","image":{"contentfulId":"4zyDUX0ZksZplGjGp08cn4","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-22T13:22:51.470Z","updatedAt":"2024-11-22T13:22:51.470Z","_updatedAt":"2024-11-22T13:22:51.470Z","revision":1,"locale":"en-GB","title":"WOB-screenshot-episode-two-lisas-train-tracks-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4zyDUX0ZksZplGjGp08cn4/e24764a333ef162666170cec467a6dfd/HYTU102_0450.jpeg","details":{"size":658941,"image":{"width":850,"height":567}},"fileName":"HYTU102_0450.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"5jIO9AShydh92yuo97fPMA","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:04:10.353Z","updatedAt":"2024-11-22T15:04:10.353Z","_updatedAt":"2024-11-22T15:04:10.353Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-5","text":"## A vault with a fault\n\nBut it's all fun and games until someone's bake starts going wrong... poor Ricardo found himself having a literal meltdown in the kitchen when his chocolate bank vault started losing shape. \n\nMeanwhile, Zoe and Jordan were having similar struggles with their showpiece, trying to perfect the details on the chandeliers we see in the Gringotts' main hallway on time. \n\n\"I'm in beaded hell!\" Jordan admitted.\n\nThankfully, the finished piece came out absolutely beautifully. If it was us, we would've probably cried at our kitchen counters, but hey, that's just us."},{"contentfulId":"9wOktxXVWWpcc3JNjcrVB","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-22T14:51:08.892Z","updatedAt":"2024-11-22T14:51:08.892Z","_updatedAt":"2024-11-22T14:51:08.892Z","entryTitle":"WOB-screenshot-episode-two-beaded-show-stopper","image":{"contentfulId":"1TxTDG7LbTLdXT3sc83Wka","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-22T14:51:06.122Z","updatedAt":"2024-11-22T14:51:06.122Z","_updatedAt":"2024-11-22T14:51:06.122Z","revision":1,"locale":"en-GB","title":"WOB-screenshot-episode-two-beaded-show-stopper","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1TxTDG7LbTLdXT3sc83Wka/9cc37b4598c9869ab9e4b23b6bca4ccd/HYTU102_0537.jpeg","details":{"size":633875,"image":{"width":850,"height":567}},"fileName":"HYTU102_0537.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"4jV1ZcQKuz1uDImBp5Fwka","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:04:24.438Z","updatedAt":"2024-11-22T15:04:24.438Z","_updatedAt":"2024-11-22T15:04:24.438Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-6","text":"## Showstopper of the episode \n\nWe hate to pick favourites, but one of the particular highlights of the episode was Elizabeth and Juan's 'Teller's Desk' cake, complete with a smoking dragon and magically wriggling quills. Oh, and it had champagne in it - which always, always helps. "},{"contentfulId":"1PShsNDLWj6Lu4ruQceRAr","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-22T13:26:45.358Z","updatedAt":"2024-11-22T13:26:45.358Z","_updatedAt":"2024-11-22T13:26:45.358Z","entryTitle":"WOB-screenshot-episode-two-screenshot-the-tellers-desk","image":{"contentfulId":"1T0B4dJbcFOCnWhlLV7Ew9","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-22T13:26:42.916Z","updatedAt":"2024-11-22T13:26:42.916Z","_updatedAt":"2024-11-22T13:26:42.916Z","revision":1,"locale":"en-GB","title":"WOB-screenshot-episode-two-screenshot-the-tellers-desk","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1T0B4dJbcFOCnWhlLV7Ew9/7fc0bf6d0df6b0cfdc913ea1a7113898/HYTU102_0524.jpeg","details":{"size":633674,"image":{"width":850,"height":567}},"fileName":"HYTU102_0524.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"4WGWSlccIVnfyXPHjv6v8P","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:04:28.390Z","updatedAt":"2024-11-22T15:04:28.390Z","_updatedAt":"2024-11-22T15:04:28.390Z","entryTitle":"harry-potter-wizards-of-baking-episode-two-recap-text-section-7","text":"## Glimmering details\n\nBut it wasn't just this particular piece that had our mouths watering. In fact, we were imagining *goblin* a lot of these cakes up. \n\nFrom chocolate jewels to golden skulls, the bakers once again excelled themselves with some of the finer nuances of their creations. We particularly enjoyed the easter egg of capturing Vault 687 here - eagle-eyed Potter experts will know all too well that's Harry's number! "},{"contentfulId":"30wfmpCsdMzCp0tnjj28VD","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-22T13:23:44.807Z","updatedAt":"2024-11-22T13:23:44.807Z","_updatedAt":"2024-11-22T13:23:44.807Z","entryTitle":"WOB-screenshot-episode-two-gringotts-vault-detailed-cake-close-up","image":{"contentfulId":"4Pd3xibbkW3JrIKJ0zKcNS","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-22T13:23:42.334Z","updatedAt":"2024-11-22T13:23:42.334Z","_updatedAt":"2024-11-22T13:23:42.334Z","revision":1,"locale":"en-GB","title":"WOB-screenshot-episode-two-gringotts-vault-detailed-c
