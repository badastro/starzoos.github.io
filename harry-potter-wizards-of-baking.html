t-web-landscape","image":{"contentfulId":"4Aidew8BgoEKQdbknhQEMn","type":"Asset","contentTypeId":"asset","createdAt":"2024-09-23T16:40:45.390Z","updatedAt":"2024-09-23T16:40:45.390Z","_updatedAt":"2024-09-23T16:40:45.390Z","revision":1,"locale":"en-GB","title":"HP-WOB-host-shot-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4Aidew8BgoEKQdbknhQEMn/5133e92ce4c64c8fb4f3b0991c1d4d71/a29c3129-9025-4230-a6df-387c10981ce4.jpg","details":{"size":558085,"image":{"width":2560,"height":1706}},"fileName":"a29c3129-9025-4230-a6df-387c10981ce4.jpg","contentType":"image/jpeg"}}},"intro":"Who’s hungry? We’ve got a freshly baked new trailer for the upcoming collaboration with Food Network, Harry Potter: Wizards of Baking – and a few extra details on this upcoming competition series – launching this November. ","author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"7oM7ITY1RJNxNaDNEKOpji","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-09-26T18:24:14.532Z","updatedAt":"2024-09-26T18:24:14.532Z","_updatedAt":"2024-09-26T18:24:14.532Z","entryTitle":"harry-potter-wizards-of-baking-releases-trailer-and-launch-date-text-section","text":"Hosted by James and Oliver Phelps, AKA the Weasley twins, Harry Potter: Wizards of Baking is an upcoming culinary competition with a Harry Potter twist. Launching 14th November (just in time for the festive season) here’s a little taster before the show launches. \n\n\u003ciframe width=\"560\" height=\"315\" src=\"https://www.youtube-nocookie.com/embed/vPnOJpqkXzQ?si=BGJopTkND4PY2VXO?rel=0\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen\u003e\u003c/iframe\u003e\n\nNine teams of pastry chefs will be pitted against each other across six episodes to deliver spellbinding showpieces to esteemed judges, Carla Hall and Jozef Youssef. And yes, each bake will be inspired by the themes of the wizarding world. But hopefully, no one will be inspired by Rubeus Hagrid’s famous rock cakes.\n\nFilmed in Leavesden, the home of the Harry Potter films, you can expect to see some magical alumni pop up to give their two cents. Warwick Davis, Evanna Lynch and Bonnie Wright will be stepping into the studio to share some nostalgic movie memories with us all - and probably a few sneaky tastes of the contestants’ concoctions too! \n\nEach team will come in pairs to create their confectionary creations. Teams competing are: Kimberly Adams (Milwaukee, MI) and Ashley Cardona (Charleston, SC), Lisa Altfest (Orange County, CA) and Mitzi Reyes (Los Angeles, CA), Hemu Basumatary  (Katy, TX) and Riccardo Menicucci (Los Angeles, CA), Zoe Burmester (Brooklyn, NY) and Jordan Pilarski (Ojai, CA), Jess Lewis (Washington, DC) and Jamie Louks (Seattle, WA), Kayla Giddings(Lafayette, LA) and Yohann Le Bescond(Ocala, FL), Juan Gutierrez (Chicago, IL) and Elizabeth Rowe (Dallas, TX), Michael Russ II (Modesto, CA) and Conner Strackman (Smithville, TX), and Christopher Teixeira (Chicago, IL) and Miko Uy (Astoria, NY). \n\nSo! Who will win the first-ever Wizards of Baking Cup? We can’t wait to find out. __Harry Potter: Wizards of Baking premieres Thursday, 14th November__ on Food Network and globally on Max where the platform is available (with further broadcasters to be announced). \n\n***\n\n*You can check out the #WizardsOfBaking hashtag to follow the conversation about the show. Maybe you can even show us your own kitchen creations!*"}],"publishDate":"2024-09-26T00:00+01:00"},{"contentfulId":"1201q4mOMn2n8tvR0kbOeG","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2022-11-16T20:43:44.565Z","updatedAt":"2022-11-16T20:43:44.565Z","_updatedAt":"2022-11-16T20:43:44.565Z","entryTitle":"WEB-PUZZLE-the-hogwarts-feast-crossword","displayTitle":"The Hogwarts feasts crossword","activationDate":"2022-11-16T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"}],"externalId":"hogwarts-feasts-crossword","mainIm "author":{"contentfulId":"3moP55ZKIanB6wWwRtA4Ea","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"author","createdAt":"2019-07-17T13:40:37.517Z","updatedAt":"2024-10-15T15:11:09.977Z","_updatedAt":"2024-10-15T15:11:09.977Z","entryTitle":"Signature-WizardingWorld","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"4ojB8JFsDOKvlf2ArnRRjW","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-05-14T13:34:28.235Z","updatedAt":"2024-05-15T15:27:16.293Z","_updatedAt":"2024-05-15T15:27:16.293Z","entryTitle":"harry-potter-wizards-of-baking-coming-soon-text-section-1","text":"What happens when the magic of the wizarding world meets pots, pans and lots and lots of cake mix? Well, we’re soon to find out, following the news today that the Food Network has a new baking competition straight out of the oven, all in the name of Harry Potter!\n\n\u003ciframe width=\"560\" height=\"315\" src=\"https://www.youtube-nocookie.com/embed/VR3z5Oyn4A4?si=7-NyJVe4SajWQguR?rel=0\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen\u003e\u003c/iframe\u003e\n\nHarry Potter: Wizards of Baking invites fans to mix, whisk and glaze their way to success, with professional pastry chefs competing against each other to create enchanting sweet treats, themed around the Harry Potter stories. Will the bakers be able to channel their inner Mrs Weasley? Or will their attempts be as successful as one of Seamus Finnigan’s exploding cauldrons?  \n\nFilmed in [Leavesden, the home of the Harry Potter film series](https://www.wizardingworld.com/discover/experiences/warner-bros-studio-tour-london-the-making-of-harry-potter), you’ll be able to watch the competition unfold at the very place where the stories were brought to life, with locations including The Burrow, The Great Hall and Gringotts Wizarding Bank. Perhaps these sets will help spur the contestants on, especially as they will then have their culinary creations inspected by a panel of judges. We hope the results will be Wingardi-yum Leviosa. \n\nHarry Potter: Wizards of Baking will be available to [stream on Max](https://www.wizardingworld.com/news/introducing-enhanced-streaming-service-max) and via The Food Network. We’ll reveal more about when the show is airing quicker than you can say treacle fudge. Stay tuned!  \n\n[Sign up to the Harry Potter Fan Club today](https://www.wizardingworld.com/register) to discover more Harry Potter news, hot off the press. "}],"publishDate":"2024-05-14T00:00+01:00"}],"publishDate":"2024-11-07T00:00+00:00"},{"contentfulId":"50IoptOtqhO4YDgJbeKeJc","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-11-13T16:00:02.623Z","updatedAt":"2024-11-14T16:25:59.470Z","_updatedAt":"2024-11-14T16:25:59.470Z","entryTitle":"WEB-FEATURE-wob-q\u0026a-weasley-twins","eyebrow":"DOUBLE TROUBLE","displayTitle":"Watch: The Phelps twins discuss new show Harry Potter: Wizards of Baking","activationDate":"2024-11-12T00:00+00:00","tags":[{"contentfulId":"6PK6KxaPndhQsAFS54UCkr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:25:53.282Z","updatedAt":"2020-02-20T13:07:09.645Z","_u h":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"4UX5uUxuXObHea3mqIPFCf","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-13T15:25:15.055Z","updatedAt":"2024-11-13T15:25:15.055Z","_updatedAt":"2024-11-13T15:25:15.055Z","entryTitle":"harry-potter-wizards-of-baking-phelps-twins-video-text-section-1","text":"You know them as the mischief-causing Fred and George from the Harry Potter films, but now, James and Oliver Phelps are trying their hand at hosting! A baking show all about Harry Potter, no less! \n\nBut what can we expect from Harry Potter: Wizards of Baking? And can the Phelps twins give us any bite-size pieces of gossip? Also! Which Harry Potter food do they wish was real? Which spell would be helpful to have in a stressful kitchen scenario? And how much cake did they really get to eat?\n\nJoin them for a little fireside (or should that be...ovenside?) chat right here."},{"contentfulId":"61KCnnllMSU2tHI5ieIkTH","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"video","createdAt":"2024-11-13T15:25:19.844Z","updatedAt":"2024-11-13T15:25:19.844Z","_updatedAt":"2024-11-13T15:25:19.844Z","entryTitle":"VIDEO-phelps-q-and-a-for-wizards-of-baking","displayTitle":"Wizards of Baking: Phelps twins Q\u0026A","activationDate":"2024-11-12T00:00+00:00","externalId":"phelps-twins-interview-wizards-of-baking","mainImage":{"contentfulId":"5OhEVFyvSbSXqhwbXcjbOl","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-12T16:22:42.053Z","updatedAt":"2024-11-12T16:22:42.053Z","_updatedAt":"2024-11-12T16:22:42.053Z","entryTitle":"phelps-twins-interview-wizards-of-baking-q-and-a-thumbnail","image":{"contentfulId":"6wYkl0HGJnOzasqYa0f0Og","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-12T16:22:39.113Z","updatedAt":"2024-11-12T16:22:39.113Z","_updatedAt":"2024-11-12T16:22:39.113Z","revision":1,"local n":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-14T13:05:06.106Z","updatedAt":"2024-11-14T13:05:06.106Z","_updatedAt":"2024-11-14T13:05:06.106Z","entryTitle":"Wayfair-Advertorial-No-Logo","image":{"contentfulId":"BAB19tjta77YzqsZkb7qH","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-14T13:05:02.448Z","updatedAt":"2024-11-14T13:05:02.448Z","_updatedAt":"2024-11-14T13:05:02.448Z","revision":1,"locale":"en-GB","title":"Wayfair-Advertorial-No-Logo","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/BAB19tjta77YzqsZkb7qH/7e08e704855e63a2ef2db3556f3e831e/Screenshot_2024-11-14_at_13.00.26.jpg","details":{"size":213031,"image":{"width":2354,"height":1408}},"fileName":"Screenshot 2024-11-14 at 13.00.26.jpg","contentType":"image/jpeg"}}},"intro":"In the run up to Harry Potter: Wizards of Baking, join judge and self-appointed ‘Minister of Baking’ Carla Hall for a quick baking lesson, brought to you by Wayfair.","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"1MYUFM7maE5eKpVxldLMjp","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-14T10:02:16.196Z","updatedAt":"2024-11-14T10:02:16.196Z","_updatedAt":"2024-11-14T10:02:16.196Z","entryTitle":"celebrate-harry-potter-wizards-of-baking-with-wayfair-text-section-1","text":"This delicious Meyer lemon \u0026 cranberry bundt cake would rival the work of Mrs Weasley’s kitchen creations! And baking expert Carla Hall (who will serve as one of the judges on Harry Potter: Wizards of Baking alongside Jozel Youssef) shows you just how easy it is to make right here."},{"contentfulId":"1AVxIFdWvwJGhVFircHGVz","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"video","createdAt":"2024-11-14T10:02:10.495Z","updatedAt":"2024-11-14T10:02:10.495Z","_updatedAt":"2024-11-14T10:02:10.495Z","entryTitle":"WEB-VIDEO-wayfair-advertorial","displayTitle":"Baking with Carla Hall for Wayfair","activationDate":"2024-11-12T00:00+00:00","externalId":"wizards-of-baking-wayfair","mainImage":{"contentfulId":"2NxrYp2q3HOaPNRugrIWtZ","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-14T10:02:07.862Z","updatedAt":"2024-11-14T10:02:07.862Z","_updatedAt":"2024-11-14T10:02:07.862Z","entryTitle":"WEB-VIDEO-wayfair-advertorial-thumbnail","image":{"contentfulId":"lfoWHPMTy0uNbxqjIZruF","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-14T10:02:05.941Z","updatedAt":"2024-11-14T10:02:05.941Z","_updatedAt":"2024-11-14T10:02:05.941Z","revision":1,"locale":"en-GB","title":"WEB-VIDEO-wayfair-advertorial-thumbnail","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/lfoWHPMTy0uNbxqjIZruF/7abddb7410300c4f80f8c215480a773e/Screenshot_2024-11-12_at_17.07.36.jpg","details":{"size":348915,"image":{"width":2958,"height":1652}},"fileName":"Screenshot 2024-11-12 at 17.07.36.jpg","contentType":"image/jpeg"}}},"videoFileSource":"https://video.wizardingworld.com/wayfair-final/h264/playlist.m3u8"},{"contentfulId":"41BELpBKG5daJFUEDlLOZt","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-12T17:21:07.538Z","updatedAt":"2024-11-16T11:40:10.665Z","_updatedAt":"2024-11-16T11:40:10.665Z","entryTitle":"celebrate-harry-potter-wizards-of-baking-with-wayfair-text-section-2","text":"[Take a look at the full recipe.](https://www.foodnetwork.com/recipes/food-network-kitchen/meyer-lemon-cranberry-bundt-cake-recipe-2012469)\n\nWhile Carla may not have had a wand to make her cake extra magical, she did have the help of a selection of Wayfair kitchen goodies. And if you’re in the US, you can make your kitchen look just like Carla’s! \n\nCarla used the [Bundt cake pan](https://www.wayfair.com/kitchen-tabletop/pdp/nordic-ware-round-anniversary-bundt-cake-pan-mbzi1035.html?refid=SCRPDIS6000) to give you that classic European-style cake shape, while using the beautiful [Harper Gold cake stand](https://www.wayfair.com/home/pdp/godinger-silver-art-co-harper-gold-raw-edge-cake-stand-rxk3178.html?piid=27330374\u0026refid=SCRPDIS6006) to display it.\n\nFor her mixing bowls, Carla used this cheerful, [purple-lidded set](https://www.wayfair.com/kitchen-tabletop/pdp/joyjolt-8-piece-glass-mixing-bowls-with-lids-jyjt1189.html?piid=72478988\u0026refid=SCRPDIS6004), and whisked everything together with the help of this sophisticated [Cuisine Art mixer.](https://www.wayfair.com/kitchen-tabletop/pdp/cuisinart-12-speed-55-qt-stand-mixer-cui3377.html?piid=61463093\u0026refid=SCRPDIS6003)\n\nYou can check out the [full suite of Wayfair products right here](https://www.wayfair.com/?refid=SCRPDIS6007) to have your very own Gringotts-style vault of baking tools!\n\n__Harry Potter: Wizards of Baking is out now to [Max](https://www.max.com/?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow) and Food Network. UK-based fans catch the show on Prime Video in the UK and Ireland on 17th December!__\n\n***\n\n*The Wayfair products in this email are subject to availability. Before purchasing, you will need to agree to their terms of purchase which you can find on their website [https://www.wayfair.com/](https://www.wayfair.com/)*\n\n*Any issues with your purchase should be directed to the Wayfair customer services teams– you can find contact information on their website.*"}],"publishDate":"2024-11-12T00:00+00:00"}]},{"contentfulId":"7sYyMeQNvN1sBi8LNW7DWd","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"customComponent","createdAt":"2024-12-06T20:20:15.246Z","updatedAt":"2025-11-01T18:17:42.058Z","_updatedAt":"2025-11-01T18:17:42.058Z","entryTitle":"WOB-PAGE-carousel-episode-guides","eyebrow":"Episode recaps","componentName":"CarouselTallContent","contentSlots":[{"contentfulId":"54aTtr3Fky6BxY6lU4j9Sq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-11-19T14:05:12.864Z","updatedAt":"2024-11-19T14:05:12.864Z","_updatedAt":"2024-11-19T14:05:12.864Z","entryTitle":"WEB-FEATURE-WOB-episode-one-round-up","eyebrow":"IN CASE YOU MISSED IT","displayTitle":"The best bites from Harry Potter: Wizards of Baking – episode one ","activationDate":"2024-11-18T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"harry-potter-wizards-of-baking-episode-one-recap","mainImage":{"contentfulId":"787OuhKCGm88hqBlJn7pI6","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T16:27:09.343Z","updatedAt":"2024-11-18T16:27:09.343Z","_updatedAt":"2024-11-18T16:27:09.343Z","entryTitle":"WOB-episode-1-screengrab-mirror-of-erised","image":{"contentfulId":"7bx6oqw7AO6FNo1KXnhTyd","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T16:27:06.864Z","updatedAt":"2024-11-18T16:27:06.864Z","_updatedAt":"2024-11-18T16:27:06.864Z","revision":1,"locale":"en-GB","title":"WOB-episode-1-screengrab-mirror-of-erised","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7bx6oqw7AO6FNo1KXnhTyd/e96d1c76b670868947b48314ff966632/HYTU101_AB_0112.jpeg","details":{"size":684259,"image":{"width":850,"height":567}},"fileName":"HYTU101_AB_0112.jpeg","contentType":"image/jpeg"}}},"intro":"From moving spiders to pesky Muggle ovens... episode one of Harry Potter: Wizards of Baking was a hearty mix of wholesome Harry Potter love and kitchen drama.","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"tXK2DpQnrlsx8ARV1Onwi","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T16:45:37.341Z","updatedAt":"2024-11-18T16:45:37.341Z","_updatedAt":"2024-11-18T16:45:37.341Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-1","text":"## The contestants entered the kitchen...via Floo Powder\n\nWell, why ever not? Yes, naturally, when it came to making an entrance in the kitchen, the bakers entered via Floo Powder, through a fireplace underneath the famous Fat Lady portrait. We wish we could dramatically enter our kitchens in such a manner - or indeed any rooms, ever. "},{"contentfulId":"7gxcwv3Dj9uEdtHo7WDxvs","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T16:30:06.177Z","updatedAt":"2024-11-18T16:30:06.177Z","_updatedAt":"2024-11-18T16:30:06.177Z","entryTitle":"WOB-episode-1-screengrab-contestants-through-the-fireplace","image":{"contentfulId":"7BJDycshwNqIWEvMIB7OB0","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T16:30:01.408Z","updatedAt":"2024-11-18T16:30:01.408Z","_updatedAt":"2024-11-18T16:30:01.408Z","revision":1,"locale":"en-GB","title":"HYTU101 0038","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7BJDycshwNqIWEvMIB7OB0/023c340f09507f89dac4910acec67d12/HYTU101_0038.jpeg","details":{"size":672694,"image":{"width":850,"height":567}},"fileName":"HYTU101_0038.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"3hQKEQL8tvqlQSWnZRkztO","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T16:46:48.179Z","updatedAt":"2024-11-18T16:46:48.179Z","_updatedAt":"2024-11-18T16:46:48.179Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-2","text":"## Absolutely everyone was starstruck to meet the Phelps twins! \n\nOnce the bakers had popped out of the fireplace, they immediately found themselves face-to-face with our esteemed hosts: James and Oliver Phelps! Scream! (In fact, many of them did.) Yes, our beloved Weasley twins are back at Warner Bros. Studio Tours London to lend their twinning energy to our teams. How excited were the contestants to meet our Harry Potter stars out of ten? Well, nine and a half, obviously. "},{"contentfulId":"5K7vCQK1yELYRl8dX7Rkp7","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T16:27:29.848Z","updatedAt":"2024-11-18T16:27:29.848Z","_updatedAt":"2024-11-18T16:27:29.848Z","entryTitle":"WOB-episode-1-screengrab-phelps-brothers-posing","image":{"contentfulId":"74Cy40uSYKcOi6EY1dPeZv","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T16:27:26.816Z","updatedAt":"2024-11-18T16:27:26.816Z","_updatedAt":"2024-11-18T16:27:26.816Z","revision":1,"locale":"en-GB","title":"HYTU101 0042","description":null,"file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/74Cy40uSYKcOi6EY1dPeZv/58beeb5c39ed70ab66a2665c18a3ada4/HYTU101_0042.jpeg","details":{"size":642906,"image":{"width":850,"height":567}},"fileName":"HYTU101_0042.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"3D1VGpihIXN3caK50iFDHl","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T17:13:09.715Z","updatedAt":"2024-11-18T17:13:09.715Z","_updatedAt":"2024-11-18T17:13:09.715Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-3","text":"## The bakes were inevitably very magical\n\nFrom a cake that literally pumped out Hogwarts letters, to moving, edible spiders outside the Whomping Willow, our professionals did not disappoint when it came to magical baking.\n\n![HYTU101 AB 0099](//contentful.harrypotter.com/usf1vwtuqyxm/opiRru6prsn86ETOE7l5h/d76db64b00a066b4663a124eb14538c5/HYTU101_AB_0099.jpeg)\n\nA beautiful depiction of the Mirror of Erised was especially powerful, while a colourful homage to Miss Luna Lovegood went down to every quirky detail - such as her snazzy Spectrespecs.\n\n![WOB-screengrab-episode-1-luna-lovegood-cake](//contentful.harrypotter.com/usf1vwtuqyxm/5TEAc9URsTAfqTvDlgDVhI/7e4da1d48615adfbba6515aa7b25d042/HYTU101_AB_0003.jpeg)\n\nWe had Hufflepuff representation with a delicious badger themed dessert, while the star of the episode was the Whomping Willow showpiece, complete with actual, moving, edible spiders - which were actually bon bons!\n\n![HYTU101 AB 0131](//contentful.harrypotter.com/usf1vwtuqyxm/2Rvki4SlGE0dfxZ3YoM4HU/f987efa5ed304f77a7a435f58549539d/HYTU101_AB_0131.jpeg)\n\nOther cake-masterpieces included the magnificent 'Power of Patronus' showstopper, detailed with almond cake lilies, while the Potions Cabinet-themed cake (complete with lemon curd bottles!) impressed our judges Carla and Josef. And might've even impressed a certain Professor Snape.\n\nAnd a Slytherin shoutout to this snake-inspired delight... is it us, or is that snake giving us side-eye? "},{"contentfulId":"5uyDAKRlOH340XhecDVbQ3","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T16:59:11.172Z","updatedAt":"2024-11-18T16:59:11.172Z","_updatedAt":"2024-11-18T16:59:11.172Z","entryTitle":"WOB-episode-1-screengrab-judges-snake-side-eye","image":{"contentfulId":"612kib753VTnA5DBPU18e2","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T16:59:08.549Z","updatedAt":"2024-11-18T16:59:08.549Z","_updatedAt":"2024-11-18T16:59:08.549Z","revision":1,"locale":"en-GB","title":"WOB-episode-1-screengrab-judges-snake-side-eye","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/612kib753VTnA5DBPU18e2/75993d668c6f6a167c03f4b01a01258b/HYTU101_AB_0230__1_.jpg","details":{"size":65002,"image":{"width":1000,"height":667}},"fileName":"HYTU101_AB_0230 (1).jpg","contentType":"image/jpeg"}}},{"contentfulId":"7gFC7b4x2kxCTC1WXvOwD6","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T17:13:14.760Z","updatedAt":"2024-11-18T17:13:14.760Z","_updatedAt":"2024-11-18T17:13:14.760Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-4","text":"## Miko suffered the classic baking faux pas...\n\nIt was bound to be someone!\n\nYes, in our very first episode, someone forgot to turn on their oven. A (baking) tale as old as time. On this occasion, poor [Miko](https://www.harrypotter.com/news/meet-the-teams-harry-potter-wizards-of-baking) was the victim. We blame Muggle technology, quite frankly."},{"contentfulId":"6I5qrnhSR5IbIVpm4Ptqcx","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-18T17:05:15.866Z","updatedAt":"2024-11-18T17:05:15.866Z","_updatedAt":"2024-11-18T17:05:15.866Z","entryTitle":"WOB-episode-1-screengrab-work-in-the-kitchen","image":{"contentfulId":"50OSIByBjBxEO8tTF0GlNX","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-18T17:05:02.429Z","updatedAt":"2024-11-18T17:05:02.429Z","_updatedAt":"2024-11-18T17:05:02.429Z","revision":1,"locale":"en-GB","title":"WOB-episode-1-screengrab-work-in-the-kitchen","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/50OSIByBjBxEO8tTF0GlNX/a01e35efe698a2648c01eb7a24d589de/HYTU101_0552.jpeg","details":{"size":699565,"image":{"width":850,"height":567}},"fileName":"HYTU101_0552.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"2f99BWIVPYEHCFkojyVf3X","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-18T17:13:18.401Z","updatedAt":"2024-11-18T17:13:18.401Z","_updatedAt":"2024-11-18T17:13:18.401Z","entryTitle":"harry-potter-wizards-of-baking-episode-one-recap-text-section-5","text":"## And we had to say goodbye to some of the teams!\n\nAccio tissues, please! Just as we were getting to know all the teams, Josef and Carla had the difficult task of having to say goodbye to a couple before the next episode. Equipped with tickets for the next round and an invite to go on Warner Bros. Studio Tour London's Hogwarts Express, many of our bakers were delighted to get the nod. However, a couple of teams missed out by a hair.\n\nWe won't spoil it here for you who goes home, but suffice to say, tears were shed - but wizarding world friendships were made forever.\n\nIn the words of a young Harry himself, 'I'm not going home, not really.' Blub!\n\n***\n\n__Spell-binding new competition series Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\n__The show is out now to [Max](https://www.max.com/geo-availability?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow) and Food Network.__"}],"relatedArticleReference":[{"contentfulId":"6qR0tdLL7Tcl5UaUyrkLmU","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-11-15T13:19:28.390Z","updatedAt":"2024-11-15T13:20:10.082Z","_updatedAt":"2024-11-15T13:20:10.082Z","entryTitle":"WEB-FEATURE-phelps-twins-quickfire-chat","eyebrow":"TWINNING","displayTitle":"\"We've been cracking eggs wrong all our lives!\" - the Phelps twins unpack Harry Potter: Wizards of Baking","activationDate":"2024-11-15T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"phelps-twins-unpack-harry-potter-wizards-of-baking","mainImage":{"contentfulId":"Hq6GZ63nsQJrcnNgslJbq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2022-03-28T16:09:54.611Z","updatedAt":"2022-03-28T16:09:54.611Z","_updatedAt":"2022-03-28T16:09:54.611Z","entryTitle":"HP-F5-order-of-the-phoenix-fred-george-grimmauld-place-smirking-web-landscape","image":{"contentfulId":"36sCgYCfRssVNuVo30TsJL","type":"Asset","contentTypeId":"asset","createdAt":"2022-03-28T16:09:48.584Z","updatedAt":"2024-11-15T12:23:26.420Z","_updatedAt":"2024-11-15T12:23:26.420Z","revision":2,"locale":"en-GB","title":"HP-F5-order-of-the-phoenix-fred-george-grimmauld-place-smirking-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/36sCgYCfRssVNuVo30TsJL/b5d6eaff37bbc26c82fc76ef4fbce204/HP-F5-order-of-the-phoenix-fred-george-grimmauld-place-smirking-web-landscape","details":{"size":659735,"image":{"width":1937,"height":954}},"fileName":"HP-F5-order-of-the-phoenix-fred-george-grimmauld-place-smirking-web-landscape","contentType":"image/jpeg"}},"imageAltText":"Fred and George sat down in Grimmauld place, wearing matching shirts and smirking.","source":[{"contentfulId":"6vSblg4bo8ERfWv6wulvcW","type":"Link"}]},"teaserImage":{"contentfulId":"5tCEVbJcNFMeAp6evw88yL","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-12T15:48:13.474Z","updatedAt":"2024-11-12T15:48:13.474Z","_updatedAt":"2024-11-12T15:48:13.474Z","entryTitle":"Phelps-brothers-WOB-crop","image":{"contentfulId":"3HuwDqCndz0Q2vszV6Hlti","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-12T15:48:10.314Z","updatedAt":"2024-11-12T15:48:10.314Z","_updatedAt":"2024-11-12T15:48:10.314Z","revision":1,"locale":"en-GB","title":"Phelps-brothers-WOB-crop","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3HuwDqCndz0Q2vszV6Hlti/cdf65cf4d64289579028651b3335f6a3/Phelps-brothers-WOB-crop.png","details":{"size":1236292,"image":{"width":1030,"height":480}},"fileName":"Phelps-brothers-WOB-crop.png","contentType":"image/png"}}},"intro":"James and Oliver Phelps are the hosts of Harry Potter: Wizards of Baking - the show where teams of talented bakers must create Harry Potter-inspired showstoppers. We had a quick chat with the brothers to discuss cake science, reuniting with old cast-members and much more.","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"4K2N2O9FYy14W7VmmH1qKi","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-15T13:19:25.904Z","updatedAt":"2024-11-15T13:24:01.006Z","_updatedAt":"2024-11-15T13:24:01.006Z","entryTitle":"phelps-twins-unpack-harry-potter-wizards-of-baking","text":"## How does it feel to be hosting a baking show?\n\nVery, very excited to be honest with you. It’s like something we’ve always watched with our families, baking shows. This is the first time in a long time I’ve said to my wife or daughter ‘oh yeah, we’re doing this show’ and they actually wanna come to set and see what’s going on – because we just love that format of show. \n\nI remember reading that the best host to be is: it's not about you, it's about the people you're shining a light on. So we definitely took that on board.\n\n## What was it like seeing all of these professionals from different cultures coming together?\n\nWell I think that’s what makes it – because we actually filmed at the [Warner Bros. Studio Tour London], where we filmed the movies, and these [contestants] are the best of the best at what they do. So getting them together, pairing them in teams, and they had never worked together before – so seeing those relationships form – ‘are they gonna get on?’ all that kind of thing, but it’s amazing how professional they can be to get a particular bake done in 10 hours that would usually take 2 weeks.\n\nIf you’re building a five-foot phoenix – yeah, that’s gonna take about 2 weeks to do. 'OK, you’ve got 10 hours!' And you’re gonna have two people coming over to ask 'how’s it going?’ But what was great to be there to witness the masters do what they do best. We enjoy baking – but even little things like learning how to properly crack an egg. I’ve been cracking eggs wrong my entire life! \n\n\u003ciframe width=\"560\" height=\"315\" src=\"https://www.youtube.com/embed/vPnOJpqkXzQ?si=yf11F5kS4Q3QyDLR\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen\u003e\u003c/iframe\u003e\n\n## Do you guys bake yourselves? And is one better than the other? \n\nWe definitely enjoy baking – as kids it was always something around us. Our grandmother would always be showing us how food was put together and our parents were the same. I don’t know if it was just to entertain us for a bit, but my dad would normally say, 'right, why don’t you go make some cakes in the kitchen' and we’d go and do it – so it was cool seeing that side of it.\n\nIt was very removed from a big professional kitchen with these guys. Here, you’ve got a baker but also got the patisserie chef – so you get to see the different types of baking as well which was really cool. A couple of contestants were molecular gastronomists (\"He's only saying that because he’s just learnt how to pronounce that\") who were pretty much scientists in the kitchen. \n\n## What kind of baking wizardry did you get to witness?\n\nThey would make stuff up – one contestant – [Mitzi](https://www.harrypotter.com/news/meet-the-teams-harry-potter-wizards-of-baking) made this mango caramel, which literally melted in your mouth when you had it. And I think she realised that we liked to taste samples to the point where she basically gave us a whole tray of it. Which is great, because we don’t have a casting vote on who goes through, so it's better because people kept being like, 'try this one, try this one' - definitely a perk of a job.\n\nBut Carla and Josef, the judges, they do such a great job of describing what everything tastes like, what flavours work with what – and it’s actually made me appreciate flavours of food I eat now. Because off-camera I asked Clara, “describe me eating this Twix” and it was so weird, she described everything that was in this chocolate bar. And she does that on camera too; yes it is about what things looks like, but ultimately this is a baking show. So it helps bring all the viewers in on it, but makes you very hungry too.\n\n## How was it reuniting with former cast members, such as Bonnie Wright, Evanna Lynch and Warwick Davies?\n\nThere were moments where it felt like we were in a time machine and there was no time between filming the last movie and this. And we had to film it at night, because it’s filmed at the Studio Tour – so they weren’t gonna close the studios off – so we we were filming at 1 or 2 in the morning on the set. So we were in this space, but at the same time, it just felt like, especially when we had Warwick, Bonnie and Evie with us, it was very much a case of “oh wow, a lot has happened in the past 12, 13 years since we were last here” but we just fell straight back into that world. And we think a lot of viewers will feel the same way, back in that nostalgic zone.\n\n## What are some of the biggest showstopper moments fans can expect to see?\n\nEven for the very first episode, the Patronus that Elizabeth crafted was just absolutely incredible. And you see the standard from the very beginning. It's not just “oh we’re gonna make a standard cake and put a Hogwarts scarf on it” – they really went to town and you realise early on that these are the best they do. \n\nIn that first episode, when Ricardo makes the crawling spiders – they tasted amazing and were actually peanut butter bon-bons, which was insane.\n\n***\n\n__Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\n__Harry Potter: Wizards of Baking is premiering tonight at 8|7c on Food Network and streaming on [Max](https://www.max.com/geo-availability?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow).__"}],"relatedArticleReference":[{"contentfulId":"6Gb1nUE1FfGSBdhVRYq13l","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-11-05T10:54:30.646Z","updatedAt":"2024-11-14T13:44:31.294Z","_updatedAt":"2024-11-14T13:44:31.294Z","entryTitle":"WEB-NEWS-everything-we-know-about-wizards-of-baking-so-far","eyebrow":"BAKING MAGIC","displayTitle":"Everything we know so far about Harry Potter: Wizards of Baking","activationDate":"2024-11-04T00:00+00:00","tags":[{"contentfulId":"6PK6KxaPndhQsAFS54UCkr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:25:53.282Z","updatedAt":"2020-02-20T13:07:09.645Z","_updatedAt":"2020-02-20T13:07:09.645Z","name":"news"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"}],"externalId":"everything-we-know-about-harry-potter-wizards-of-baking","mainImage":{"contentfulId":"1nvDfZdqWpW2baiqLjNROa","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-04T20:01:46.879Z","updatedAt":"2024-11-04T20:01:46.879Z","_updatedAt":"2024-11-04T20:01:46.879Z","entryTitle":"WOB-thumbnail-great-hall-clapping","image":{"content 5pEP0VNypsw8g3","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-09-23T16:40:48.327Z","updatedAt":"2024-09-23T16:40:48.327Z","_updatedAt":"2024-09-23T16:40:48.327Z","entryTitle":"HP-WOB-host-shot-web-landscape","image":{"contentfulId":"4Aidew8BgoEKQdbknhQEMn","type":"Asset","contentTypeId":"asset","createdAt":"2024-09-23T16:40:45.390Z","updatedAt":"2024-09-23T16:40:45.390Z","_updatedAt":"2024-09-23T16:40:45.390Z","revision":1,"locale":"en-GB","title":"HP-WOB-host-shot-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4Aidew8BgoEKQdbknhQEMn/5133e92ce4c64c8fb4f3b0991c1d4d71/a29c3129-9025-4230-a6df-387c10981ce4.jpg","details":{"size":558085,"image":{"width":2560,"height":1706}},"fileName":"a29c3129-9025-4230-a6df-387c10981ce4.jpg","contentType":"image/jpeg"}}},"intro":"This new Harry Potter-themed baking show promises to make your mouth magically water. Launching on Food Network and streaming on Max now, here’s everything we know so far about this culinary competition series - and how you can tune in. ","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"6OfOl5yN1ievYVqUcUK7Rr","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-05T10:43:35.719Z","updatedAt":"2024-11-15T15:15:19.570Z","_updatedAt":"2024-11-15T15:15:19.570Z","entryTitle":"everything-we-know-about-harry-potter-wizards-of-baking-text-section-1","text":"__UPDATE: Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\n__Harry Potter: Wizards of Baking is premiering tonight at 8|7c on Food Network and streaming on [Max.](https://www.max.com/?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow)__\n\nAnd here's a very special first look at the opening of the show!"},{"contentfulId":"29eFTdYSTL3Rse1KlOX8M9","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"video","createdAt":"2024-11-04T19:53:05.050Z","updatedAt":"2024-11-05T10:54:27.691Z","_updatedAt":"2024-11-05T10:54:27.691Z","entryTitle":"WOB-opening-segment","displayTitle":"Harry Potter: Wizards of Baking | Opening segment ","activationDate":"2024-11-04T00:00+00:00","externalId":"wizards-of-baking-opener","mainImage":{"contentfulId":"4KdQJz95z4Ls4CU5uk4YGB","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-05T10:54:23.466Z","updatedAt":"2024-11-05T10:54:23.466Z","_updatedAt":"2024-11-05T10:54:23.466Z","entryTitle":"WOB-logo-official","image":{"contentfulId":"VLXYc8eBTiuVNN9zLeWMR","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-05T10:54:18.884Z","updatedAt":"2024-11-05T10:54:18.884Z","_updatedAt":"2024-11-05T10:54:18.884Z","revision":1,"locale":"en-GB","title":"WOB-logo-official","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/VLXYc8eBTiuVNN9zLeWMR/3fbdcc318c68fb79e4b81bb59df8496f/WIZARDS_OF_BAKING_LOGO_300dpi__2_.jpg","details":{"size":223705,"image":{"width":1920,"height":1080}},"fileName":"WIZARDS OF BAKING LOGO 300dpi (2).jpg","contentType":"image/jpeg"}}},"videoFileSource":"https://video.wizardingworld.com/wob-open/h264/playlist.m3u8"},{"contentfulId":"307OILkHhY12oZuaWEZqE2","type":"Entry","revision":17,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-04T17:52:46.418Z","updatedAt":"2024-11-15T15:16:16.653Z","_updatedAt":"2024-11-15T15:16:16.653Z","entryTitle":"everything-we-know-about-harry-potter-wizards-of-baking-text-section-2","text":"## The series will stream on Max across available territories\n\nIf you're in the right territory to stream Max, ([you can find out here)](https://www.harrypotter.com/features/how-to-stream-harry-potter-wherever-you-are) Harry Potter: Wizards of Baking will be available via Food Network. The show launches exclusively on Prime Video in the UK and Ireland on 17th December.\n\n## The series is filmed at the home of the Harry Potter films\n\nYes! Our pastry chefs will be whisking, chopping, rolling and sprinkling their way through a series of spellbinding challenges at the most magical place of all: [Warner Bros. Studio Tour London.](https://www.wbstudiotour.co.uk/) Perhaps the magical settings will inspire our bakers. And at the end, their grand trophy will be presented to them in the Great Hall set - just as if it were the House Cup! \n\n## The Phelps twins are your esteemed hosts\n\nThey've conquered Weasleys' Wizard Wheezes, and now, the Phelps twins are entering the messy world of baking (well, the Weasley twins did perfect a Canary Cream once upon a time...) and they're not alone. Judges Carla Hall and Jozel Youssef will be on hand to offer culinary tips to the competing bakers.\n\n## Expect guests from the Harry Potter films\n\nIf it wasn't enough having to create show-stopping works of baked art, the bakers will also be greeted with some special visitors throughout the show! From Bonnie Wright to Warwick Davis to Evanna Lynch, will our celebrity guests inspire the contestants... or create a distraction?\n\n## The bakers will come in pairs\n\nBaking can be a stressful experience as many of you will know. But thankfully, for these professionals, they will be buddied up. \n\nEach team will come in pairs to create their confectionary creations. Teams competing are: Kimberly Adams (Milwaukee, MI) and Ashley Cardona (Charleston, SC), Lisa Altfest (Orange County, CA) and Mitzi Reyes (Los Angeles, CA), Hemu Basumatary (Katy, TX) and Riccardo Menicucci (Los Angeles, CA), Zoe Burmester (Brooklyn, NY) and Jordan Pilarski (Ojai, CA), Jess Lewis (Washington, DC) and Jamie Louks (Seattle, WA), Kayla Giddings(Lafayette, LA) and Yohann Le Bescond (Ocala, FL), Juan Gutierrez (Chicago, IL) and Elizabeth Rowe (Dallas, TX), Michael Russ II (Modesto, CA) and Conner Strackman (Smithville, TX), and Christopher Teixeira (Chicago, IL) and Miko Uy (Astoria, NY).\n\n## The showstoppers will be themed around characters, settings and magical moments from the Harry Potter series\n\nIn the clip above, we spotted a breathtaking [Patronus](https://www.harrypotter.com/features/what-is-a-patronus) piece, a Fawkes the Phoenix showstopper and a homage to the Whomping Willow (we wish we could be *chomping* that Willow!) complete with a moving spider! What other wizardry will our bakers conjure up?\n\n## The prize will be a Wizards of Baking Cup!\n\nAlongside an inclusion in the new Harry Potter cookbook. And in the words of Dumbledore, probably a bit of 'eternal glory' too. But who will it be - and what will be our favourite bewitching bake?! We are hungry for more already.\n\n***\n\n__Harry Potter: Wizards of Baking premieres Thursday, 14th November on Food Network and globally on [Max](https://www.max.com/?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow).__\n\n__Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\n__You can check out the #WizardsOfBaking hashtag (if you're old enough!) to follow the conversation.__"}],"relatedArticleReference":[{"contentfulId":"4kWrlrshvWzOctFc8wZRrq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-09-26T18:24:19.555Z","updatedAt":"2024-09-26T18:24:19.555Z","_updatedAt":"2024-09-26T18:24:19.555Z","entryTitle":"WEB-NEWS-hpwob-trailer-and-details-announced","eyebrow":"FEAST YOUR EYES","displayTitle":"Check out the new trailer and launch date for Harry Potter: Wizards of Baking","activationDate":"2024-09-26T00:00+01:00","tags":[{"contentfulId":"6PK6KxaPndhQsAFS54UCkr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:25:53.282Z","updatedAt":"2020-02-20T13:07:09.645Z","_updatedAt":"2020-02-20T13:07:09.645Z","name":"news"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"}],"externalId":"harry-potter-wizards-of-baking-releases-trailer-and-launch-date","mainImage":{"contentfulId":"6zzzVopC5pEP0VNypsw8g3","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-09-23T16:40:48.327Z","updatedAt":"2024-09-23T16:40:48.327Z","_updatedAt":"2024-09-23T16:40:48.327Z","entryTitle":"HP-WOB-host-shot-web-landscape","image":{"contentfulId":"4Aidew8BgoEKQdbknhQEMn","type":"Asset","contentTypeId":"asset","createdAt":"2
