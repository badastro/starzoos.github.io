details":{"size":151724,"image":{"width":1804,"height":926}},"fileName":"Screenshot 2024-11-12 at 15.45.24.jpg","contentType":"image/jpeg"}}},"intro":"They're used to making magic... but what about baking magic? James and Oliver Phelps (aka the Weasley twins) are your esteemed hosts for the upcoming culinary competition series, Harry Potter: Wizards of Baking. Tune in to this Q\u0026A with our favourite twins to learn more about the show.","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"4UX5uUxuXObHea3mqIPFCf","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-13T15:25:15.055Z","updatedAt":"2024-11-13T15:25:15.055Z","_updatedAt":"2024-11-13T15:25:15.055Z","entryTitle":"harry-potter-wizards-of-baking-phelps-twins-video-text-section-1","text":"You know them as the mischief-causing Fred and George from the Harry Potter films, but now, James and Oliver Phelps are trying their hand at hosting! A baking show all about Harry Potter, no less! \n\nBut what can we expect from Harry Potter: Wizards of Baking? And can the Phelps twins give us any bite-size pieces of gossip? Also! Which Harry Potter food do they wish was real? Which spell would be helpful to have in a stressful kitchen scenario? And how much cake did they really get to eat?\n\nJoin them for a little fireside (or should that be...ovenside?) chat right here."},{"contentfulId":"61KCnnllMSU2tHI5ieIkTH","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"video","createdAt":"2024-11-13T15:25:19.844Z","updatedAt":"2024-11-13T15:25:19.844Z","_updatedAt":"2024-11-13T15:25:19.844Z","entryTitle":"VIDEO-phelps-q-and-a-for-wizards-of-baking","displayTitle":"Wizards of Baking: Phelps twins Q\u0026A","activationDate":"2024-11-12T00:00+00:00","externalId":"phelps-twins-interview-wizards-of-baking","mainImage":{"contentfulId":"5OhEVFyvSbSXqhwbXcjbOl","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-12T16:22:42.053Z","updatedAt":"2024-11-12T16:22:42.053Z","_updatedAt":"2024-11-12T16:22:42.053Z","entryTitle":"phelps-twins-interview-wizards-of-baking-q-and-a-thumbnail","image":{"contentfulId":"6wYkl0HGJnOzasqYa0f0Og","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-12T16:22:39.113Z","updatedAt":"2024-11-12T16:22:39.113Z","_updatedAt":"2024-11-12T16:22:39.113Z","revision":1,"locale":"en-GB","title":"phelps-twins-interview-wizards-of-baking-q-and-a-thumbnail","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6wYkl0HGJnOzasqYa0f0Og/87aab64f307f760455c076a00530b345/Screenshot_2024-11-12_at_15.45.24.jpg","details":{"size":151724,"image":{"width":1804,"height":926}},"fileName":"Screenshot 2024-11-12 at 15.45.24.jpg","contentType":"image/jpeg"}}},"videoFileSource":"https://video.wizardingworld.com/phelps-wob/h264/playlist.m3u8"},{"contentfulId":"7Jfv7o87KYfcjEyprCakOZ","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-13T15:25:23.864Z","updatedAt":"2024-11-14T13:43:04.786Z","_updatedAt":"2024-11-14T13:43:04.786Z","entryTitle":"harry-potter-wizards-of-baking-phelps-twins-video-text-section-2","text":"Thanks, lads! And FYI, if you need a spell for tidying up after yourself in the kitchen, may we recommend [Scourgify?](https://www.harrypotter.com/features/what-is-the-most-underrated-spell-in-the-wizarding-world-the-debate) \n\nStay tuned for extra slices about the show as \u0026 when we have them! \n\n__Harry Potter: Wizards of Baking is out now to [Max](https://www.max.com/?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow) and Food Network. UK-based fans catch the show on Prime Video in the UK and Ireland on 17th December!__"}],"publishDate":"2024-11-12T00:00+00:00"},{"contentfulId":"3PSSEMyooxYLmWC7uB8Kae","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-11-07T14:05:12.558Z","updatedAt":"2025-10-27T14:47:26.825Z","_updatedAt":"2025-10-27T14:47:26.825Z","entryTitle":"WEB-NEWS-meet-the-teams-harry-potter-wizards-of-baking","eyebrow":"Cake connoisseurs ","displayTitle":"Meet the teams of Harry Potter: Wizards of Baking Season 1","activationDate":"2024-11-07T00:00+00:00","tags":[{"contentfulId":"6PK6KxaPndhQsAFS54UCkr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:25:53.282Z","updatedAt":"2020-02-20T13:07:09.645Z","_updatedAt":"2020-02-20T13:07:09.645Z","name":"news"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"}],"externalId":"meet-the-teams-harry-potter-wizards-of-baking","mainImage":{"contentfulId":"2nNjZOPtbzBq1oakCvabn3","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T11:13:54.320Z","updatedAt":"2024-11-07T14:02:48.352Z","_updatedAt":"2024-11-07T14:02:48.352Z","entryTitle":"wizards-of-baking-full-team-shot-landscape","image":{"contentfulId":"2IsuoJZZL3MkDiUom9rqdo","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T13:52:10.576Z","updatedAt":"2024-11-07T14:01:51.188Z","_updatedAt":"2024-11-07T14:01:51.188Z","revision":3,"locale":"en-GB","title":"wizards-of-baking-full-team-shot-crop-2-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2IsuoJZZL3MkDiUom9rqdo/2bc4c0c57855b62fed769df7ed5b5118/1__1_.jpg","details":{"size":1580671,"image":{"width":9000,"height":3841}},"fileName":"1 (1).jpg","contentType":"image/jpeg"}}},"intro":"With the launch of Food Network’s new show Harry Potter: Wizards of Baking drawing ever closer, we thought now would be a great time to meet those culinary whizzes who add a little magic to their baking. It’s time to meet the teams…","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"B5CkHEdmCDJlBiBupMV2M","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:01:34.595Z","updatedAt":"2024-11-07T14:03:42.435Z","_updatedAt":"2024-11-07T14:03:42.435Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-1","text":"But before we meet those vying for victory, a little context about this exciting new baking programme from Food Network. Set at Warner Bros. Studio Tour London – the Making of Harry Potter, tune in as nine teams battle it out to create magical masterpieces and showstopping bakes, all inspired by Harry Potter. So, who are the bakers?"},{"contentfulId":"zep8rs25aeM0c9mjxMwBk","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:38:04.479Z","updatedAt":"2024-11-07T12:38:04.479Z","_updatedAt":"2024-11-07T12:38:04.479Z","entryTitle":"wizards-of-baking-meet-the-teams-elizabeth-juan-web-landscape","image":{"contentfulId":"2OWuFmdTF69uHgIxCxVmiY","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:38:00.261Z","updatedAt":"2024-11-07T12:38:00.261Z","_updatedAt":"2024-11-07T12:38:00.261Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-elizabeth-juan-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2OWuFmdTF69uHgIxCxVmiY/62d6149ec46960f075cde9e8ee137f46/wizards-of-baking-meet-the-teams-elizabeth-juan-web-landscape.png","details":{"size":1212161,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-elizabeth-juan-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"684QAoocFHPG9cqC8Cvdcm","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:07:53.412Z","updatedAt":"2024-11-07T13:09:33.641Z","_updatedAt":"2024-11-07T13:09:33.641Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-2","text":"Juan (left) and Elizabeth (right) \n\n### Elizabeth and Juan\nElizabeth is no slouch when it comes to baking competitions and is also a huge Harry Potter fan. In fact, she had thought about retiring from competitions, but her love of Harry Potter drew her back to Wizards of Baking. When it comes to her personality, she thinks of herself as rather Molly Weasley-esque. She’s ferocious, protective but has a sweet side! \n\nJuan is an executive pastry chef and chocolatier but most importantly (in our opinion) a Harry Potter fan. He always thought he was a Gryffindor, but it turns out he is actually a Hufflepuff! Though that came as a surprise, he’s very happy about it – as it speaks to who he is as a person.\n"},{"contentfulId":"4ukkqDgLYsOX5Ak0UOcq05","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:35:46.199Z","updatedAt":"2024-11-07T12:35:46.199Z","_updatedAt":"2024-11-07T12:35:46.199Z","entryTitle":"wizards-of-baking-meet-the-teams-jessica-jamie-web-landscape","image":{"contentfulId":"19mQtzdNoZNxKJ5UsylTLn","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:35:38.553Z","updatedAt":"2024-11-07T12:35:38.553Z","_updatedAt":"2024-11-07T12:35:38.553Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-jessica-jamie-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/19mQtzdNoZNxKJ5UsylTLn/2d2bfd2d56691843e749d9be385338b8/wizards-of-baking-meet-the-teams-jessica-jamie-web-landscape.png","details":{"size":1198984,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-jessica-jamie-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"2ZwbaMQK9JB4VBb7YJKsWd","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:11:31.074Z","updatedAt":"2024-11-07T13:12:31.610Z","_updatedAt":"2024-11-07T13:12:31.610Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-3","text":"Jessica (left) and Jamie (right) \n\n### Jessica and Jamie\nJamie is a pastry chef and cake designer. Fun fact! Jamie is known for her lifelike skulls and anatomical heart cakes – we’re both impressed and a little scared. She discovered her love of Harry Potter once the films came out and thinks it would be cool to recreate the moving staircase as a dessert.\n\nJessica is an award-winning pastry chef. She had thought she was a Hufflepuff but found herself sorted into Gryffindor. However, her Gryffindor vibe makes sense to us – especially as she thinks of herself as a bit of a Ron Weasley. She’s not too serious and loves a good laugh."},{"contentfulId":"2oEt5BkW64dWnCFEDFYVlq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:50:59.284Z","updatedAt":"2024-11-07T12:50:59.284Z","_updatedAt":"2024-11-07T12:50:59.284Z","entryTitle":"wizards-of-baking-meet-the-teams-miko-chris-web-landscape","image":{"contentfulId":"3nbVcAJLPsk54ppfGH6eQq","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:50:54.306Z","updatedAt":"2024-11-07T12:50:54.306Z","_updatedAt":"2024-11-07T12:50:54.306Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-miko-chris-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3nbVcAJLPsk54ppfGH6eQq/1513f465c3f0ec79aafc5c03f207c8d4/wizards-of-baking-meet-the-teams-miko-chris-web-landscape.png","details":{"size":1215085,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-miko-chris-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"4UQ28Tk4anuL4VxPULsHKj","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:13:39.661Z","updatedAt":"2024-11-07T14:03:01.558Z","_updatedAt":"2024-11-07T14:03:01.558Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-4","text":"Chris (left) and Miko (right)\n\n### Miko and Chris\nMiko is a cake artist who discovered his love of Harry Potter through the films. He still watches them to destress when life gets a little tough. His Harry Potter hot-take is that he thinks Snape is an unsung hero – Miko is a Slytherin though so that might explain his love for the slippery Snape.\n\nThe other member of this team, and fellow Slytherin, is Chris. An executive pastry chef, he is all about attention to detail. If he had the chance to recreate any Harry Potter location as a dessert, it would be the Forbidden Forest because of its mysterious ambience. \n"},{"contentfulId":"4QwFoafZTZ8ElE0etts4SZ","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:52:13.726Z","updatedAt":"2024-11-07T12:52:13.726Z","_updatedAt":"2024-11-07T12:52:13.726Z","entryTitle":"wizards-of-baking-meet-the-teams-yohann-kayla-web-landscape","image":{"contentfulId":"3zu5XsCGnTSwYC0m3L6oSt","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:52:11.253Z","updatedAt":"2024-11-07T12:52:11.253Z","_updatedAt":"2024-11-07T12:52:11.253Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-yohann-kayla-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3zu5XsCGnTSwYC0m3L6oSt/9478ec80c46b556fa3be85bff4c09e47/wizards-of-baking-meet-the-teams-yohann-kayla-web-landscape.png","details":{"size":1198886,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-yohann-kayla-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"7ETiqJVA59jcdFm501uWmF","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:15:13.279Z","updatedAt":"2024-11-07T13:15:13.279Z","_updatedAt":"2024-11-07T13:15:13.279Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-5","text":"Yohann (left) and Kayla (right) \n\n### Yohann and Kayla\nNext up we have Kayla, a cake designer known for her colourful creations.  Having always loved magic (and with a feeling that it could still be real), Kayla was drawn to Harry Potter when the films were released. She particularly likes the Great Hall because that is where all the excellent food is – a very smart choice. \n\nKayla’s team member, Yohann, is an executive pastry chef and a Gryffindor. He feels like this house suits him because they do what is right and he relates to that. Plus, they’re winners and he’s in this competition to win it! Yohann’s favourite character is Dumbledore because of how much knowledge he has and in Yohann’s words, knowledge is power. "},{"contentfulId":"6Fbv8T8a7d7FR7tT1syRET","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:49:11.452Z","updatedAt":"2024-11-07T12:49:11.452Z","_updatedAt":"2024-11-07T12:49:11.452Z","entryTitle":"wizards-of-baking-meet-the-teams-conner-michael-web-landscape","image":{"contentfulId":"XkRiMk8VxITcHARmgBx5U","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:49:07.650Z","updatedAt":"2024-11-07T12:49:07.650Z","_updatedAt":"2024-11-07T12:49:07.650Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-conner-michael-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/XkRiMk8VxITcHARmgBx5U/51389611415232bc701f103d542f1621/wizards-of-baking-meet-the-teams-conner-michael-web-landscape.png","details":{"size":1235723,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-conner-michael-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"55O8apvtkq6IyVFQ7D3kZQ","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:18:04.632Z","updatedAt":"2024-11-07T13:18:04.632Z","_updatedAt":"2024-11-07T13:18:04.632Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-6","text":"Michael (left) and Conner (right)\n\n### Conner and Michael\nNow we come to the youngest contestant in the competition, Conner. At 18 years old he is already a pastry chef. He also says that he embraces his identify as 100% a Gryffindor. Conner has big ambitions, he would love to create Hogwarts as a dessert…if he had unlimited time and chocolate that is. \n\nMichael is a professionally trained cake designer and a proud Harry Potter superfan! He has loved the books since his grandma bought them for him as a kid and has read them multiple times. He’s also a big fan of the movies and can quote them word for word – impressive! Michael’s two favourite characters are Dumbledore and… Voldemort. To him they represent the balance of good and evil. "},{"contentfulId":"4uU3l17GX9LI2nmkEcPr7Z","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:33:23.459Z","updatedAt":"2024-11-07T12:33:23.459Z","_updatedAt":"2024-11-07T12:33:23.459Z","entryTitle":"wizards-of-baking-meet-the-teams-mitzi-lisa-web-landscape","image":{"contentfulId":"12A9tVFAbK19LwNyBl3Zsx","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:33:20.361Z","updatedAt":"2024-11-07T12:33:20.361Z","_updatedAt":"2024-11-07T12:33:20.361Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-mitzi-lisa-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/12A9tVFAbK19LwNyBl3Zsx/b839fb927e6758b945db63f41726c8c5/wizards-of-baking-meet-the-teams-mitzi-lisa-web-landscape.png","details":{"size":1227532,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-mitzi-lisa-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"2Sjo7udt4UOEGo6iZHTk75","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:21:59.554Z","updatedAt":"2024-11-07T13:21:59.554Z","_updatedAt":"2024-11-07T13:21:59.554Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-7","text":"Mitzi (left) and Lisa (right)\n\n### Lisa and Mitzi\nLisa is known for her large cakes and what she describes as her ‘Hagrid-sized’ love of Harry Potter. Now that’s what we call a fan. She is also, in her own words, the ‘huffliest puffliest’ Hufflepuff. If she could create any Harry Potter location as a dessert it would be Hagrid’s Hut – complete with dragon egg. Does someone have a soft spot for this half-giant?\n\nThe other half of this duo is Mitzi, an executive pastry chef who loves molecular gastronomy (we wager she would be a fan of Potions class). Despite being a Gryffindor, Mitzi identifies with Luna Lovegood and all her eccentricates as she sees those qualities reflected in herself.\n"},{"contentfulId":"3EtwkxqjglpZ3EPtpjeIf5","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:51:47.053Z","updatedAt":"2024-11-07T12:51:47.053Z","_updatedAt":"2024-11-07T12:51:47.053Z","entryTitle":"wizards-of-baking-meet-the-teams-hemu-riccardo-web-landscape","image":{"contentfulId":"qNta3k0XXfu2cenIiYM5i","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:51:44.238Z","updatedAt":"2024-11-07T12:51:44.238Z","_updatedAt":"2024-11-07T12:51:44.238Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-hemu-riccardo-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/qNta3k0XXfu2cenIiYM5i/6b2874d7e08c1cf1d96a90324896239c/wizards-of-baking-meet-the-teams-hemu-riccardo-web-landscape.png","details":{"size":1234908,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-hemu-riccardo-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"1MXsctTo64h1uTm3eXKZv9","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:26:45.883Z","updatedAt":"2024-11-07T13:26:45.883Z","_updatedAt":"2024-11-07T13:26:45.883Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-8","text":"Riccardo (left) and Hemu (right)\n\n### Hemu and Riccardo\nRiccardo is an executive pastry chef whose love of Harry Potter started in high school when he was introduced to the wizarding world by watching *Goblet of Fire*! He enjoyed it so much he went back and watched the series from the start. Although he is a Gryffindor, Riccardo also thinks he is like Harry Potter and could easily have been a Slytherin.\n\nRiccardo’s fellow Gryffindor and team member is Hemu, a cake artist known for her hyper-realistic cakes. Hemu’s favourite character is Dobby. His cuteness does factor into this decision but the way he gives his life for his friends resonates with Hemu who also feels she would do anything for those she loved. \n"},{"contentfulId":"5zHEpz27nCK5q8xivRXDzX","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:50:00.804Z","updatedAt":"2024-11-07T12:50:00.804Z","_updatedAt":"2024-11-07T12:50:00.804Z","entryTitle":"wizards-of-baking-meet-the-teams-zoe-jordan-web-landscape","image":{"contentfulId":"52NeOIiXDPBElITboB7kfc","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:49:56.057Z","updatedAt":"2024-11-07T12:49:56.057Z","_updatedAt":"2024-11-07T12:49:56.057Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-zoe-jordan-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/52NeOIiXDPBElITboB7kfc/aed2cfa539dbc7190e4a107f67186adb/wizards-of-baking-meet-the-teams-zoe-jordan-web-landscape.png","details":{"size":1219334,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-zoe-jordan-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"6s1Pq6xg3HiJn3DbwuBKyH","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:27:28.187Z","updatedAt":"2024-11-07T13:27:28.187Z","_updatedAt":"2024-11-07T13:27:28.187Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-9","text":"Jordan (left) and Zoe (right) \n\n### Jordan and Zoe\nBefore she became a self-taught cake artist, Zoe worked in film and TV. In fact, this is how she discovered her love of Harry Potter when she got the opportunity to visit the set of *Philosopher’s Stone*. Very exciting! She then read the stories to her children, so Harry Potter has been in her life for a long time. She also happens to be a Hufflepuff.\n\nLike his fellow teammate, executive pastry chef Jordan is a Hufflepuff. This came as a bit of a surprise to him as he initially thought he was a Gryffindor. Though, as he describes himself as loyal, diligent and dedicated to his profession, we can see exactly why he was sorted into this house. Plus, Jordan thinks he is like Cedric Diggory, humble and smart in his own way – a true Hufflepuff.\n"},{"contentfulId":"6tTQyEvWb3bwvkqEzvw2nA","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-07T12:29:40.995Z","updatedAt":"2024-11-07T12:29:40.995Z","_updatedAt":"2024-11-07T12:29:40.995Z","entryTitle":"wizards-of-baking-meet-the-teams-kimberly-ashley-web-landscape","image":{"contentfulId":"5cW6P0sK6Iz8JFPtCCKfym","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-07T12:29:35.463Z","updatedAt":"2024-11-07T12:29:35.463Z","_updatedAt":"2024-11-07T12:29:35.463Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-meet-the-teams-kimberly-ashley-web-landscape","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5cW6P0sK6Iz8JFPtCCKfym/d0ada20dba5f25fcaa0b1e60fbf68f5d/wizards-of-baking-meet-the-teams-kimberly-ashley-web-landscape.png","details":{"size":1204408,"image":{"width":1000,"height":667}},"fileName":"wizards-of-baking-meet-the-teams-kimberly-ashley-web-landscape.png","contentType":"image/png"}}},{"contentfulId":"1WbBkYRnA09TYIkDQCbwza","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-07T13:29:35.847Z","updatedAt":"2024-11-14T13:52:12.620Z","_updatedAt":"2024-11-14T13:52:12.620Z","entryTitle":"meet-the-teams-harry-potter-wizards-of-baking-text-section-10","text":"Kimberly (left) and Ashley (right) \n\n### Kimberly and Ashley\nKimberly has been baking for 16 years, but only recently went to culinary school to make her dazzling wedding cakes even better. She has watched the films at least three times and has decided that twinkly-eyed Dumbledore is her favourite character. She loves the professor because he is wise and helps people – like Kimberly does in her day-to-day life. \n\nAshley is a French-trained pastry chef known for her gingerbread mansions. She also happens to be a Ravenclaw and thinks she was sorted into this house because she uses both the left and right side of her brain. Essentially, not only does she have a real passion for knowledge, but she happens to be creative and independent too. \n\n***\n\n__Spell-binding new competition series Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\n__The show is out now to [Max](https://www.max.com/?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow) and Food Network.__\n"}],"relatedArticleReference":[{"contentfulId":"5b7dA58OUVN6RgslpTytRJ","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"article","createdAt":"2022-11-24T13:11:27.946Z","updatedAt":"2022-11-24T13:25:44.989Z","_updatedAt":"2022-11-24T13:25:44.989Z","entryTitle":"WEB-FEATURE-importance-of-sweets-treats-in-wizarding-world","displayTitle":"The importance of sweets and treats in the wizarding world","activationDate":"2022-11-24T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentType
