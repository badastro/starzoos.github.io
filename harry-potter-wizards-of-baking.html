reatedAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"harry-potter-wizards-of-baking-episode-three-recap","mainImage":{"contentfulId":"1MUoAhMGLnTV2ABJjYIIwk","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-29T13:50:15.150Z","updatedAt":"2024-11-29T13:50:15.150Z","_updatedAt":"2024-11-29T13:50:15.150Z","entryTitle":"WOB-episode-three-screengrab-cauldron-cake","image":{"contentfulId":"6w59D3UzDhU1L2DZuRIf3D","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-29T13:50:09.053Z","updatedAt":"2024-11-29T13:50:09.053Z","_updatedAt":"2024-11-29T13:50:09.053Z","revision":1,"locale":"en-GB","title":"WOB-episode-three-screengrab-cauldron-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6w59D3UzDhU1L2DZuRIf3D/783837e88ee812449621f25c8290aeb0/HYTU103_0240.jpeg","details":{"size":599876,"image":{"width":850,"height":567}},"fileName":"HYTU103_0240.jpeg","contentType":"image/jpeg"}}},"intro":"Things are heating up (literally, there are ovens at play here, people!) in Harry Potter: Wizards of Baking, as the contestants take to the cobbled streets of Diagon Alley for this week's baking theme. ","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"4xWZ1JC0zqppIIXmJKwIal","type":"Entry","revision":10,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-29T16:33:27.760Z","updatedAt":"2024-11-29T17:20:21.936Z","_updatedAt":"2024-11-29T17:20:21.936Z","entryTitle":"harry-potter-wizards-of-baking-episode-three-recap-text-section-1","text":"In our third episode, our contestants' concoctions are inspired by magical shops - from [Ollivander's](https://www.harrypotter.com/fact-file/locations/ollivanders) wand shop to [Flourish \u0026 Blotts.](https://www.harrypotter.com/fact-file/locations/flourish-and-blotts) And if that wasn't difficult enough - each bake must include an interactive element to wow the judges. \n\nBut that's not all! Inspired by the Doubling Curse (or you might know the [Duplication Charm](https://www.harrypotter.com/fact-file/spells/the-duplication-charm)), the teams must also create 50 small desserts to go alongside their showpieces!  \n\nIf the stakes couldn't get any higher, this week, it's not just the judges who will be dictating the teams' future in the competition: a tribe of Harry Potter superfans will be coming along to Warner Bros. Studio Tour London to help vote for their favourites! \n\nLisa, who is tasked with creating a Weasley's Wizard Wheezes dessert, sums up the situation beautifully: \"I feel like the inside of the Weasley store is what it's like inside of my brain.\" "},{"contentfulId":"EnhgszGC50eRIAa4k4qeH","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-29T16:30:35.701Z","updatedAt":"2024-11-29T16:30:35.701Z","_updatedAt":"2024-11-29T16:30:35.701Z","entryTitle":"WOB-episode-three-screengrab-teams-deliberate","image":{"contentfulId":"3PpqPwHMbkZsOW9cxnzxZN","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-29T16:30:32.054Z","updatedAt":"2024-11-29T16:30:32.054Z","_updatedAt":"2024-11-29T16:30:32.054Z","revision":1,"locale":"en-GB","title":"WOB-episode-three-screengrab-teams-deliberate","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3PpqPwHMbkZsOW9cxnzxZN/e4e93f3d680a31b4a45cf9651b412e9f/HYTU103_0018.jpg","details":{"size":75638,"image":{"width":1000,"height":667}},"fileName":"HYTU103_0018.jpg","contentType":"image/jpeg"}}},{"contentfulId":"58hEO7NmpaV8xgo4LyLSHh","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-29T16:41:57.444Z","updatedAt":"2024-11-29T16:58:40.990Z","_updatedAt":"2024-11-29T16:58:40.990Z","entryTitle":"harry-potter-wizards-of-baking-episode-three-recap-text-section-2","text":"## Stiff competition\n\nAs last week's winners of the Gringotts challenge, Elizabeth and Juan find themselves with an extra advantage. Gifted with the Petrificus Totalus card (that's the [Full-Body Bind curse](https://www.harrypotter.com/fact-file/spells/the-full-body-bind), for the our wizarding world novices, out there) the pair have the power to freeze one member of ALL opposing teams for ten minutes at the opportune moment. What evil fun! During the freeze, poor Lisa resorts to interpretive dance to boost the spirits. "},{"contentfulId":"44YPLjcW3lfH3aWjFsoMh1","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-29T16:59:01.171Z","updatedAt":"2024-11-29T16:59:01.171Z","_updatedAt":"2024-11-29T16:59:01.171Z","entryTitle":"harry-potter-wizards-of-baking-episode-three-recap-text-section-3","text":"## Opulent shops\n\nAs ever, our bakers set about building their magical creations. With Flourish \u0026 Blotts as their theme, Zoe and Jordan design delicious looking books, conscious they were in the bottom three last episode. "},{"contentfulId":"6qEn55yS54OHdcdoATmYgO","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-29T13:49:01.012Z","updatedAt":"2024-11-29T13:49:01.012Z","_updatedAt":"2024-11-29T13:49:01.012Z","entryTitle":"WOB-episode-three-screengrab-book-cake","image":{"contentfulId":"1zzXSFWF3aw7PVMRNEnPQZ","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-29T13:48:58.390Z","updatedAt":"2024-11-29T13:48:58.390Z","_updatedAt":"2024-11-29T13:48:58.390Z","revision":1,"locale":"en-GB","title":"WOB-episode-three-screengrab-book-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1zzXSFWF3aw7PVMRNEnPQZ/a95d1af6b2ecbd2f00c7707b762f6a83/HYTU103_0179.jpeg","details":{"size":701748,"image":{"width":850,"height":567}},"fileName":"HYTU103_0179.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"4oAEMYQzye2j02zorqXPWS","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-29T16:58:57.100Z","updatedAt":"2024-11-29T16:58:57.100Z","_updatedAt":"2024-11-29T16:58:57.100Z","entryTitle":"harry-potter-wizards-of-baking-episode-three-recap-text-section-4","text":"Hemu \u0026 Riccardo are tasked with recreating Ollivander's wand shop, complete with chocolate wands and multiple sponge layers, to replicate the bountiful array of boxes you find in the wandmaker's dusty dwelling."},{"contentfulId":"7AzeoGcWsLNuuRgKzHymJS","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-29T13:49:38.716Z","updatedAt":"2024-11-29T13:49:38.716Z","_updatedAt":"2024-11-29T13:49:38.716Z","entryTitle":"WOB-episode-three-screengrab-wand-box-cake","image":{"contentfulId":"1PnSsC67hRQzugbuDoUOVM","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-29T13:49:36.506Z","updatedAt":"2024-11-29T13:49:36.506Z","_updatedAt":"2024-11-29T13:49:36.506Z","revision":1,"locale":"en-GB","title":"WOB-episode-three-screengrab-wand-box-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1PnSsC67hRQzugbuDoUOVM/b6cdd9e6eb65931f10acd213988edf32/HYTU103_0280.jpeg","details":{"size":737345,"image":{"width":850,"height":567}},"fileName":"HYTU103_0280.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"yySX8HdLpd5SsR46sHcW1","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-29T16:58:47.054Z","updatedAt":"2024-11-29T17:02:42.380Z","_updatedAt":"2024-11-29T17:02:42.380Z","entryTitle":"harry-potter-wizards-of-baking-episode-three-recap-text-section-5","text":"## The grand Diagon Alley opening\n\nAfter another day of kitchen anxiety, the bakers return to the Diagon Alley set to show off their creations to a selection of Harry Potter superfans. But first, can we get a shoutout for another amazing Carla Hall outfit?! \n"},{"contentfulId":"4CUnL36QSmqgV8D0a2wtaH","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-29T17:05:06.122Z","updatedAt":"2024-11-29T17:05:06.122Z","_updatedAt":"2024-11-29T17:05:06.122Z","entryTitle":"WOB-episode-three-screengrab-carla-hall-in-diagon-alley","image":{"contentfulId":"72OluhHkF76HK0vjmOXLJ0","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-29T17:04:59.819Z","updatedAt":"2024-11-29T17:04:59.819Z","_updatedAt":"2024-11-29T17:04:59.819Z","revision":1,"locale":"en-GB","title":"WOB-episode-three-screengrab-carla-hall-in-diagon-alley","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/72OluhHkF76HK0vjmOXLJ0/c90a515c2624e1ba0ab128b0eb4f71e6/HYTU103_0247.jpeg","details":{"size":739589,"image":{"width":850,"height":567}},"fileName":"HYTU103_0247.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"hzF4SMBRwqhYs3dpUnELR","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-29T17:09:43.666Z","updatedAt":"2024-11-29T17:21:47.563Z","_updatedAt":"2024-11-29T17:21:47.563Z","entryTitle":"harry-potter-wizards-of-baking-episode-three-recap-text-section-7","text":"## That's elementary \n\nRemember that each bake has to involve one interactive element - and our bakers didn't dissapoint. Judge Josef is bowled over by the Ollivander's bake, where the wands magically lift out of the cake to 'choose' him. \n\nWe also see smoking cauldrons that LITERALLY bubble - and Carla gets to a grips with a screaming yo-yo design, inspired by the Weasley's Wizard Wheezes mischievous products.\n\nElizabeth and Juan are not slowing down after their win last week either - providing fluttering Golden Snitches to the awe of all."},{"contentfulId":"1MUoAhMGLnTV2ABJjYIIwk","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-11-29T13:50:15.150Z","updatedAt":"2024-11-29T13:50:15.150Z","_updatedAt":"2024-11-29T13:50:15.150Z","entryTitle":"WOB-episode-three-screengrab-cauldron-cake","image":{"contentfulId":"6w59D3UzDhU1L2DZuRIf3D","type":"Asset","contentTypeId":"asset","createdAt":"2024-11-29T13:50:09.053Z","updatedAt":"2024-11-29T13:50:09.053Z","_updatedAt":"2024-11-29T13:50:09.053Z","revision":1,"locale":"en-GB","title":"WOB-episode-three-screengrab-cauldron-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6w59D3UzDhU1L2DZuRIf3D/783837e88ee812449621f25c8290aeb0/HYTU103_0240.jpeg","details":{"size":599876,"image":{"width":850,"height":567}},"fileName":"HYTU103_0240.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"6DOHA3ICsAKegomKaOR2ax","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-29T16:58:51.756Z","updatedAt":"2024-11-29T17:17:32.192Z","_updatedAt":"2024-11-29T17:17:32.192Z","entryTitle":"harry-potter-wizards-of-baking-episode-three-recap-text-section-8","text":"## And in the end...\n\nWith Harry Potter superfans joining in the judges' deliberations, an emotional Elizabeth and Juan managed to secure their SECOND win in two weeks.\n\nAlas, another team had to go home, despite creating magic on the cobbles of Diagon Alley. But we won't ruin the ending for you here. Watch the episode for yourself!\n\n***\n\nAnd with that, another baking adventure (and another oven!) comes to a close... and once again, we are staggered by the talent - and hungry. Always, always hungry. \n\nStay tuned for episode four next week where things are about to get spooky in the Forbidden Forest..."},{"contentfulId":"5jFaypMCVLabZF75f3HT0z","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:03:59.849Z","updatedAt":"2024-11-22T15:03:59.849Z","_updatedAt":"2024-11-22T15:03:59.849Z","entryTitle":"wizards-of-baking-generic-text-section-cta","text":"__Spell-binding new competition series Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\nThe show is out now to [Max](https://www.max.com/geo-availability?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow) and Food Network - and you can learn more about the show at our [handy hub.](https://www.harrypotter.com/harry-potter-wizards-of-baking)"}],"publishDate":"2024-11-22T00:00+00:00"}],"publishDate":"2024-12-10T00:00+00:00"},{"contentfulId":"6mRwTpP4RFmVa3kKAIN87A","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-12-21T09:00:02.758Z","updatedAt":"2024-12-21T09:00:02.758Z","_updatedAt":"2024-12-21T09:00:02.758Z","entryTitle":"WEB-FEATURE-harry-potter-wizards-of-baking-episode-six-recap","eyebrow":"The grand finale! ","displayTitle":"The best bites from Harry Potter: Wizards of Baking – episode six","activationDate":"2024-12-21T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"},{"contentfulId":"L1Cef6BUiA2eC84VPklgq","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-09-20T03:41:18.386Z","updatedAt":"2020-02-20T13:07:02.831Z","_updatedAt":"2020-02-20T13:07:02.831Z","name":"hide-from-app"},{"contentfulId":"5pjGg1O8g0NYmdITUba28D","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:27:52.290Z","updatedAt":"2020-02-20T13:06:54.732Z","_updatedAt":"2020-02-20T13:06:54.732Z","name":"hide-from-discover","authorComment":"This excludes the content item from its index page i.e. quizzes run to Quiz section automatically, but for other Quiz content (publishing elsewhere) it excludes from Discover. ALL SECRET CODE OR ENCHANTED CONTENT"}],"externalId":"harry-potter-wizards-of-baking-episode-six-recap","mainImage":{"contentfulId":"3nPexy54RAdAT0H2uJV1Wb","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-19T22:06:57.011Z","updatedAt":"2024-12-19T22:06:57.011Z","_updatedAt":"2024-12-19T22:06:57.011Z","entryTitle":"wizards-of-baking-ep-6-judges-at-table-great-hall-screengrab","image":{"contentfulId":"2VO6YyEXv3KbiWwVkho7hu","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-19T22:06:49.197Z","updatedAt":"2024-12-19T22:06:49.197Z","_updatedAt":"2024-12-19T22:06:49.197Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-ep-6-judges-at-table-great-hall-screengrab","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2VO6YyEXv3KbiWwVkho7hu/328e9e7b80844c87047afcc65da49e5e/wizards-of-baking-ep-6-judges-at-table-great-hall-screengrab.png","details":{"size":722798,"image":{"width":1000,"height":567}},"fileName":"wizards-of-baking-ep-6-judges-at-table-great-hall-screengrab.png","contentType":"image/png"}}},"intro":"This is it. The big one. With two teams remaining and the end in sight, it’s time for the final of Wizards of Baking! This week, to add that extra bit of finale magic, the teams are in the iconic Great Hall to face their toughest challenge yet and see who will lift the coveted trophy.","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"3VaZmtBORUJSsQuZIqNyjl","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-19T22:15:02.871Z","updatedAt":"2024-12-19T22:57:36.266Z","_updatedAt":"2024-12-19T22:57:36.266Z","entryTitle":"harry-potter-wizards-of-baking-episode-six-recap-text-section-1","text":"With just Elizabeth \u0026 Juan and Zoe \u0026 Jordan left, all is still to play for in the epic final of the first ever season of Wizards of Baking. With twist, turns, surprise guests and more, this is one you won’t want to miss. \n\n## Memorable scenes\nSuch a grand occasion needs a suitably grand challenge – one you might say is larger than life! Speaking of which, this week the contestants not only have to recreate an iconic scene that took place in the Great Hall, but their creations also need to be a minimum of six feet tall – no Engorgement Charms allowed!\n"},{"contentfulId":"3LJMTqEuiuECY9AThbDjRM","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-19T22:13:29.831Z","updatedAt":"2024-12-19T22:13:29.831Z","_updatedAt":"2024-12-19T22:13:29.831Z","entryTitle":"wizards-of-baking-ep-6-contestants-walking-into-great-hall-screengrab","image":{"contentfulId":"1s3SGoKW9FUe0TE2x9E35U","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-19T22:13:24.221Z","updatedAt":"2024-12-19T22:13:24.221Z","_updatedAt":"2024-12-19T22:13:24.221Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-ep-6-contestants-walking-into-great-hall-screengrab","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1s3SGoKW9FUe0TE2x9E35U/c765b02545e85316daeef86fec1c3bad/wizards-of-baking-ep-6-contestants-walking-into-great-hall-screengrab.png","details":{"size":885439,"image":{"width":1000,"height":570}},"fileName":"wizards-of-baking-ep-6-contestants-walking-into-great-hall-screengrab.png","contentType":"image/png"}}},{"contentfulId":"4KootSPCibjjHEn6TZmcjN","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-19T22:15:44.701Z","updatedAt":"2024-12-19T22:15:44.701Z","_updatedAt":"2024-12-19T22:15:44.701Z","entryTitle":"harry-potter-wizards-of-baking-episode-six-recap-text-section-2","text":"## A roarsome design\nWho doesn’t love the moment Umbridge is chased out of the Great Hall by a dragon-shaped firework who we expect has a fearsome roar?  Two-time winners, Elizabeth \u0026 Juan, certainly love that moment with their showstopping bake being centred around the moment the Weasley twins decided they were done with their formal education. \n"},{"contentfulId":"5NnLkKoh8IB8TdZ9qzGM3C","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-19T22:12:40.235Z","updatedAt":"2024-12-19T22:12:40.235Z","_updatedAt":"2024-12-19T22:12:40.235Z","entryTitle":"wizards-of-baking-ep-6-elizabeth-juan-cake-illusatration-screengrab","image":{"contentfulId":"1HtB1DtAcpm25YXQ3mGdtt","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-19T22:12:37.060Z","updatedAt":"2024-12-19T22:12:37.060Z","_updatedAt":"2024-12-19T22:12:37.060Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-ep-6-elizabeth-juan-cake-illusatration-screengrab","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1HtB1DtAcpm25YXQ3mGdtt/94fb25f602ee310580c83b1ec1a9e8f1/wizards-of-baking-ep-6-elizabeth-juan-cake-illusatration-screengrab.png","details":{"size":736922,"image":{"width":1000,"height":561}},"fileName":"wizards-of-baking-ep-6-elizabeth-juan-cake-illusatration-screengrab.png","contentType":"image/png"}}},{"contentfulId":"5CyYl505Vefuoo2fPpuQww","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-19T22:16:15.713Z","updatedAt":"2024-12-19T22:16:15.713Z","_updatedAt":"2024-12-19T22:16:15.713Z","entryTitle":"harry-potter-wizards-of-baking-episode-six-recap-text-section-3","text":"## Yuletide whimsy\nZoe \u0026 Jordan will not be giving up without a fight, however. Last week’s winners are coming in strong with a Christmas twist to their Great Hall bake. One Jordan claims will ‘defy gravity’ with no need of any Levitation Charm. "},{"contentfulId":"1bYrR5HOk1EY2DpU5L0xLd","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-19T22:08:57.722Z","updatedAt":"2024-12-19T22:08:57.722Z","_updatedAt":"2024-12-19T22:08:57.722Z","entryTitle":"wizards-of-baking-ep-6-zoe-jordan-cake-illustration-screengrab","image":{"contentfulId":"7AREyqKzgQtJobKLg9s4GA","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-19T22:08:54.620Z","updatedAt":"2024-12-19T22:08:54.620Z","_updatedAt":"2024-12-19T22:08:54.620Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-ep-6-zoe-jordan-cake-illustration-screengrab","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7AREyqKzgQtJobKLg9s4GA/f80032440541ba4866226ad46c52c6ba/wizards-of-baking-ep-6-zoe-jordan-cake-illustration-screengrab.png","details":{"size":727176,"image":{"width":1000,"height":559}},"fileName":"wizards-of-baking-ep-6-zoe-jordan-cake-illustration-screengrab.png","contentType":"image/png"}}},{"contentfulId":"1em2zxMwSYIMyasOwgf5zL","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-19T22:17:20.868Z","updatedAt":"2024-12-19T22:58:27.666Z","_updatedAt":"2024-12-19T22:58:27.666Z","entryTitle":"harry-potter-wizards-of-baking-episode-six-recap-text-section-4","text":"## Tensions are rising…\nWell, it wouldn’t be the final without some drama. Zoe has burnt her eggnog! Starting it from scratch with time ticking on is not what she needs… where’s a Time-Turner when you need one?\n\nThat’s not all, turns out it would be really useful to have Madam Pomfrey on standby right about now as Elizabeth has cut her finger. Luckily, the talented medic is on hand to help and she gets right back to her baking – what a trooper! "},{"contentfulId":"5ezzS6DFvmhlxjwvOIYas7","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-19T22:10:14.404Z","updatedAt":"2024-12-19T22:10:14.404Z","_updatedAt":"2024-12-19T22:10:14.404Z","entryTitle":"wizards-of-baking-ep-6-jordan-zoe-designing-bake-screengrab","image":{"contentfulId":"1VP224ypuOpzkRwHVRtoIL","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-19T22:10:10.911Z","updatedAt":"2024-12-19T22:10:10.911Z","_updatedAt":"2024-12-19T22:10:10.911Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-ep-6-jordan-zoe-designing-bake-screengrab","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1VP224ypuOpzkRwHVRtoIL/d08901ce60c011ca0dea9c14fa1aa027/wizards-of-baking-ep-6-jordan-zoe-designing-bake-screengrab.png","details":{"size":614686,"image":{"width":1000,"height":562}},"fileName":"wizards-of-baking-ep-6-jordan-zoe-designing-bake-screengrab.png","contentType":"image/png"}}},{"contentfulId":"2gEccxI2hgC55mBEve08GM","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-19T22:17:59.467Z","updatedAt":"2024-12-19T22:58:58.477Z","_updatedAt":"2024-12-19T22:58:58.477Z","entryTitle":"harry-potter-wizards-of-baking-episode-six-recap-text-section-5","text":"## A bit of self-reflection\nAs it is the final time these teams will bake together in this competition, they take a moment to reflect on the journey they’ve been on, one that should be commemorated… with a tattoo according to Juan. He and Elizabeth did shake hands on it and while that might not *quite* be an Unbreakable Vow, we still think it’s pretty binding.  \n\nAs for Zoe \u0026 Jordan, they have gone from being total strangers to, in the words of Jordan, ‘like an old married couple’. They have stretched themselves professionally and emotionally coming up with stunning concepts over the last few weeks. \n"},{"contentfulId":"2j9QyW0CgjPL1zOLN1ta6A","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-19T22:12:02.670Z","updatedAt":"2024-12-19T22:12:02.670Z","_updatedAt":"2024-12-19T22:12:02.670Z","entryTitle":"wizards-of-baking-ep-6-elizabeth-juan-designing-bake-screengrab","image":{"contentfulId":"4ZRGQvBx0V2pLNGSS8iXZ9","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-19T22:11:56.316Z","updatedAt":"2024-12-19T22:11:56.316Z","_updatedAt":"2024-12-19T22:11:56.316Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-ep-6-elizabeth-juan-designing-bake-screengrab","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4ZRGQvBx0V2pLNGSS8iXZ9/e9d28f2e58810b65f62a384158e6e3e1/wizards-of-baking-ep-6-elizabeth-juan-desinging-bake-screengrab.png","details":{"size":619139,"image":{"width":1000,"height":562}},"fileName":"wizards-of-baking-ep-6-elizabeth-juan-desinging-bake-screengrab.png","contentType":"image/png"}}},{"contentfulId":"15Jw4HxGoxIAw0C0JNGE7k","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-19T22:18:23.437Z","updatedAt":"2025-01-02T11:51:08.869Z","_updatedAt":"2025-01-02T11:51:08.869Z","entryTitle":"harry-potter-wizards-of-baking-episode-six-recap-text-section-6","text":"## The room of reunion\nThe first twist is here! And who is that emerging from the fireplace? Only previous contestants Miko \u0026 Chris! And they’re not just here to observe. As the winners of the previous challenge, Zoe \u0026 Jordan can pick who they would like to become the baking assistant for the next two hours. However, whoever they don’t pick will become Elizabeth and Juan’s helper. They will need to choose wisely."},{"contentfulId":"2TszKMn1Zihs9LGPU0kSwS","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-19T22:14:04.268Z","updatedAt":"2024-12-19T22:14:04.268Z","_updatedAt":"2024-12-19T22:14:04.268Z","entryTitle":"wizards-of-baking-ep-6-chris-miko-surprise-guests-screengrab","image":{"contentfulId":"NDHMGYQDC0QXEDe481EpH","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-19T22:14:00.582Z","updatedAt":"2024-12-19T22:14:00.582Z","_updatedAt":"2024-12-19T22:14:00.582Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-ep-6-chris-miko-surprise-guests-screengrab","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/NDHMGYQDC0QXEDe481EpH/5c675d8f64966ab1afac6239010bcc76/wizards-of-baking-ep-6-chris-miko-surprise-guests-screengrab.png","details":{"size":751443,"image":{"width":1000,"height":565}},"fileName":"wizards-of-baking-ep-6-chris-miko-surprise-guests-screengrab.png","contentType":"image/png"}}},{"contentfulId":"7lflvpovSsbIPRKhufhb6E","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-19T22:22:15.151Z","updatedAt":"2024-12-19T23:00:24.508Z","_updatedAt":"2024-12-19T23:00:24.508Z","entryTitle":"harry-potter-wizards-of-baking-episode-six-recap-text-section-7","text":"## The new golden trios\nIn the end, Zoe \u0026 Jordan decide they want Miko on their team as they need a hand creating some ultra-realistic looking food items. Elizabeth \u0026 Juan seem very happy to have Chris on their side – especially with his talent for speedy baking. \n"},{"contentfulId":"6YW6VgGF19Xcjop1pRaoqV","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-19T22:09:35.985Z","updatedAt":"2024-12-19T22:09:35.985Z","_updatedAt":"2024-12-19T22:09:35.985Z","entryTitle":"wizards-of-baking-ep-6-trophy-screengrab","image":{"contentfulId":"6PaLg69gBooBBadPmTh5Qk","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-19T22:09:30.898Z","updatedAt":"2024-12-19T22:09:30.898Z","_updatedAt":"2024-12-19T22:09:30.898Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-ep-6-trophy-screengrab","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6PaLg69gBooBBadPmTh5Qk/1799409f202fadc4590d70e1800f442a/wizards-of-baking-ep-6-trophy-screengrab.png","details":{"size":592762,"image":{"width":1000,"height":565}},"fileName":"wizards-of-baking-ep-6-trophy-screengrab.png","contentType":"image/png"}}},{"contentfulId":"1BYJcxRvyI9ZgFnpHGvolW","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-19T22:23:05.861Z","updatedAt":"2024-12-19T22:46:43.114Z","_updatedAt":"2024-12-19T22:46:43.114Z","entryTitle":"harry-potter-wizards-of-baking-episode-six-recap-text-section-8","text":"## The final, final creations\nFor the last time, the bakers have put down their tools ready to face the judges Carla and Josef. What they weren’t expecting was to walk into the Great Hall to crowds cheering them on, like they’re Celestina Warbeck at one of her concerts. Zoe sums it up perfectly with just one word – 'epic'. \n"},{"contentfulId":"286lwqlY1oiFUWFNhxOQi3","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-19T22:11:19.859Z","updatedAt":"2024-12-19T22:11:19.859Z","_updatedAt":"2024-12-19T22:11:19.859Z","entryTitle":"wizards-of-baking-ep-6-fans-in-great-hall-screengrab","image":{"contentfulId":"5O8qBjy5n6SCVTVb772zBL","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-19T22:11:17.078Z","updatedAt":"2024-12-19T22:11:17.078Z","_updatedAt":"2024-12-19T22:11:17.078Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-ep-6-fans-in-great-hall-screengrab","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5O8qBjy5n6SCVTVb772zBL/92fdb0d2530817630d9083d7ce9949cd/wizards-of-baking-ep-6-fans-in-great-hall-screengrab.png","details":{"size":860718,"image":{"width":1000,"height":565}},"fileName":"wizards-of-baking-ep-6-fans-in-great-hall-screengrab.png","contentType":"image/png"}}},{"contentfulId":"1qtm01KSkxllynQtoPnEuK","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-19T22:47:18.190Z","updatedAt":"2024-12-19T22:47:18.190Z","_updatedAt":"2024-12-19T22:47:18.190Z","entryTitle":"harry-potter-wizards-of-baking-episode-six-recap-text-section-9","text":"However, their test isn’t over yet. In front of the cheering fans, they now have just 20 minutes to put all of their elements together – no pressure then! \n\nAnd just like that, their time is up.\n\nCarla and Josef want to have their socks knocked off… but they aren’t the only ones the teams need to impress. Evanna Lynch, Warwick Davis and Bonnie Wright have all come back to help decide who will become champion.\n"},{"contentfulId":"6sJGyq5ND7OzxserIcf7X7","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-19T22:07:47.225Z","updatedAt":"2024-12-19T22:07:47.225Z","_updatedAt":"2024-12-19T22:07:47.225Z","entryTitle":"wizards-of-baking-ep-6-bonnie-wright-evanna-lynch-warwick-davis-walking-into-great-hall-screengrab","image":{"contentfulId":"1rZNorV7hIdHPGcPkSzt7P","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-19T22:07:43.827Z","updatedAt":"2024-12-19T22:07:43.827Z","_updatedAt":"2024-12-19T22:07:43.827Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-ep-6-bonnie-wright-evanna-lynch-warwick-davis-walking-into-great-hall-screengrab","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1rZNorV7hIdHPGcPkSzt7P/e9553c5ecb3cd2cbdb4239670de745fc/wizards-of-baking-ep-6-bonnie-wright-evanna-lynch-warwick-davis-walking-into-great-hall-screengrab.png","details":{"size":830118,"image":{"width":1000,"height":558}},"fileName":"wizards-of-baking-ep-6-bonnie-wright-evanna-lynch-warwick-davis-walking-into-great-hall-screengrab.png","contentType":"image/png"}}},{"contentfulId":"67ClSSSiuPqcotPjqFM23x","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-19T22:49:56.441Z","updatedAt":"2024-12-19T22:49:56.441Z","_updatedAt":"2024-12-19T22:49:56.441Z","entryTitle":"harry-potter-wizards-of-baking-episode-six-recap-text-section-10","text":"Zoe \u0026 Jordan wowed with their stunning Christmassy creation – they’ve even managed to make it snow in the Great Hall. Josef is blown away, Evanna describes it as ‘magic spell in motion’ and Warwick said that they turkey (yes, the turkey) was the best cake he’s eaten all competition. "},{"contentfulId":"7bwzLKqqLad4nCQNpsl9lX","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-19T22:10:49.030Z","updatedAt":"2024-12-19T22:20:46.361Z","_updatedAt":"2024-12-19T22:20:46.361Z","entryTitle":"wizards-of-baking-ep-6-great-hall-christmas-cake-screengrab","image":{"contentfulId":"wUtv1BVs3cLuuPn6ZXvVv","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-19T22:10:46.047Z","updatedAt":"2024-12-19T22:10:46.047Z","_updatedAt":"2024-12-19T22:10:46.047Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-ep-6-great-hall-chrsitmas-cake-screengrab","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/wUtv1BVs3cLuuPn6ZXvVv/f29455197374571c629f2f29cdffe959/wizards-of-baking-ep-6-great-hall-chrsitmas-cake-screengrab.png","details":{"size":819882,"image":{"width":1000,"height":560}},"fileName":"wizards-of-baking-ep-6-great-hall-chrsitmas-cake-screengrab.png","contentType":"image/png"}}},{"contentfulId":"6hbDrhmw6jIWvAeZ4KXcbO","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-19T22:50:39.115Z","updatedAt":"2024-12-19T22:50:39.115Z","_updatedAt":"2024-12-19T22:50:39.115Z","entryTitle":"harry-potter-wizards-of-baking-episode-six-recap-text-section-11","text":"How will Elizabeth \u0026 Juan follow such a performance? Well, they do so with falling Educational Decrees and a dragon whose nose puffs out clouds of smoke – ingenious!  With the coffee flavours, Carla thinks it was a great way to celebrate Juan’s country, Columbia and Josef is a big fan of the chocolate cake! "},{"contentfulId":"7zflsJclVvXNdzNVJOhl8k","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-19T22:51:13.830Z","updatedAt":"2024-12-19T22:51:13.830Z","_updatedAt":"2024-12-19T22:51:13.830Z","entryTitle":"wizards-of-baking-ep-6-elizabeth-juan-final-bake-great-hall-owl-exams-screengrab","image":{"contentfulId":"7x5pkKneEPd9w5EuK7Ucrf","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-19T22:51:09.301Z","updatedAt":"2024-12-19T22:51:09.301Z","_updatedAt":"2024-12-19T22:51:09.301Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-ep-6-elizabeth-juan-final-bake-great-hall-owl-exams-screengrab","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7x5pkKneEPd9w5EuK7Ucrf/7302e2171324b2aed6b3c2f7d5846154/wizards-of-baking-ep-6-elizabeth-juan-final-bake-great-hall-owl-exams-screengrab.png","details":{"size":823874,"image":{"width":1000,"height":563}},"fileName":"wizards-of-baking-ep-6-elizabeth-juan-final-bake-great-hall-owl-exams-screengrab.png","contentType":"image/png"}}},{"contentfulId":"1fMApSL6r2Q9RGErYNNroc","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-19T22:51:56.466Z","updatedAt":"2024-12-19T22:52:14.339Z","_updatedAt":"2024-12-19T22:52:14.339Z","entryTitle":"harry-potter-wizards-of-baking-episode-six-recap-text-section-12","text":"How on earth can the judges decide with cakes as whimsical and wonderful as those? \n\n## Eternal glory belongs to…\n\nUnlike Hagrid whose catchphrase is ‘I shouldn’ta said that’, we are keeping our lips sealed. \n\nAfter all, there’s no fun in spoilers. \n"},{"contentfulId":"WUNVLICS9K8NRTSYqMPwM","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-19T22:08:22.033Z","updatedAt":"2024-12-19T22:08:22.033Z","_updatedAt":"2024-12-19T22:08:22.033Z","entryTitle":"wizards-of-baking-ep-6-phelps-twins-evanna-bonnie-trophy-screengrab","image":{"contentfulId":"2vkPdqCILUh9DBwTbIoWuk","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-19T22:08:17.262Z","updatedAt":"2024-12-19T22:08:17.262Z","_updatedAt":"2024-12-19T22:08:17.262Z","revision":1,"locale":"en-GB","title":"wizards-of-baking-ep-6-phelps-twins-evanna-bonnie-trophy-screengrab","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2vkPdqCILUh9DBwTbIoWuk/f211378de6863f4029132b2bbe28b844/wizards-of-baking-ep-6-phelps-twins-evanna-bonnie-trophy-screengrab.png","details":{"size":747700,"image":{"width":1000,"height":560}},"fileName":"wizards-of-baking-ep-6-phelps-twins-evanna-bonnie-trophy-screengrab.png","contentType":"image/png"}}},{"contentfulId":"79znFPWPUwfpmrSXZwjKAW","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-19T22:54:21.536Z","updatedAt":"2024-12-19T22:54:21.536Z","_updatedAt":"2024-12-19T22:54:21.536Z","entryTitle":"harry-potter-wizards-of-baking-episode-six-recap-text-section-13","text":"To find out who has taken home the Wizards of Baking trophy, make sure to tune into the spell-binding new competition series Harry Potter: Wizards of Baking on Prime Video in the UK and Ireland.\n\nThe show is out now to [Max](https://www.max.com/geo-availability?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow) and Food Network - and you can learn more about the show at our [handy hub.](https://www.harrypotter.com/harry-potter-wizards-of-baking)\n"}],"relatedArticleReference":[{"contentfulId":"3iHbMeTE5jlaP9uyQKxLiR","type":"Entry","revision":8,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-12-13T09:00:03.342Z","updatedAt":"2024-12-16T11:58:26.054Z","_updatedAt":"2024-12-16T11:58:26.054Z","entryTitle":"WEB-FEATURE-WOB-episode-five-round-up","eyebrow":"IT'S THE SEMI-FINALS!","displayTitle":"The best bites from Harry Potter: Wizards of Baking – episode five","activationDate":"2024-12-10T00:00+00:00","tags":[{"contentfulId":"3B1lhNkNAFaVH3lS0WLMxV","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"tag","createdAt":"2019-07-22T14:12:56.517Z","updatedAt":"2019-08-01T11:51:53.952Z","_updatedAt":"2019-08-01T11:51:53.952Z","name":"feature"}],"externalId":"harry-potter-wizards-of-baking-episode-five-recap","mainImage":{"contentfulId":"4bNu3Ql1DzEhi9N84TbeTj","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-16T11:47:47.947Z","updatedAt":"2024-12-16T11:47:47.947Z","_updatedAt":"2024-12-16T11:47:47.947Z","entryTitle":"harry-potter-wizards-of-baking-episode-five-recap-screengrab-bonnie-and-twins-and-judges","image":{"contentfulId":"7KioIdLx7TMmjC3a2s7Ge0","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-16T11:15:38.874Z","updatedAt":"2024-12-16T11:15:38.874Z","_updatedAt":"2024-12-16T11:15:38.874Z","revision":1,"locale":"en-GB","title":"harry-potter-wizards-of-baking-episode-five-recap-screengrab-bonnie-and-twins-and-judges","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7KioIdLx7TMmjC3a2s7Ge0/e400c1bf7fedec857633616f2ee6e455/HYTU105_0117.jpeg","details":{"size":710618,"image":{"width":850,"height":567}},"fileName":"HYTU105_0117.jpeg","contentType":"image/jpeg"}}},"intro":"This week, it's the semi-finals of Harry Potter: Wizards of Baking - and to make things extra-special, the surviving teams have congregated in Dumbledore's Office to prep for their most important challenge yet. And there'll be yet another special guest!","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"2Qx1dcnZClWgfgTsxbP4cO","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-12T21:51:38.614Z","updatedAt":"2024-12-12T22:53:24.571Z","_updatedAt":"2024-12-12T22:53:24.571Z","entryTitle":"harry-potter-wizards-of-baking-episode-five-recap-text-section-1","text":"Three teams left... but only two placements available in the grand finale of [Harry Potter: Wizards of Baking](https://www.harrypotter.com/harry-potter-wizards-of-baking). \n\nTo boost morale, our old friend Bonnie Wright (AKA Ginny Weasley) rocks up to Leavesden (\"it's so special, all these memories just flood through\") to reunite with her Weasley siblings, Jamie and Oliver.\n\nBonnie will be joining judges Carla and Josef to review the teams' showpieces. And this week, the bakes must include a 'transformation element'! Everyone looks *pretty* nervous..."},{"contentfulId":"4eUR0kbTthJkRWqAVfSv2e","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-16T11:52:44.381Z","updatedAt":"2024-12-16T11:52:44.381Z","_updatedAt":"2024-12-16T11:52:44.381Z","entryTitle":"HP-WOB-episode-5-screengrabs-bonnie-joins-phelps","image":{"contentfulId":"1H7jaqXvj35mixWx1V7Ge8","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-16T11:52:42.324Z","updatedAt":"2024-12-16T11:52:42.324Z","_updatedAt":"2024-12-16T11:52:42.324Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-5-screengrabs-bonnie-joins-phelps","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/1H7jaqXvj35mixWx1V7Ge8/929b334a065805a6a2dee35a4ec7689e/HYTU105_0023.jpeg","details":{"size":647821,"image":{"width":850,"height":567}},"fileName":"HYTU105_0023.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"6nAuvwihXt65J7GZYuUtcR","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-12T21:51:33.589Z","updatedAt":"2024-12-12T21:51:33.589Z","_updatedAt":"2024-12-12T21:51:33.589Z","entryTitle":"harry-potter-wizards-of-baking-episode-five-recap-text-section-2","text":"## The (head)master plans \n\nEach team must be inspired by the elements in Dumbledore's Office for their bakes. Last week's winners Miko and Chris have been gifted with the [Hogwarts Portraits](https://www.harrypotter.com/features/a-guided-tour-of-hogwarts-portraits) as their theme, while Elizabeth \u0026 Juan (with two challenge-wins under their belts) are given Fawkes the Phoenix.\n\nAs for Zoe and Jordan, their project must revolve around the famous Time-Turner, which immediately sounds off alarm bells for the surviving team. If only they had more...time (lol!) to work on their bake! "},{"contentfulId":"3QgBftlJvt6y2n94NGmPi6","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-12T21:44:17.715Z","updatedAt":"2024-12-12T21:44:17.715Z","_updatedAt":"2024-12-12T21:44:17.715Z","entryTitle":"HP-WOB-episode-5-screengrabs-zoe-and-jordans-time-turner-design","image":{"contentfulId":"4SWTVZISrCJ6CvzBc94kTl","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-12T21:43:59.399Z","updatedAt":"2024-12-12T21:43:59.399Z","_updatedAt":"2024-12-12T21:43:59.399Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-5-screengrabs-zoe-and-jordans-time-turner-design","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4SWTVZISrCJ6CvzBc94kTl/29f0f17f93b5f2653554579684d26388/Screenshot_2024-12-12_at_21.42.42.jpg","details":{"size":134661,"image":{"width":1972,"height":1096}},"fileName":"Screenshot 2024-12-12 at 21.42.42.jpg","contentType":"image/jpeg"}}},{"contentfulId":"4WGkyL3YTbnHIH2kBsDdzk","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-12T21:51:20.846Z","updatedAt":"2024-12-12T21:54:35.505Z","_updatedAt":"2024-12-12T21:54:35.505Z","entryTitle":"harry-potter-wizards-of-baking-episode-five-recap-text-section-3","text":"## Lights out\n\nAs the team set about creating their bakes, Miko \u0026 Chris are given an extra advantage. The pair are given a [Deluminator](https://www.harrypotter.com/fact-file/objects/deluminator), which means they can turn off the lights of the opponents' stations - meaning their rivals will effectively be baking in the dark. \n\nAs the great [Dumbledore once said](https://www.harrypotter.com/features/pearls-of-wisdom-from-professor-dumbledore) \"Happiness can be found even in the darkest of times, if one only remembers to turn on the light\" - so... the bakers certainly won't be very happy about this."},{"contentfulId":"fASMuVm8xqLuUgHJeQPPJ","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-12T21:54:17.682Z","updatedAt":"2024-12-16T11:53:31.223Z","_updatedAt":"2024-12-16T11:53:31.223Z","entryTitle":"HP-WOB-episode-5-screengrabs-miko-and-chris-get-the-deluminator-card","image":{"contentfulId":"2gbuOVZXdDr6DkL0fTNNh4","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-16T11:53:28.676Z","updatedAt":"2024-12-16T11:53:28.676Z","_updatedAt":"2024-12-16T11:53:28.676Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-5-screengrabs-miko-and-chris-get-the-deluminator-card","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2gbuOVZXdDr6DkL0fTNNh4/f5d569e90cdef6c2258e06716efe0f16/HYTU105_0035.jpeg","details":{"size":460439,"image":{"width":850,"height":567}},"fileName":"HYTU105_0035.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"6P5oCbH3cs8hNMM4LbGA4e","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-12T22:55:24.646Z","updatedAt":"2024-12-12T22:55:24.646Z","_updatedAt":"2024-12-12T22:55:24.646Z","entryTitle":"harry-potter-wizards-of-baking-episode-five-recap-text-section-4","text":"## Let the baking commence\n\nElizabeth \u0026 Juan both have fun ideas to add into their Fawkes cake, with Juan inspired by his grandmother's old carrot cake recipe, while Elizabeth wants to pay homage to Dumbledore's love of sherbet lemon. \n\nWhile brainstorming their cake, Elizabeth confesses how much of a huge Harry Potter fan she is, even having her own Quidditch costume! Bonnie Wright is extremely impressed and we are sad and jealous."},{"contentfulId":"57EJRVB5DVwp0VEvCLB03s","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-16T11:58:16.451Z","updatedAt":"2024-12-16T11:58:16.451Z","_updatedAt":"2024-12-16T11:58:16.451Z","entryTitle":"HP-WOB-episode-5-screengrabs-sherbet-lemon-close-up","image":{"contentfulId":"3V5uT243hfiQrMbKgpglGH","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-16T11:58:14.450Z","updatedAt":"2024-12-16T11:58:14.450Z","_updatedAt":"2024-12-16T11:58:14.450Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-5-screengrabs-clock-cake-close-up","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3V5uT243hfiQrMbKgpglGH/833eddf5107c3843360108cbb65982ce/HYTU105_0208.jpeg","details":{"size":601493,"image":{"width":850,"height":567}},"fileName":"HYTU105_0208.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"5mrRF9Q1CAWxwnKt6eR9d8","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-12T22:37:19.490Z","updatedAt":"2024-12-12T22:37:19.490Z","_updatedAt":"2024-12-12T22:37:19.490Z","entryTitle":"harry-potter-wizards-of-baking-episode-five-recap-text-section-5","text":"## Rock around the clock \n\nZoe and Jordan decide that a Time-Turner themed cake should be themed around the mechanics of time-keeping itself, going for an industrial aesthetic, complete with cogs and dials.\n\nBut that is not all, no, no! On top of effectively becoming clockmakers, the team are also nodding to Dumbledore with...you guessed it, more sherbet lemons. \n\nZoe explains how the lemons will be hidden inside an infinity mirror, and will magically appear. Okay, can someone please give her the Nobel Prize?! "},{"contentfulId":"6PcYRRWANotyx8l9a60Obo","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-16T11:56:45.703Z","updatedAt":"2024-12-16T11:56:45.703Z","_updatedAt":"2024-12-16T11:56:45.703Z","entryTitle":"HP-WOB-episode-5-screengrabs-clock-cake-close-up","image":{"contentfulId":"435Oq9X0NKs2wYQSmYa2kQ","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-16T11:56:39.059Z","updatedAt":"2024-12-16T11:56:39.059Z","_updatedAt":"2024-12-16T11:56:39.059Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-5-screengrabs-clock-cake-close-up","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/435Oq9X0NKs2wYQSmYa2kQ/53ab587a7d68f50b70107eb2a04cea0d/HYTU105_0093.jpeg","details":{"size":511555,"image":{"width":850,"height":567}},"fileName":"HYTU105_0093.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"1Sk2NpRAUsbqcXGcPbgT7v","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-12T22:44:45.956Z","updatedAt":"2024-12-12T22:44:45.956Z","_updatedAt":"2024-12-12T22:44:45.956Z","entryTitle":"harry-potter-wizards-of-baking-episode-five-recap-text-section-6","text":"## Picture perfect\n\n'For us, Snape is our unsung hero' Miko and Chris confess, as they look for subjects for their Hogwarts Portrait cake. Alongside Professor Dumbledore (of course) the pair decide to contrast the headmaster with a character that would be VERY important to his arc... clever! \n\nBut can the duo pull off such a complicated concept? Or will they *paint* themselves into a corner?"},{"contentfulId":"417t0sb7sRlaQC58pPmi8A","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-16T10:56:06.290Z","updatedAt":"2024-12-16T10:56:06.290Z","_updatedAt":"2024-12-16T10:56:06.290Z","entryTitle":"harry-potter-wizards-of-baking-episode-five-recap-screengrab-snape-portrait","image":{"contentfulId":"6m5MsvqXlDK0LNOYAx3RfI","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-16T10:56:03.455Z","updatedAt":"2024-12-16T10:56:03.455Z","_updatedAt":"2024-12-16T10:56:03.455Z","revision":1,"locale":"en-GB","title":"harry-potter-wizards-of-baking-episode-five-recap-screengrab-snape-portrait","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6m5MsvqXlDK0LNOYAx3RfI/93ff6a564763ed27435558e455dd35e0/HYTU105_0278.jpeg","details":{"size":598440,"image":{"width":850,"height":567}},"fileName":"HYTU105_0278.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"7ivMPHtyRXvkErcVSxB2hV","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-12T22:19:59.390Z","updatedAt":"2024-12-12T22:19:59.390Z","_updatedAt":"2024-12-12T22:19:59.390Z","entryTitle":"harry-potter-wizards-of-baking-episode-five-recap-text-section-7","text":"## Beyond the bakes\n\nSpeaking of turning back time... we get to know a little more about the bakers' backstories - such as Miko's history as a painter, which gave him the artistic acumen to turn his creative skill into baking. Zoe tells a moving tale about how creating fantastical cakes for her children brought her closer to her family. Accio tissues?"},{"contentfulId":"3JBJPnOdRdYBlkkXZcoc6P","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-16T11:47:40.323Z","updatedAt":"2024-12-16T11:47:40.323Z","_updatedAt":"2024-12-16T11:47:40.323Z","entryTitle":"harry-potter-wizards-of-baking-episode-five-recap-screengrab-zoe-works-on-cake","image":{"contentfulId":"4X09eudjHShHTZVfLuATvo","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-16T10:56:41.779Z","updatedAt":"2024-12-16T10:56:41.779Z","_updatedAt":"2024-12-16T10:56:41.779Z","revision":1,"locale":"en-GB","title":"harry-potter-wizards-of-baking-episode-five-recap-screengrab-zoe-perfects-time-turner-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4X09eudjHShHTZVfLuATvo/10a707b0cac8d3140f7f1911c6e90708/HYTU105_0179.jpeg","details":{"size":669889,"image":{"width":850,"height":567}},"fileName":"HYTU105_0179.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"1VDjC1WPWfyRcfvgyrzFEs","type":"Entry","revision":6,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-12T22:22:23.891Z","updatedAt":"2024-12-12T22:51:27.971Z","_updatedAt":"2024-12-12T22:51:27.971Z","entryTitle":"harry-potter-wizards-of-baking-episode-five-recap-text-section-8","text":"## Burning Day comes early for Fawkes?\n\nAs ever, there is chaos in the kitchen yet again this week. We thought this just happened at our house.\n\nThis time, Elizabeth is the one who is cursed, as her phoenix wings begin to fall apart! Thankfully, she has the most keep-calm-and-carry-on reaction, ever. \n\n'Can we have a dustpan and brush, please?' - that's the spirit, girl.\n\nMiko \u0026 Chris aren't having better luck... with gaps in their portrait frame, the pair hold their breath and try and fix everything with more chocolate. Well, we're not complaining about that."},{"contentfulId":"59zkfNknDbdzRLRJYm0ICR","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-12T22:38:10.954Z","updatedAt":"2024-12-16T11:54:03.447Z","_updatedAt":"2024-12-16T11:54:03.447Z","entryTitle":"HP-WOB-episode-5-screengrabs-elizabeth-struggles-with-fawkes-wings","image":{"contentfulId":"2BhNp83YJl3WgrLwConnFT","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-16T11:54:01.139Z","updatedAt":"2024-12-16T11:54:01.139Z","_updatedAt":"2024-12-16T11:54:01.139Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-5-screengrabs-elizabeth-struggles-with-fawkes-wings-2","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2BhNp83YJl3WgrLwConnFT/168d19f36fc0e82cb6a602c8282e3c3a/HYTU105_0077.jpeg","details":{"size":572516,"image":{"width":850,"height":567}},"fileName":"HYTU105_0077.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"1UmYBaqsRKVDTwfK22zczF","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-12T22:22:27.344Z","updatedAt":"2024-12-12T22:52:31.433Z","_updatedAt":"2024-12-12T22:52:31.433Z","entryTitle":"harry-potter-wizards-of-baking-episode-five-recap-text-section-9","text":"## Judging time\n\nBut finally, the teams sojourn to Dumbledore's office to get their showpieces assessed by the judges - but also Bonnie! The actor seems extremely pleased with her new job as cake-tester.\n\nWhile Miko and Chris's dual-professors effect inspires awe and Zoe and Jordan's intricate clock-themed cake is an all-timer (do you see what we're...okay, never mind) it is once again Elizabeth and Juan who take our breath away with the most detailed (yet edible!) interpretation of Fawkes ever seen.\n\nWe wish once this cake is eaten, it could be reborn just like our favourite [phoenix.](https://www.harrypotter.com/fact-file/creatures/phoenix)"},{"contentfulId":"1JVzhGpTmczRLY57494tG8","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-12T22:30:33.021Z","updatedAt":"2024-12-16T11:55:04.185Z","_updatedAt":"2024-12-16T11:55:04.185Z","entryTitle":"HP-WOB-episode-5-screengrabs-phoenix-cake-full","image":{"contentfulId":"71mj28gHoV9RGGRkpO8qHI","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-16T11:55:01.929Z","updatedAt":"2024-12-16T11:55:01.929Z","_updatedAt":"2024-12-16T11:55:01.929Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-5-screengrabs-phoenix-cake-full","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/71mj28gHoV9RGGRkpO8qHI/fc96bcbbaa0c2d05c3dec78d4d18ab6d/HYTU105_0244.jpeg","details":{"size":619506,"image":{"width":850,"height":567}},"fileName":"HYTU105_0244.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"VmTJPrOyUOf2ezXLVu8QM","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-12T22:34:12.925Z","updatedAt":"2024-12-12T22:55:01.581Z","_updatedAt":"2024-12-12T22:55:01.581Z","entryTitle":"harry-potter-wizards-of-baking-episode-five-recap-text-section-10","text":"## One final hurdle\n\nHow on earth could anyone be sent home after these quirky concoctions? Just like Dumbledore himself, each cake was elegant and complex and... full of sherbet lemons! \n\nThe team that DO go home right before the final call the moment 'bittersweet', leaving only two pairs left for one final challenge.\n\nBy the grace of Merlin's pants, we have no idea how the finalists can 'exceed expectations' beyond all they've done already.\n\nWe will have to wait one more week to find out..."},{"contentfulId":"5jFaypMCVLabZF75f3HT0z","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:03:59.849Z","updatedAt":"2024-11-22T15:03:59.849Z","_updatedAt":"2024-11-22T15:03:59.849Z","entryTitle":"wizards-of-baking-generic-text-section-cta","text":"__Spel f-baking-episode-four-recap","mainImage":{"contentfulId":"6BnAIVQWIB3vNtJ9Uns4LH","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T19:52:22.827Z","updatedAt":"2024-12-06T19:52:22.827Z","_updatedAt":"2024-12-06T19:52:22.827Z","entryTitle":"HP-WOB-episode-four-screengrabs-horcrux-cake","image":{"contentfulId":"IPzFOMWnhUOmtjjWrYegQ","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T19:52:19.493Z","updatedAt":"2024-12-06T19:52:19.493Z","_updatedAt":"2024-12-06T19:52:19.493Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-horcrux-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/IPzFOMWnhUOmtjjWrYegQ/c68cdc385879a5a6e18eba8de28d0570/HYTU104_0312.jpeg","details":{"size":767558,"image":{"width":850,"height":567}},"fileName":"HYTU104_0312.jpeg","contentType":"image/jpeg"}}},"intro":"As the competition gets fiercer, today's episode got spookier, thanks to a foray into the Forbidden Forest. Thankfully, the always-delightful Evanna Lynch was on hand to bring some Luna-esque cheer to proceedings. ","author":{"contentfulId":"2rkKHoWCQydFLzxjiO9jUS","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"author","createdAt":"2024-10-01T14:45:10.477Z","updatedAt":"2024-10-01T14:48:00.948Z","_updatedAt":"2024-10-01T14:48:00.948Z","entryTitle":"Signature-Harry-Potter-Editorial-Team","displayTitle":"Written by","title":"The Harry Potter Editorial Team","mainImage":{"contentfulId":"jxbSiAfafvRThYeCQZET8","type":"Asset","contentTypeId":"asset","createdAt":"2024-10-01T14:45:08.335Z","updatedAt":"2024-10-01T14:45:08.335Z","_updatedAt":"2024-10-01T14:45:08.335Z","revision":1,"locale":"en-GB","title":"Golden HP logo initials","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/jxbSiAfafvRThYeCQZET8/497ddde0198c18d6ecf28108ba7dc8ad/Short-Harry-Potter-Logo-Gold-white.jpg","details":{"size":80997,"image":{"width":460,"height":460}},"fileName":"Short-Harry-Potter-Logo-Gold-white.jpg","contentType":"image/jpeg"}}},"section":[{"contentfulId":"472aMGahoZceVFerwYRKny","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T18:15:02.035Z","updatedAt":"2024-12-06T20:11:22.450Z","_updatedAt":"2024-12-06T20:11:22.450Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-1","text":"Last week, the bakers were overwhelmed by Diagon Alley-inspired tasks, with their wizarding shop-inspired bakes analysed by the judges... but also a full throng of Harry Potter superfans.\n\nSo, you'd think with all that stress, we can have a nice, wholesome, relaxing episode this week, right? Right? Wrong! \n\nThis week, with one less team in the competition, and a place in a semi-finals at stake, things are getting a little spooky, with Dark Arts-inspired creations and a visit to the Studio Tour's [Forbidden Forest](https://www.harrypotter.com/fact-file/locations/the-forbidden-forest) to get the contestants in the mood."},{"contentfulId":"6hIgldz3Pi7zBJZoUIhzMq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T18:17:30.480Z","updatedAt":"2024-12-06T18:17:30.480Z","_updatedAt":"2024-12-06T18:17:30.480Z","entryTitle":"HP-WOB-episode-four-screengrabs-invitation-to-create-dark-arts-bakes","image":{"contentfulId":"vLX818JjRXGwZn7a4udml","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T18:17:27.587Z","updatedAt":"2024-12-06T18:17:27.587Z","_updatedAt":"2024-12-06T18:17:27.587Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-invitation-to-create-dark-arts-bakes","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/vLX818JjRXGwZn7a4udml/d6f7ff4bb31e28ff620bf195a595d4f9/HYTU104_0006.jpeg","details":{"size":470257,"image":{"width":850,"height":567}},"fileName":"HYTU104_0006.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"EM5Cu5cfXhVOF5pRawlcf","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T18:55:30.202Z","updatedAt":"2024-12-06T18:55:30.202Z","_updatedAt":"2024-12-06T18:55:30.202Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-2","text":"## We *love* this *good* guest\n\nThankfully, we have a special guest from the Harry Potter family to cheer things up. It's Evanna Lynch! Famed for portraying Luna Lovegood in the films, Evanna is on-hand to support the bakers, alongside looking fabulous in the process. What, no Butterbeer cork necklace, though?"},{"contentfulId":"6AhPcT9s7znjzJDbMSvWnz","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T18:55:36.530Z","updatedAt":"2024-12-06T18:55:36.530Z","_updatedAt":"2024-12-06T18:55:36.530Z","entryTitle":"HP-WOB-episode-four-screengrabs-evanna-lynch-phelps-twins","image":{"contentfulId":"3BsUTNtmmWsIBP3cIFmNoL","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T17:55:04.976Z","updatedAt":"2024-12-06T17:55:04.976Z","_updatedAt":"2024-12-06T17:55:04.976Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-evanna-lynch-phelps-twins","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/3BsUTNtmmWsIBP3cIFmNoL/5e8106bd543a3bc59142e6bf351a3498/HYTU104_0029.jpeg","details":{"size":646755,"image":{"width":850,"height":567}},"fileName":"HYTU104_0029.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"3ZLOBSyUZpciTuVCWfp9Lo","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T18:35:37.729Z","updatedAt":"2024-12-06T20:14:40.418Z","_updatedAt":"2024-12-06T20:14:40.418Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-3","text":"## Wingardi-yum Leviosa\n\nUnderstandably, the baking teams are thrilled, with Lisa tearfully divulging that she is raising her children to have the same kind-hearted energy as [Luna Lovegood](https://www.harrypotter.com/fact-file/characters-and-pets/luna-lovegood). N'aww! Okay, now we have something in our eye too. \n\nBut not for long! The teams have a long day of baking ahead of them, tasked with creating three-feet tall cakes and other delicious treats fashioned around the darker elements of the Harry Potter stories. Oh, and they also must contain tasting elements comprised of ten layers. And! There must also be an enchanting element, inspired by the levitating charm, [Wingardium Leviosa](https://www.harrypotter.com/fact-file/spells/the-levitation-charm) too. Merlin's beard!\n\nOne thing's for sure: Aunt Petunia's sugared violet pudding ain't got nothing on this."},{"contentfulId":"1pyjro02aImFFBZ6HrPcrv","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T18:34:29.705Z","updatedAt":"2024-12-06T18:34:29.705Z","_updatedAt":"2024-12-06T18:34:29.705Z","entryTitle":"HP-WOB-episode-four-screengrabs-contestants-react","image":{"contentfulId":"22ycIFZS7PK0IJ70OdknBB","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T18:34:25.934Z","updatedAt":"2024-12-06T18:34:25.934Z","_updatedAt":"2024-12-06T18:34:25.934Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-bakers-creating-in-the-kitchen","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/22ycIFZS7PK0IJ70OdknBB/b7a1086a14373067d468b53d57d96b3e/HYTU104_0098.jpeg","details":{"size":712005,"image":{"width":850,"height":567}},"fileName":"HYTU104_0098.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"pqPOEHMnfxfmBgCMdURKB","type":"Entry","revision":5,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T18:41:46.600Z","updatedAt":"2024-12-06T18:53:40.580Z","_updatedAt":"2024-12-06T18:53:40.580Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-4","text":"## Delicious Dolores?\n\nThe teams are assigned their Dark Arts themes, ranging from Boggarts, Dementors, Horcruxes and maybe the most dastardly of all: [Professor Dolores Umbridge](https://www.harrypotter.com/writing-by-jk-rowling/dolores-umbridge). Thinking about it, this character should lend quite well to a dessert, what with being so sickly sweet and all... \n\nEdible tea cups, pink macarons and even a cake-cat will be on the menu for Zoe and Jordan."},{"contentfulId":"7HWl7VsHeEHjnUg3jpHc8w","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T18:39:54.438Z","updatedAt":"2024-12-06T18:39:54.438Z","_updatedAt":"2024-12-06T18:39:54.438Z","entryTitle":"HP-WOB-episode-four-screengrabs-umbridge-cake-concept","image":{"contentfulId":"FVkuzablitV7oCBdaSYbv","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T18:39:51.358Z","updatedAt":"2024-12-06T18:39:51.358Z","_updatedAt":"2024-12-06T18:39:51.358Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-umbridge-cake-concept","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/FVkuzablitV7oCBdaSYbv/00f08862efc64bb46735460776e55f6c/HYTU104_0049.jpeg","details":{"size":745652,"image":{"width":566,"height":850}},"fileName":"HYTU104_0049.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"3LZfXuIBCILqffok4QeOw1","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T18:52:24.619Z","updatedAt":"2024-12-06T18:52:24.619Z","_updatedAt":"2024-12-06T18:52:24.619Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-5","text":"## A Riddikulus endeavour\n\nMeanwhile, Mitzi and Lisa are focusing on the defying gravity element of the task (we hope they're holding space for it!) infused into a Boggart. And for these two: that Boggart will be spider-themed. Ron would absolutely concur. In fact, the pair will be paying homage to how Ron manages to banish his Boggart - aka - making the image comical in some way. And what's funnier than a giant arachnid wearing retro rollerskates?"},{"contentfulId":"ZyGQb18PdBA7fj0XcLwUZ","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T18:43:52.440Z","updatedAt":"2024-12-06T18:43:52.440Z","_updatedAt":"2024-12-06T18:43:52.440Z","entryTitle":"HP-WOB-episode-four-screengrabs-lisa-and-mitsis-spider-cake","image":{"contentfulId":"2NvhQLSRocpciuTs9FxPs6","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T18:43:50.049Z","updatedAt":"2024-12-06T18:43:50.049Z","_updatedAt":"2024-12-06T18:43:50.049Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-lisa-and-mitsis-spider-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2NvhQLSRocpciuTs9FxPs6/195ccba1b038d8af5cf351a8bdce1d84/HYTU104_0291.jpeg","details":{"size":705635,"image":{"width":850,"height":567}},"fileName":"HYTU104_0291.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"7M0eJd2z25Aamnwkvtzts4","type":"Entry","revision":7,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T18:55:55.502Z","updatedAt":"2024-12-06T20:16:27.822Z","_updatedAt":"2024-12-06T20:16:27.822Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-6","text":"## A bit o' help\n\nElizabeth and Juan, fresh off the back of their back-to-back wins, are conscious there's a 'target on their back'... (making spooky cakes will hardly make them less paranoid, then) and are given another magical advantage. In the famous words of Dumbledore, they discover that 'help will be given to those who need it'.\n\nThat help comes in the form of judge Jozef! Brilliantly, Elizabeth and Juan only need this accomplished chef to do a bit of icing for them. Stay humble, Jozef, stay humble."},{"contentfulId":"oPZgjEazWsxptdgdCulVH","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T18:51:15.352Z","updatedAt":"2024-12-06T18:51:15.352Z","_updatedAt":"2024-12-06T18:51:15.352Z","entryTitle":"HP-WOB-episode-four-screengrabs-elizabeth-gets-to-work","image":{"contentfulId":"5V6EgJC1acLzjq8zvEmuff","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T18:51:13.025Z","updatedAt":"2024-12-06T18:51:13.025Z","_updatedAt":"2024-12-06T18:51:13.025Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-elizabeth-gets-to-work","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/5V6EgJC1acLzjq8zvEmuff/8caf3e293aff9e3cec8fec8588cee4da/HYTU104_0074.jpeg","details":{"size":515653,"image":{"width":850,"height":567}},"fileName":"HYTU104_0074.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"1ObTz3kTv2oEBUJiwW1mdJ","type":"Entry","revision":4,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T18:56:12.609Z","updatedAt":"2024-12-06T19:48:44.330Z","_updatedAt":"2024-12-06T19:48:44.330Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-7","text":"## Broken cake alert!\n\nLisa and Mitzi soon learn the hard way that attaching rollerskates to a giant edible spider is...actually quite hard! (Who knew?!) leading to our first baking disaster of the episode. \n\nThankfully, these ladies are professionals, and those cake rollerskates (roller-cakes?) go straight in the fridge. Our Boggart is now a slightly wobbly cake after witnessing this baking misadventure."},{"contentfulId":"2B4unqwJWsYXRmh3bqvdXG","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T19:35:59.576Z","updatedAt":"2024-12-06T19:49:31.088Z","_updatedAt":"2024-12-06T19:49:31.088Z","entryTitle":"HP-WOB-episode-four-screengrabs-lisa-and-mitsi-work-on-spider","image":{"contentfulId":"4qhftOCP676yB7G92iTr0f","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T19:49:28.370Z","updatedAt":"2024-12-06T19:49:28.370Z","_updatedAt":"2024-12-06T19:49:28.370Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-lisa-and-mitsi-work-on-spider-2","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4qhftOCP676yB7G92iTr0f/da216ee5ccd8c21a3402b98fa80d3caa/HYTU104_0148.jpeg","details":{"size":617104,"image":{"width":850,"height":567}},"fileName":"HYTU104_0148.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"2SZVMCyRDXM9lV0NPxzZju","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T19:45:05.260Z","updatedAt":"2024-12-06T19:45:05.260Z","_updatedAt":"2024-12-06T19:45:05.260Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-8","text":"## Death by chocolate\n\nOver at Miko and Chris's station, the boys are working on a life-like Dementor. And how's this for a flex? They're making its ethereal cloak out of tempered chocolate. Yep, [the very thing that makes you feel better after a Dementor attack](https://www.harrypotter.com/writing-by-jk-rowling/dementors-and-chocolate). Smart. \n\nMiko's passion for hyper-real elements in his baking mean that his Dementor comes out looking worryingly realistic... damn, if we only had that [Patronus cake from episode one](https://www.harrypotter.com/features/harry-potter-wizards-of-baking-episode-one-recap) to conquer it! "},{"contentfulId":"3rRpFnXaoMngVBNMLmhPPT","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T19:50:14.324Z","updatedAt":"2024-12-06T19:50:14.324Z","_updatedAt":"2024-12-06T19:50:14.324Z","entryTitle":"HP-WOB-episode-four-screengrabs-dementor-cake","image":{"contentfulId":"37AKtUfCbcr2KCS8SFbTdi","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T19:50:11.123Z","updatedAt":"2024-12-06T19:50:11.123Z","_updatedAt":"2024-12-06T19:50:11.123Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-dementor-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/37AKtUfCbcr2KCS8SFbTdi/73c3860f6f19e99253b62b7bb6f43258/HYTU104_0232.jpeg","details":{"size":685019,"image":{"width":850,"height":567}},"fileName":"HYTU104_0232.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"1akftXvKPKFYuTwHyJRSjo","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T20:18:56.911Z","updatedAt":"2024-12-06T20:18:56.911Z","_updatedAt":"2024-12-06T20:18:56.911Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-9","text":"## Facing their fears\n\nJoined by special guest Evanna, the bakers and judges meet in the Forbidden Forest (as you do) to test out their scary bakes.\n\nZoe and Jordan's Umbridge cake is pretty in pink, but a few imperfections put them in danger."},{"contentfulId":"khgLypWP1R0befDgEZyzA","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T19:55:38.768Z","updatedAt":"2024-12-06T19:55:38.768Z","_updatedAt":"2024-12-06T19:55:38.768Z","entryTitle":"HP-WOB-episode-four-screengrabs-umbridge-cake","image":{"contentfulId":"6JznxkQPyc0HmmRaSOlM8o","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T19:55:35.897Z","updatedAt":"2024-12-06T19:55:35.897Z","_updatedAt":"2024-12-06T19:55:35.897Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-umbridge-cake","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6JznxkQPyc0HmmRaSOlM8o/e1ab06a9e5006a1871117903635f71e9/HYTU104_0196.jpeg","details":{"size":656115,"image":{"width":850,"height":567}},"fileName":"HYTU104_0196.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"1FrxniESL8Vf606MPhl8uG","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T20:04:06.941Z","updatedAt":"2024-12-06T20:04:06.941Z","_updatedAt":"2024-12-06T20:04:06.941Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-10","text":"Miko and Chris's chocolate Dementor creation comes with a black forrest cake (shouldn't that be black...Forbidden Forest?) and gets a warm reception from the judges. Will it be enough to take them to the semi-finals, though? Or will they get the kiss-off?\n\nMeanwhile, Lisa and Mitzi's wobbly Boggart spider sparks certainly raises eyebrows, but the flavours win over the judges. Carla even does the ol' \"it's not good...it's great!\" trick - always a classic reality judge move. And it gets us every time! \n\nFor reigning champions Elizabeth and Juan, their Horcrux-inspired showpiece features the Hufflepuff cup, an edible version of Nagini and even rotating Basilisk fang. However, Jozef is concerned that the finishing is a bit 'messy'. Hey, wait a minute, didn't you help them make this, sir?"},{"contentfulId":"7abnAeCOqsNnoj0Ift8M8i","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T20:03:44.540Z","updatedAt":"2024-12-06T20:03:44.540Z","_updatedAt":"2024-12-06T20:03:44.540Z","entryTitle":"HP-WOB-episode-four-screengrabs-horcrux-cake-close-up","image":{"contentfulId":"2raJC1KTBPVrCGauLpWMOw","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T20:03:40.321Z","updatedAt":"2024-12-06T20:03:40.321Z","_updatedAt":"2024-12-06T20:03:40.321Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-horcrux-cake-close-up","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2raJC1KTBPVrCGauLpWMOw/0ca62c37304aa58c844edc230734f842/HYTU104_0318.jpeg","details":{"size":683986,"image":{"width":850,"height":567}},"fileName":"HYTU104_0318.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"2BTOIHkZ8ndF6gU0Zv07yx","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-12-06T20:08:04.446Z","updatedAt":"2024-12-06T20:18:47.254Z","_updatedAt":"2024-12-06T20:18:47.254Z","entryTitle":"harry-potter-wizards-of-baking-episode-four-text-section-11","text":"## And in the end...\n\nIt is Miko and Chris's Dementor cake that takes the top prize, securing their safety for the next episode - and making them real contenders to take the all-important Wizards of Baking Cup.\n\nAs ever, we're not going to reveal who goes home here... but it is definitely emotional. \n\nNext week, the remaining teams hit Dumbledore's Office - and must make their biggest, most challenging showpieces yet! Come join us next week for more kitchen hi-jinks!"},{"contentfulId":"gJEjQFSEdJkmTERbuK65h","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2024-12-06T20:09:37.686Z","updatedAt":"2024-12-06T20:09:37.686Z","_updatedAt":"2024-12-06T20:09:37.686Z","entryTitle":"HP-WOB-episode-four-screengrabs-the-bakers-gather-in-the-forest","image":{"contentfulId":"4xbKRocL1StnXwefgPmrg0","type":"Asset","contentTypeId":"asset","createdAt":"2024-12-06T20:09:34.883Z","updatedAt":"2024-12-06T20:09:34.883Z","_updatedAt":"2024-12-06T20:09:34.883Z","revision":1,"locale":"en-GB","title":"HP-WOB-episode-four-screengrabs-the-bakers-gather-in-the-forest","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/4xbKRocL1StnXwefgPmrg0/5475378f5937428ea07a6ddd996cd963/HYTU104_0360.jpeg","details":{"size":778346,"image":{"width":850,"height":567}},"fileName":"HYTU104_0360.jpeg","contentType":"image/jpeg"}}},{"contentfulId":"5jFaypMCVLabZF75f3HT0z","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-11-22T15:03:59.849Z","updatedAt":"2024-11-22T15:03:59.849Z","_updatedAt":"2024-11-22T15:03:59.849Z","entryTitle":"wizards-of-baking-generic-text-section-cta","text":"__Spell-binding new competition series Harry Potter: Wizards of Baking to launch exclusively on Prime Video in the UK and Ireland on 17th December.__\n\nThe show is out now to [Max](https://www.max.com/geo-availability?utm_source=wizardingworld\u0026utm_medium=web\u0026utm_campaign=ACQ_3466_MAX\u0026utm_content=hp_streamnow) and Food Network - and you can learn more about the show at our [handy hub.](https://www.harrypotter.com/harry-potter-wizards-of-baking)"}],"relatedArticleReference":[{"contentfulId":"54aTtr3Fky6BxY6lU4j9Sq","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"article","createdAt":"2024-
