ction":[{"contentfulId":"4zl4O2Cj7qy2XMsDERHyWX","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-02-09T12:13:49.926Z","updatedAt":"2024-02-09T12:23:44.307Z","_updatedAt":"2024-02-09T12:23:44.307Z","entryTitle":"one-year-of-hogwarts-legacy-text-section-1","text":"Since launch, Hogwarts Legacy has been casting a spell on us in so many ways, with game-players discovering what kind of witching or wizarding life they truly want to lead at Hogwarts. You've discovered spells, you've brewed fabulous potions, you're the best dueller ever, you've unlocked secrets, you've got obsessed with side-quests and oh-so much more.\n\nTake a look at some of these crazy numbers on all of your gameplay activity. \n\n(And these have probably all gotten even bigger by the time of writing!) \n\n## 877,481,826 potions made\n\nThere are a lot of budding Snapes among you! Approximately 877 million potions have been brewed up during your time playing Hogwarts Legacy so far. Save us a bit of Felix Felicis if there's some going spare?\n\n## 5,252,741,694 Dark wizards killed \n\nA wise man once said we are \"as strong as we are united\", and that's clearly the case here. Altogether, you have vanquished over 5 billion Dark wizards in the game. You're giving off Auror vibes and we love to see it. \n\n## 783,164,104 stealth attacks"},{"contentfulId":"45TMzre47zIeglvLDmcmhW","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2023-01-25T13:40:21.357Z","updatedAt":"2023-01-25T13:40:21.357Z","_updatedAt":"2023-01-25T13:40:21.357Z","entryTitle":"Hogwarts-Legacy-Duelling","image":{"contentfulId":"2JIOEAfvJSLIVKivvpYZmh","type":"Asset","contentTypeId":"asset","createdAt":"2023-01-25T13:40:18.777Z","updatedAt":"2023-01-25T13:40:18.777Z","_updatedAt":"2023-01-25T13:40:18.777Z","revision":1,"locale":"en-GB","title":"Hogwarts-Legacy-Duelling","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/2JIOEAfvJSLIVKivvpYZmh/3c156f3aec192df652226517ce38ab42/Screenshot_2023-01-24_at_16.02.01.png","details":{"size":8745589,"image":{"width":2996,"height":1682}},"fileName":"Screenshot 2023-01-24 at 16.02.01.png","contentType":"image/png"}}},{"contentfulId":"I1owWw6F3ZkcDSBMwPeNo","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-02-12T10:18:58.244Z","updatedAt":"2024-02-12T10:18:58.244Z","_updatedAt":"2024-02-12T10:18:58.244Z","entryTitle":"one-year-of-hogwarts-legacy-text-section-2","text":"We all have different gameplay styles. Some of us... let's just say are more elegant than others. But it looks like there's a lot of secret ninjas among you out there. Over 700 million stealth attacks! That's Petrificus Totally cool. \n\n## 425,187,457 Merlin Trials solved\n\nAlright, clever clogs. Over 425 million of you clearly have a knack for lateral thinking - completely smashing the several Merlin Trials that crop up during the game. Which was your favourite?\n\n## 1,385,967,010 plants harvested\n\nWe've all been rooting for you - and look how you've grown! While Herbology is perhaps not seen as one of the more glamorous of Hogwarts lessons (juicing Snargaluff Pods sounds like an extremely humbling activity) you are clearly a green-fingered bunch, harvesting over 1 billion plants across the past 12 months collectively. As you've learnt, plant growing is super important for your progress in Hogwarts Legacy, be it for brewing better potions or even using them as weapons! And we imagine the gentle art of nurturing magical greenery has made you more centred, peaceful people all round. (Apart from when you're chucking a Chinese Chomping Cabbage at somebody during a duel.)"},{"contentfulId":"7i2fhD03qwi8wI0Uo2sTz7","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2023-02-03T14:23:13.946Z","updatedAt":"2023-02-03T14:23:13.946Z","_updatedAt":"2023-02-03T14:23:13.946Z","entryTitle":"Hogwarts-Legacy-Vivarium","image":{"contentfulId":"6dvXh8DKsjvBHk1jpIjjwr","type":"Asset","contentTypeId":"asset","createdAt":"2023-02-03T14:23:10.728Z","updatedAt":"2023-06-27T15:20:18.041Z","_updatedAt":"2023-06-27T15:20:18.041Z","revision":2,"locale":"en-GB","title":"Hogwarts-Legacy-Vivarium","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/6dvXh8DKsjvBHk1jpIjjwr/96229cfc0317d237fe244d2960776832/6dvXh8DKsjvBHk1jpIjjwr.png","details":{"size":1632238,"image":{"width":2480,"height":1550}},"fileName":"6dvXh8DKsjvBHk1jpIjjwr.png","contentType":"image/png"}}},{"contentfulId":"7qttebPwXPQHJux3hozVCr","type":"Entry","revision":2,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-02-09T12:11:21.430Z","updatedAt":"2024-02-09T12:15:12.569Z","_updatedAt":"2024-02-09T12:15:12.569Z","entryTitle":"one-year-of-hogwarts-legacy-text-section-3","text":"## 2,990,821,595 instances of Ancient Magic used\n\nIn Hogwarts Legacy, our character taps into a deeper realm of power than we had previously seen before, engaging in the mysterious powers of Ancient Magic. And you lot love it! In the words of Niamh Fitzgerald, \"a magic this powerful can do great harm in the wrong hands. It must be wielded by a select few\" By becoming tuned into this long-forgotten magic, you have become more complex and powerful wizards and witches.\n\n## 5,306,108,339 spiders vanquished\n\nSomewhere in the future, Ron Weasley is smiling. You guys really don't like spiders, huh? Well, we can't blame you. We're something of an arachnophobe ourselves.\n\n## 51,430,548 hours on a broom\n\nHogwarts Legacy offers us so many wizarding activities - but sometimes, all we want to do is just soar joyfully through the Scottish highlands. Just for 5 minutes. Or, you know, 51 million hours... \n\nAnd for those of you favouring different modes of transport, such as a jaunt on a Graphorn, we reckon you spent about 973,000 hours doing that, give or take."},{"contentfulId":"1y14wYujdZ5JsfBD2vlA2I","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"image","createdAt":"2023-01-25T13:40:12.555Z","updatedAt":"2023-01-25T13:40:12.555Z","_updatedAt":"2023-01-25T13:40:12.555Z","entryTitle":"Hogwarts-Legacy-Flying-Through-Hogwarts-Broomstick","image":{"contentfulId":"7sfvc0Mo1MOIgC5Rm2Bwlm","type":"Asset","contentTypeId":"asset","createdAt":"2023-01-25T12:16:44.088Z","updatedAt":"2023-01-25T12:16:44.088Z","_updatedAt":"2023-01-25T12:16:44.088Z","revision":1,"locale":"en-GB","title":"Hogwarts-Legacy-Flying-Through-Hogwarts-Broomstick","description":"","file":{"url":"https://contentful.harrypotter.com/usf1vwtuqyxm/7sfvc0Mo1MOIgC5Rm2Bwlm/b8fb60a1208563bc5ca121f0ffb4e161/Screenshot_2023-01-24_at_16.01.46.png","details":{"size":8778237,"image":{"width":2968,"height":1656}},"fileName":"Screenshot 2023-01-24 at 16.01.46.png","contentType":"image/png"}}},{"contentfulId":"4xzGjDZCv05J2dinPs56f8","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"textSection","createdAt":"2024-02-09T12:16:26.398Z","updatedAt":"2024-02-12T10:19:15.660Z","_updatedAt":"2024-02-12T10:19:15.660Z","entryTitle":"one-year-of-hogwarts-legacy-text-section-4","text":"## 636,957,923 beasts captured\n\nFrom plant-lovers to animal-lovers... you are a wholesome bunch! From Graphorns to colourful Nifflers, we've loved channeling our inner Hagrids and nurturing all of these fantastic beasts. There's nothing more soothing than just chilling with your pet Kneazle in the Vivarium, is there?\n\n## 374,897,930 trolls killed\n\nMuch like a young Harry, Ron and Hermione, you also have a penchant for defeating trolls. 374 million, in fact. They really aren't that clever, are they?\n\n## And the most popular Hogwarts house so far is...\n\n(Drum roll) Slytherin!! But only by a whisker. Yes, as part of Hogwarts Legacy, your Hogwarts house is a vital part of your magical journey - and we're thrilled to see Slytherin house thriving among our Hogwarts Legacy community. Party down at the dungeons, anybody?\n\nPS: That's over 35 million houses discovered so far! That Sorting Hat is the hardest worker in the wizarding world! \n\n***\n\nAnd that's all only in one year. Where will the next 12 months take us, we wonder? But for now, let's celebrate Hogwarts Legacy's first anniversary in the best way possible: [with a blooper reel.](https://www.youtube.com/watch?v=gwyHqXMSkAw\u0026ab_channel=HogwartsLegacy)\n\n__[Hogwarts Legacy](https://www.hogwartslegacy.com/en-gb/purchase) is an immersive, open-world action RPG set in the world first introduced in the Harry Potter books. Here, you can find the latest news about the game, deep-dives guides, videos and more. Hogwarts Legacy is currently available on PC, PlayStation®5, PlayStation®4, PlayStation®4 Pro, Xbox Series X|S, Xbox One consoles and Nintendo Switch!__"}],"publishDate":"2024-02-09T00:00+00:00"}]},{"contentfulId":"7MYGTzAS0Gg2EGZf7XyZpQ","type":"Entry","revision":3,"locale":"en-GB","contentTypeId":"expandableTextSection","createdAt":"2022-12-06T16:21:56.240Z","updatedAt":"2023-01-25T14:15:58.618Z","_updatedAt":"2023-01-25T14:15:58.618Z","entryTitle":"Latest Hogwarts Legacy news text section","header":"Latest Hogwarts Legacy news","text":"From new gameplay footage, trailers, gameplay tips, easter eggs, interviews, voice cast news, deep-dives, news on exclusive in-game rewards, and beyond, take a look at all the latest Hogwarts Legacy updates right here!"},{"contentfulId":"3Py6EA8Hq41YHECokpducq","type":"Entry","revision":20,"locale":"en-GB","contentTypeId":"customComponent","createdAt":"2022-08-24T14:05:54.351Z","updatedAt":"2024-02-12T10:23:56.151Z","_updatedAt":"2024-02-12T10:23:56.151Z","entryTitle":"hogleg-promo-list-recent-articles","eyebrow":"Learn more about the game","header":"More Hogwarts Legacy news","subheader":"Dig deeper","componentName":"PromoList","contentSlots":[{"contentfulId":"4ABjh8CENwHEZWUYUMAjHu","type":"Entry","revision":1,"locale":"en-GB","contentTypeId":"links","createdAt":"2024-02-12T10:23:53.391Z","updatedAt":"2024-
